  <p>ブルズアイ: 前壁=12時 / 下壁=6時 / 中隔=左半 / 側壁=右半。基部=外周・中部・心尖・中心。</p>
  <div class="cols">
    <div class="terr" style="background:#3a1f27;border:1px solid #f0637a">LAD {1,2,7,8,13,14,17}<br><small>前壁・前中隔・心尖</small></div>
    <div class="terr" style="background:#1c2f45;border:1px solid #5b9bd5">RCA {3,4,9,10,15}<br><small>下壁・下中隔</small></div>
    <div class="terr" style="background:#1e3529;border:1px solid #7ecb8f">LCx {5,6,11,12,16}<br><small>側壁</small></div>
  </div>
  <div class="warn">⚠ 標準は右冠動脈優位(~85%)を仮定。心尖17と下壁/側壁の接合(4,5,9,10,11,15,16)は<b>個人差・優位性で変動</b>。長いwrap-around LADが心尖下壁/側壁を支配することも(CMR相関: Ortiz-Pérez 2008)。</div>

  <h2 id="r-dop">⑦ ドップラー規約 <span class="src" style="float:right">ASE / 教科書標準</span></h2>
  <p><b>BART</b>: プローブに近づく=赤 / 遠ざかる=青(カラーバーが正、装置により反転あり)。<b>モザイク</b>=ナイキスト限界超のエイリアシング折返し+乱流の分散(緑)。正常流入は層流で滑らか。</p>
  <p><b>心尖ビューの正常流</b>: 拡張期の房室弁流入は心尖へ=<span style="color:#e23b3b;font-weight:700">赤</span> / 収縮期のLVOT→大動脈流出は遠ざかる=<span style="color:#3b6fe2;font-weight:700">青</span>(In=赤, Out=青)。</p>
  <table><tr><th>病変</th><th>流入腔</th><th>時相</th><th>最適ビュー</th></tr>
    <tr><td>MR</td><td>左房(LV→LA)</td><td>収縮期</td><td>A4C / PLAX(VC)</td></tr>
    <tr><td>AR</td><td>左室(Ao→LV)</td><td>拡張期</td><td>PLAX / A5C(CW)</td></tr>
    <tr><td>AS</td><td>大動脈(LV→Ao)</td><td>収縮期</td><td>A5C / A3C(CW)</td></tr>
    <tr><td>MS</td><td>左室(LA→LV)</td><td>拡張期</td><td>A4C / PSAX</td></tr>
    <tr><td>TR</td><td>右房(RV→RA)</td><td>収縮期</td><td>A4C / RV流入</td></tr>
    <tr><td>PR</td><td>RVOT(PA→RVOT)</td><td>拡張期</td><td>PSAX-AV</td></tr>
    <tr><td>VSD</td><td>右室(LV→RV)</td><td>収縮期</td><td>傍胸骨 / 心尖</td></tr></table>
  <p>収縮期ジェット=MR/TR/AS/VSD。拡張期ジェット=AR/PR/MS(半月弁と房室弁は逆位相)。</p>

  <h2 id="r-diff">⑧ ガイドライン相違点(学習者向けに明示)</h2>
  <div class="warn">⚠ <b>機能性MRの高度基準</b>: ASE 2017は器質性と同じ(EROA≥0.40)だが、COAPT等の予後データで多くはEROA≥0.30/RVol≥45を高度とする(2020 ACC/AHA)。</div>
  <div class="warn">⚠ <b>MS高度のMVA</b>: ESC/EAE 2009=&lt;1.0cm² / 2020 ACC/AHA・2023 ASE=≤1.5cm²(超重症≤1.0)。</div>
  <div class="warn">⚠ <b>拡張能e′</b>: 2016は中隔&lt;7/側壁&lt;10。2025 ASE改訂で中隔≤6/側壁≤7/平均≤6.5に。混在させない。</div>

  <h2 id="r-src">⑨ 出典</h2>
  <p>Lang RM 他. ASE/EACVI 2015 Chamber Quantification, JASE 2015;28:1-39.<br>
     Zoghbi WA 他. ASE 2017 Native Valvular Regurgitation, JASE 2017;30:303-71.<br>
     Baumgartner H 他. ASE/EACVI 2017 Aortic Stenosis focused update, JASE 2017;30:372-92.<br>
     Baumgartner H 他. EAE/ASE 2009 Valve Stenosis, JASE 2009;22:1-23.<br>
     Nagueh SF 他. ASE/EACVI 2016 Diastolic Function, JASE 2016;29:277-314(改訂2025).<br>
     Rudski LG 他. ASE 2010 Right Heart, JASE 2010;23:685-713.<br>
     Cerqueira MD 他. AHA 2002 17-segment model, Circulation 2002;105:539-42.</p>
  <p class="src" style="margin-top:14px">※ 本アプリは学習・訓練用の模式化であり、実臨床の診断・計測の代替ではありません。数値は成人・標準的値で、個々の患者・装置・ガイドライン改訂で変わり得ます。</p>
  `;
}

/* =====================================================================
   🩺 病態モジュール — モルフォロジー重畳 + 所見 + 診断クイズ
   ===================================================================== */
const PATHOS=[
  {k:'none',jp:'正常',view:'A4C'},
  {k:'peff',jp:'心嚢液・タンポナーデ',view:'PLAX',hasSev:true,
    find:['心膜腔に echo-free space(黒い帯)','大量では拡張期に RA/RV 虚脱','IVC 拡大+呼吸性変動<50%(plethora)','swinging heart → 心電図 electrical alternans'],
    dx:'心タンポナーデ',teach:'量より貯留“速度”が重要。急速なら少量でもタンポナーデ。'},
  {k:'lvh',jp:'左室肥大 LVH',view:'PSAX-pap',
    find:['壁厚増加(IVS/PW>11mm, 高度>15mm)','内腔狭小化・求心性肥大','原因: 高血圧・AS','HCM=非対称中隔肥大+SAM+LVOT閉塞'],
    dx:'左室肥大',teach:'HCMでは中隔非対称肥大とSAMによるLVOT閉塞に注意。'},
  {k:'dcm',jp:'拡張型心筋症 DCM',view:'A4C',ef:0.16,
    find:['LV拡大・球状化(LVIDd増大)','びまん性の壁運動低下','EF高度低下(<30%)','弁輪拡大→機能性MR'],
    dx:'拡張型心筋症',teach:'“全周性”の低下が特徴。区域性ならまず虚血を疑う。'},
  {k:'rvo',jp:'右室圧/容量負荷(肺塞栓)',view:'PSAX-pap',
    find:['RV拡大(RV/LV径>1)','収縮期に中隔平坦化→LVがD-shape','McConnell徴候: RV中間部低下+心尖温存','TR上昇→PASP上昇・IVC拡大'],
    dx:'急性右室圧負荷(肺塞栓など)',teach:'圧負荷=収縮期D-shape / 容量負荷=拡張期D-shape。'},
  {k:'mvp',jp:'僧帽弁逸脱 MVP',view:'PLAX',
    find:['収縮期に弁尖が弁輪面を越えてLAへ>2mm偏位','後尖(P2)逸脱が多い','逸脱尖と反対方向への偏心性MR','粘液腫様変性・弁尖延長'],
    dx:'僧帽弁逸脱症',teach:'前尖逸脱→後方MR / 後尖逸脱→前方MR(逸脱と反対へ吹く)。'},
];
function selectPathology(k){
  S.pathology=k; const P=PATHOS.find(x=>x.k===k)||PATHOS[0];
  S.ef = (k==='dcm')?0.16:0.6;
  if(k==='peff' && !S.effusion) S.effusion=2;
  setViewAxis(P.view); S.playing=true;
  S.pathoRevealed=false; S.pathoGuess=null;
  buildRail();
}
function railPatho(){
  S.pathoMode=S.pathoMode||'learn';
  const P=PATHOS.find(x=>x.k===S.pathology)||PATHOS[0];
  const quiz=S.pathoMode==='quiz';
  rail.innerHTML=
    `<div class="sec"><h3>病態(所見の認識)</h3>
      <div class="seg" style="margin-bottom:10px">
        <button class="${!quiz?'on':''}" onclick="S.pathoMode='learn';buildRail()">学習</button>
        <button class="${quiz?'on':''}" onclick="startPathoQuiz()">診断クイズ</button>
      </div>
      ${!quiz?`<select onchange="selectPathology(this.value)">${PATHOS.map(p=>`<option value="${p.k}" ${S.pathology===p.k?'selected':''}>${p.jp}</option>`).join('')}</select>`:''}
    </div>`+
    (S.pathology==='peff'&&!quiz? `<div class="sec"><h3>心嚢液の量</h3>
      <div class="seg">${[['1','少量'],['2','中等量'],['3','大量→タンポナーデ']].map(([v,l])=>`<button class="${S.effusion==v?'on':''}" onclick="S.effusion=${v};buildRail()">${l}</button>`).join('')}</div>
      <div class="note" style="margin-top:7px">大量では拡張期に右心が虚脱。IVCビューでplethora(拡大・虚脱消失)も確認を。</div></div>`:'')+
    (!quiz&&P.find? `<div class="sec"><h3>${P.jp} の所見</h3>
      <ul style="margin:0 0 0 16px;padding:0;font-size:12px;color:var(--ink);line-height:1.7">${P.find.map(f=>`<li>${f}</li>`).join('')}</ul>
      <div class="note" style="margin-top:8px"><b>Point:</b> ${P.teach}</div></div>`:'')+
    (quiz? pathoQuizSection():'')+
    cycleSection();
  restorePhaseUI();
}
function pathoQuizSection(){
  const opts=PATHOS.filter(p=>p.k!=='none');
  let ans='';
  if(S.pathoRevealed){ const P=PATHOS.find(x=>x.k===S.pathology); const ok=S.pathoGuess===S.pathology;
    ans=`<div class="answerbox reveal"><div class="big" style="color:${ok?'#34d399':'#f87171'}">${P.dx||P.jp}</div>
      <div class="mini" style="text-align:center">あなた: ${(PATHOS.find(x=>x.k===S.pathoGuess)||{}).jp||'—'} ${ok?'<b style=\"color:#34d399\">正解!</b>':'<b style=\"color:#f87171\">不正解</b>'}</div>
      <ul style="margin:7px 0 0 16px;padding:0;font-size:11px;color:var(--ink2);line-height:1.6">${(P.find||[]).map(f=>`<li>${f}</li>`).join('')}</ul></div>`;
  }
  return `<div class="sec"><h3>この所見の診断は?</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      ${opts.map(p=>`<button class="pbtn" onclick="guessPatho('${p.k}')">${p.jp}</button>`).join('')}
    </div>${ans}
    <div class="row" style="margin-top:10px"><button class="btn" onclick="startPathoQuiz()">次の症例 →</button></div>
    <div style="margin-top:9px"><span class="scorepill">正解 ${S.pathoScore||0} / ${S.pathoN||0}</span></div></div>`;
}
function startPathoQuiz(){
  S.pathoMode='quiz'; const opts=PATHOS.filter(p=>p.k!=='none');
  const p=opts[Math.floor(Math.random()*opts.length)];
  S.pathology=p.k; S.ef=(p.k==='dcm')?0.16:0.6; if(p.k==='peff') S.effusion=3;
  setViewAxis(p.view); S.playing=true; S.pathoRevealed=false; S.pathoGuess=null;
  buildRail();
}
function guessPatho(k){ if(S.pathoRevealed) return; S.pathoGuess=k; S.pathoRevealed=true;
  S.pathoN=(S.pathoN||0)+1; if(k===S.pathology) S.pathoScore=(S.pathoScore||0)+1; buildRail(); }

/* --- モルフォロジー重畳(スタブを上書き) --- */
function drawPathoOverlay(view){
  if(S.module!=='patho'||S.pathology==='none') return;
  if(S.pathology==='peff') drawEffusion(view);
  else if(S.pathology==='lvh') drawLVH(view);
  else if(S.pathology==='rvo') drawRVoverload(view);
  else if(S.pathology==='mvp') drawMVP(view);
  else if(S.pathology==='dcm') drawDCMnote(view);
  // クイズ時は病名を伏せる(所見のみ)
  if(!(S.pathoMode==='quiz'&&!S.pathoRevealed)){
    const P=PATHOS.find(x=>x.k===S.pathology);
    ex.textAlign='right'; ex.textBaseline='top'; ex.font='700 12px sans-serif'; ex.fillStyle='#ffd0d8';
    ex.fillText(P?P.jp:'', EW-12, 12);
  }
}
function drawEffusion(view){
  const eff=S.effusion||1, U=EH, off=eff*U*0.03+U*0.02;
  ex.save(); ex.strokeStyle='#e6eef8'; ex.lineWidth=2; ex.fillStyle='#02050b';
  const band=(cx,cy,rIn,a0,a1)=>{ // 無エコー帯 + 明るい心膜線
    ex.beginPath(); ex.arc(cx,cy,rIn+off,a0,a1); ex.arc(cx,cy,rIn,a1,a0,true); ex.closePath(); ex.fill();
    ex.beginPath(); ex.arc(cx,cy,rIn+off,a0,a1); ex.stroke();
  };
  if(view==='PLAX'){
    const midY=EH*0.5;
    band(EW*0.42, midY, U*0.175, 0.25, Math.PI-0.25);           // 後方(LV後方)
    band(EW*0.45, midY-U*0.02, U*0.235, Math.PI+0.45, TAU-0.45); // 前方(RV前)
    label('心嚢液',EW*0.42,midY+U*0.235,'#bcd7ef',10);
  } else if(view==='A4C'||view==='SC4C'){
    const cx=EW/2, apexY=EH*0.08;
    band(cx, apexY+U*0.38, U*0.30, 0.32, Math.PI-0.32);
    band(cx, apexY+U*0.38, U*0.30, Math.PI+0.32, TAU-0.32);
    label('心嚢液',cx,apexY+U*0.72,'#bcd7ef',10);
  } else { // 短軸=全周性
    const cx=EW/2, cy=EH*0.52;
    ex.beginPath(); ex.arc(cx,cy,EH*0.40+off,0,TAU); ex.arc(cx,cy,EH*0.40,0,TAU,true); ex.fill();
    ex.beginPath(); ex.arc(cx,cy,EH*0.40+off,0,TAU); ex.stroke();
    label('心嚢液',cx,cy-EH*0.40-off-8,'#bcd7ef',10);
  }
  ex.restore();
  if(eff>=3){ // タンポナーデ
    ex.textAlign='center'; ex.fillStyle='#f87171'; ex.font='800 14px sans-serif';
    ex.fillText('⚠ 大量 → 心タンポナーデ', EW*0.5, EH*0.13);
    if(contractF(S.phase)<0.25){ ex.fillStyle='#fbbf24'; ex.font='700 11px sans-serif';
      ex.fillText('拡張期: 右房・右室が虚脱', EW*0.5, EH*0.185); }
  }
}
function drawLVH(view){
  const U=EH;
  if(view.startsWith('PSAX')){
    const cx=EW/2, cy=EH*0.52, R=EH*0.40, lvR=R*0.52, wall=lvR*0.34;
    ex.save(); ex.beginPath(); ex.arc(cx,cy,lvR,0,TAU); ex.arc(cx,cy,lvR-wall*1.75,0,TAU,true);
    ex.fillStyle='rgba(150,66,86,.55)'; ex.fill('evenodd'); ex.restore();
    ex.fillStyle='#ffb0bd'; ex.font='700 10px sans-serif'; ex.textAlign='center'; ex.fillText('求心性の壁肥厚', cx, cy-lvR-6);
  } else {
    const midY=EH*0.5;
    ex.fillStyle='rgba(150,66,86,.5)';
    ex.fillRect(EW*0.30, midY-U*0.20, U*0.24, U*0.06);  // IVS 肥厚
    ex.fillRect(EW*0.30, midY+U*0.14, U*0.24, U*0.06);  // 後壁 肥厚
    ex.fillStyle='#ffb0bd'; ex.font='700 10px sans-serif'; ex.textAlign='left'; ex.fillText('壁肥厚', EW*0.55, midY-U*0.19);
  }
}
function drawRVoverload(view){
  const U=EH;
  if(view.startsWith('PSAX')){
    const cx=EW/2, cy=EH*0.52, R=EH*0.40, lvR=R*0.52;
    // 中隔平坦化(D-shape): RV側を直線化
    ex.strokeStyle='#2a4a6d'; ex.lineWidth=lvR*0.28; ex.lineCap='round';
    ex.beginPath(); ex.moveTo(cx-lvR*0.62, cy-lvR*0.68); ex.lineTo(cx-lvR*0.62, cy+lvR*0.68); ex.stroke();
    // 拡大RV
    ex.strokeStyle='#5b9bd5'; ex.lineWidth=3;
    ex.beginPath(); ex.ellipse(cx-lvR*1.35, cy, lvR*1.0, lvR*1.05, 0, -1.1, 1.1); ex.stroke();
    ex.fillStyle='#7dd3fc'; ex.font='800 12px sans-serif'; ex.textAlign='center'; ex.fillText('D-shape', cx+lvR*0.1, cy);
    ex.fillStyle='#cfe4ff'; ex.font='700 10px'; ex.fillText('RV拡大', cx-lvR*1.35, cy);
  } else if(view==='A4C'){
    ex.fillStyle='#7dd3fc'; ex.font='700 11px sans-serif'; ex.textAlign='center';
    ex.fillText('RV/LV径 >1(RV拡大)', EW*0.5, EH*0.16);
  }
}
function drawMVP(view){
  const sys=contractF(S.phase), U=EH;
  if(view==='PLAX'){
    const midY=EH*0.5, hx=EW*0.40+U*0.205*0.86;
    ex.strokeStyle='#ffd0d8'; ex.lineWidth=U*0.014; ex.lineCap='round';
    ex.beginPath(); ex.moveTo(hx,midY+U*0.015);
    ex.quadraticCurveTo(hx+U*0.05, midY+U*0.015+sys*U*0.09, hx+U*0.02, midY+U*0.10); ex.stroke();
    if(sys>0.3){ ex.fillStyle='#ffd0d8'; ex.font='700 9px sans-serif'; ex.textAlign='center'; ex.fillText('弁尖の逸脱', hx+U*0.03, midY+U*0.13);
      drawJet(hx+U*0.01, midY+U*0.03, 0.7, 0.6, U*0.15, 'turbBlue','mod', sys); }
  } else if(view==='A4C'){
    const cx=EW/2, apexY=EH*0.08, R=EH*0.9, lvCx=cx+R*0.12, valveY=apexY+R*0.60;
    ex.strokeStyle='#ffd0d8'; ex.lineWidth=U*0.013;
    ex.beginPath(); ex.moveTo(lvCx,valveY-U*0.005); ex.quadraticCurveTo(lvCx+U*0.02, valveY+sys*U*0.06, lvCx-U*0.03, valveY+U*0.08); ex.stroke();
    if(sys>0.3) drawJet(lvCx, valveY+U*0.02, Math.PI/2+0.4, 0.6, U*0.18, 'turbBlue','mod', sys);
  }
}
function drawDCMnote(view){
  ex.fillStyle='#f8b', ex.font='700 11px sans-serif'; ex.textAlign='center';
  ex.fillText('LV拡大・球状化 / びまん性壁運動低下 / EF↓↓', EW*0.5, EH*0.90);
}

/* onModuleEnter を拡張版で上書き(S.ef リセット等) */
function onModuleEnter(m){
  if(m==='ef'){ if(S.efTarget===undefined) newEF(); else S.ef=S.efTarget; setViewAxis('A4C'); S.playing=true; }
  else if(m==='wall'){ S.ef=0.6; if(Object.keys(S.segStates).length===0) initSegStates(); S.wallMode=S.wallMode||'learn'; setViewAxis('PSAX-pap'); S.playing=true; }
  else if(m==='doppler'){ S.ef=0.6; const L=LESIONS.find(x=>x.k===S.lesion); if(L&&L.view) setViewAxis(L.view); else setViewAxis('A4C'); S.playing=true; }
  else if(m==='patho'){ S.pathoMode=S.pathoMode||'learn'; if(!S.pathology||S.pathology==='none') S.pathology='peff'; const P=PATHOS.find(x=>x.k===S.pathology); S.ef=(S.pathology==='dcm')?0.16:0.6; if(P) setViewAxis(P.view); S.playing=true; }
  else { S.ef=0.6; }
}
</script>
