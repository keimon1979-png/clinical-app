<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="心エコー3D">
<title>心エコー3D — 断面・EF・壁運動・ドップラー訓練</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🫀</text></svg>">
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root{
  --bg:#0b1220; --panel:#111a2b; --panel2:#0e1626; --line:#22304a;
  --ink:#e6edf7; --ink2:#9fb0c8; --ink3:#6b7d99;
  --accent:#38bdf8; --accent2:#22d3ee; --good:#34d399; --warn:#fbbf24; --bad:#f87171;
  --lv:#f0637a; --rv:#5b9bd5; --la:#f0a35e; --ra:#7ecb8f; --ao:#c98bea; --valve:#e8eaed;
}
html,body{ height:100%; }
body{ font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','ヒラギノ角ゴ ProN','Meiryo',sans-serif;
  background:var(--bg); color:var(--ink); display:flex; flex-direction:column; overflow:hidden; font-size:13px; }
button{ font-family:inherit; }

/* header */
.hdr{ height:46px; flex-shrink:0; display:flex; align-items:center; gap:10px; padding:0 12px;
  background:linear-gradient(120deg,#0e1a2e,#12233d 60%,#0b1a2c); border-bottom:1px solid var(--line); }
.hdr h1{ font-size:15px; font-weight:800; letter-spacing:.02em; display:flex; align-items:center; gap:7px; }
.hdr .sub{ font-size:10.5px; color:var(--ink3); font-weight:600; }
.hdr .home{ margin-left:auto; font-size:11px; color:var(--ink2); text-decoration:none; border:1px solid var(--line);
  padding:5px 11px; border-radius:8px; background:rgba(255,255,255,.03); }
.hdr .home:hover{ background:rgba(255,255,255,.08); color:var(--ink); }

/* tabs */
.tabs{ display:flex; gap:4px; padding:7px 10px 0; background:var(--panel2); border-bottom:1px solid var(--line);
  flex-shrink:0; overflow-x:auto; }
.tab{ background:transparent; border:1px solid transparent; border-bottom:none; color:var(--ink2);
  padding:8px 14px; border-radius:10px 10px 0 0; cursor:pointer; font-size:12.5px; font-weight:700; white-space:nowrap; }
.tab .ic{ margin-right:5px; }
.tab.active{ background:var(--panel); color:var(--ink); border-color:var(--line); box-shadow:inset 0 2px 0 var(--accent); }
.tab:hover:not(.active){ color:var(--ink); background:rgba(255,255,255,.03); }

/* layout */
.main{ flex:1; display:flex; min-height:0; overflow:hidden; }
.viewwrap{ flex:1; display:flex; min-height:0; overflow:hidden; position:relative; }
.ref-panel{ position:absolute; inset:0; z-index:20; overflow-y:auto; background:linear-gradient(180deg,#0c1424,#0a1220); padding:20px 26px 40px; }
.ref-panel::-webkit-scrollbar{ width:9px; } .ref-panel::-webkit-scrollbar-thumb{ background:#233149; border-radius:4px; }
.ref-panel h2{ font-size:15px; color:#7dd3fc; margin:22px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--line); font-weight:800; }
.ref-panel h2:first-child{ margin-top:0; }
.ref-panel table{ width:100%; border-collapse:collapse; margin:6px 0 4px; font-size:12px; }
.ref-panel th, .ref-panel td{ border:1px solid var(--line); padding:5px 8px; text-align:left; vertical-align:top; }
.ref-panel th{ background:#12213a; color:var(--ink2); font-weight:700; }
.ref-panel td.sev{ color:#f8a; font-weight:700; }
.ref-panel .src{ font-size:10.5px; color:var(--ink3); margin:2px 0 4px; }
.ref-panel .warn{ background:#20180a; border:1px solid #4a3a1a; border-radius:8px; padding:8px 11px; font-size:11.5px; color:#e8c98a; margin:8px 0; }
.ref-panel p{ font-size:12.5px; color:var(--ink2); line-height:1.6; margin:5px 0; }
.ref-panel .cols{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin:6px 0; }
.ref-panel .terr{ border-radius:8px; padding:9px 11px; font-size:11.5px; line-height:1.5; }
.ref-toc{ font-size:12px; line-height:1.9; }
.ref-toc a{ color:var(--accent2); text-decoration:none; cursor:pointer; display:block; }
.ref-toc a:hover{ color:#fff; }
.pane{ flex:1; min-width:0; position:relative; display:flex; flex-direction:column; }
.pane + .pane{ border-left:1px solid var(--line); }
.pane-hd{ position:absolute; top:8px; left:10px; z-index:5; font-size:11px; font-weight:800; letter-spacing:.03em;
  color:var(--ink); background:rgba(8,14,24,.62); backdrop-filter:blur(3px); padding:4px 9px; border-radius:8px;
  border:1px solid var(--line); pointer-events:none; }
.pane-hd small{ color:var(--ink3); font-weight:600; margin-left:6px; }
#gl{ width:100%; height:100%; display:block; touch-action:none; cursor:grab; background:radial-gradient(circle at 50% 40%,#0f1d33,#080f1b 75%); }
#gl:active{ cursor:grabbing; }
.echo-hold{ flex:1; display:flex; align-items:center; justify-content:center; min-height:0; padding:6px; background:#05080f; }
#echo{ width:100%; height:100%; display:block; }
.badge3d{ position:absolute; right:10px; top:8px; z-index:5; display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-end; max-width:60%; }
.chip{ font-size:10px; font-weight:700; padding:3px 8px; border-radius:20px; border:1px solid var(--line); background:rgba(8,14,24,.55); }
.chip .dot{ display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; vertical-align:middle; }

/* control rail */
.rail{ width:300px; flex-shrink:0; background:var(--panel); border-left:1px solid var(--line);
  display:flex; flex-direction:column; overflow-y:auto; }
.rail::-webkit-scrollbar{ width:8px; } .rail::-webkit-scrollbar-thumb{ background:#233149; border-radius:4px; }
.sec{ padding:12px 13px; border-bottom:1px solid var(--line); }
.sec h3{ font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--ink3); margin-bottom:9px; font-weight:800; }
.presetgrid{ display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.pbtn{ background:var(--panel2); border:1px solid var(--line); color:var(--ink); padding:8px 7px; border-radius:9px;
  cursor:pointer; font-size:12px; font-weight:700; text-align:left; line-height:1.25; transition:.12s; }
.pbtn small{ display:block; color:var(--ink3); font-weight:600; font-size:9.5px; margin-top:1px; }
.pbtn:hover{ border-color:var(--accent); background:#13233c; }
.pbtn.on{ border-color:var(--accent); background:#123048; box-shadow:0 0 0 1px var(--accent) inset; }
.field{ margin-bottom:11px; }
.field label{ display:flex; justify-content:space-between; font-size:11px; color:var(--ink2); font-weight:700; margin-bottom:5px; }
.field label .v{ color:var(--accent2); font-variant-numeric:tabular-nums; }
input[type=range]{ width:100%; -webkit-appearance:none; height:5px; border-radius:3px; background:#1d2b42; outline:none; }
input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:17px; height:17px; border-radius:50%;
  background:var(--accent); cursor:pointer; border:2px solid #0b1220; box-shadow:0 1px 4px rgba(0,0,0,.5); }
.seg{ display:flex; gap:4px; background:var(--panel2); border:1px solid var(--line); border-radius:9px; padding:3px; }
.seg button{ flex:1; background:transparent; border:none; color:var(--ink2); padding:6px 4px; border-radius:6px; cursor:pointer;
  font-size:11px; font-weight:700; }
.seg button.on{ background:var(--accent); color:#04121f; }
.hint{ font-size:11px; color:var(--ink3); line-height:1.5; }
.hint b{ color:var(--ink2); }
.btn{ display:block; width:100%; padding:9px; border-radius:9px; border:1px solid var(--line); background:var(--panel2);
  color:var(--ink); font-weight:800; font-size:12.5px; cursor:pointer; }
.btn.primary{ background:linear-gradient(135deg,#0891b2,#0e7490); border-color:#0e7490; }
.btn.primary:hover{ filter:brightness(1.12); }
.btn.ghost:hover{ border-color:var(--accent); }
.row{ display:flex; gap:7px; }
.row>*{ flex:1; }
.kpi{ background:var(--panel2); border:1px solid var(--line); border-radius:9px; padding:9px 10px; text-align:center; }
.kpi .n{ font-size:20px; font-weight:800; font-variant-numeric:tabular-nums; }
.kpi .l{ font-size:9.5px; color:var(--ink3); font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-top:1px; }
.play{ display:flex; align-items:center; gap:8px; }
.iconbtn{ width:38px; height:34px; border-radius:8px; border:1px solid var(--line); background:var(--panel2); color:var(--ink);
  cursor:pointer; font-size:14px; }
.iconbtn:hover{ border-color:var(--accent); }
.tag{ display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; margin:2px 3px 2px 0; }
.divider{ height:1px; background:var(--line); margin:11px 0; }
.note{ font-size:10.5px; color:var(--ink3); line-height:1.5; margin-top:8px; }
.legend{ display:flex; flex-wrap:wrap; gap:5px 10px; font-size:10.5px; color:var(--ink2); }
.legend span{ display:flex; align-items:center; gap:4px; }
.legend i{ width:11px; height:11px; border-radius:3px; display:inline-block; }
.answerbox{ background:var(--panel2); border:1px dashed var(--line); border-radius:10px; padding:11px; margin-top:10px; }
.answerbox.reveal{ border-style:solid; }
.big{ font-size:26px; font-weight:800; text-align:center; font-variant-numeric:tabular-nums; }
.mini{ font-size:11px; color:var(--ink2); }
select{ width:100%; background:var(--panel2); color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:8px; font-size:12.5px; font-weight:700; font-family:inherit; }
.scorepill{ font-size:11px; font-weight:800; padding:3px 9px; border-radius:20px; background:#0e2436; border:1px solid var(--line); color:var(--accent2); }

@media (max-width:860px){
  .main{ flex-direction:column; }
  .viewwrap{ flex-direction:column; }
  .rail{ width:100%; border-left:none; border-top:1px solid var(--line); max-height:44vh; }
  .pane + .pane{ border-left:none; border-top:1px solid var(--line); }
}
</style>
</head>
<body>
<div class="hdr">
  <h1>🫀 心エコー3D <span class="sub">断面 · EF · 壁運動 · ドップラー</span></h1>
  <a class="home" href="index.html">← 臨床コンパス</a>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-mod="anatomy"><span class="ic">🧭</span>断面解剖</button>
  <button class="tab" data-mod="ef"><span class="ic">📉</span>EF目測</button>
  <button class="tab" data-mod="wall"><span class="ic">🎯</span>壁運動17seg</button>
  <button class="tab" data-mod="doppler"><span class="ic">🌈</span>弁膜症ドップラー</button>
  <button class="tab" data-mod="patho"><span class="ic">🩺</span>病態</button>
  <button class="tab" data-mod="reference"><span class="ic">📋</span>リファレンス</button>
</div>

<div class="main">
  <div class="viewwrap">
    <div class="pane">
      <div class="pane-hd">3D 心臓 + 切断面 <small>ドラッグで回転 / ホイールで拡大</small></div>
      <div class="badge3d" id="badge3d"></div>
      <canvas id="gl"></canvas>
    </div>
    <div class="pane">
      <div class="pane-hd" id="echoHd">心エコー像 <small id="echoSub"></small></div>
      <div class="echo-hold"><canvas id="echo"></canvas></div>
    </div>
    <div id="refPanel" class="ref-panel" style="display:none"></div>
  </div>
  <div class="rail" id="rail"></div>
</div>

<script src="lib/three.min.js"></script>
<script>
/* ============================================================================
   心エコー3D 訓練アプリ  —  自己完結・オフライン動作 (Three.js 同梱)
   構成: 左=3D心臓+任意切断面 / 右=2D心エコー模式像(拍動) / 右端=モジュール別コントロール
   ========================================================================== */
'use strict';
const TAU = Math.PI*2, D2R = Math.PI/180;
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const lerp = (a,b,t)=>a+(b-a)*t;
const smooth = t=>{ t=clamp(t,0,1); return t*t*(3-2*t); };

/* ---------- グローバル状態 ---------- */
const S = {
  module:'anatomy',
  view:'A4C',        // 現在の2Dビュー名
  theta:0,           // 長軸まわりの回転角(deg): 0=A4C
  saxLevel:0.5,      // 短軸レベル 0(基部)..1(心尖)
  axisMode:'long',   // long | short
  phase:0,           // 心周期 0..1
  playing:true,
  hr:70,
  resp:0,            // 呼吸位相 0..1(IVC用)
  sniffT:0,          // sniff(急速吸気)残り秒
  freeAz:20, freeEl:0, freeOff:0,  // 自由断面: 方位・傾き・位置
  ef:0.60,           // 目標EF(小数)
  // 病態
  pathology:'none',
  effusion:1,        // 心嚢液量 0-3
  // 壁運動
  segStates:{},      // segIndex -> 'normal'|'hypo'|'akinetic'|'dyskinetic'
  showTerritory:false,
  showCoronary3D:false,
  showChest:true,
  // ドップラー
  lesion:'none',     // none|MR|AR|AS|MS|TR|PR|VSD
  severity:'mod',    // mild|mod|severe
  colorOn:true,
};

/* ============================================================================
   3D シーン  (heart-local == world。 L=長軸=+Y, apex=-Y, 前方=+Z, 患者左=+X)
   ========================================================================== */
let renderer, scene, camL, heart, planeMesh, planeRing, planeGroup;
const glCanvas = document.getElementById('gl');
let cam = { theta:-0.55, phi:1.22, r:28, tx:0.3, ty:0.1, tz:0 };
const chambers = {}; // name -> mesh

function initGL(){
  renderer = new THREE.WebGLRenderer({ canvas:glCanvas, antialias:true, alpha:true });
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  scene = new THREE.Scene();
  camL = new THREE.PerspectiveCamera(42, 1, 0.1, 200);

  scene.add(new THREE.AmbientLight(0xffffff,0.55));
  const key = new THREE.DirectionalLight(0xffffff,0.9); key.position.set(6,10,8); scene.add(key);
  const rim = new THREE.DirectionalLight(0x88bbff,0.5); rim.position.set(-8,-4,-6); scene.add(rim);

  heart = new THREE.Group(); scene.add(heart);
  buildHeart();
  buildChest();
  buildWindows();
  buildPlane();
  buildOrientationGizmo();

  bindOrbit();
  resizeGL();
}

/* --- 楕円体チャンバー: 中心・半径(rx,ry,rz)・色 --- */
function ellipsoid(cx,cy,cz, rx,ry,rz, color, opts={}){
  const g = new THREE.SphereGeometry(1, opts.seg||40, opts.seg||28);
  const m = new THREE.MeshStandardMaterial({ color, transparent:true,
    opacity: opts.opacity ?? 0.34, roughness:0.55, metalness:0.05,
    depthWrite:false, side:THREE.DoubleSide });
  const mesh = new THREE.Mesh(g,m);
  mesh.position.set(cx,cy,cz); mesh.scale.set(rx,ry,rz);
  heart.add(mesh);
  return mesh;
}
function wallShell(cx,cy,cz, rx,ry,rz, color, op){
  // 半透明の心筋殻(ワイヤ風の薄い面)
  const g = new THREE.SphereGeometry(1, 30, 20);
  const m = new THREE.MeshStandardMaterial({ color, transparent:true, opacity:op, roughness:0.7,
    depthWrite:false, side:THREE.DoubleSide, wireframe:false });
  const mesh = new THREE.Mesh(g,m); mesh.position.set(cx,cy,cz); mesh.scale.set(rx,ry,rz); heart.add(mesh);
  return mesh;
}

/* 局所フレーム(authoring): +Y=基部方向, -Y=心尖, +Z=前方, +X=患者左。
   最後に heart グループを解剖学的軸(心尖=前下左, 長軸≈正中面45°)へ回転。 [出典: 解剖ファクトシート] */
let HEARTQ = new THREE.Quaternion();
function computeHeartQ(){
  const eY=new THREE.Vector3(-0.35,0.86,-0.37).normalize();      // 基部→ 後上右
  const eX=new THREE.Vector3(0.90,-0.10,0.42);                   // 患者左/側壁→ 左やや前下
  eX.addScaledVector(eY,-eX.dot(eY)).normalize();
  const eZ=new THREE.Vector3().crossVectors(eX,eY).normalize();  // 前方(RV側)
  HEARTQ.setFromRotationMatrix(new THREE.Matrix4().makeBasis(eX,eY,eZ));
}
function buildHeart(){
  computeHeartQ();
  // --- 心筋殻 + 内腔(半透明) ---
  chambers.lvWall = wallShell(0.5,-1.0,-0.2, 2.85,4.4,2.85, 0xb04a5a,0.22); // LV: 後左, prolate
  chambers.lv     = ellipsoid(0.5,-1.0,-0.2, 2.0,3.9,2.0, 0xf0637a,{opacity:0.26});
  chambers.rvWall = wallShell(-1.7,-0.5,1.5, 3.0,3.6,1.75, 0x3f6ea5,0.14);  // RV: 前右, 三日月(壁薄)
  chambers.rv     = ellipsoid(-1.7,-0.5,1.5, 2.6,3.25,1.4, 0x5b9bd5,{opacity:0.20});
  chambers.la     = ellipsoid(0.7,3.4,-1.7, 1.9,1.6,1.7, 0xf0a35e,{opacity:0.28});  // LA: 最後方・上
  chambers.ra     = ellipsoid(-2.7,3.0,0.1, 1.8,2.0,1.7, 0x7ecb8f,{opacity:0.28});  // RA: 右・前
  // --- RVOT/漏斗部: RV上部→前方を左上へ横切りPVへ ---
  addTube([[-1.4,1.7,1.7],[-0.8,2.9,2.0],[0.1,3.6,2.0],[0.5,3.8,1.9]],0.55,0x5b9bd5,0.14,'rvot');
  // --- 大血管(上行→弓部→下行大動脈, 肺動脈幹の交差) ---
  addGreatVessels();
  // --- 弁輪(AV中央高位・MV後左・TV右で心尖側偏位・PV最前上左) ---
  addValve('MV',0.7,2.2,-0.5,1.25,0xe8eaed);
  addValve('TV',-2.0,1.9,0.7,1.2,0xcfd6de);   // y=1.9<MV2.2 → 心尖側偏位(≤10mm)
  addValve('AV',0.2,2.7,0.35,0.8,0xd9c2f0);    // 中央くさび, 最高位
  addValve('PV',0.55,3.8,1.9,0.72,0xbfe0d0);   // 前上左
  // --- 乳頭筋(ALPM 前外側=二重支配 / PMPM 後内側=単一支配で脆弱) ---
  addPapillary(1.9,-1.7,0.8);
  addPapillary(-0.5,-1.7,-1.3);
  // --- 大静脈・肺静脈(位置関係の把握用) ---
  addTube([[-2.7,4.2,0.3],[-2.7,5.8,0.4]],0.48,0x7ecb8f,0.13,'svc');  // SVC 上
  addTube([[-2.7,1.2,-0.1],[-2.7,-0.6,-0.2]],0.52,0x7ecb8f,0.13,'ivc'); // IVC 下
  addTube([[0.7,4.4,-2.1],[1.8,3.9,-1.9]],0.24,0xf0a35e,0.18,'pvR');   // 肺静脈(後方)
  addTube([[0.7,4.4,-2.1],[-0.5,3.9,-2.1]],0.24,0xf0a35e,0.18,'pvL');
  // --- 心尖マーカー ---
  const apex=new THREE.Mesh(new THREE.SphereGeometry(0.24,16,12),new THREE.MeshBasicMaterial({color:0xffffff}));
  apex.position.set(0.5,-5.35,-0.2); apex.name='apexMarker'; heart.add(apex);
  // --- 冠動脈 ---
  buildCoronaries();
  // --- 解剖学的軸へ傾ける ---
  heart.quaternion.copy(HEARTQ);
}
function addTube(pts,radius,color,opacity,name){
  const curve=new THREE.CatmullRomCurve3(pts.map(p=>new THREE.Vector3(p[0],p[1],p[2])));
  const g=new THREE.TubeGeometry(curve,40,radius,14,false);
  const mesh=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color,transparent:true,opacity,roughness:0.5,side:THREE.DoubleSide,depthWrite:false}));
  if(name) mesh.name=name; heart.add(mesh); return mesh;
}
function addGreatVessels(){
  addTube([[0.2,2.7,0.35],[0.35,4.2,0.05],[0.2,5.3,-0.35]],0.82,0xc98bea,0.17,'aoAsc'); // 上行大動脈
  addTube([[0.2,5.3,-0.35],[0.9,5.9,-0.8],[0.35,5.6,-1.7],[0.2,4.7,-2.15]],0.66,0xc98bea,0.15,'aoArch'); // 弓部
  addTube([[0.2,4.7,-2.15],[0.15,1.5,-2.25],[0.2,-1.5,-2.15],[0.25,-4.0,-1.9]],0.55,0xc98bea,0.14,'aoDesc'); // 下行大動脈(LA後方)
  addTube([[0.55,3.8,1.9],[1.2,4.2,0.5],[1.5,4.3,-0.6]],0.78,0x6fb3c9,0.16,'pa'); // 肺動脈幹(大動脈前を交差)
}
/* 冠動脈: LAD=前室間溝→心尖wrap / RCA=右房室溝→下壁(PDA) / LCx=左房室溝→側壁 */
let coronaryMeshes=[];
function buildCoronaries(){
  coronaryMeshes=[];

function windowForView(){
  if(S.view==='FREE') return 'none';
  if(S.view==='SC4C'||S.view==='IVC') return 'subcostal';
  return (S.view&&S.view[0]==='A')?'apical':'parasternal';

function updateWindowHighlight(){
  if(!windowMarkers.parasternal||!beamLine) return;
  const active=windowForView();
  for(const k in windowMarkers){ const on=(k===active);
    windowMarkers[k].mesh.material.color.setHex(on?0x38bdf8:0x2b4a5f);
    windowMarkers[k].mesh.scale.setScalar(on?1.5:1.0);
    windowMarkers[k].lbl.material.opacity=on?1:0.42;
  }
  if(active==='none'||!WINDOWS[active]){ beamLine.visible=false; return; }
  beamLine.visible=true;
  const wp=new THREE.Vector3(...WINDOWS[active].pos);

/* --- 切断面 (プローブ面) --- */
function buildPlane(){
  planeGroup = new THREE.Group(); scene.add(planeGroup);
  const g = new THREE.PlaneGeometry(13,13);
  const m = new THREE.MeshBasicMaterial({color:0x38bdf8, transparent:true, opacity:0.17, side:THREE.DoubleSide, depthWrite:false});
  planeMesh = new THREE.Mesh(g,m); planeGroup.add(planeMesh);
  const eg = new THREE.EdgesGeometry(new THREE.PlaneGeometry(13,13));
  planeRing = new THREE.LineSegments(eg, new THREE.LineBasicMaterial({color:0x7dd3fc, transparent:true, opacity:0.95}));
  planeGroup.add(planeRing);
  updatePlaneFromView();
}

/* 局所フレームで切断面の法線n・通過点pを決める(心臓の傾きHEARTQは updatePlaneFromView で適用) */
function planeForView(){
  const cx=0.5, cz=-0.2; // LV長軸(局所)の中心
  if(S.axisMode==='free'){
    const az=S.freeAz*D2R, el=S.freeEl*D2R;
    const n=new THREE.Vector3(Math.cos(el)*Math.cos(az), Math.sin(el), Math.cos(el)*Math.sin(az)).normalize();
    const p=new THREE.Vector3(0.4,-0.9,-0.1).addScaledVector(n, S.freeOff);
    return { n, p };
  }
  if(S.axisMode==='sub'){
    if(S.view==='IVC') return { n:new THREE.Vector3(0.2,0,1).normalize(), p:new THREE.Vector3(-2.7,1.0,0) }; // RA/IVC を通る傍矢状面
    return { n:new THREE.Vector3(1,0,0), p:new THREE.Vector3(cx,-1.0,cz) }; // 心窩部4腔(A4C様の面, 窓のみ心窩部)
  }
  if(S.axisMode==='short'){
    const y = lerp(2.2, -5.0, S.saxLevel); // 基部..心尖
    return { n:new THREE.Vector3(0,1,0), p:new THREE.Vector3(cx,y,cz) };
  } else {
    const th = S.theta*D2R;
    const n = new THREE.Vector3(Math.cos(th),0,Math.sin(th)).normalize(); // 長軸(Y)を含む面
    return { n, p:new THREE.Vector3(cx,-1.0,cz) };
  }
}
function updatePlaneFromView(){
  const {n,p} = planeForView();
  const nW = n.clone().applyQuaternion(HEARTQ).normalize();
  const pW = p.clone().applyQuaternion(HEARTQ);
  const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,1), nW);
  planeGroup.position.copy(pW);
  planeGroup.quaternion.copy(q);
  updateWindowHighlight();
}

/* --- 自作オービット --- */
function bindOrbit(){
  let dragging=false, lx=0, ly=0;
  const dn=e=>{ dragging=true; const t=e.touches?e.touches[0]:e; lx=t.clientX; ly=t.clientY; };
  const mv=e=>{ if(!dragging)return; const t=e.touches?e.touches[0]:e;
    const dx=t.clientX-lx, dy=t.clientY-ly; lx=t.clientX; ly=t.clientY;
    cam.theta -= dx*0.008; cam.phi = clamp(cam.phi - dy*0.008, 0.15, Math.PI-0.15);
    if(e.touches) e.preventDefault();
  };
  const up=()=>{ dragging=false; };
  glCanvas.addEventListener('mousedown',dn); window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
  glCanvas.addEventListener('touchstart',dn,{passive:true}); glCanvas.addEventListener('touchmove',mv,{passive:false}); glCanvas.addEventListener('touchend',up);
  glCanvas.addEventListener('wheel',e=>{ e.preventDefault(); cam.r = clamp(cam.r*(1+Math.sign(e.deltaY)*0.09), 12, 48); },{passive:false});
}
function updateCamera(){
  const {theta,phi,r,tx,ty,tz}=cam;
  camL.position.set(tx + r*Math.sin(phi)*Math.sin(theta), ty + r*Math.cos(phi), tz + r*Math.sin(phi)*Math.cos(theta));
  camL.lookAt(tx,ty,tz);
}
function resizeGL(){
  const w=glCanvas.clientWidth, h=glCanvas.clientHeight;
  if(w===0||h===0) return;
  renderer.setSize(w,h,false); camL.aspect=w/h; camL.updateProjectionMatrix();
}

/* ============================================================================
   2D 心エコー描画エンジン (右パネル)  —  拍動アニメ付き模式像
   ========================================================================== */
const echo = document.getElementById('echo');
const ex = echo.getContext('2d');
let EW=600, EH=600; // 内部解像度(正方)

function resizeEcho(){
  const hold = echo.parentElement;
  const w=hold.clientWidth, h=hold.clientHeight;
  const s=Math.min(w,h); if(s<=0) return;
  const dpr=Math.min(devicePixelRatio,2);
  echo.width=s*dpr; echo.height=s*dpr; echo.style.width=s+'px'; echo.style.height=s+'px';
  ex.setTransform(dpr,0,0,dpr,0,0);
  EW=s; EH=s;
}

/* 心周期の収縮率 f: ED(0)→ES(1)。 t=phase(0..1) */
function contractF(t){
  const es=0.35; // 収縮末期のタイミング
  if(t<es) return smooth(t/es);
  if(t<es+0.22) return smooth(1-(t-es)/0.22);
  return 0; // 拡張中期〜末期
}
/* EFに応じた内腔の線寸法スケール(ED=1, ES=endScale) */
function cavityLinScale(t, ef){
  const endScale = Math.sqrt(clamp(1-ef,0.02,1)); // 面積比≈(1-EF)
  return 1 - contractF(t)*(1-endScale);
}

/* 心エコー背景(セクター扇形) apical/parasternal用。 apexTop=trueで頂点上 */
function echoBackground(apexTop=true){
  ex.fillStyle='#05080f'; ex.fillRect(0,0,EW,EH);
  const cx=EW/2, apexY=EH*0.08, halfAng=32*D2R, R=EH*0.9;
  ex.save();
  ex.beginPath();
  ex.moveTo(cx, apexY);
  ex.arc(cx, apexY, R, Math.PI/2-halfAng, Math.PI/2+halfAng);
  ex.closePath();
  const grd=ex.createRadialGradient(cx,apexY,R*0.1, cx,apexY,R);
  grd.addColorStop(0,'#0c1526'); grd.addColorStop(1,'#02040a');
  ex.fillStyle=grd; ex.fill();
  ex.clip();
  // 深度リング
  ex.strokeStyle='rgba(120,150,190,.08)'; ex.lineWidth=1;
  for(let i=1;i<=5;i++){ ex.beginPath(); ex.arc(cx,apexY,R*i/5, Math.PI/2-halfAng, Math.PI/2+halfAng); ex.stroke(); }
  return {cx, apexY, R, halfAng};
}
/* スペックル(超音波ノイズ質感) */
function speckle(seed, amount=0.05){
  let x=seed*9301+49297;
  const rnd=()=>{ x=(x*9301+49297)%233280; return x/233280; };
  ex.save(); ex.globalAlpha=amount;
  for(let i=0;i<900;i++){ const px=rnd()*EW, py=rnd()*EH; const g=120+rnd()*100;
    ex.fillStyle=`rgb(${g},${g},${g})`; ex.fillRect(px,py,1.4,1.4); }
  ex.restore();
}

/* apical系の心室: 心尖(頂点)→弁輪(底)へ広がるテーパー形。太ストローク=心筋 */
function apicalChamber(ax,ay, bcx,bw, by, wallColor, wall){
  const p=new Path2D();
  p.moveTo(ax,ay);
  p.quadraticCurveTo(bcx+bw*1.04, ay+(by-ay)*0.62, bcx+bw, by);
  p.quadraticCurveTo(bcx, by+bw*0.20, bcx-bw, by);
  p.quadraticCurveTo(bcx-bw*1.04, ay+(by-ay)*0.62, ax,ay);
  p.closePath();
  ex.save(); ex.lineJoin='round';
  ex.strokeStyle=wallColor; ex.lineWidth=wall*2; ex.stroke(p);   // 心筋(外側)
  ex.fillStyle='#060e18'; ex.fill(p);                            // 内腔
  ex.strokeStyle='rgba(150,180,220,.28)'; ex.lineWidth=1.2; ex.stroke(p);
  ex.restore();
  return p;
}

  // ---- RV(画面左, やや小さく心尖寄り) ----
  apicalChamber(cx-U*0.03, apexY+U*0.10, rvCx, U*0.115*lerp(1,0.94,1-ls), valveY-U*0.02, '#28486a', U*0.032);
  // ---- moderator band(RV心尖の索状=RV同定の手がかり) ----
  ex.strokeStyle='#4a6f96'; ex.lineWidth=Math.max(2.5,U*0.02); ex.lineCap='round';
  ex.beginPath(); ex.moveTo(cx-U*0.035, apexY+U*0.39); ex.lineTo(rvCx+U*0.01, apexY+U*0.45); ex.stroke();

function drawPLAX(){ // 傍胸骨長軸: 左=心尖側LV / 右=基部(MV・大動脈・LA) / 上=前壁(IVS) / 下=下側壁
  ex.fillStyle='#05080f'; ex.fillRect(0,0,EW,EH);
  const bg=echoBackgroundSide(); const U=EH;
  const ls=cavityLinScale(S.phase,S.ef);
  const midY=EH*0.50;
  // ---- LV: 水平の弾丸型。心筋バンド(上=IVS, 下=下側壁)+ 内腔 ----
  const lvCx=EW*0.40, lvCy=midY, lvRx=U*0.205, lvRy=U*0.145;
  wallEllipseH(lvCx,lvCy, lvRx, lvRy, '#2a4a6d');          // 心筋(外)
  bloodEllipseH(lvCx,lvCy, lvRx*0.80*ls, lvRy*0.72*lerp(1,0.9,1-ls)); // 内腔
  // ---- 大動脈基部(右上へ, 前壁はIVSに連続) ----
  const aoX=EW*0.635, aoY=midY-U*0.115;
  drawAoSide(aoX, aoY, U, S.phase);
  // ---- 僧帽弁(LVの右端, 前尖=Ao側/後尖=LA側) ----
  const mvHingeX=lvCx+lvRx*0.86, mvy=midY+U*0.01;
  drawMVplax(mvHingeX, mvy, U, S.phase);
  // ---- LA(右下, MV後尖の下) ----
  const laX=EW*0.72, laY=midY+U*0.135;
  wallEllipseH(laX,laY, U*0.135, U*0.115,'#274058');
  bloodEllipseH(laX,laY, U*0.115, U*0.095);

  ex.fillStyle='#0a1420'; ex.fill(); ex.strokeStyle='#3f6288'; ex.lineWidth=2; ex.stroke();

  ex.fillStyle='#0a1420'; ex.fill(); ex.strokeStyle='#345272'; ex.stroke();

  chamberBlob(EW*0.82,midY,EH*0.13,EH*0.16,0,'#22415f','RA','#d6f2df',12);
  // 径キャリパー(点線 + 数値)

  ex.fillStyle='#7dd3fc'; [midY-half,midY+half].forEach(yy=>{ex.fillRect(calX-6,yy-1,12,2);});
  label('IVC',EW*0.16,midY,'#cfe0f2',13);
  label(dcm.toFixed(1)+' cm',calX,midY-half-14,'#7dd3fc',11);
  // 情報パネル(下部)
  const bx=12, by=EH-104, bw=EW-24;
  ex.fillStyle='rgba(8,14,24,.85)'; ex.fillRect(bx,by,bw,96);
  ex.strokeStyle='#22304a'; ex.strokeRect(bx,by,bw,96);
  ex.textAlign='left'; ex.textBaseline='top'; ex.font='700 12px sans-serif';
  ex.fillStyle='#cdd8ea'; ex.fillText(`最大径 ${dMax.toFixed(1)} cm ・ 呼吸性虚脱 ${Math.round(cfg.col*100)}%`, bx+10, by+9);
  ex.fillText(`現在: ${insp>0.5?'吸気(虚脱)':'呼気(拡張)'} → ${dcm.toFixed(1)} cm`, bx+10, by+28);
  ex.font='800 14px sans-serif'; ex.fillStyle=rapCol;
  ex.fillText(`推定右房圧 RAP ≈ ${rap} mmHg (${rapT})`, bx+10, by+50);
  ex.font='600 10px sans-serif'; ex.fillStyle='#7f93b3';
  ex.fillText('径≤2.1cm & 虚脱>50% → 3 / >2.1cm & <50% → 15 mmHg', bx+10, by+76);
  ex.fillStyle='#6b7d99'; ex.textAlign='right'; ex.fillText('PASP = 4×(TR速度)² + RAP', bx+bw-8, by+76);
}

/* =========================  自由断面(実断面再構成)  =========================
   軸平行楕円体 ((x-c)/r)²…=1 と平面 n·x=n·p の交線(楕円)を解析的に計算し、
   面の2D基底(u,v)へ投影して描画。標準ビューにスナップしない“生”の断面。 */
function planeBasis(n){
  const L=new THREE.Vector3(0,1,0); // 局所長軸を上向きの手がかりに
  let u=new THREE.Vector3().crossVectors(n,L);
  if(u.lengthSq()<1e-6) u=new THREE.Vector3().crossVectors(n,new THREE.Vector3(1,0,0));
  u.normalize();
  const v=new THREE.Vector3().crossVectors(n,u).normalize();
  return {u,v};
}
function ellipsoidCrossSection(center,radii,n,p,basis){
  const c=center, r=radii;
  const m=new THREE.Vector3(n.x*r.x, n.y*r.y, n.z*r.z);           // X空間(単位球)での面法線
  const mLen=m.length(); if(mLen<1e-6) return null;
  const e=n.dot(new THREE.Vector3().subVectors(p,c));
  const ratio=e/mLen; if(Math.abs(ratio)>=1) return null;         // 面が楕円体を外れる
  const mn=m.clone().normalize();
  const X0=m.clone().multiplyScalar(e/(mLen*mLen));               // 円中心(X空間)
  const rho=Math.sqrt(1-ratio*ratio);                            // 円半径(X空間)
  let t1=Math.abs(mn.x)>0.9?new THREE.Vector3(0,1,0):new THREE.Vector3(1,0,0);
  t1.sub(mn.clone().multiplyScalar(t1.dot(mn))).normalize();
  const t2=new THREE.Vector3().crossVectors(mn,t1);
  const {u,v}=basis, pts=[], tmp=new THREE.Vector3(), real=new THREE.Vector3(), d=new THREE.Vector3();
  for(let i=0;i<=44;i++){ const th=i/44*TAU;
    tmp.copy(X0).addScaledVector(t1,rho*Math.cos(th)).addScaledVector(t2,rho*Math.sin(th));
    real.set(r.x*tmp.x+c.x, r.y*tmp.y+c.y, r.z*tmp.z+c.z);
    d.subVectors(real,p);
    pts.push([d.dot(u), d.dot(v)]);
  }
  return pts;
}
function polyCentroid(pts){ let x=0,y=0; for(const q of pts){x+=q[0];y+=q[1];} return [x/pts.length,y/pts.length]; }
function shrinkPoly(pts,f){ const c=polyCentroid(pts); return pts.map(q=>[c[0]+(q[0]-c[0])*f, c[1]+(q[1]-c[1])*f]); }
function drawFreeCut(){
  ex.fillStyle='#05080f'; ex.fillRect(0,0,EW,EH);
  const cx=EW/2, cy=EH*0.5, R=EH*0.46;
  ex.save(); ex.beginPath(); ex.arc(cx,cy,R*1.08,0,TAU);
  const grd=ex.createRadialGradient(cx,cy,R*0.1,cx,cy,R*1.2); grd.addColorStop(0,'#0c1526'); grd.addColorStop(1,'#03060d');
  ex.fillStyle=grd; ex.fill(); ex.clip();
  const {n,p}=planeForView(); const basis=planeBasis(n);
  const ls=cavityLinScale(S.phase,S.ef);
  const rv=(base,fac)=>new THREE.Vector3(base.x*fac.x, base.y*fac.y, base.z*fac.z);
  // --- 1st pass: 交差を計算し収集 ---
  const layers=[]; const labels=[]; let sx=0,sy=0,ns=0;
  const acc=pts=>{ for(const q of pts){sx+=q[0];sy+=q[1];ns++;} };
  const ventricle=(wall,cav,wallCol,name,lblCol)=>{
    const wp=ellipsoidCrossSection(wall.position,wall.scale,n,p,basis);
    const cs=rv(cav.scale,new THREE.Vector3(ls,lerp(1,0.92,1-ls),ls));
    const cp=ellipsoidCrossSection(cav.position,cs,n,p,basis);
    if(wp){ layers.push({pts:wp,fill:wallCol,stroke:'rgba(150,180,220,.18)',lw:1.2}); acc(wp); }
    if(cp){ layers.push({pts:cp,fill:'#060e18',stroke:'rgba(150,180,220,.35)',lw:1.4}); acc(cp); labels.push([polyCentroid(cp),name,lblCol]); }
  };
  ventricle(chambers.lvWall,chambers.lv,'#2a4a6d','LV','#ffd9df');
  ventricle(chambers.rvWall,chambers.rv,'#28486a','RV','#cfe4ff');
  [[chambers.la,'LA','#ffe6c9'],[chambers.ra,'RA','#d6f2df']].forEach(([mo,nm,col])=>{
    const pp=ellipsoidCrossSection(mo.position,mo.scale,n,p,basis);
    if(pp){ layers.push({pts:pp,fill:'#243a52',stroke:null}); layers.push({pts:shrinkPoly(pp,0.84),fill:'#060e18',stroke:'rgba(150,180,220,.28)',lw:1.2}); acc(pp); labels.push([polyCentroid(pp),nm,col]); }
  });
  // --- 全断面の重心で自動センタリング ---
  const mx=ns?sx/ns:0, my=ns?sy/ns:0, scale=EH*0.058;
  const toC=q=>[cx+(q[0]-mx)*scale, cy-(q[1]-my)*scale];
  const poly=(pts,fill,stroke,lw)=>{ if(!pts)return; ex.beginPath();
    pts.forEach((q,i)=>{ const a=toC(q); i?ex.lineTo(a[0],a[1]):ex.moveTo(a[0],a[1]); }); ex.closePath();
    if(fill){ex.fillStyle=fill;ex.fill();} if(stroke){ex.strokeStyle=stroke;ex.lineWidth=lw||1.4;ex.stroke();} };
  layers.forEach(l=>poly(l.pts,l.fill,l.stroke,l.lw));
  speckle(90,0.04);
  labels.forEach(([c2,nm,col])=>{ const a=toC(c2); label(nm,a[0],a[1],col,13); });
  if(ns===0){ ex.textAlign='center'; ex.fillStyle='#5b6b82'; ex.font='600 12px sans-serif'; ex.fillText('この面は心腔を通っていません', cx, cy); }
  // 方位ミニ表示
  ex.textAlign='left'; ex.textBaseline='top'; ex.font='600 10px sans-serif'; ex.fillStyle='#6b7d99';
  ex.fillText(`方位 ${Math.round(S.freeAz)}° / 傾き ${Math.round(S.freeEl)}° / 位置 ${S.freeOff.toFixed(1)}`, 12, 12);
  ex.restore();
  cornerLabels('自由断面 (実断面再構成)','面∩楕円体を解析計算 — 標準ビューにスナップしない生の断面');
  drawTimingBar();
}

function drawLeaflet(x1,y1,x2,y2,phase,vertical){
  // 拡張期に開放, 収縮期に閉鎖。 f=contractF(0=開)
  const closed=contractF(phase); // 1で閉
  ex.strokeStyle='#dfe7f2'; ex.lineWidth=Math.max(2,EH*0.006); ex.lineCap='round';
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  const open=(1-closed);
  if(vertical){
    ex.beginPath(); ex.moveTo(x1,y1); ex.quadraticCurveTo(mx-open*EH*0.05,my, x1,my+ (y2-y1)*0.0); ex.stroke();
    ex.beginPath(); ex.moveTo(x2,y2); ex.quadraticCurveTo(mx-open*EH*0.05,my, x2,my); ex.stroke();
  } else {
    ex.beginPath(); ex.moveTo(x1,y1); ex.quadraticCurveTo(mx,my+open*EH*0.05, x2,y2); ex.stroke();
    // 収縮期は水平に閉じる
  }
}
function drawAorticRoot(x,y,U,phase){
  ex.strokeStyle='#c98bea'; ex.lineWidth=U*0.02;
  ex.beginPath(); ex.moveTo(x-U*0.03,y); ex.lineTo(x+U*0.10,y-U*0.16); ex.stroke();
  ex.beginPath(); ex.moveTo(x-U*0.03,y+U*0.05); ex.lineTo(x+U*0.10,y-U*0.11); ex.stroke();
}
function drawAoSide(x,y,U,phase){
  // 大動脈基部: 右上へ伸びる2本の壁(前壁=上/後壁=下)。 AV弁尖は収縮期に開放。
  const openS=contractF(phase); // 収縮期=1(AV開)
  const len=U*0.20, dx=Math.cos(-0.5)*len, dy=Math.sin(-0.5)*len;
  ex.strokeStyle='#b98fd6'; ex.lineWidth=U*0.02; ex.lineCap='round';
  const hw=U*0.075; // 半径
  // 前壁(上)
  ex.beginPath(); ex.moveTo(x-U*0.02, y-hw); ex.lineTo(x-U*0.02+dx, y-hw+dy); ex.stroke();
  // 後壁(下)
  ex.beginPath(); ex.moveTo(x-U*0.02, y+hw); ex.lineTo(x-U*0.02+dx, y+hw+dy); ex.stroke();
  // AV弁尖(基部側, 開=壁沿い / 閉=中央で合わさる)
  ex.strokeStyle='#eaf0f8'; ex.lineWidth=U*0.012;
  const cxv=x-U*0.01, cyv=y;
  const spread=lerp(U*0.01, hw*0.9, openS);
  ex.beginPath(); ex.moveTo(cxv,cyv-spread); ex.lineTo(cxv+U*0.05, cyv-spread*0.7); ex.stroke();
  ex.beginPath(); ex.moveTo(cxv,cyv+spread); ex.lineTo(cxv+U*0.05, cyv+spread*0.7); ex.stroke();
}

function drawPSAXmv(cx,cy,R){
  const lvR=R*0.5, wall=lvR*0.3;
  drawLVring(cx,cy,lvR,wall,1);
  // 僧帽弁 fish-mouth(収縮期閉/拡張期開)
  const open=1-contractF(S.phase);
  ex.strokeStyle='#e8eaed'; ex.lineWidth=lvR*0.09; ex.lineCap='round';
  ex.beginPath(); ex.moveTo(cx-lvR*0.5, cy-lvR*0.05); ex.quadraticCurveTo(cx,cy-lvR*0.05-open*lvR*0.3,cx+lvR*0.5,cy-lvR*0.05); ex.stroke();
  ex.beginPath(); ex.moveTo(cx-lvR*0.5, cy+lvR*0.05); ex.quadraticCurveTo(cx,cy+lvR*0.05+open*lvR*0.3,cx+lvR*0.5,cy+lvR*0.05); ex.stroke();
  label('LV',cx,cy-lvR*0.4,'#ffd9df',13);
  label('MV',cx,cy+lvR*0.35,'#e8eaed',11);
  cornerLabels('傍胸骨短軸 僧帽弁レベル','fish-mouth(MS評価)');
}
function drawPSAXav(cx,cy,R){
  // 標準TTE表示: 前方(上)=RV/RVOTが横切る, 右=TV/RA, 下=LA, 左上=PV/PA。
  // 中央AV3尖: RCC=前(上, RVOT側)/ NCC=右下(心房中隔に接する)/ LCC=左下(PA側)。
  const r=R*0.20;
  // --- RVOT: 前方(上)を横切る三日月 ---
  ex.save();
  ex.beginPath();
  ex.arc(cx,cy-R*0.04, R*0.60, Math.PI*1.06, Math.PI*1.94);
  ex.arc(cx,cy-R*0.04, r*1.45, Math.PI*1.86, Math.PI*1.14, true);
  ex.closePath(); ex.fillStyle='#22415f'; ex.fill();
  ex.strokeStyle='rgba(150,180,220,.22)'; ex.lineWidth=1.2; ex.stroke(); ex.restore();
  label('RVOT',cx-R*0.16,cy-R*0.46,'#cfe4ff',10);
  // --- PV → 肺動脈(左上, RVOTから続く) ---
  chamberBlob(cx-R*0.60,cy-R*0.30,R*0.20,R*0.16,0.3,'#33324f','PA','#d9c2f0',10);
  ex.strokeStyle='#e8eaed'; ex.lineWidth=r*0.1; // 肺動脈弁の弁尖(chevron)
  ex.beginPath(); ex.moveTo(cx-R*0.72,cy-R*0.30); ex.lineTo(cx-R*0.60,cy-R*0.36); ex.lineTo(cx-R*0.48,cy-R*0.30); ex.stroke();
  // --- 右房 RA(右) + 三尖弁 ---
  chamberBlob(cx+R*0.62,cy+R*0.06,R*0.21,R*0.24,0,'#22415f','RA','#d6f2df',11);
  // --- 左房 LA(下) ---
  chamberBlob(cx+R*0.04,cy+R*0.58,R*0.30,R*0.20,0,'#463824','LA','#ffe6c9',11);
  // --- 心房中隔(RAとLAの間, NCCに接する) ---
  ex.strokeStyle='#5b6b82'; ex.lineWidth=2; ex.setLineDash([4,3]);
  ex.beginPath(); ex.moveTo(cx+r*0.85,cy+r*0.7); ex.lineTo(cx+R*0.44,cy+R*0.42); ex.stroke(); ex.setLineDash([]);
  label('心房中隔',cx+R*0.30,cy+R*0.30,'#9fb6d6',8,'left');
  // --- 大動脈弁(中央): 3尖 Mercedes-Benz ---
  ex.save(); ex.translate(cx,cy);
  ex.beginPath(); ex.arc(0,0,r,0,TAU); ex.fillStyle='#0a1626'; ex.fill();
  ex.strokeStyle='#8b97ad'; ex.lineWidth=2; ex.stroke();
  const open=1-contractF(S.phase);
  ex.strokeStyle='#eaf0f8'; ex.lineWidth=r*0.12; ex.lineCap='round';
  // commissure 3本: 下(6時), 左上, 右上 → 弁尖 RCC上・LCC左下・NCC右下
  const comm=[Math.PI/2, Math.PI*7/6, Math.PI*11/6];
  for(const a of comm){ const inn=r*(0.10+open*0.6);
    ex.beginPath(); ex.moveTo(Math.cos(a)*r*0.92,Math.sin(a)*r*0.92); ex.lineTo(Math.cos(a)*inn,Math.sin(a)*inn); ex.stroke(); }
  ex.restore();
  label('RCC',cx,cy-r*0.52,'#ffe8b0',9);
  label('LCC',cx-r*0.52,cy+r*0.42,'#ffe8b0',9);
  label('NCC',cx+r*0.52,cy+r*0.42,'#ffe8b0',9);
  // 冠動脈口: RCA(RCC=前/上), 左主幹LM(LCC=左)
  dotMark(cx-r*0.15,cy-r*1.02,'#f0637a'); label('RCA',cx-r*0.4,cy-r*1.25,'#f2a6b1',8,'right');
  dotMark(cx-r*1.02,cy+r*0.55,'#f0637a'); label('LM',cx-r*1.2,cy+r*0.72,'#f2a6b1',8,'right');
  drawDopplerOverlay({cx,cy,R},'PSAX-av');
  cornerLabels('傍胸骨短軸 大動脈弁レベル','3尖Mercedes / RCC=前・NCC=中隔隣接・LCC=左');
}
function chamberBlob(x,y,rx,ry,rot,col,name,lblCol,sz){
  ex.save(); ex.beginPath(); ex.ellipse(x,y,rx,ry,rot,0,TAU); ex.fillStyle=col; ex.fill();
  ex.beginPath(); ex.ellipse(x,y,rx*0.78,ry*0.76,rot,0,TAU); ex.fillStyle='#060e18'; ex.fill();
  ex.beginPath(); ex.ellipse(x,y,rx,ry,rot,0,TAU); ex.strokeStyle='rgba(150,180,220,.2)'; ex.lineWidth=1.2; ex.stroke(); ex.restore();
  if(name) label(name,x,y,lblCol||'#c7d4e6',sz||10);
}
function dotMark(x,y,col){ ex.beginPath(); ex.arc(x,y,Math.max(2.5,EH*0.006),0,TAU); ex.fillStyle=col; ex.fill();
  ex.strokeStyle='#0a1220'; ex.lineWidth=1; ex.stroke(); }
function ringChamber(x,y,rx,ry,col,name,rot){
  ex.save(); ex.beginPath(); ex.ellipse(x,y,rx,ry,rot,0,TAU); ex.fillStyle=col; ex.fill();
  ex.beginPath(); ex.ellipse(x,y,rx*0.8,ry*0.78,rot,0,TAU); ex.fillStyle='#060e18'; ex.fill(); ex.restore();
  label(name,x,y,'#c7d4e6',10);
}

/* LVリング(短軸): 壁運動セグメントで内縁を変形させて描く */
function drawLVring(cx,cy,lvR,wall,ls){
  const outR=lvR, inR0=lvR-wall;
  const N=72;
  // 心筋帯
  ex.beginPath();
  for(let i=0;i<=N;i++){ const a=i/N*TAU-Math.PI/2; const x=cx+Math.cos(a)*outR, y=cy+Math.sin(a)*outR; i?ex.lineTo(x,y):ex.moveTo(x,y); }
  for(let i=N;i>=0;i--){ const a=i/N*TAU-Math.PI/2; const r=inR0 - segEndoOffset(a)*wall*0.55*(1-ls*0.0);
    const x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r; ex.lineTo(x,y); }
  ex.closePath(); ex.fillStyle='#2a4a6d'; ex.fill();
  // 内腔
  ex.beginPath();
  for(let i=0;i<=N;i++){ const a=i/N*TAU-Math.PI/2; const r=inR0 - segEndoOffset(a)*wall*0.55;
    // 収縮でさらに内側へ(正常セグメントのみ)
    const contract = contractF(S.phase)*(0.16*segMotion(a));
    const rr=r*(1-contract) - inR0*contract*0.0;
    const x=cx+Math.cos(a)*rr, y=cy+Math.sin(a)*rr; i?ex.lineTo(x,y):ex.moveTo(x,y); }
  ex.closePath(); ex.fillStyle='#060e18'; ex.fill();
  ex.strokeStyle='rgba(150,180,220,.28)'; ex.lineWidth=1.4; ex.stroke();
  // 壁運動タブなら各セグメントを色付け
  if(S.module==='wall') drawSegColorRing(cx,cy,outR,inR0);
}
/* 角度aにおける「壁運動の低下度」0..1(1=正常) — 壁運動モジュールで上書き */
function segMotion(a){ return 1; }
function segEndoOffset(a){ return 0; }

/* --- 共通: セクター背景(PLAX横向き) --- */
function echoBackgroundSide(){
  const cx=EW*0.5, apexY=EH*0.06, halfAng=34*D2R, R=EH*0.94;
  ex.save(); ex.beginPath(); ex.moveTo(cx,apexY); ex.arc(cx,apexY,R,Math.PI/2-halfAng,Math.PI/2+halfAng); ex.closePath();
  const grd=ex.createRadialGradient(cx,apexY,R*0.1,cx,apexY,R); grd.addColorStop(0,'#0c1526'); grd.addColorStop(1,'#02040a');
  ex.fillStyle=grd; ex.fill(); ex.clip();
  return {cx,apexY,R};
}

/* --- コーナーの説明ラベル --- */
function cornerLabels(title,sub){
  ex.textAlign='left'; ex.textBaseline='top';
  ex.font='800 14px sans-serif'; ex.fillStyle='#dbe6f5'; ex.fillText(title, 12, EH-56);
  ex.font='600 11px sans-serif'; ex.fillStyle='#7f93b3'; ex.fillText(sub||'', 12, EH-38);
}
/* --- ECG / 心周期タイミングバー(下部) --- */
function ecgWave(t){ // t:0..1(1拍), R波はt≈0.03。 P-QRS-T
  const g=(c,w,a)=>a*Math.exp(-((t-c)*(t-c))/(2*w*w));
  return g(0.88,0.022,0.16) + g(0.03,0.009,0.85)+g(1.03,0.009,0.85)
       - g(0.005,0.006,0.18) - g(0.065,0.008,0.22) + g(0.26,0.035,0.24);
}
function drawTimingBar(){
  const bh=20, by=EH-bh-3, bx=12, bw=EW-24, sysEnd=0.38;
  ex.fillStyle='rgba(8,14,24,.72)'; ex.fillRect(bx,by,bw,bh);
  ex.fillStyle='rgba(226,110,120,.15)'; ex.fillRect(bx,by,bw*sysEnd,bh);
  ex.fillStyle='rgba(96,150,220,.12)'; ex.fillRect(bx+bw*sysEnd,by,bw*(1-sysEnd),bh);
  // ECG
  ex.strokeStyle='#5fd39a'; ex.lineWidth=1.4; ex.beginPath();
  for(let i=0;i<=bw;i+=2){ const yy=by+bh*0.5 - ecgWave(i/bw)*bh*0.42; i?ex.lineTo(bx+i,yy):ex.moveTo(bx+i,yy); }
  ex.stroke();
  // 現在位相カーソル
  const cxp=bx+bw*S.phase; ex.strokeStyle='#7dd3fc'; ex.lineWidth=1.8;
  ex.beginPath(); ex.moveTo(cxp,by-2); ex.lineTo(cxp,by+bh+2); ex.stroke();
  // ラベル
  ex.textAlign='left'; ex.textBaseline='middle'; ex.font='700 9px sans-serif';
  ex.fillStyle='#e79aa2'; ex.fillText('収縮期', bx+5, by+bh*0.5);
  ex.fillStyle='#8fb4e0'; ex.fillText('拡張期', bx+bw*sysEnd+5, by+bh*0.5);
  // 弁の状態
  const sys=contractF(S.phase)>0.15;
  ex.textAlign='right'; ex.fillStyle='#9fb6d6';
  ex.fillText(sys?'房室弁 閉 / 半月弁 開':'房室弁 開 / 半月弁 閉', bx+bw-5, by+bh*0.5);
}

/* --- ドップラー重畳(弁膜症モジュール) --- */
function drawDopplerOverlay(bg,view){ /* 弁膜症モジュールで実装 */ }
function drawSegColorRing(){ /* 壁運動モジュールで実装 */ }
function drawPathoOverlay(view){ /* 病態モジュールで実装 */ }

/* =========================  ビュー切替  ========================= */
function renderEcho(){
  resizeEcho();
  const v=S.view;
  if(v==='A4C') drawA4C();
  else if(v==='A2C') drawA2C();
  else if(v==='A3C') drawA3C();
  else if(v==='PLAX') drawPLAX();
  else if(v==='PSAX-pap') drawPSAX('pap');
  else if(v==='PSAX-mv') drawPSAX('mv');
  else if(v==='PSAX-av') drawPSAX('av');
  else if(v==='PSAX-apex') drawPSAX('apex');
  else if(v==='SC4C') drawSC4C();
  else if(v==='IVC') drawIVC();
  else if(v==='FREE') { drawFreeCut(); return; }
  else drawA4C();
  if(v!=='IVC'){ drawPathoOverlay(v); drawTimingBar(); }
}

/* =========================  メインループ  ========================= */
let lastT=performance.now();
function loop(now){
  const dt=(now-lastT)/1000; lastT=now;
  if(S.playing){ S.phase=(S.phase + dt*(S.hr/60))%1; S.resp=(S.resp + dt*0.22)%1; }
  if(S.sniffT>0) S.sniffT=Math.max(0,S.sniffT-dt);
  if(S.module!=='reference'){        // リファレンスタブでは描画停止(パネルが覆う)
    updateCamera();
    renderer.render(scene, camL);
    renderEcho();
    updateHUD();
  }
  requestAnimationFrame(loop);
}

/* =========================  HUD / バッジ  ========================= */
function updateHUD(){
  const b=document.getElementById('badge3d');
  const dot=(c)=>`<span class="dot" style="background:${c}"></span>`;
  b.innerHTML =
    `<span class="chip">${dot('#f0637a')}LV</span>`+
    `<span class="chip">${dot('#5b9bd5')}RV</span>`+
    `<span class="chip">${dot('#f0a35e')}LA</span>`+
    `<span class="chip">${dot('#7ecb8f')}RA</span>`;
  document.getElementById('echoSub').textContent = viewJP(S.view);
}
function viewJP(v){
  return ({A4C:'心尖部四腔像',A2C:'心尖部二腔像',A3C:'心尖部長軸',PLAX:'傍胸骨長軸',
    'PSAX-pap':'短軸 乳頭筋','PSAX-mv':'短軸 僧帽弁','PSAX-av':'短軸 大動脈弁','PSAX-apex':'短軸 心尖',
    SC4C:'心窩部四腔像',IVC:'下大静脈(IVC)',FREE:'自由断面(実断面)'})[v]||v;
}

/* =========================  初期化  ========================= */
function boot(){
  initGL();
  buildRail();
  window.addEventListener('resize', ()=>{ resizeGL(); });
  // 初期ビュー
  setView('A4C');
  requestAnimationFrame(loop);
}

/* レール(右コントロール)はモジュールごとに differ — 別スクリプトで定義 */
window.addEventListener('DOMContentLoaded', boot);

<script>
/* ============================================================================
   コントロールレール & モジュール切替  (UI ロジック)
   ========================================================================== */
function setView(v){ S.view=v; updatePlaneFromView(); syncPresetButtons(); }
function syncPresetButtons(){
  document.querySelectorAll('.pbtn[data-view]').forEach(b=>b.classList.toggle('on', b.dataset.view===S.view));
}

/* --- プリセット: ビュー → {view, axisMode, theta/level} --- */
const PRESETS = [
  {v:'PLAX', jp:'傍胸骨長軸', sub:'PLAX', mode:'long', theta:118},
  {v:'PSAX-av', jp:'短軸 大動脈弁', sub:'PSAX AV', mode:'short', level:0.05},
  {v:'PSAX-mv', jp:'短軸 僧帽弁', sub:'PSAX MV', mode:'short', level:0.30},
  {v:'PSAX-pap', jp:'短軸 乳頭筋', sub:'PSAX 乳頭筋', mode:'short', level:0.55},
  {v:'PSAX-apex', jp:'短軸 心尖', sub:'PSAX apex', mode:'short', level:0.85},
  {v:'A4C', jp:'心尖部四腔', sub:'A4C', mode:'long', theta:0},
  {v:'A3C', jp:'心尖部長軸', sub:'A3C', mode:'long', theta:118},
  {v:'A2C', jp:'心尖部二腔', sub:'A2C', mode:'long', theta:60},
  {v:'SC4C', jp:'心窩部四腔', sub:'SC4C', mode:'sub'},
  {v:'IVC', jp:'下大静脈', sub:'IVC', mode:'sub'},
];
function applyPreset(p){

  syncPresetButtons();
  buildRail();
}

/* ========== レール構築(モジュール別) ========== */
const rail = document.getElementById('rail');
function buildRail(){
  const rp=document.getElementById('refPanel');
  if(rp){ const on=S.module==='reference'; rp.style.display=on?'block':'none';
    if(on){ buildRefPanel(); } }
  if(S.module==='anatomy') railAnatomy();
  else if(S.module==='ef') railEF();
  else if(S.module==='wall') railWall();
  else if(S.module==='doppler') railDoppler();
  else if(S.module==='patho') railPatho();
  else if(S.module==='reference') railReference();

function presetSection(){
  return `<div class="sec"><h3>標準ビュー(プリセット)</h3><div class="presetgrid">`+
    PRESETS.map(p=>`<button class="pbtn ${S.view===p.v?'on':''}" data-view="${p.v}" onclick='applyPreset(${JSON.stringify(p)})'>${p.jp}<small>${p.sub}</small></button>`).join('')+
    `</div></div>`;
}
function cycleSection(){
  return `<div class="sec"><h3>心周期</h3>
    <div class="play">
      <button class="iconbtn" id="playBtn" onclick="togglePlay()">${S.playing?'⏸':'▶'}</button>
      <div style="flex:1">
        <div class="field" style="margin:0">
          <label>フェーズ <span class="v" id="phaseV"></span></label>
          <input type="range" min="0" max="1" step="0.001" id="phaseR" oninput="S.playing=false;S.phase=+this.value;document.getElementById('playBtn').textContent='▶'">
        </div>
      </div>
    </div>
    <div class="field" style="margin-top:9px"><label>心拍数 <span class="v">${S.hr} bpm</span></label>
      <input type="range" min="40" max="130" step="1" value="${S.hr}" oninput="S.hr=+this.value;this.previousElementSibling.querySelector('.v').textContent=this.value+' bpm'"></div>`;
}
function togglePlay(){ S.playing=!S.playing; document.getElementById('playBtn').textContent=S.playing?'⏸':'▶'; }

/* ---- ①断面解剖 ---- */
function railAnatomy(){
  rail.innerHTML =
    presetSection()+
    `<div class="sec"><h3>断面を自由に動かす</h3>
      <div class="seg" style="margin-bottom:11px">
        <button class="${S.axisMode==='long'?'on':''}" onclick="S.axisMode='long';pickLongView();buildRail()">長軸で回す</button>
        <button class="${S.axisMode==='short'?'on':''}" onclick="S.axisMode='short';S.view=levelToView(S.saxLevel);buildRail()">短軸でスライド</button>
        <button class="${S.axisMode==='free'?'on':''}" onclick="S.axisMode='free';S.view='FREE';updatePlaneFromView();buildRail()">🔪 自由</button>
      </div>`+
    (S.axisMode==='free'
      ? `<div class="field"><label>面の方位 <span class="v">${Math.round(S.freeAz)}°</span></label>
          <input type="range" min="0" max="360" step="1" value="${S.freeAz}" oninput="S.freeAz=+this.value;updatePlaneFromView();this.previousElementSibling.querySelector('.v').textContent=Math.round(this.value)+'°'"></div>
         <div class="field"><label>面の傾き <span class="v">${Math.round(S.freeEl)}°</span></label>
          <input type="range" min="-70" max="70" step="1" value="${S.freeEl}" oninput="S.freeEl=+this.value;updatePlaneFromView();this.previousElementSibling.querySelector('.v').textContent=Math.round(this.value)+'°'"></div>
         <div class="field"><label>面の位置(法線方向) <span class="v">${S.freeOff.toFixed(1)}</span></label>
          <input type="range" min="-4" max="4" step="0.1" value="${S.freeOff}" oninput="S.freeOff=+this.value;updatePlaneFromView();this.previousElementSibling.querySelector('.v').textContent=(+this.value).toFixed(1)"></div>
         <div class="hint"><b>任意の角度・位置</b>で心臓を実際にカット。左3Dの水色面と右の断面が常に一致。楕円体との交差を解析計算した“生”の断面なので、標準ビューのように整った形にはなりません。標準像との違いを見比べる用。</div>`
      : S.axisMode==='sub'
      ? (S.view==='IVC'
        ? `<div class="field"><label>容量状態(基準径・虚脱率)</label>
            <div class="seg">${[['0','脱水'],['1','正常'],['2','溢水']].map(([v,l])=>`<button class="${(S.ivcVol==null?1:S.ivcVol)==v?'on':''}" onclick="S.ivcVol=${v};buildRail()">${l}</button>`).join('')}</div></div>
           <button class="btn ghost" onclick="S.sniffT=0.9">🌬 sniff(急速吸気)</button>
           <div class="hint" style="margin-top:8px">IVC径と呼吸性虚脱→<b>右房圧(RAP)</b>推定。溢水/高RAPでは拡大&虚脱消失(plethora)。<b>PASP=4×TR速度²+RAP</b>。</div>`
        : `<div class="hint">心窩部から上向きに描出。近位=肝臓。<b>心膜(心嚢液)・心房中隔(ASD)・容量評価</b>に有用。ショック/心停止のPOCUSで頻用。</div>`)
      : S.axisMode==='long'
      ? `<div class="field"><label>長軸まわりの回転角 <span class="v">${Math.round(S.theta)}°</span></label>
          <input type="range" min="0" max="180" step="1" value="${S.theta}" oninput="S.theta=+this.value;pickLongView();this.previousElementSibling.querySelector('.v').textContent=this.value+'°';document.getElementById('echoSub').textContent=viewJP(S.view)"></div>
          <div class="hint">0°=<b>四腔(A4C)</b> → 60°=<b>二腔(A2C)</b> → 118°=<b>長軸(A3C)</b>。プローブを心尖に当てたまま回すイメージ。</div>`
      : `<div class="field"><label>短軸レベル <span class="v">${levelJP(S.saxLevel)}</span></label>
          <input type="range" min="0" max="1" step="0.01" value="${S.saxLevel}" oninput="S.saxLevel=+this.value;S.view=levelToView(S.saxLevel);this.previousElementSibling.querySelector('.v').textContent=levelJP(S.saxLevel);document.getElementById('echoSub').textContent=viewJP(S.view)"></div>
          <div class="hint">基部(大動脈弁)→ 僧帽弁 → 乳頭筋 → 心尖。輪切りの位置を頭↔足方向に動かす。</div>`)+
    `</div>`+
    `<div class="sec"><h3>3D表示</h3>
      <label style="display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink2);font-weight:700;margin-bottom:7px">
        <input type="checkbox" ${S.showCoronary3D?'checked':''} onchange="S.showCoronary3D=this.checked;setCoronaryVisible(this.checked)"> 冠動脈(LAD/RCA/LCx)</label>
      <label style="display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink2);font-weight:700">
        <input type="checkbox" ${S.showChest?'checked':''} onchange="S.showChest=this.checked;const c=scene.getObjectByName('chest');if(c)c.visible=this.checked"> 胸壁・音響窓</label>
      <div class="note" style="margin-top:8px">水色の<b>プローブ窓</b>と<b>ビーム</b>が、その断面をどこから当てて撮るかを示します(A4C/A2C/A3C=心尖、PLAX/PSAX=傍胸骨)。心臓は解剖学的な傾き(心尖=前・下・左、長軸≈正中面45°)で配置。</div>
    </div>`+
    cycleSection()+
    `<div class="sec"><h3>使い方</h3><div class="hint">
      左の<b>3D</b>で切断面(水色)がどこを通るか確認 → 右の<b>エコー像</b>がその断面。<br>
      3Dはドラッグで自由回転。プリセットで標準断面へ一発移動。<br><br>
      <span class="tag" style="background:#123048;color:#7dd3fc">Tip</span>「長軸で回す」を0→180°ゆっくり動かすと、四腔像がどう二腔・長軸へ変わるか体感できます。</div></div>`;
  restorePhaseUI();
  syncPhaseLabel();
}
function pickLongView(){
  // thetaから最寄りの長軸ビューへスナップ
  const t=S.theta;
  S.view = t<35?'A4C' : t<90?'A2C' : 'A3C';
  updatePlaneFromView();
}
function levelToView(l){ return l<0.15?'PSAX-av' : l<0.42?'PSAX-mv' : l<0.72?'PSAX-pap' : 'PSAX-apex'; }
function levelJP(l){ return ({['PSAX-av']:'大動脈弁',['PSAX-mv']:'僧帽弁',['PSAX-pap']:'乳頭筋',['PSAX-apex']:'心尖'})[levelToView(l)]; }

/* フェーズUIの復元 */
function restorePhaseUI(){ const r=document.getElementById('phaseR'); if(r) r.value=S.phase; }
function syncPhaseLabel(){ const v=document.getElementById('phaseV'); if(v){ v.textContent=phaseNameJP(S.phase);} }
function phaseNameJP(p){ return p<0.35?'収縮期':p<0.55?'弛緩期':'拡張期'; }

/* プレースホルダ(後続スクリプトで本実装) */
function railEF(){ rail.innerHTML=`<div class="sec"><div class="hint">EFモジュール読込中…</div></div>`; }
function railWall(){ rail.innerHTML=`<div class="sec"><div class="hint">壁運動モジュール読込中…</div></div>`; }
function railDoppler(){ rail.innerHTML=`<div class="sec"><div class="hint">ドップラーモジュール読込中…</div></div>`; }

/* タブ切替 */
document.getElementById('tabs').addEventListener('click',e=>{
  const t=e.target.closest('.tab'); if(!t) return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  S.module=t.dataset.mod;
  onModuleEnter(S.module);
  buildRail();
});
function onModuleEnter(m){
  if(m==='ef'){ S.view='A4C'; S.axisMode='long'; S.theta=0; S.playing=true; }
  else if(m==='wall'){ S.view='PSAX-pap'; S.axisMode='short'; S.saxLevel=0.55; S.playing=true; }
  else if(m==='doppler'){ if(!S.view.startsWith('P')&&S.view[0]!=='A') S.view='A4C'; }
  updatePlaneFromView();
}

/* 動的フェーズラベル更新 */
setInterval(()=>{ syncPhaseLabel(); const r=document.getElementById('phaseR'); if(r&&S.playing) r.value=S.phase; },120);
</script>
<script>
/* ============================================================================
   訓練モジュール本実装:  ②EF目測 / ③壁運動17seg / ④弁膜症カラードップラー
   （前スクリプトのプレースホルダ関数を上書き）
   ========================================================================== */

/* ---------- 共通ヘルパ ---------- */
function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
function fillWedge(cx,cy,r1,r2,d1,d2,color){ // d: 上=0, 時計回り(度)
  const a1=(d1-90)*D2R,a2=(d2-90)*D2R;
  ex.beginPath(); ex.arc(cx,cy,r2,a1,a2); ex.arc(cx,cy,r1,a2,a1,true); ex.closePath();
  ex.fillStyle=color; ex.fill();
}
function setViewAxis(v){
  if(v==='SC4C'||v==='IVC'){ S.axisMode='sub'; }
  else if(v.startsWith('PSAX')){ S.axisMode='short'; S.saxLevel={'PSAX-av':0.05,'PSAX-mv':0.30,'PSAX-pap':0.55,'PSAX-apex':0.85}[v]??0.55; }
  else if(v==='PLAX'||v==='A3C'){ S.axisMode='long'; S.theta=118; }
  else if(v==='A2C'){ S.axisMode='long'; S.theta=60; }
  else { S.axisMode='long'; S.theta=0; }
  S.view=v;
  updatePlaneFromView();
}

/* =====================================================================
   17セグメント / 壁運動モデル
   ===================================================================== */
const SEG_NAMES={1:'基部前壁',2:'基部前中隔',3:'基部下中隔',4:'基部下壁',5:'基部下側壁',6:'基部前側壁',
  7:'中部前壁',8:'中部前中隔',9:'中部下中隔',10:'中部下壁',11:'中部下側壁',12:'中部前側壁',
  13:'心尖前壁',14:'心尖中隔',15:'心尖下壁',16:'心尖側壁',17:'心尖部'};
const SEG_TERRITORY=(()=>{ const t={}; [1,2,7,8,13,14,17].forEach(s=>t[s]='LAD');
  [3,4,9,10,15].forEach(s=>t[s]='RCA'); [5,6,11,12,16].forEach(s=>t[s]='LCx'); return t; })();
const TERRITORY_COLORS={LAD:'#f0637a',RCA:'#5b9bd5',LCx:'#7ecb8f'};
const TERRITORY_JP={LAD:'左前下行枝 (LAD)',RCA:'右冠動脈 (RCA)',LCx:'回旋枝 (LCx)'};
const MOTION_COLORS={normal:'#1f9e6e',hypo:'#eab308',akinetic:'#ef4444',dyskinetic:'#c026d3'};
const MOTION_JP={normal:'正常',hypo:'低下 hypo',akinetic:'無収縮 akinetic',dyskinetic:'奇異性 dys'};
const MOTION_ORDER=['normal','hypo','akinetic','dyskinetic'];
const MOTION_FACTOR={normal:1,hypo:0.42,akinetic:0.05,dyskinetic:-0.28};

function initSegStates(){ for(let i=1;i<=17;i++) S.segStates[i]='normal'; }
function currentSaxLevel(){
  if(S.view==='PSAX-apex'||S.saxLevel>0.72) return 'apical';
  if(S.view==='PSAX-mv'||S.saxLevel<0.42) return 'basal';
  return 'mid';
}
function segAtAngle(a){ // a: drawLVringの角度(上=-π/2起点)
  const deg=(((a+Math.PI/2)/D2R)%360+360)%360;
  const lvl=currentSaxLevel();
  if(lvl==='apical'){ if(deg>=315||deg<45) return 13; if(deg<135) return 16; if(deg<225) return 15; return 14; }
  const map=lvl==='basal'?[1,6,5,4,3,2]:[7,12,11,10,9,8];
  return map[Math.floor(((deg+30)%360)/60)%6];
}
function motionOf(seg){ return MOTION_FACTOR[S.segStates[seg]||'normal']; }

/* 前スクリプトのスタブを上書き: 壁運動時のみ収縮率をセグメント別に */
function segMotion(a){ if(S.module!=='wall') return 1; return motionOf(segAtAngle(a)); }
function drawSegColorRing(cx,cy,outR,inR0){
  const lvl=currentSaxLevel();
  const segs = lvl==='apical'? [[13,-45,45],[16,45,135],[15,135,225],[14,225,315]]
    : lvl==='basal'? [[1,-30,30],[6,30,90],[5,90,150],[4,150,210],[3,210,270],[2,270,330]]
    : [[7,-30,30],[12,30,90],[11,90,150],[10,150,210],[9,210,270],[8,270,330]];
  ex.save(); ex.globalAlpha=0.5;
  for(const [s,d1,d2] of segs) fillWedge(cx,cy,inR0*0.97,outR*1.0,d1,d2,MOTION_COLORS[S.segStates[s]||'normal']);
  ex.restore();
  for(const [s,d1,d2] of segs){ if((S.segStates[s]||'normal')!=='normal'){
    const am=((d1+d2)/2-90)*D2R,rm=(inR0+outR)/2; label(String(s),cx+Math.cos(am)*rm,cy+Math.sin(am)*rm,'#06101c',11); } }
}

/* ---- ブルズアイ(17-seg polar map) ---- */
function drawBullseye(cnv){
  const g=cnv.getContext('2d'); const W=cnv.width,H=cnv.height; g.clearRect(0,0,W,H);
  const bx=W/2,by=H/2,R=Math.min(W,H)*0.46;
  const rings=[
    {r1:0,r2:R*0.17,segs:[[17,0,360]]},
    {r1:R*0.17,r2:R*0.45,segs:[[13,-45,45],[16,45,135],[15,135,225],[14,225,315]]},
    {r1:R*0.45,r2:R*0.72,segs:[[7,-30,30],[12,30,90],[11,90,150],[10,150,210],[9,210,270],[8,270,330]]},
    {r1:R*0.72,r2:R,segs:[[1,-30,30],[6,30,90],[5,90,150],[4,150,210],[3,210,270],[2,270,330]]},
  ];
  for(const ring of rings) for(const [s,d1,d2] of ring.segs){
    const a1=(d1-90)*D2R,a2=(d2-90)*D2R;
    g.beginPath(); g.arc(bx,by,ring.r2,a1,a2); g.arc(bx,by,ring.r1,a2,a1,true); g.closePath();
    g.fillStyle=hexA(MOTION_COLORS[S.segStates[s]||'normal'],0.9); g.fill();
    if(S.showTerritory){ g.strokeStyle=TERRITORY_COLORS[SEG_TERRITORY[s]]; g.lineWidth=3; }
    else { g.strokeStyle='#0b1220'; g.lineWidth=1.5; }
    g.stroke();
    if(S.wallMode==='quiz'&&S.quizSuspect&&S.quizSuspect[s]){
      g.strokeStyle='#38bdf8'; g.lineWidth=3; g.stroke();
    }
    const am=((d1+d2)/2-90)*D2R,rm=(ring.r1+ring.r2)/2||R*0.09;
    g.fillStyle='#06101c'; g.font='700 12px sans-serif'; g.textAlign='center'; g.textBaseline='middle';
    g.fillText(s, bx+Math.cos(am)*rm, by+Math.sin(am)*rm);
  }
  // 方位ラベル
  g.fillStyle='#8fa3c0'; g.font='600 10px sans-serif';
  g.fillText('前 ant',bx,by-R-8); g.fillText('下 inf',bx,by+R+9);
  g.textAlign='right'; g.fillText('中隔',bx-R-4,by); g.textAlign='left'; g.fillText('側壁',bx+R+4,by);
}
function segFromPolar(rr,deg,R){
  if(rr<R*0.17) return 17;
  const d=(deg+360)%360;
  if(rr<R*0.45){ if(d>=315||d<45) return 13; if(d<135) return 16; if(d<225) return 15; return 14; }
  const map=rr<R*0.72?[7,12,11,10,9,8]:[1,6,5,4,3,2];
  return map[Math.floor(((d+30)%360)/60)%6];
}
function bullseyeClick(e){
  const cnv=e.currentTarget, rect=cnv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(cnv.width/rect.width), my=(e.clientY-rect.top)*(cnv.height/rect.height);
  const bx=cnv.width/2,by=cnv.height/2,R=Math.min(cnv.width,cnv.height)*0.46;
  const dx=mx-bx,dy=my-by,rr=Math.hypot(dx,dy); if(rr>R*1.02) return;
  let deg=(Math.atan2(dy,dx)*180/Math.PI+90+360)%360;
  const s=segFromPolar(rr,deg,R);
  if(S.wallMode==='quiz'){ S.quizSuspect=S.quizSuspect||{}; S.quizSuspect[s]=!S.quizSuspect[s]; }
  else { const cur=S.segStates[s]||'normal'; S.segStates[s]=MOTION_ORDER[(MOTION_ORDER.indexOf(cur)+1)%4]; }
  drawBullseye(cnv);
}

/* =====================================================================
   ③ 壁運動モジュール  レール
   ===================================================================== */
function railWall(){
  if(Object.keys(S.segStates).length===0) initSegStates();
  S.wallMode = S.wallMode||'learn';
  const lvl=currentSaxLevel();
  rail.innerHTML =
    `<div class="sec"><h3>壁運動 17セグメント</h3>
      <div class="seg" style="margin-bottom:10px">
        <button class="${S.wallMode==='learn'?'on':''}" onclick="S.wallMode='learn';buildRail()">学習</button>
        <button class="${S.wallMode==='quiz'?'on':''}" onclick="startWallQuiz()">クイズ</button>
      </div>
      <div class="hint">${S.wallMode==='learn'
        ? 'ブルズアイの各セグメントを<b>クリック</b>すると 正常→低下→無収縮→奇異性 と変化。左の短軸エコーが即座に連動します。'
        : '短軸エコーで動きの悪い領域を探し、<b>責任冠動脈</b>を推定 → 答え合わせ。ブルズアイをクリックで疑い箇所をマーク。'}</div>
    </div>
    <div class="sec"><h3>短軸レベル</h3>
      <div class="seg">
        <button class="${lvl==='basal'?'on':''}" onclick="setViewAxis('PSAX-mv');buildRail()">基部</button>
        <button class="${lvl==='mid'?'on':''}" onclick="setViewAxis('PSAX-pap');buildRail()">中部</button>
        <button class="${lvl==='apical'?'on':''}" onclick="setViewAxis('PSAX-apex');buildRail()">心尖</button>
      </div>
      <div class="note">今の断面: <b>${({basal:'基部(seg 1-6)',mid:'中部(seg 7-12)',apical:'心尖(seg 13-16)'})[lvl]}</b></div>
    </div>
    <div class="sec"><h3>ブルズアイ (AHA 17分画)</h3>
      <canvas id="bull" width="260" height="260" style="width:100%;max-width:260px;display:block;margin:0 auto;cursor:pointer"></canvas>
      <label style="display:flex;align-items:center;gap:7px;margin-top:9px;font-size:12px;color:var(--ink2);font-weight:700">
        <input type="checkbox" ${S.showTerritory?'checked':''} onchange="S.showTerritory=this.checked;drawBullseye(document.getElementById('bull'))"> 冠動脈支配で枠色分け</label>
    </div>`+
    (S.wallMode==='quiz'? wallQuizSection() : `<div class="sec"><h3>壁運動の色</h3><div class="legend">`+
      MOTION_ORDER.map(k=>`<span><i style="background:${MOTION_COLORS[k]}"></i>${MOTION_JP[k]}</span>`).join('')+
      `</div><button class="btn ghost" style="margin-top:10px" onclick="initSegStates();drawBullseye(document.getElementById('bull'))">すべて正常に戻す</button></div>`)+
    cycleSection();
  const bc=document.getElementById('bull'); if(bc){ drawBullseye(bc); bc.onclick=bullseyeClick; }
  restorePhaseUI();
}
function wallQuizSection(){
  const revealed=S.quizRevealed;
  let ans='';
  if(revealed){
    const ok=S.quizGuess===S.quizAnswer;
    ans=`<div class="answerbox reveal"><div class="mini">責任冠動脈</div>
      <div class="big" style="color:${ok?'#34d399':'#f87171'}">${TERRITORY_JP[S.quizAnswer]}</div>
      <div class="mini" style="text-align:center">あなた: ${S.quizGuess?TERRITORY_JP[S.quizGuess]:'—'} ${ok?'<b style=\"color:#34d399\">正解!</b>':'<b style=\"color:#f87171\">不正解</b>'}</div>
      <div class="note" style="margin-top:7px">低下領域: ${S.quizSegs.map(s=>SEG_NAMES[s]).join('・')}</div></div>`;
  }
  return `<div class="sec"><h3>責任冠動脈は?</h3>
    <div class="row">
      ${['LAD','RCA','LCx'].map(t=>`<button class="btn ghost" style="border-color:${TERRITORY_COLORS[t]}" onclick="guessTerritory('${t}')">${t}</button>`).join('')}
    </div>${ans}
    <div class="row" style="margin-top:10px">
      <button class="btn" onclick="startWallQuiz()">新しい症例</button>
      ${revealed?'':'<button class="btn ghost" onclick="revealWallQuiz()">答えを見る</button>'}
    </div>
    <div style="margin-top:9px"><span class="scorepill">正解 ${S.quizScore||0} / ${S.quizN||0}</span></div></div>`;
}
function startWallQuiz(){
  S.wallMode='quiz'; initSegStates(); S.quizSuspect={}; S.quizRevealed=false; S.quizGuess=null;
  const terr=['LAD','RCA','LCx'][Math.floor(Math.random()*3)];
  const segs=Object.keys(SEG_TERRITORY).filter(s=>SEG_TERRITORY[s]===terr).map(Number).filter(s=>s!==17);
  const sev=Math.random()<0.5?'akinetic':'hypo';
  segs.forEach(s=>S.segStates[s]=sev);
  S.quizAnswer=terr; S.quizSegs=segs;
  // 中部から観察
  setViewAxis('PSAX-pap'); S.playing=true;
  buildRail();
}
function guessTerritory(t){ if(S.quizRevealed) return; S.quizGuess=t; revealWallQuiz(true); }
function revealWallQuiz(fromGuess){
  if(S.quizRevealed) return; S.quizRevealed=true;
  S.quizN=(S.quizN||0)+1; if(S.quizGuess===S.quizAnswer) S.quizScore=(S.quizScore||0)+1;
  buildRail();
}

/* =====================================================================
   ② EF 目測モジュール  レール
   ===================================================================== */
function newEF(){ S.efTarget=Math.round((0.15+Math.random()*0.55)*100)/100; S.ef=S.efTarget; S.efGuess=0.5; S.efRevealed=false; S.playing=true; S.phase=0; }
function freezeED(){ S.playing=false; S.phase=0; }
function freezeES(){ S.playing=false; S.phase=0.35; }
function revealEF(){
  if(S.efRevealed) return; S.efRevealed=true;
  const err=Math.round(Math.abs(S.efGuess-S.efTarget)*100);
  S.efScoreN=(S.efScoreN||0)+1; S.efErrSum=(S.efErrSum||0)+err;
  const g= err<=5?['お見事','#34d399']: err<=10?['まずまず','#fbbf24']:['要練習','#f87171'];
  const ab=document.getElementById('efAnswer');
  if(ab) ab.innerHTML=`<div class="answerbox reveal"><div class="mini">正解 EF</div>
    <div class="big" style="color:${g[1]}">${Math.round(S.efTarget*100)}%</div>
    <div class="mini" style="text-align:center">あなた ${Math.round(S.efGuess*100)}% ・ 誤差 ${err}pt <b style="color:${g[1]}">${g[0]}</b></div>
    <div class="note" style="margin-top:6px">${efComment(S.efTarget)}</div></div>`;
}
function efComment(ef){ const p=Math.round(ef*100);
  if(p>=55) return '正常収縮 (LVEF ≥55%)'; if(p>=40) return '軽度〜中等度低下 (HFmrEF域 40-54%)';
  if(p>=30) return '中等度低下 (HFrEF)'; return '高度低下 (LVEF <30%・要注意)'; }
function railEF(){
  if(S.efTarget===undefined) newEF();
  rail.innerHTML =
    `<div class="sec"><h3>EF 目測トレーニング</h3>
      <div class="hint">拍動を見て左室駆出率(EF)を<b>目測</b>→答え合わせ。コツは <b>ED(拡張末期)とES(収縮末期)</b>で内腔がどれだけ縮むかを比べること。</div>
      <div class="seg" style="margin-top:10px">
        <button class="${S.view==='A4C'?'on':''}" onclick="setViewAxis('A4C');buildRail()">四腔 A4C</button>
        <button class="${S.view==='PLAX'?'on':''}" onclick="setViewAxis('PLAX');buildRail()">長軸 PLAX</button>
      </div>
    </div>
    <div class="sec"><h3>コマ送り(ED↔ES比較)</h3>
      <div class="row">
        <button class="btn ghost" onclick="freezeED()">ED 拡張末期</button>
        <button class="btn ghost" onclick="freezeES()">ES 収縮末期</button>
      </div>
      <button class="btn ghost" style="margin-top:7px" onclick="S.playing=true">▶ 連続再生</button>
    </div>
    <div class="sec"><h3>あなたの目測</h3>
      <div class="field"><label>推定 EF <span class="v" id="efGuessV">${Math.round(S.efGuess*100)}%</span></label>
        <input type="range" min="0.10" max="0.75" step="0.01" value="${S.efGuess}"
          oninput="S.efGuess=+this.value;document.getElementById('efGuessV').textContent=Math.round(this.value*100)+'%'"></div>
      <button class="btn primary" onclick="revealEF()">答え合わせ</button>
      <div id="efAnswer"></div>
    </div>
    <div class="sec">
      <button class="btn" onclick="newEF();buildRail()">次の問題 →</button>
      <div style="margin-top:10px"><span class="scorepill">出題 ${S.efScoreN||0} ・ 平均誤差 ${S.efScoreN?Math.round(S.efErrSum/S.efScoreN):'—'}pt</span></div>
      <div class="hint" style="margin-top:9px">目安: 健常 <b>55-70%</b> / 軽度低下 40-54% / HFrEF <b>&lt;40%</b>。まず ED と ES を止めて見比べ、次に連続再生で確認。</div>
    </div>`+
    cycleSection();
  restorePhaseUI();
}

/* =====================================================================
   ④ 弁膜症 カラードップラー モジュール
   ===================================================================== */
const LESIONS=[
  {k:'none',jp:'なし(弁膜症なし)'},
  {k:'normal',jp:'正常血流(In=赤 / Out=青)',view:'A4C',phase:'dia',spec:null,

/* スペクトルドップラー模式波形(心尖: 上=接近, 下=離反) */
function drawSpectral(cnv,type){
  const g=cnv.getContext('2d'), W=cnv.width, H=cnv.height, base=H*0.5;
  g.clearRect(0,0,W,H);
  g.strokeStyle='#2b3d57'; g.lineWidth=1; g.beginPath(); g.moveTo(0,base); g.lineTo(W,base); g.stroke();
  g.fillStyle='#5b6b82'; g.font='9px sans-serif'; g.textAlign='left'; g.fillText('接近+',3,10); g.fillText('離反−',3,H-4);
  const beats=2, bw=W/beats;
  const sysEnd=0.4;
  const env=(t)=>{ // t:0..1 within beat, returns signed amp (-1..1)
    if(type==='sysdome'){ return t<sysEnd? -Math.sin(Math.PI*t/sysEnd)*0.95 : 0; }        // AS 収縮期ドーム(下)
    if(type==='holosys'){ return t<sysEnd? -(0.9) : 0; }                                    // MR/VSD 全収縮期(下, 平坦)
    if(type==='systri'){ return t<sysEnd? -(1-(t/sysEnd))*0.95-0.05*(t<sysEnd?1:0) : 0; }   // TR 三角(早期ピーク,下)
    if(type==='diaE'){ if(t<sysEnd) return 0; const d=(t-sysEnd)/(1-sysEnd);                 // MS 拡張E波(緩徐減衰,上)
      const e=Math.max(0,1-d/0.7)*0.9; const a=d>0.8?(1-Math.abs(d-0.9)/0.1)*0.5:0; return Math.max(e,a); }
    if(type==='diadecay'){ if(t<sysEnd) return 0; const d=(t-sysEnd)/(1-sysEnd); return (1-d)*0.9; } // AR/PR 拡張期減衰(上)
    return 0;
  };
  g.fillStyle=type.startsWith('dia')||type==='diaE'? 'rgba(96,180,220,.5)':'rgba(226,110,120,.5)';
  g.strokeStyle=type.startsWith('dia')||type==='diaE'? '#6fb3dc':'#e2707a'; g.lineWidth=1.5;
  for(let b=0;b<beats;b++){ const x0=b*bw;
    g.beginPath(); g.moveTo(x0,base);
    for(let i=0;i<=60;i++){ const t=i/60; g.lineTo(x0+t*bw, base - env(t)*base*0.9); }
    g.lineTo(x0+bw,base); g.closePath(); g.fill(); g.stroke();
  }
  // 収縮/拡張の帯
  g.fillStyle='rgba(255,255,255,.04)';
  for(let b=0;b<beats;b++){ g.fillRect(b*bw, 0, bw*sysEnd, H); }
  g.fillStyle='#6b7d99'; g.textAlign='center'; g.font='8px sans-serif';
  g.fillText('収縮', bw*sysEnd/2, H-14); g.fillText('拡張', bw*(sysEnd+1)/2, H-14);
}

/* ジェット描画: 原点(ox,oy)から角度angへ扇状に着色 */
function drawJet(ox,oy,ang,spread,len,mode,sev,intensity){
  const w={mild:0.55,mod:0.85,severe:1.2}[sev]||0.85;
  const inten=intensity==null?1:clamp(intensity,0,1);
  const N=Math.round(360*w*Math.max(0.12,inten));
  ex.save();
  for(let i=0;i<N;i++){
    const t=Math.random(), d=t*len, sp=(Math.random()-0.5)*spread*(0.35+t*w);
    const a=ang+sp, x=ox+Math.cos(a)*d, y=oy+Math.sin(a)*d;
    let col,al;
    if(mode==='turb'||mode==='turbBlue'||mode==='turbRed'){
      const r=Math.random(), redP= mode==='turbBlue'?0.28: mode==='turbRed'?0.56:0.42;
      col = r<redP?'#e23b3b': r<redP+0.30?'#3b6fe2': r<redP+0.46?'#e2c93b':'#37c26a'; al=0.55-0.28*t;
    }
    else if(mode==='toward'){ col='#e23b3b'; al=0.5-0.3*t; }
    else { col='#3b6fe2'; al=0.5-0.3*t; }
    ex.globalAlpha=Math.max(0,al*inten); ex.fillStyle=col; ex.fillRect(x,y,2.6,2.6);
  }
  ex.restore();
}
/* 正常血流: A4C拡張期の房室弁流入=赤(層流) */
function drawNormalFlow(view,sysA,diaA){
  const U=EH;
  if(view==='A4C'){
    const cx=EW/2, apexY=EH*0.08, R=EH*0.9, lvCx=cx+R*0.12, rvCx=cx-R*0.155, valveY=apexY+R*0.60;
    drawJet(lvCx, valveY-U*0.02, -Math.PI/2+0.04, 0.5, U*0.20, 'toward','mod', diaA);
    drawJet(rvCx, valveY-U*0.02, -Math.PI/2-0.04, 0.5, U*0.18, 'toward','mod', diaA);
    if(sysA>0.55){ ex.textAlign='center'; ex.textBaseline='middle'; ex.font='600 11px sans-serif'; ex.fillStyle='#8fa8c8';
      ex.fillText('収縮期: 房室弁閉鎖=流入なし(流出の青はA5C)', EW/2, apexY+R*0.30); }
  } else if(view==='PLAX'){
    const midY=EH*0.50; drawJet(EW*0.55, midY, Math.PI, 0.5, U*0.14, 'toward','mod', diaA); // 流入
  }
}
function drawDopplerOverlay(bg,view){
  if(S.module!=='doppler'||!S.colorOn||S.lesion==='none') return;
  const L=LESIONS.find(x=>x.k===S.lesion); if(!L) return;
  const c=contractF(S.phase), sysA=0.15+0.85*c, diaA=0.15+0.85*(1-c);
  const active=(L.phase==='sys')?sysA:diaA, sev=S.severity, U=EH;
  if(S.lesion==='normal'){ drawNormalFlow(view,sysA,diaA); return; }
  if(view==='A4C'){
    const cx=EW/2, apexY=EH*0.08, R=EH*0.9, lvCx=cx+R*0.12, rvCx=cx-R*0.155, valveY=apexY+R*0.60;
    if(S.lesion==='MR') drawJet(lvCx-R*0.02, valveY+U*0.015, Math.PI/2+0.25, 0.7, U*0.22, 'turbBlue', sev, active);
    else if(S.lesion==='TR') drawJet(rvCx+R*0.02, valveY+U*0.015, Math.PI/2-0.2, 0.7, U*0.20, 'turbBlue', sev, active);
    else if(S.lesion==='MS') drawJet(lvCx, valveY-U*0.01, -Math.PI/2+0.15, 0.5, U*0.17, 'turbRed', sev, active);
    else if(S.lesion==='VSD') drawJet(cx-U*0.01, apexY+R*0.34, Math.PI, 0.5, U*0.13, 'turb', sev, active);
  } else if(view==='PLAX'){
    const midY=EH*0.50, lvCx=EW*0.40, aoX=EW*0.635, aoY=midY-U*0.115;
    if(S.lesion==='AR') drawJet(aoX-U*0.03, aoY+U*0.02, Math.PI*0.86, 0.55, U*0.24, 'turbRed', sev, active);
    else if(S.lesion==='AS') drawJet(aoX, aoY, -0.5, 0.5, U*0.22, 'turbBlue', sev, active);
    else if(S.lesion==='MR') drawJet(EW*0.58, midY+U*0.02, 0.5, 0.7, U*0.18, 'turbBlue', sev, active);
  } else if(view.startsWith('PSAX')){
    const cx=EW/2, cy=EH*0.52, R=EH*0.40;
    if(S.lesion==='PR') drawJet(cx+R*0.55, cy-R*0.35, Math.PI*0.75, 0.6, R*0.7, 'turbRed', sev, active);
    else drawJet(cx,cy,0,0.6,R*0.5,'turb',sev,active);
  }
  // キャプション + タイミング表示
  ex.textAlign='right'; ex.textBaseline='top'; ex.font='700 12px sans-serif'; ex.fillStyle='#e6eef8';
  ex.fillText(L.jp+' ('+SEV_JP[sev]+')', EW-12, 12);
  ex.font='600 11px sans-serif'; ex.fillStyle= active>0.5?'#7dd3fc':'#5b6b82';
  ex.fillText((L.phase==='sys'?'収縮期':'拡張期')+'に出現'+(active<0.35?' — 今は消失':''), EW-12, 30);
}
