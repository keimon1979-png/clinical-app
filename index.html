// ── BY DATE ───────────────────────────────────────────────
function renderLabByDate(){
  const p=selP(); const c=document.getElementById('tabContent'); if(!p||!c) return;
  const dates=[...new Set(p.labs.filter(lv=>lv.date).map(lv=>lv.date))].sort().reverse();
  if(!dates.length){
    c.innerHTML=labSubNav()+'<div style="text-align:center;padding:30px;color:#bbb;font-size:13px">検査値がありません</div>'+'<div style="margin-top:14px">'+labAddForm()+'</div>';
    return;
  }
  if(!S.labSelDate||!dates.includes(S.labSelDate)) S.labSelDate=dates[0];
  const selDate=S.labSelDate;
  const entries=p.labs.filter(lv=>lv.date===selDate);
  const criticals=[];
  const cards=entries.map(lv=>{
    const flag=getFlag(lv.name,lv.val);
    if(flag==='HH'||flag==='LL') criticals.push(lv.name);
    const ref=LAB_REF[lv.name];
    const cls=flag?`f${flag}`:'';
    const isQual=ref&&ref.qual;
    const dispVal=isQual?(lv.val>0?'陽性':'陰性'):lv.val;
    const cls2=isQual?(lv.val>0?'fHH':''):cls;
    const range=(!isQual&&ref)?`基準: ${ref.lo!==null?ref.lo:'?'} ～ ${ref.hi!==null?ref.hi:'?'} ${ref.unit}`:'';
    return `<div class="lab-card ${cls2}">
      ${flag&&!isQual?`<span class="lc-flag">${flag}</span>`:isQual&&lv.val>0?'<span class="lc-flag">陽性</span>':''}
      <div class="lc-name">${esc(lv.name)}</div>
      <div><span class="lc-val">${isQual?`<span style="color:${lv.val>0?'var(--danger)':'var(--success)'};font-weight:800">${dispVal}</span>`:dispVal}</span>${!isQual?`<span class="lc-unit">${esc(lv.unit)}</span>`:''}</div>
      ${range?`<div class="lc-range">${range}</div>`:''}
      <div class="lc-ts">${esc(lv.ts||'')}</div>
      <button class="lc-del" onclick="deleteLab('${lv.id}')" title="削除">&#215;</button>
    </div>`;
  }).join('');
  const alert=criticals.length?`<div class="critical-alert"><span class="c-lbl">&#9888; 危険値</span><span class="c-body">${esc(criticals.join('、'))} — 至急確認してください</span></div>`:'';
  const pills=dates.map(d=>{
    const mm=d.slice(5).replace('-','/');
    const cnt=p.labs.filter(lv=>lv.date===d).length;
    return `<button class="date-pill${d===selDate?' active':''}" onclick="S.labSelDate='${d}';renderLabByDate()">${mm} <span style="font-size:10px;opacity:.7">(${cnt}件)</span></button>`;
  }).join('');
  c.innerHTML=labSubNav()+
    `<div class="date-pills">${pills}</div>`+
    alert+
    (entries.length?`<div class="lab-grid">${cards}</div>`:'<div style="padding:16px;color:#bbb;font-size:13px">この日付のデータはありません</div>')+
    '<div style="margin-top:14px">'+labAddForm()+'</div>';
}

// 軽量Markdown整形（**太字**・`code`・表・#見出し・改行保持）
function mdInline(s){
  return s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
}
function mdBlock(raw){
  const lines=String(raw).split('\n');
  let html='',tbl=[];
  const flushTbl=()=>{
    if(!tbl.length) return;
    const rows=tbl.filter(l=>!/^\s*\|[\s:\-｜|]+\|\s*$/.test(l));
    html+='<table class="ai-md-tbl">'+rows.map((l,ri)=>{
      const cells=l.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(cell=>mdInline(esc(cell.trim())));
      return '<tr>'+cells.map(cell=>ri===0?`<th>${cell}</th>`:`<td>${cell}</td>`).join('')+'</tr>';
    }).join('')+'</table>';
    tbl=[];
  };
  lines.forEach(l=>{
    if(/^\s*\|.*\|\s*$/.test(l)){ tbl.push(l); return; }
    flushTbl();
    const t=l.trim();
    if(!t){ html+='<div class="md-sp"></div>'; return; }
    const h=t.match(/^#{1,4}\s+(.*)$/);
    if(h){ html+=`<div class="md-h">${mdInline(esc(h[1]))}</div>`; return; }
    html+=`<div class="md-l">${mdInline(esc(l))}</div>`;
  });
  flushTbl();
  return html;
}
function formatAI(text){
  // 絵文字セクションヘッダのパターン
  const EMOJI_RE=/^([🔴🟡💊🫀📋❓🏥🔬🦠⚠️⚠📋]|⚠️)/u;
  const STYLE={
    '🔴':{bg:'#fef2f2',bd:'#fca5a5',tc:'#b91c1c'},
    '🟡':{bg:'#fefce8',bd:'#fde047',tc:'#854d0e'},
    '💊':{bg:'#faf5ff',bd:'#d8b4fe',tc:'#6b21a8'},
    '🫀':{bg:'#fdf4ff',bd:'#e879f9',tc:'#701a75'},
    '📋':{bg:'#eff6ff',bd:'#93c5fd',tc:'#1e40af'},
    '❓':{bg:'#f0fdf4',bd:'#86efac',tc:'#15803d'},
    '🏥':{bg:'#f0fdf4',bd:'#6ee7b7',tc:'#065f46'},
    '🔬':{bg:'#eff6ff',bd:'#93c5fd',tc:'#1e3a8a'},
    '🦠':{bg:'#fff7ed',bd:'#fed7aa',tc:'#9a3412'},
    '⚠️':{bg:'#fffbeb',bd:'#fcd34d',tc:'#92400e'},
    '⚠' :{bg:'#fffbeb',bd:'#fcd34d',tc:'#92400e'},
  };
  const getStyle=line=>{ for(const [k,v] of Object.entries(STYLE)){ if(line.startsWith(k)) return {emoji:k,...v}; } return null; };

  // 絵文字形式かどうか判定
  const lines=text.split('\n');
  const hasEmoji=lines.some(l=>getStyle(l.trim()));

  if(!hasEmoji){
    // 旧 【】 形式フォールバック
    const parts=text.split(/(【[^】]+】)/g);
    let html='';
    for(let i=0;i<parts.length;i++){
      const part=parts[i];
      if(/^【[^】]+】$/.test(part)&&i+1<parts.length){
        html+=`<div class="ai-sec"><div class="ai-sec-title">${esc(part)}</div><div class="ai-sec-body ai-md">${mdBlock(parts[i+1].trim())}</div></div>`;
        i++;
      } else if(part.trim()){
        html+=`<div class="ai-md" style="margin-bottom:8px">${mdBlock(part.trim())}</div>`;
      }
    }
    return html||`<div class="ai-md">${mdBlock(text)}</div>`;
  }

  // 絵文字セクション形式
  let html=''; let sec=null; let body=[];
  const flush=()=>{
    if(!sec&&!body.length) return;
    const s=sec?getStyle(sec):null;
    const bg=s?s.bg:'#fff'; const bd=s?s.bd:'var(--g200)'; const tc=s?s.tc:'var(--g800)';
    html+=`<div style="background:${bg};border:1px solid ${bd};border-radius:7px;padding:10px 14px;margin-bottom:8px">`;
    if(sec) html+=`<div style="font-weight:700;font-size:13px;color:${tc};margin-bottom:5px">${esc(sec)}</div>`;
    const bodyText=body.join('\n').trim();
    if(bodyText) html+=`<div class="ai-md" style="color:var(--g800)">${mdBlock(bodyText)}</div>`;
    html+='</div>';
    sec=null; body=[];
  };
  lines.forEach(line=>{
    if(getStyle(line.trim())){ flush(); sec=line.trim(); }
    else body.push(line);
  });
  flush();
  return html||`<div class="ai-md">${mdBlock(text)}</div>`;
}

function buildSummaryText(p){
  const lines=[];
  lines.push('━━━ 入院サマリ ━━━');
  lines.push(`患者: ${p.name}　病室: ${p.room||'—'}　入院日: ${p.date||'—'}`);
  const age=p.birthdate?` (${calcAge(p.birthdate)})`:'' ;
  const bmi=p.height&&p.weight?`  BMI: ${calcBMI(p.height,p.weight)}`:'';
  if(p.birthdate||p.height||p.weight)
    lines.push(`生年月日: ${p.birthdate||'—'}${age}  身長: ${p.height?p.height+'cm':'—'}  体重: ${p.weight?p.weight+'kg':'—'}${bmi}`);
  if(p.adl) lines.push(`ADL: ${p.adl}`);
  if(p.kpName||p.kpRel) lines.push(`キーパーソン: ${p.kpName||'—'}（${p.kpRel||'—'}）`);
  lines.push('');
  lines.push(`【診断名】\n${p.diag||'—'}`);
  if(p.chiefComplaint)   lines.push(`\n【主訴】\n${p.chiefComplaint}`);
  if(p.presentIllness)   lines.push(`\n【現病歴】\n${p.presentIllness}`);
  if(p.pastHistory)      lines.push(`\n【既往歴】\n${p.pastHistory}`);
  if(p.allergies)        lines.push(`\n【アレルギー】\n${p.allergies}`);
  if(p.familyHistory)    lines.push(`\n【家族歴】\n${p.familyHistory}`);
  if(p.admissionFindings) lines.push(`\n【入院時所見】\n${p.admissionFindings}`);
  if(p.labFindings)      lines.push(`\n【検査所見】\n${p.labFindings}`);
  if(p.labs&&p.labs.length){
    lines.push('\n  (検査データ)');
    const byName={};
    p.labs.forEach(lv=>{ if(!byName[lv.name]||lv.date>=byName[lv.name].date) byName[lv.name]=lv; });
    Object.entries(byName).forEach(([name,lv])=>{
      const flag=getFlag(name,lv.val);
      const ref=LAB_REF[name];
      const rng=ref?` (基準: ${ref.lo??'?'}-${ref.hi??'?'} ${ref.unit})`:'';
      lines.push(`  ${name}: ${lv.val}${lv.unit?' '+lv.unit:''}${rng}${flag?` [${flag}]`:''}`);
    });
  }
  if(p.clinicalCourse)   lines.push(`\n【入院後経過】\n${p.clinicalCourse}`);
  if(p.treatment)        lines.push(`\n【治療内容】\n${p.treatment}`);
  if(p.ivLines&&p.ivLines.length){
    lines.push('\n  (点滴・輸液)');
    p.ivLines.forEach(iv=>{
      const parts=[iv.drug];
      if(iv.dose) parts.push(iv.dose);
      if(iv.rate) parts.push(`${iv.rate}mL/h`);
      if(iv.start) parts.push(`開始 ${iv.start}`);
      if(iv.end) parts.push(`終了予定 ${iv.end}`);
      lines.push(`  ・${parts.join('  ')}`);
    });
  }
  if(p.medications&&p.medications.length){
    lines.push('\n  (内服薬)');
    p.medications.forEach(med=>{
      const timing=[med.am&&'朝',med.noon&&'昼',med.pm&&'夕',med.bed&&'眠前'].filter(Boolean).join('・');
      lines.push(`  ・${med.drug}${med.dose?` ${med.dose}`:''}${timing?` (${timing})`:''}`);
    });
  }
  if(p.dischargeStatus)  lines.push(`\n【退院時状態】\n${p.dischargeStatus}`);
  if(p.dischargePrescription) lines.push(`\n【退院時処方】\n${p.dischargePrescription}`);
  if(p.dischargePolicy)  lines.push(`\n【退院後方針】\n${p.dischargePolicy}`);
  if(p.handoverNotes)    lines.push(`\n【申し送り事項】\n${p.handoverNotes}`);
  if(p.physicalFindings&&p.physicalFindings.trim()) lines.push(`\n【身体所見】\n${p.physicalFindings.trim()}`);
  if(p.subjective&&p.subjective.trim()) lines.push(`\n【S情報（患者の訴え）】\n${p.subjective.trim()}`);
  if(p.memo&&p.memo.trim()) lines.push(`\n【メモ】\n${p.memo.trim()}`);
  return lines.join('\n');
}

function autoFillSummary(){
  const p=selP(); if(!p) return;
  const raw=document.getElementById('summaryPasteArea').value;
  if(!raw.trim()) return;

  // Each entry: canonical field, and keyword variants to match (longest first to avoid partial matches)
  const FIELD_MAP=[
    {field:'diag',            keys:['診断名','病名','傷病名']},
    {field:'chiefComplaint',  keys:['主訴']},
    {field:'presentIllness',  keys:['現病歴']},
    {field:'pastHistory',     keys:['既往歴','既往症','既往']},
    {field:'allergies',       keys:['アレルギー歴','アレルギー']},
    {field:'familyHistory',   keys:['家族歴']},
    {field:'admissionFindings',keys:['入院時現症','入院時身体所見','入院時所見','身体所見','入院所見']},
    {field:'labFindings',     keys:['入院時検査所見','検査所見','検査結果','血液検査','血液検査結果']},
    {field:'clinicalCourse',  keys:['入院後経過','入院経過','経過']},
    {field:'treatment',       keys:['治療内容','治療方針','治療']},
    {field:'dischargeStatus', keys:['退院時現症','退院時状態','退院時所見']},
    {field:'dischargePrescription', keys:['退院時処方','退院処方']},
    {field:'dischargePolicy', keys:['退院後方針','退院後の方針','退院方針']},
    {field:'handoverNotes',   keys:['申し送り事項','申し送り']},
  ];

  // Build a single pattern: matches 【キー】 or キー alone at line start followed by [：: 　\s] or end-of-line
  // Sort all keys by length desc so longer variants match first
  const allKeys=FIELD_MAP.flatMap(e=>e.keys).sort((a,b)=>b.length-a.length);
  const esc2=s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  // Pattern: optional 【】, key word, optional 】, then optional separator (：:  space) or EOL
  const headRe=new RegExp(
    `^[【\\[■●▶▼◆○●※#＃　\\s]*(?:【)?(${allKeys.map(esc2).join('|')})(?:】)?[】：: 　\\t]*$`,
    'gim'
  );

  const lines=raw.split('\n');
  const segments=[];
  let curField=null, curLines=[];

  const flush=()=>{ if(curField) segments.push({field:curField, text:curLines.join('\n').trim()}); };

  for(const line of lines){
    const m=line.match(headRe);
    if(m){
      flush();
      const keyword=m[1]||m[0].replace(/[【】：:\s■●▶▼◆○※#＃]/g,'').trim();
      // Find matching field entry (try each key)
      const entry=FIELD_MAP.find(e=>e.keys.some(k=>keyword.includes(k)||k.includes(keyword)));
      curField=entry?entry.field:null;
      curLines=[];
    } else {
      if(curField) curLines.push(line);
    }
  }
  flush();

  if(!segments.length){ alert('見出しが見つかりませんでした。\n【主訴】や「主訴」「主訴：」など、キーワードが行頭にある形式で記入してください。'); return; }

  let filled=0;
  segments.forEach(({field,text})=>{
    if(!field||!text) return;
    if(field==='diag'){
      p.diag=p.diag?p.diag+'\n'+text:text;
    } else {
      p[field]=p[field]?p[field]+'\n'+text:text;
    }
    filled++;
  });

  if(!filled){ alert('テキストを振り分けられませんでした。見出し行の次に内容が続く形式で入力してください。'); return; }

  save();
  document.getElementById('summaryPasteArea').value='';
  renderSummary();
}

function parseDDxResult(text){
  // Split by numbered items or emoji bullets
  const lines=text.split('\n');
  let html='';
  let inDDx=false, ddxBuf=[], buf=[];

  const flushBuf=()=>{
    if(!buf.length) return;
    html+=`<div style="font-size:12px;color:#374151;line-height:1.7;padding:6px 10px;background:rgba(255,255,255,.6);border-radius:6px">${buf.map(l=>esc(l)).join('<br>')}</div>`;
    buf=[];
  };

  for(const raw of lines){
    const l=raw.trim();
    if(!l) continue;

    // DDx item: starts with 1. / 2. etc or 🔴🟡🟢
    const ddxMatch=l.match(/^(\d+)\.\s*(.+)/)||l.match(/^([🔴🟡🟢])\s*(.+)/);
    // Workup section header
    const workupMatch=l.match(/^[▶■●※#＃*]+\s*(確定のための検査|精査|workup|検査計画|鑑別を絞る)/i);

    if(ddxMatch){
      flushBuf();
      const num=ddxMatch[1], title=ddxMatch[2];
      const isHigh=num==='1'||num==='🔴';
      const isMid=num==='2'||num==='🟡';
      const color=isHigh?'#dc2626':isMid?'#d97706':'#16a34a';
      const bg=isHigh?'#fef2f2':isMid?'#fffbeb':'#f0fdf4';
      const border=isHigh?'#fca5a5':isMid?'#fde68a':'#bbf7d0';
      html+=`<div style="background:${bg};border:1px solid ${border};border-radius:8px;padding:10px 13px">
        <div style="font-weight:700;color:${color};font-size:13px;margin-bottom:4px">${esc(title)}</div>`;
      inDDx=true; ddxBuf=[];
    } else if(inDDx && l.match(/^[・-]\s*/)){
      ddxBuf.push(l.replace(/^[・-]\s*/,''));
    } else if(inDDx && (l.match(/^(根拠|支持する|否定する|確定|推奨|検査|精査)/)||ddxBuf.length>0&&!l.match(/^\d+\.|^[🔴🟡🟢]/))){
      ddxBuf.push(l);
    } else {
      if(inDDx){
        if(ddxBuf.length) html+=`<div style="font-size:12px;color:#4b5563;line-height:1.7;padding-left:4px">${ddxBuf.map(x=>`・${esc(x)}`).join('<br>')}</div>`;
        html+='</div>';
        inDDx=false; ddxBuf=[];
      }
      buf.push(raw);
    }
  }
  if(inDDx){
    if(ddxBuf.length) html+=`<div style="font-size:12px;color:#4b5563;line-height:1.7;padding-left:4px">${ddxBuf.map(x=>`・${esc(x)}`).join('<br>')}</div>`;
    html+='</div>';
  }
  flushBuf();
  return html||`<div style="font-size:12px;white-space:pre-wrap;line-height:1.8;color:#374151">${esc(text)}</div>`;
}

function buildDDxPrompt(p){
  const parts=[];
  const age=p.birthdate?calcAge(p.birthdate):'不明';
  const bmi=p.height&&p.weight?` BMI${calcBMI(p.height,p.weight)}`:'';
  parts.push(`【患者基本情報】\n${p.name} / ${age}${p.height?` 身長${p.height}cm`:''}${p.weight?` 体重${p.weight}kg`:''}${bmi}\n診断名: ${p.diag||'未確定'}\nADL: ${p.adl||'不明'}`);
  if(p.pastHistory) parts.push(`【既往歴】\n${p.pastHistory}`);
  if(p.allergies)   parts.push(`【アレルギー】\n${p.allergies}`);
  if(p.subjective&&p.subjective.trim()) parts.push(`【S情報（患者の訴え）】\n${p.subjective.trim()}`);

  const sx=SYMPTOMS.filter(s=>p.symptoms&&p.symptoms[s.id]).map(s=>s.label);
  if(sx.length) parts.push(`【症候チェック（陽性）】\n${sx.join('、')}`);

  const physPos=[];
  PHYS_CATS.forEach(cat=>cat.items.forEach((item,i)=>{
    const d=(p.physChecks||{})[`${cat.id}_${i}`];
    if(d&&d.checked) physPos.push(d.memo?`${cat.label}：${item}（${d.memo}）`:`${cat.label}：${item}`);
  }));
  if(physPos.length) parts.push(`【身体所見（異常所見）】\n${physPos.join('\n')}`);

  const cnPos=[];
  CN_LIST.forEach((cn,ni)=>cn.items.forEach((item,i)=>{
    const d=(p.cnChecks||{})[`cn${ni}_${i}`];
    if(d&&d.checked) cnPos.push(d.memo?`第${cn.num}（${cn.name}）：${item}（${d.memo}）`:`第${cn.num}（${cn.name}）：${item}`);
  }));
  if(cnPos.length) parts.push(`【脳神経所見（異常）】\n${cnPos.join('\n')}`);

  const byName={};
  (p.labs||[]).forEach(lv=>{ if(!byName[lv.name]||lv.date>=byName[lv.name].date) byName[lv.name]=lv; });
  const labLines=Object.entries(byName).map(([n,lv])=>{ const f=getFlag(n,lv.val); return `${n}: ${lv.val}${lv.unit?' '+lv.unit:''}${f?' ['+f+']':''}`; });
  if(labLines.length) parts.push(`【検査値】\n${labLines.join('\n')}`);

  return parts.join('\n\n');
}

    });

function goER(){ S.view='er'; S.erView=S.erView||'home'; render(); toggleSidebar(false); }
function erNewCase(key){
  const pr=ER_PROTOCOLS.find(x=>x.key===key); if(!pr) return;
  const c={id:uid(),key,startedAt:Date.now(),times:{onset:'',lkw:''},checks:{},memo:'',aiNote:''};
  if(!S.erCases) S.erCases=[];
  S.erCases.unshift(c);
  S.erCaseId=c.id; S.erView='case';
  save(); render();
}
function erOpenCase(id){ S.erCaseId=id; S.erView='case'; S.view='er'; render(); }
function erBackHome(){ S.erView='home'; render(); }
function erDeleteCase(id){
  if(!confirm('この症例シートを削除しますか？')) return;
  S.erCases=(S.erCases||[]).filter(c=>c.id!==id);
  if(S.erCaseId===id){ S.erCaseId=null; S.erView='home'; }
  save(); render();
}
function erCase(){ return (S.erCases||[]).find(c=>c.id===S.erCaseId); }
function erProto(c){ return ER_PROTOCOLS.find(x=>x.key===c.key); }
function erToggle(itemKey,ev){
  const c=erCase(); if(!c) return;
  const on=!c.checks[itemKey];
  const now=nowHM();
  if(on) c.checks[itemKey]=now; else delete c.checks[itemKey];
  save();
  // スクロール位置を保つため、押した項目だけをその場で更新（全体再描画しない）
  const el=ev&&ev.currentTarget;
  if(!el){ renderMain(); return; }
  el.classList.toggle('er-done',on);
  const chk=el.querySelector('.smart-chk');
  if(chk){ chk.classList.toggle('on',on); chk.textContent=on?'✓':''; }
  let ts=el.querySelector('.er-item-ts');
  if(on){ if(!ts){ ts=document.createElement('span'); ts.className='er-item-ts'; el.appendChild(ts); } ts.textContent=now; }
  else if(ts){ ts.remove(); }
  // セクションの件数を更新
  const sk=itemKey.slice(0,itemKey.lastIndexOf('_'));
  const cntEl=document.querySelector(`[data-ercount="${sk}"]`);
  if(cntEl){ const done=Object.keys(c.checks).filter(k=>k.startsWith(sk+'_')).length; cntEl.textContent=`${done}/${cntEl.dataset.ertotal}`; }
  // ヘッダの進捗を更新
  const pg=erCaseProgress(c);
  const hp=document.getElementById('erProgress'); if(hp) hp.textContent=`${pg.done}/${pg.total}`;
}
function erSaveTime(k,val){ const c=erCase(); if(c){ c.times[k]=val; save(); renderMain(); } }
function erSaveMemo(val){ const c=erCase(); if(c){ c.memo=val; save(); } }
function erFmtDur(ms){
  if(ms<0) ms=0;
  const m=Math.floor(ms/60000), h=Math.floor(m/60);
  return h>0?`${h}時間${m%60}分`:`${m}分`;
}
function updateErLive(){
  document.querySelectorAll('[data-er-from]').forEach(el=>{
    const from=parseInt(el.dataset.erFrom,10); if(!from) return;
    el.textContent=erFmtDur(Date.now()-from);
  });
  document.querySelectorAll('[data-er-deadline]').forEach(el=>{
    const dl=parseInt(el.dataset.erDeadline,10); if(!dl) return;
    const rem=dl-Date.now();
    el.textContent=rem>0?`残り ${erFmtDur(rem)}`:`超過 ${erFmtDur(-rem)}`;
    el.style.color=rem<=0?'#dc2626':(rem<30*60000?'#d97706':'#059669');
  });
}
const ER_SECTIONS=[
  ['red','🚩 レッドフラッグ（常に頭に置く鑑別）','#dc2626'],
  ['combo','⚡ 症状の組み合わせ（随伴症状で変わる鑑別）','#c026d3'],

  ['echo','🔊 エコー（どう当てる・何をみる）','#0891b2'],
  ['decide','🎯 判断・アクション','#059669'],
  ['common','🤝 共通確認（お薬手帳・家族・救急隊）','#64748b'],
];
function erSectionItems(pr,secKey){ return secKey==='common'?ER_COMMON:(pr[secKey]||[]); }
function erCaseProgress(c){
  const pr=erProto(c); if(!pr) return {done:0,total:0};
  let done=0,total=0;
  ER_SECTIONS.forEach(([sk])=>{ erSectionItems(pr,sk).forEach((_,i)=>{ total++; if(c.checks[`${sk}_${i}`]) done++; }); });
  return {done,total};
}
async function erConsultAI(){
  const c=erCase(); if(!c||S.erAiBusy) return;
  if(!getApiKey()){ alert('APIキーが未設定です（AIタブで設定）'); return; }
  const pr=erProto(c);
  S.erAiBusy=true; renderMain();
  try{
    const checked=[],unchecked=[];
    ER_SECTIONS.forEach(([sk,label])=>{
      erSectionItems(pr,sk).forEach((it,i)=>{
        (c.checks[`${sk}_${i}`]?checked:unchecked).push(`[${label.replace(/^.\s*/,'').split('（')[0]}] ${it}`);
      });
    });
    const timesTxt=[
      `来院: ${new Date(c.startedAt).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}（${erFmtDur(Date.now()-c.startedAt)}経過）`,
      c.times.onset?`発症時刻: ${c.times.onset.replace('T',' ')}`:'発症時刻: 不明/未入力',
      c.times.lkw?`最終健常確認(LKW): ${c.times.lkw.replace('T',' ')}`:'',
    ].filter(Boolean).join('\n');
    const r=await callClaude({
      system:'あなたは救急外来の指導医です。NP実習生が対応中のER症例について、現時点の実施状況を踏まえ、簡潔かつ実践的に指導してください。日本語で回答。',
      messages:[{role:'user',content:`【主訴・病態】${pr.label}\n【時間情報】\n${timesTxt}\n\n【実施・確認済み】\n${checked.slice(0,60).join('\n')||'（まだなし）'}\n\n【未実施】\n${unchecked.slice(0,60).join('\n')}\n\n【メモ】\n${c.memo||'（なし）'}${kbContext()}\n\n---\n上記の状況で以下を簡潔に:\n🔴 今すぐやるべき次の3手（優先順位つき）\n🚩 この状況で見逃しやすい鑑別・ピットフォール\n⏱ 時間依存の判断（あれば期限を明示）\n❓ 家族・救急隊に追加で聞くべきこと`}],
      maxTokens:2048,
      onDelta:(d,full)=>{ const box=document.getElementById('erAiOut'); if(box){ box.style.display='block'; box.textContent=full; } },
    });
    c.aiNote=r.text||''; save();
  }catch(e){ alert('AI相談エラー: '+e.message); }
  S.erAiBusy=false; renderMain();
}
function erToPatient(){
  const c=erCase(); if(!c) return;
  const pr=erProto(c);
  const checkedLines=[];
  ER_SECTIONS.forEach(([sk,label])=>{
    erSectionItems(pr,sk).forEach((it,i)=>{ const t=c.checks[`${sk}_${i}`]; if(t) checkedLines.push(`✓${t} ${it}`); });
  });
  const p={
    id:uid(),
    name:`ER ${pr.label.split('（')[0]}（${new Date(c.startedAt).getMonth()+1}/${new Date(c.startedAt).getDate()}）`,
    room:'ER', diag:'', date:todayStr(),
    chiefComplaint:pr.label,
    presentIllness:[c.times.onset?`発症: ${c.times.onset.replace('T',' ')}`:'',c.times.lkw?`最終健常: ${c.times.lkw.replace('T',' ')}`:'',`来院: ${new Date(c.startedAt).toLocaleString('ja-JP')}`].filter(Boolean).join('\n'),
    tasks:[],labs:[],
    memo:`【ERチェックシートから登録】\n${c.memo?c.memo+'\n\n':''}実施済み:\n${checkedLines.join('\n')}`,
  };
  S.patients.push(migrate(p));
  save();
  showToast('🚑 患者として登録しました');
  selectPatient(p.id);
}

function kbDB(){

    const rq=indexedDB.open('clinical_kb',1);

}
async function kbAll(){ const db=await kbDB(); return new Promise((res,rej)=>{ const r=db.transaction('docs','readonly').objectStore('docs').getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=()=>rej(r.error); }); }
async function kbPut(doc){ const db=await kbDB(); return new Promise((res,rej)=>{ const r=db.transaction('docs','readwrite').objectStore('docs').put(doc); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); }
async function kbDel(id){ const db=await kbDB(); return new Promise((res,rej)=>{ const r=db.transaction('docs','readwrite').objectStore('docs').delete(id); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); }

// v3.1: クラウド自動同期（GitHub非公開リポジトリ + 端末側AES-GCM暗号化）
// ================================================================
const SYNC_REPO='keimon1979-png/clinical-data';
const SYNC_FILE='data.json.enc';
function getSyncCfg(){ try{ return JSON.parse(localStorage.getItem('clinical_sync')||'{}'); }catch(e){ return {}; } }
function setSyncCfg(patch){ const c=getSyncCfg(); Object.assign(c,patch); localStorage.setItem('clinical_sync',JSON.stringify(c)); }
function syncEnabled(){ const c=getSyncCfg(); return !!(c.enabled&&c.token&&c.pass); }
function getMeta(){ try{ return JSON.parse(localStorage.getItem('clinical_v2_meta')||'{}'); }catch(e){ return {}; } }
function setMeta(patch){ const m=getMeta(); Object.assign(m,patch); localStorage.setItem('clinical_v2_meta',JSON.stringify(m)); }

// --- 暗号化（WebCrypto: PBKDF2 200k + AES-GCM 256） ---
function b64FromBuf(buf){ const u=new Uint8Array(buf); let s=''; const CH=0x8000; for(let i=0;i<u.length;i+=CH){ s+=String.fromCharCode.apply(null,u.subarray(i,i+CH)); } return btoa(s); }
function bufFromB64(b64){ const bin=atob(b64); const u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i); return u.buffer; }
async function deriveSyncKey(pass,saltBuf){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:saltBuf,iterations:200000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function encryptSync(obj,pass){
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const key=await deriveSyncKey(pass,salt);
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(obj)));
  return JSON.stringify({v:1,salt:b64FromBuf(salt.buffer),iv:b64FromBuf(iv.buffer),ct:b64FromBuf(ct)});
}
async function decryptSync(str,pass){
  const o=JSON.parse(str);
  const key=await deriveSyncKey(pass,bufFromB64(o.salt));
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(bufFromB64(o.iv))},key,bufFromB64(o.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

// --- GitHub Contents API ---
function ghHeaders(cfg){ return {'Authorization':'Bearer '+cfg.token,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}; }
async function ghGetFile(cfg){
  const res=await fetch(`https://api.github.com/repos/${SYNC_REPO}/contents/${SYNC_FILE}?t=${Date.now()}`,{headers:ghHeaders(cfg),cache:'no-store'});
  if(res.status===404) return null;
  if(res.status===401) throw new Error('トークンが無効です（期限切れの可能性）');
  if(res.status===403) throw new Error('アクセス権限がありません（トークンのリポジトリ設定を確認）');
  if(!res.ok) throw new Error('GitHub API エラー: '+res.status);
  const j=await res.json();
  return {sha:j.sha,content:atob(String(j.content||'').replace(/\n/g,''))};
}
async function ghPutFile(cfg,contentStr,sha){
  const body={message:'sync '+new Date().toISOString(),content:btoa(contentStr)};
  if(sha) body.sha=sha;
  const res=await fetch(`https://api.github.com/repos/${SYNC_REPO}/contents/${SYNC_FILE}`,{method:'PUT',headers:ghHeaders(cfg),body:JSON.stringify(body)});
  if(res.status===409) return {conflict:true};
  if(res.status===401) throw new Error('トークンが無効です');
  if(!res.ok){ let m='GitHub API エラー: '+res.status; try{ const e=await res.json(); if(e.message)m+=' '+e.message; }catch(_){}; throw new Error(m); }
  const j=await res.json();
  return {sha:j.content&&j.content.sha};
}

// --- 同期本体 ---
function buildSyncPayload(){
  const patients=JSON.parse(JSON.stringify(S.patients));
  patients.forEach(p=>(p.reports||[]).forEach(r=>{ r.imageData=''; })); // 画像は容量のため同期対象外（端末内に保持）
  return {app:'clinical_v2',updatedAt:getMeta().updatedAt||Date.now(),device:navigator.userAgent.includes('iPhone')?'iPhone':'PC',patients,erCases:JSON.parse(JSON.stringify(S.erCases||[]))};
}
function applyRemoteData(remote){
  const imgMap={};
  S.patients.forEach(p=>(p.reports||[]).forEach(r=>{ if(r.imageData) imgMap[r.id]=r.imageData; }));
  S._applyingRemote=true;
  try{
    S.patients=(remote.patients||[]).map(migrate);
    S.patients.forEach(p=>(p.reports||[]).forEach(r=>{ if(!r.imageData&&imgMap[r.id]) r.imageData=imgMap[r.id]; }));
    if(Array.isArray(remote.erCases)) S.erCases=remote.erCases;
    if(S.sel&&!S.patients.some(p=>p.id===S.sel)) S.sel=null;
    save();
    setMeta({updatedAt:remote.updatedAt||Date.now()});
  } finally { S._applyingRemote=false; }
  render();
}
function setSyncStatus(state,msg){
  S._syncState=state; S._syncMsg=msg||'';
  const dot=document.getElementById('syncDot');
  if(dot){ dot.className='sync-dot '+state; dot.title=msg||state; }
  const el=document.getElementById('sync-status-line');
  if(el){ el.textContent=msg||''; el.style.color=state==='error'?'#fca5a5':'rgba(255,255,255,.0)'; }
  const mEl=document.getElementById('sync-modal-status');
  if(mEl){ mEl.textContent=msg||''; mEl.style.color=state==='error'?'var(--danger)':'var(--success)'; }
}
let _pushTimer=null;
function scheduleSyncPush(delayMs){
  if(!syncEnabled()) return;
  setSyncStatus('pending','変更あり（自動保存待ち）');
  clearTimeout(_pushTimer);
  _pushTimer=setTimeout(()=>{ syncPushNow(); },delayMs||12000);
}
async function syncPushNow(){
  if(!syncEnabled()||S._syncBusy) return;
  const cfg=getSyncCfg();
  S._syncBusy=true; setSyncStatus('syncing','クラウドへ保存中…');
  try{
    const enc=await encryptSync(buildSyncPayload(),cfg.pass);
    let r=await ghPutFile(cfg,enc,cfg.lastSha||undefined);
    if(r.conflict){
      // 他端末が先に保存 → 取得して新しい方を採用
      const f=await ghGetFile(cfg);
      if(f){
        setSyncCfg({lastSha:f.sha});
        let remote=null; try{ remote=await decryptSync(f.content,cfg.pass); }catch(_){}
        if(remote&&(remote.updatedAt||0)>(getMeta().updatedAt||0)){ applyRemoteData(remote); setSyncStatus('ok','☁ 他端末の新しいデータを取得しました'); S._syncBusy=false; return; }
        r=await ghPutFile(getSyncCfg(),enc,f.sha);
      }
    }
    if(r&&r.sha) setSyncCfg({lastSha:r.sha});
    setSyncStatus('ok','☁ 同期済み '+nowHM());
  }catch(e){ console.error('sync push:',e); setSyncStatus('error','同期エラー: '+e.message); }
  S._syncBusy=false;
}
async function syncPullNow(manual){
  if(!syncEnabled()||S._syncBusy) return;
  const cfg=getSyncCfg();
  S._syncBusy=true; setSyncStatus('syncing','クラウドを確認中…');
  try{
    const f=await ghGetFile(cfg);
    setSyncCfg({lastPullAt:Date.now()});
    if(!f){ setSyncStatus('ok','クラウドは空です（この端末の内容が最初の保存になります）'); S._syncBusy=false; if(S.patients.length) scheduleSyncPush(1500); return; }
    setSyncCfg({lastSha:f.sha});
    let remote;
    try{ remote=await decryptSync(f.content,cfg.pass); }
    catch(e){ throw new Error('復号できません。合言葉が他の端末と一致しているか確認してください'); }
    const localT=getMeta().updatedAt||0, remoteT=remote.updatedAt||0;
    if(remoteT>localT){ applyRemoteData(remote); setSyncStatus('ok','☁ 最新データを取得しました（'+(remote.device||'他端末')+'から）'); if(manual) showToast('☁️ 最新データを取得しました'); }
    else if(localT>remoteT){ setSyncStatus('pending','この端末の方が新しいため保存します'); scheduleSyncPush(1500); }
    else setSyncStatus('ok','☁ 同期済み（最新）');
  }catch(e){ console.error('sync pull:',e); setSyncStatus('error','同期エラー: '+e.message); if(manual) alert('同期エラー: '+e.message); }
  S._syncBusy=false;
}

        3. Repository access: <b>Only select repositories</b> → <code>clinical-data</code> を選択<br>
        4. Permissions → Repository permissions → <b>Contents</b> を <b>Read and write</b> に<br>
        5. 一番下の Generate token → 表示された <code>github_pat_...</code> をコピーして下に貼り付け
      </div>`:''}
      <div class="form-group"><label>アクセストークン</label>
        <input type="password" id="sync-token" placeholder="github_pat_..." value="${esc(cfg.token||'')}"></div>
      <div class="form-group"><label>合言葉（全端末で同じものを・暗号化キーになります）</label>
        <input type="password" id="sync-pass" placeholder="例: 覚えやすい長めのフレーズ" value="${esc(cfg.pass||'')}"></div>
      <div id="sync-modal-status" style="font-size:12px;font-weight:700;min-height:18px;margin-bottom:4px">${esc(S._syncMsg||'')}</div>
    </div>
    <div class="modal-foot" style="flex-wrap:wrap">
      ${cfg.enabled?`<button class="btn btn-ghost" onclick="setSyncCfg({enabled:false});setSyncStatus('off','同期オフ');renderSyncModal()">同期を止める</button>
      <button class="btn btn-ghost" onclick="syncPullNow(true)">↓ 今すぐ取得</button>
      <button class="btn btn-ghost" onclick="syncPushNow()">↑ 今すぐ保存</button>`:''}
      <button class="btn btn-primary" style="min-width:140px" onclick="syncSetup()">${cfg.enabled?'設定を更新':'接続して同期を開始'}</button>
    </div>`;
}
async function syncSetup(){
  const token=(document.getElementById('sync-token')||{}).value||'';
  const pass=(document.getElementById('sync-pass')||{}).value||'';
  if(!token.trim()||!pass.trim()){ alert('トークンと合言葉の両方を入力してください'); return; }
  if(pass.trim().length<6){ alert('合言葉は6文字以上にしてください'); return; }
  if(!crypto||!crypto.subtle){ alert('この開き方では暗号化が使えません。https のURL（github.io）から開いてください'); return; }
  setSyncCfg({token:token.trim(),pass:pass.trim()});
  const cfg=getSyncCfg();
  setSyncStatus('syncing','接続テスト中…'); renderSyncModal(); setSyncStatus('syncing','接続テスト中…');
  try{
    const f=await ghGetFile(cfg);
    if(f===null){
      // クラウドが空 → この端末の内容を初回アップロード
      setSyncCfg({enabled:true});
      setSyncStatus('syncing','初回アップロード中…');
      await syncPushNow();
      showToast('☁️ 同期を開始しました（この端末のデータを保存）');
    }else{
      let remote=null;
      try{ remote=await decryptSync(f.content,cfg.pass); }
      catch(e){ setSyncStatus('error','復号できません。他の端末と同じ合言葉を入力してください'); renderSyncModal(); return; }
      setSyncCfg({enabled:true,lastSha:f.sha});
      const remoteN=(remote.patients||[]).length;
      const localN=S.patients.length;
      if(!localN&&remoteN){
        applyRemoteData(remote);
        showToast('☁️ クラウドのデータを取り込みました');
      }else if(!remoteN){
        setMeta({updatedAt:Date.now()});
        await syncPushNow();
        showToast('☁️ この端末のデータをクラウドへ保存しました');
      }else{
        // 両方にデータあり → 初回は必ず確認（どちらを正とするか）
        if(confirm(`クラウドに${remoteN}名、この端末に${localN}名の患者データがあります。どちらを残しますか？\n\n［OK］クラウドの${remoteN}名を取り込む（この端末の${localN}名は消えます）\n［キャンセル］この端末の${localN}名でクラウドを上書きする（クラウドの${remoteN}名は消えます）\n\n※不安な場合は一度キャンセルし、💾保存でバックアップを取ってから再設定してください`)){
          applyRemoteData(remote);
          showToast('☁️ クラウドのデータを取り込みました');
        }else{
          setMeta({updatedAt:Date.now()});
          await syncPushNow();
          showToast('☁️ この端末のデータでクラウドを上書きしました');
        }
      }
      setSyncStatus('ok','☁ 同期済み');
    }
    renderSyncModal();
  }catch(e){ setSyncStatus('error',e.message); renderSyncModal(); }
}
function initSync(){
  if(!syncEnabled()){ setSyncStatus('off','同期オフ（☁️から設定）'); return; }
  syncPullNow(false);
  window.addEventListener('focus',()=>{
    if(!syncEnabled()) return;
    const last=getSyncCfg().lastPullAt||0;
    if(Date.now()-last>60000&&!S._syncBusy) syncPullNow(false);
  });
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='visible'&&syncEnabled()){
      const last=getSyncCfg().lastPullAt||0;
      if(Date.now()-last>60000&&!S._syncBusy) syncPullNow(false);
    }
  });
}

// ================================================================
// INIT
// ================================================================
load(); render();
initSync();
loadKB();
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    const qm=document.getElementById('qmModal');
    const sm=document.getElementById('syncModal');
    if(qm&&qm.style.display==='flex') closeQuickMemo();
    else if(sm&&sm.style.display==='flex') closeSyncModal();
    else if(S.smart.open) closeSmartImport();
    else closeModal();
  }
});
// グローバル貼り付け: 画像 or 長文テキスト → スマート取込を自動オープン
document.addEventListener('paste',e=>{
  try{
    const items=e.clipboardData&&e.clipboardData.items;
    const imgFiles=[];
    if(items){ for(const it of items){ if(it.type&&it.type.startsWith('image/')){ const f=it.getAsFile(); if(f) imgFiles.push(f); } } }
    // スマート取込モーダルが開いている時: 画像を直接受け取る（複数可）
    if(S.smart.open){
      if(imgFiles.length){ e.preventDefault(); smartAddImages(imgFiles); }
      return;
    }
    // 患者登録モーダルが開いている時は何もしない
    const pm=document.getElementById('patientModal');
    if(pm&&pm.style.display==='flex') return;
    if(!selP()) return;
    const tgt=e.target;
    const inField=tgt&&(tgt.tagName==='INPUT'||tgt.tagName==='TEXTAREA'||tgt.isContentEditable);
    if(imgFiles.length){
      // 画像はどこに貼ってもスマート取込へ
      e.preventDefault();
      openSmartImport();
      smartAddImages(imgFiles);
      return;
    }
    if(!inField){
      const txt=e.clipboardData?e.clipboardData.getData('text'):'';
      if(txt&&txt.trim().length>40){ openSmartImport(txt); }
    }
  }catch(err){ console.error('paste handler error:',err); }
});
</script>
