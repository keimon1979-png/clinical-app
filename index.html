<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>臨床タスク管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #1a5f8a; --primary-l: #2980b9; --primary-d: #0d3a57;
  --success: #16a34a; --warning: #d97706; --danger: #dc2626;
  --g50:#f8f9fa; --g100:#f1f3f5; --g200:#e9ecef; --g300:#dee2e6;
  --g400:#ced4da; --g500:#adb5bd; --g600:#6c757d; --g700:#495057; --g800:#343a40;
}
body { font-family:'Hiragino Sans','ヒラギノ角ゴ ProN','Meiryo',sans-serif; font-size:13px; background:var(--g100); color:var(--g800); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
.app-header { height:50px; background:var(--primary); color:#fff; display:flex; align-items:center; padding:0 14px; gap:8px; flex-shrink:0; box-shadow:0 2px 6px rgba(0,0,0,.25); }
.app-header h1 { font-size:15px; font-weight:700; }
.hdr-clock { margin-left:auto; font-size:12px; opacity:.85; }
.hdr-reset { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); color:#fff; padding:3px 9px; border-radius:4px; cursor:pointer; font-size:11px; font-weight:600; }
.hdr-reset:hover { background:rgba(255,255,255,.28); }
.app-body { display:flex; flex:1; overflow:hidden; }
.sidebar { width:200px; background:var(--primary-d); color:#fff; display:flex; flex-direction:column; flex-shrink:0; }
.sb-head { padding:10px 11px; border-bottom:1px solid rgba(255,255,255,.12); display:flex; align-items:center; justify-content:space-between; }
.sb-head span { font-size:11px; font-weight:700; opacity:.6; letter-spacing:.07em; }
.btn-add-pt { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); color:#fff; padding:3px 9px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:600; }
.btn-add-pt:hover { background:rgba(255,255,255,.28); }
.pt-list { flex:1; overflow-y:auto; padding:6px; }
.pt-card { padding:8px 10px; border-radius:6px; cursor:pointer; margin-bottom:3px; border:1px solid transparent; transition:background .1s; }
.pt-card:hover { background:rgba(255,255,255,.1); }
.pt-card.active { background:rgba(255,255,255,.2); border-color:rgba(255,255,255,.3); }
.pt-name { font-weight:700; font-size:13px; margin-bottom:2px; }
.pt-meta { display:flex; align-items:center; justify-content:space-between; }
.pt-room { font-size:11px; opacity:.6; }
.task-badge { font-size:10px; background:var(--danger); color:#fff; padding:1px 5px; border-radius:10px; font-weight:700; }
.task-badge.all-done { background:var(--success); }
.task-badge.has-check { background:var(--warning); }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.pt-header { background:#fff; padding:9px 16px; border-bottom:1px solid var(--g200); display:flex; align-items:center; gap:8px; flex-shrink:0; min-height:46px; }
.pt-header h2 { font-size:16px; font-weight:700; color:var(--primary); }
.tag { padding:2px 7px; border-radius:3px; font-size:11px; }
.tag-room { background:var(--g100); border:1px solid var(--g300); color:var(--g600); }
.tag-diag { background:#e6f2fb; border:1px solid #b5d4ec; color:var(--primary); }
.header-actions { margin-left:auto; display:flex; gap:5px; }
.btn { padding:5px 11px; border-radius:4px; border:none; cursor:pointer; font-size:12px; font-weight:600; font-family:inherit; transition:all .12s; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-l); }
.btn-ghost { background:transparent; color:var(--g600); border:1px solid var(--g300); }
.btn-ghost:hover { background:var(--g100); }
.btn-sm { padding:3px 8px; font-size:11px; }
.tabs { background:#fff; border-bottom:2px solid var(--g200); display:flex; flex-shrink:0; }
.tab-btn { padding:9px 15px; border:none; background:none; cursor:pointer; font-size:12px; font-weight:600; color:var(--g600); border-bottom:2px solid transparent; margin-bottom:-2px; font-family:inherit; transition:color .1s; }
.tab-btn:hover { color:var(--primary); }
.tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
.tab-content { flex:1; overflow-y:auto; padding:14px 16px; }
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#bbb; gap:10px; font-size:14px; }
/* Tasks */
.tasks-summary { background:#fff; border:1px solid var(--g200); border-radius:6px; padding:10px 14px; margin-bottom:12px; display:flex; align-items:center; gap:14px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
.s-stat { text-align:center; }
.s-num { font-size:22px; font-weight:700; line-height:1; }
.s-lbl { font-size:10px; color:var(--g600); margin-top:2px; }
.n-done { color:var(--success); } .n-check { color:var(--warning); } .n-pend { color:var(--g500); }
.prog-bar { flex:1; }
.prog-info { display:flex; justify-content:space-between; font-size:11px; color:var(--g600); margin-bottom:4px; }
.prog-track { height:6px; background:var(--g200); border-radius:3px; overflow:hidden; }
.prog-fill { height:100%; background:var(--success); border-radius:3px; transition:width .4s; }
.cat-group { background:#fff; border:1px solid var(--g200); border-radius:8px; margin-bottom:9px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.05); }
.cat-hdr { display:flex; align-items:center; gap:9px; padding:9px 12px; cursor:pointer; background:var(--g50); user-select:none; }
.cat-hdr:hover { background:var(--g100); }
.cat-icon { width:24px; height:24px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; flex-shrink:0; }
.cat-title { font-weight:700; font-size:13px; flex:1; }
.cat-count { font-size:11px; color:var(--g600); white-space:nowrap; }
.cat-count.c-done { color:var(--success); font-weight:700; }
.cat-count.c-check { color:var(--warning); font-weight:700; }
.cat-arrow { font-size:9px; color:var(--g500); }
.cat-body { padding:8px 12px 10px; border-top:1px solid var(--g200); }
.task-item { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:5px; margin-bottom:3px; border:1px solid var(--g200); transition:background .1s; }
.task-item:hover { background:var(--g50); }
.task-item.s-done { opacity:.6; }
.task-item.s-check { background:#fffbf0; border-color:#fde68a; }
.status-btn { min-width:90px; padding:3px 7px; border-radius:4px; border:1px solid var(--g300); cursor:pointer; font-size:11px; font-weight:700; font-family:inherit; text-align:center; white-space:nowrap; flex-shrink:0; background:var(--g100); color:var(--g600); transition:all .1s; }
.task-item.s-done .status-btn { background:#dcfce7; color:#15803d; border-color:#86efac; }
.task-item.s-check .status-btn { background:#fef3c7; color:#b45309; border-color:#fcd34d; }
.task-text { flex:1; font-size:12px; }
.s-done .task-text { text-decoration:line-through; color:var(--g500); }
.task-del { background:none; border:none; cursor:pointer; color:var(--g400); font-size:14px; padding:0 2px; flex-shrink:0; }
.task-del:hover { color:var(--danger); }
.add-inline { display:flex; gap:6px; align-items:center; margin-top:8px; padding-top:8px; border-top:1px dashed var(--g300); }
.add-inline input { flex:1; padding:5px 8px; border:1px solid var(--g300); border-radius:4px; font-size:12px; font-family:inherit; }
.add-inline input:focus { outline:none; border-color:var(--primary-l); }
.tmpl-btn { font-size:11px; color:var(--primary); background:none; border:1px dashed var(--primary-l); border-radius:4px; padding:4px 8px; cursor:pointer; font-family:inherit; white-space:nowrap; }
.tmpl-btn:hover { background:#e6f2fb; }
.cat-empty { color:#bbb; font-size:12px; padding:4px 0; }
/* Lab sub-nav */
.lab-subnav { display:flex; gap:3px; margin-bottom:12px; background:#fff; border:1px solid var(--g200); border-radius:6px; padding:4px; }
.lsn-btn { flex:1; padding:5px 6px; border:none; border-radius:4px; background:none; cursor:pointer; font-size:11px; font-weight:600; color:var(--g600); font-family:inherit; text-align:center; white-space:nowrap; transition:all .1s; }
.lsn-btn.active { background:var(--primary); color:#fff; }
.lsn-btn:hover:not(.active) { background:var(--g100); }
/* Lab cards */
.critical-alert { background:#fef2f2; border:2px solid var(--danger); border-radius:6px; padding:8px 13px; margin-bottom:12px; display:flex; align-items:center; gap:8px; animation:cpulse 2s infinite; }
@keyframes cpulse { 0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.3)} 50%{box-shadow:0 0 0 5px rgba(220,38,38,0)} }
.c-lbl { font-weight:700; color:var(--danger); white-space:nowrap; }
.c-body { color:var(--danger); font-size:12px; }
.lab-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:8px; margin-bottom:14px; }
.lab-card { background:var(--g50); border:1px solid var(--g200); border-radius:6px; padding:8px 10px; position:relative; }
.lab-card.fH  { background:#fff5f5; border-color:#fca5a5; }
.lab-card.fL  { background:#eff6ff; border-color:#93c5fd; }
.lab-card.fHH { background:#fef2f2; border-color:var(--danger); box-shadow:0 0 0 2px rgba(220,38,38,.15); }
.lab-card.fLL { background:#eff6ff; border-color:#1d4ed8; box-shadow:0 0 0 2px rgba(29,78,216,.15); }
.lc-name { font-size:11px; font-weight:700; color:var(--g600); margin-bottom:2px; }
.lc-val { font-size:20px; font-weight:700; color:var(--g800); }
.lab-card.fH .lc-val,.lab-card.fHH .lc-val { color:var(--danger); }
.lab-card.fL .lc-val,.lab-card.fLL .lc-val { color:#1d4ed8; }
.lc-unit { font-size:11px; color:var(--g600); margin-left:3px; }
.lc-flag { position:absolute; top:6px; right:6px; font-size:10px; font-weight:800; padding:1px 4px; border-radius:3px; }
.fH  .lc-flag { background:#fca5a5; color:var(--danger); }
.fL  .lc-flag { background:#93c5fd; color:#1d4ed8; }
.fHH .lc-flag { background:var(--danger); color:#fff; }
.fLL .lc-flag { background:#1d4ed8; color:#fff; }
.lc-range { font-size:10px; color:var(--g400); margin-top:2px; }
.lc-ts { font-size:10px; color:var(--g400); margin-top:2px; }
.lc-del { position:absolute; bottom:4px; right:5px; background:none; border:none; cursor:pointer; color:var(--g400); font-size:12px; }
.lc-del:hover { color:var(--danger); }
/* Lab add form */
.lab-add { background:#fff; border:1px solid var(--g200); border-radius:6px; padding:11px 12px; }
.lab-add-title { font-size:11px; font-weight:700; color:#888; margin-bottom:9px; }
.lab-form-row { display:flex; gap:7px; align-items:center; flex-wrap:wrap; }
.lab-form-row select,.lab-form-row input { padding:5px 7px; border:1px solid var(--g300); border-radius:4px; font-size:12px; font-family:inherit; background:#fff; }
.lab-form-row select:focus,.lab-form-row input:focus { outline:none; border-color:var(--primary-l); }
.unit-hint { font-size:11px; color:var(--g600); }
/* Lab table */
.lab-matrix-wrap { overflow-x:auto; }
.lab-matrix { border-collapse:collapse; width:100%; font-size:12px; white-space:nowrap; }
.lab-matrix th { background:var(--g50); border:1px solid var(--g200); padding:6px 10px; font-weight:700; font-size:11px; text-align:center; }
.lab-matrix th.name-th { text-align:left; min-width:120px; }
.lab-matrix td { border:1px solid var(--g200); padding:5px 9px; text-align:center; }
.lab-matrix td.name-td { text-align:left; font-weight:600; }
.lab-matrix td.name-td .lm-unit { font-size:10px; color:var(--g500); font-weight:400; margin-left:3px; }
.lab-matrix td.name-td .lm-range { font-size:10px; color:var(--g400); display:block; font-weight:400; }
.lab-matrix td.empty-td { color:var(--g400); }
.lab-matrix td.cH  { background:#fff5f5; color:var(--danger); font-weight:700; }
.lab-matrix td.cL  { background:#eff6ff; color:#1d4ed8; font-weight:700; }
.lab-matrix td.cHH { background:var(--danger); color:#fff; font-weight:700; }
.lab-matrix td.cLL { background:#1d4ed8; color:#fff; font-weight:700; }
.flag-sup { font-size:9px; font-weight:800; vertical-align:super; margin-left:1px; }
/* Chart */
.chart-panel { display:flex; gap:12px; align-items:flex-start; }
.chart-items-col { width:130px; flex-shrink:0; background:#fff; border:1px solid var(--g200); border-radius:6px; padding:10px; }
.chart-items-col h4 { font-size:11px; font-weight:700; color:var(--g600); margin-bottom:8px; }
.chart-item-label { display:flex; align-items:center; gap:5px; padding:3px 0; cursor:pointer; font-size:12px; }
.chart-item-label input { cursor:pointer; }
.chart-main { flex:1; min-width:0; }
.chart-wrap { background:#fff; border:1px solid var(--g200); border-radius:6px; padding:10px 12px; margin-bottom:10px; }
.chart-item-title { font-size:12px; font-weight:700; color:var(--g700); margin-bottom:6px; }
.chart-item-title .ct-unit { font-weight:400; color:var(--g600); }
.chart-item-title .ct-range { font-size:11px; font-weight:400; color:var(--g500); margin-left:8px; }
/* Import */
.import-panel { max-width:680px; }
.import-mode-toggle { display:flex; gap:0; margin-bottom:14px; border:1px solid var(--g300); border-radius:5px; overflow:hidden; width:fit-content; }
.imt-btn { padding:5px 16px; border:none; background:var(--g50); cursor:pointer; font-size:12px; font-weight:600; color:var(--g600); font-family:inherit; transition:all .1s; }
.imt-btn.active { background:var(--primary); color:#fff; }
.import-prompt-box { background:#f5f3ff; border:1px solid #c4b5fd; border-radius:6px; padding:12px 14px; margin-bottom:14px; }
.import-prompt-title { font-size:12px; font-weight:700; color:#5b21b6; margin-bottom:6px; }
.import-prompt-code { font-size:11px; font-family:monospace; color:#4c1d95; line-height:1.7; white-space:pre-wrap; }
.import-json-area { width:100%; height:160px; border:1px solid var(--g300); border-radius:5px; padding:9px; font-size:12px; font-family:monospace; resize:vertical; }
.import-json-area:focus { outline:none; border-color:var(--primary-l); }
.import-preview { background:var(--g50); border:1px solid var(--g200); border-radius:6px; padding:10px 12px; margin-top:10px; font-size:12px; }
.import-preview-row { display:flex; align-items:center; gap:8px; padding:3px 0; }
.import-ok { color:var(--success); font-weight:700; }
.import-warn { color:var(--warning); font-weight:700; }
.import-err { color:var(--danger); }
/* Date-based view */
.date-pills { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:14px; }
.date-pill { padding:4px 11px; border-radius:14px; border:1px solid var(--g300); background:#fff; cursor:pointer; font-size:12px; font-weight:600; color:var(--g600); transition:all .1s; }
.date-pill:hover { border-color:var(--primary-l); color:var(--primary); }
.date-pill.active { background:var(--primary); border-color:var(--primary); color:#fff; }
/* Memo */
.memo-area { width:100%; min-height:200px; border:1px solid var(--g300); border-radius:5px; padding:9px; font-size:13px; font-family:inherit; resize:vertical; line-height:1.7; }
.memo-area:focus { outline:none; border-color:var(--primary-l); box-shadow:0 0 0 3px rgba(41,128,185,.1); }
/* AI */
.ai-settings-card { background:#fff; border:1px solid var(--g200); border-radius:8px; padding:12px 14px; margin-bottom:12px; }
.ai-s-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.ai-s-title { font-size:12px; font-weight:700; color:var(--g600); }
.ai-key-row { display:flex; gap:7px; }
.ai-key-row input { flex:1; padding:6px 9px; border:1px solid var(--g300); border-radius:4px; font-size:12px; font-family:monospace; }
.ai-key-row input:focus { outline:none; border-color:var(--primary-l); }
.ai-ctx { background:var(--g50); border:1px solid var(--g200); border-radius:6px; padding:10px 12px; margin-bottom:12px; font-size:11px; line-height:1.6; white-space:pre-wrap; max-height:180px; overflow-y:auto; color:var(--g700); font-family:monospace; }
.ai-run-btn { background:#7c3aed; color:#fff; border:none; border-radius:6px; padding:9px 20px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; width:100%; margin-bottom:12px; transition:background .15s; }
.ai-run-btn:hover { background:#6d28d9; }
.ai-run-btn:disabled { background:var(--g400); cursor:not-allowed; }
.ai-loading { text-align:center; padding:20px; color:var(--g600); font-size:13px; }
.ai-result { background:#fff; border:1px solid #c4b5fd; border-radius:8px; padding:14px 16px; line-height:1.8; font-size:13px; }
.ai-sec { margin-bottom:12px; }
.ai-sec-title { font-weight:700; color:#5b21b6; font-size:13px; margin-bottom:4px; border-left:3px solid #7c3aed; padding-left:8px; }
.ai-sec-body { font-size:12px; line-height:1.7; color:var(--g700); padding-left:11px; }
.ai-note { font-size:11px; color:#aaa; margin-top:8px; border-top:1px solid var(--g200); padding-top:6px; }
/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; z-index:200; }
.modal { background:#fff; border-radius:10px; padding:0; width:540px; max-width:96vw; box-shadow:0 20px 60px rgba(0,0,0,.3); display:flex; flex-direction:column; max-height:90vh; }
.modal-head { display:flex; align-items:center; justify-content:space-between; padding:16px 20px 12px; border-bottom:1px solid var(--g200); flex-shrink:0; }
.modal-title { font-size:14px; font-weight:700; }
.modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--g600); }
.modal-body { overflow-y:auto; padding:14px 20px; flex:1; }
.modal-foot { display:flex; gap:7px; justify-content:flex-end; padding:12px 20px; border-top:1px solid var(--g200); flex-shrink:0; }
.form-group { margin-bottom:10px; }
.form-group label { display:block; font-size:11px; font-weight:700; color:var(--g600); margin-bottom:3px; }
.form-group input,.form-group select,.form-group textarea { width:100%; padding:7px 9px; border:1px solid var(--g300); border-radius:4px; font-size:13px; font-family:inherit; background:#fff; }
.form-group input:focus,.form-group select:focus,.form-group textarea:focus { outline:none; border-color:var(--primary-l); }
.form-group textarea { resize:vertical; min-height:56px; line-height:1.6; }
.form-group .calc-hint { font-size:12px; color:var(--primary); font-weight:700; margin-left:6px; }
.form-row { display:flex; gap:8px; }
.form-row .form-group { flex:1; }
.modal-section-divider { height:1px; background:var(--g200); margin:12px 0 14px; }
.modal-section-label { font-size:10px; font-weight:700; color:var(--g500); letter-spacing:.08em; margin-bottom:10px; text-transform:uppercase; }
/* Summary tab */
.summary-copy-bar { display:flex; align-items:center; justify-content:flex-end; gap:8px; margin-bottom:10px; }
.summary-box { background:#fff; border:1px solid var(--g200); border-radius:8px; padding:16px 18px; font-size:12px; line-height:1.9; white-space:pre-wrap; font-family:monospace; color:var(--g800); }
.summary-section { margin-bottom:14px; }
.summary-section-title { font-size:11px; font-weight:700; color:var(--primary); border-bottom:1px solid var(--g200); padding-bottom:4px; margin-bottom:6px; letter-spacing:.05em; }
.summary-row { display:flex; gap:8px; }
.summary-key { color:var(--g500); font-size:11px; min-width:80px; flex-shrink:0; }
.summary-val { font-size:12px; color:var(--g800); }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--g300); border-radius:3px; }
/* IV Lines */
.iv-section { margin:8px 0 4px; border-top:1px dashed var(--g300); padding-top:10px; }
.iv-section-title { font-size:10px; font-weight:700; color:#8e44ad; letter-spacing:.06em; text-transform:uppercase; margin-bottom:7px; }
.iv-table { width:100%; border-collapse:collapse; font-size:11px; margin-bottom:8px; }
.iv-table th { background:var(--g50); border:1px solid var(--g200); padding:4px 7px; font-size:10px; font-weight:700; color:var(--g600); text-align:left; white-space:nowrap; }
.iv-table td { border:1px solid var(--g200); padding:4px 7px; }
.iv-form-row { display:flex; gap:5px; align-items:center; flex-wrap:wrap; margin-top:6px; }
.iv-form-row input { padding:4px 7px; border:1px solid var(--g300); border-radius:4px; font-size:11px; font-family:inherit; }
.iv-form-row input:focus { outline:none; border-color:var(--primary-l); }
/* Sidebar hospital filter */
.sb-filter { padding:4px 6px 3px; }
.sbf-pills { display:flex; flex-wrap:wrap; gap:3px; padding-bottom:4px; }
.sbf-pill { font-size:10px; padding:2px 8px; border:1px solid rgba(255,255,255,.22); background:rgba(255,255,255,.1); color:rgba(255,255,255,.72); border-radius:10px; cursor:pointer; font-family:inherit; white-space:nowrap; max-width:150px; overflow:hidden; text-overflow:ellipsis; transition:background .1s; }
.sbf-pill:hover { background:rgba(255,255,255,.2); color:#fff; }
.sbf-pill.active { background:rgba(255,255,255,.28); color:#fff; font-weight:700; border-color:rgba(255,255,255,.5); }
.sbf-pill.arch { border-color:rgba(255,200,80,.35); color:rgba(255,210,100,.8); }
.sbf-pill.arch.active { background:rgba(255,200,80,.18); color:rgb(255,220,100); }
/* CQ */
.cq-card { background:#fff; border:1px solid var(--g200); border-radius:8px; padding:12px 14px; margin-bottom:9px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
.cq-q { font-size:13px; font-weight:700; color:var(--g800); margin-bottom:8px; line-height:1.5; }
.cq-section { margin-bottom:6px; }
.cq-label { font-size:10px; font-weight:700; color:var(--g500); text-transform:uppercase; letter-spacing:.05em; display:block; margin-bottom:2px; }
.cq-body { font-size:12px; color:var(--g700); line-height:1.6; padding-left:8px; }
.cq-ref { color:var(--primary); font-style:italic; }
.cq-sv { background:#f0fdf4; border-left:3px solid #86efac; padding:4px 8px; border-radius:0 4px 4px 0; color:#15803d; }
.cq-tag { font-size:10px; background:#e6f2fb; border:1px solid #b5d4ec; color:var(--primary); padding:1px 6px; border-radius:10px; font-weight:600; }
/* Reports */
.report-card { background:#fff; border:1px solid var(--g200); border-radius:8px; padding:12px 14px; margin-bottom:9px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
.report-img { max-width:100%; max-height:200px; border-radius:4px; cursor:pointer; border:1px solid var(--g200); display:block; margin:6px 0; transition:max-height .2s; }
.report-cat { font-size:10px; font-weight:700; padding:2px 7px; border-radius:3px; }
.rcat-CT,.rcat-ct { background:#e6f2fb; color:var(--primary); }
.rcat-MRI,.rcat-mri { background:#fff7ed; color:#ea580c; }
.rcat-X線,.rcat-xray { background:#f0fdf4; color:#16a34a; }
.rcat-心エコー,.rcat-超音波,.rcat-echo { background:#f5f3ff; color:#7c3aed; }
.rcat-other { background:var(--g100); color:var(--g600); }
/* Echo */
.echo-card { background:#fff; border:1px solid var(--g200); border-radius:8px; padding:12px 14px; margin-bottom:9px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
.echo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:6px; margin-bottom:8px; }
.echo-val { background:var(--g50); border:1px solid var(--g200); border-radius:5px; padding:5px 8px; }
.echo-val-name { font-size:10px; color:var(--g500); font-weight:700; }
.echo-val-num { font-size:15px; font-weight:700; color:var(--g800); }
.interp-row { display:flex; align-items:flex-start; gap:8px; padding:5px 8px; border-radius:5px; margin-bottom:3px; font-size:12px; }
.interp-ok { background:#f0fdf4; border:1px solid #bbf7d0; }
.interp-warn { background:#fffbeb; border:1px solid #fde68a; }
.interp-crit { background:#fef2f2; border:1px solid #fecaca; }
.interp-neutral { background:var(--g50); border:1px solid var(--g200); }
.interp-lbl { font-weight:700; min-width:90px; flex-shrink:0; }
.interp-ok .interp-lbl { color:#15803d; }
.interp-warn .interp-lbl { color:#b45309; }
.interp-crit .interp-lbl { color:var(--danger); }
.interp-neutral .interp-lbl { color:var(--g600); }
</style>
</head>
<body>
<header class="app-header">
  <h1>臨床タスク管理</h1>
  <button class="hdr-reset" onclick="resetDay()">本日リセット</button>
  <div class="hdr-clock" id="clock"></div>
</header>
<div class="app-body">
  <div class="sidebar">
    <div class="sb-head"><span>担当患者</span><button class="btn-add-pt" onclick="openAddModal()">+ 追加</button></div>
    <div id="sidebarFilter"></div>
    <div class="pt-list" id="patientList"></div>
  </div>
  <div class="main" id="mainArea">
    <div class="empty-state"><div style="font-size:44px;opacity:.15">+</div><div>患者を選択または追加してください</div></div>
  </div>
</div>
<div id="patientModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head"><div class="modal-title" id="modalTitle">患者登録</div><button class="modal-close" onclick="closeModal()">&#215;</button></div>
    <div class="modal-body">
      <div class="modal-section-label">基本情報</div>
      <div class="form-group"><label>実習先・病院名</label><input type="text" id="f-hospital" placeholder="例: ○○病院 内科病棟"></div>
      <div class="form-group"><label>患者名 <span style="color:var(--danger)">*</span></label><input type="text" id="f-name" placeholder="例: 山田 太郎"></div>
      <div class="form-row">
        <div class="form-group"><label>病室</label><input type="text" id="f-room" placeholder="例: 301号室"></div>
        <div class="form-group"><label>入院日</label><input type="date" id="f-date"></div>
      </div>
      <div class="form-group"><label>診断名</label><input type="text" id="f-diag" placeholder="例: 2型糖尿病、急性心不全"></div>
      <div class="modal-section-divider"></div>
      <div class="modal-section-label">患者属性</div>
      <div class="form-row">
        <div class="form-group"><label>生年月日</label><input type="date" id="f-birth" oninput="updateModalCalc()"></div>
        <div class="form-group"><label>年齢</label><input type="text" id="f-age" placeholder="自動計算" readonly style="background:var(--g50);color:var(--primary);font-weight:700"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>身長 (cm)</label><input type="number" id="f-height" placeholder="例: 165" step="0.1" oninput="updateModalCalc()"></div>
        <div class="form-group"><label>体重 (kg)</label><input type="number" id="f-weight" placeholder="例: 60" step="0.1" oninput="updateModalCalc()"></div>
        <div class="form-group"><label>BMI</label><input type="text" id="f-bmi" placeholder="自動計算" readonly style="background:var(--g50);color:var(--primary);font-weight:700"></div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:0 0 160px"><label>ADL</label>
          <select id="f-adl">
            <option value="">未選択</option>
            <option value="自立">自立</option>
            <option value="一部介助">一部介助</option>
            <option value="全介助">全介助</option>
          </select>
        </div>
      </div>
      <div class="modal-section-divider"></div>
      <div class="modal-section-label">キーパーソン・背景</div>
      <div class="form-row">
        <div class="form-group"><label>キーパーソン氏名</label><input type="text" id="f-kp-name" placeholder="例: 山田 花子"></div>
        <div class="form-group" style="flex:0 0 120px"><label>続柄</label><input type="text" id="f-kp-rel" placeholder="例: 妻"></div>
      </div>
      <div class="form-group"><label>既往歴</label><textarea id="f-past" placeholder="例: 高血圧（2010年〜）&#10;2型糖尿病（2015年〜）&#10;狭心症（2018年手術）"></textarea></div>
      <div class="form-group"><label>アレルギー</label><textarea id="f-allergy" placeholder="例: ペニシリン系（発疹）、造影剤、卵" style="min-height:44px"></textarea></div>
      <div class="form-group"><label>家族歴</label><textarea id="f-family" placeholder="例: 父：高血圧、母：2型糖尿病" style="min-height:44px"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="savePatient()">登録</button>
    </div>
  </div>
</div>
<script>
// ================================================================
// 定数
// ================================================================
const CATEGORIES = [
  {name:'バイタル確認', abbr:'V', color:'#2980b9', defaults:['体温測定','血圧測定（収縮期/拡張期）','脈拍確認','SpO₂測定','呼吸数確認']},
  {name:'点滴・輸液',  abbr:'I', color:'#8e44ad', defaults:['点滴内容・薬剤確認','滴下速度確認','残量確認','ルート・固定確認']},
  {name:'内服薬',      abbr:'M', color:'#e67e22', defaults:['朝薬投与確認','昼薬投与確認','夕薬投与確認','眠前薬投与確認']},
  {name:'処置',        abbr:'P', color:'#c0392b', defaults:['創傷処置','カテーテル管理（交換日確認含む）','ドレーン確認']},
  {name:'観察項目',    abbr:'O', color:'#27ae60', defaults:['意識レベル確認（JCS/GCS）','疼痛評価（NRS/VAS）','浮腫・皮膚状態確認','排泄確認（尿量・排便）']},
  {name:'検査',        abbr:'L', color:'#16a085', defaults:['採血結果確認','画像検査確認','培養結果確認']},
  {name:'記録・報告',  abbr:'R', color:'#7f8c8d', defaults:['看護記録記載','申し送り準備','医師への報告事項確認']},
  {name:'その他',      abbr:'他', color:'#95a5a6', defaults:[]},
];
const CAT_NAMES = CATEGORIES.map(c=>c.name);
const CAT_MIGRATE = {'点滴':'点滴・輸液','投薬':'内服薬','観察':'観察項目'};

const LAB_REF = {
  'WBC':    {unit:'×10³/μL',lo:3.5, hi:9.0, cLo:2.0, cHi:30.0},
  'RBC':    {unit:'×10⁶/μL',lo:3.86,hi:5.55},
  'Hb':     {unit:'g/dL',   lo:11.5,hi:17.5,cLo:7.0},
  'Hct':    {unit:'%',      lo:35,  hi:52},
  'Plt':    {unit:'×10³/μL',lo:150, hi:400, cLo:50,  cHi:1000},
  'Na':     {unit:'mEq/L',  lo:136, hi:145, cLo:125, cHi:155},
  'K':      {unit:'mEq/L',  lo:3.5, hi:5.0, cLo:2.5, cHi:6.5},
  'Cl':     {unit:'mEq/L',  lo:98,  hi:108},
  'BUN':    {unit:'mg/dL',  lo:8,   hi:20},
  'Cr':     {unit:'mg/dL',  lo:0.46,hi:1.09},
  'eGFR':   {unit:'mL/min', lo:60,  hi:null},
  'BS':     {unit:'mg/dL',  lo:70,  hi:110, cLo:50,  cHi:450},
  'HbA1c':  {unit:'%',      lo:4.6, hi:6.2},
  'AST':    {unit:'U/L',    lo:13,  hi:33},
  'ALT':    {unit:'U/L',    lo:7,   hi:40},
  'γ-GTP':  {unit:'U/L',    lo:0,   hi:70},
  'T-Bil':  {unit:'mg/dL',  lo:0.3, hi:1.2},
  'TP':     {unit:'g/dL',   lo:6.5, hi:8.0},
  'Alb':    {unit:'g/dL',   lo:4.0, hi:5.0, cLo:2.5},
  'CRP':    {unit:'mg/dL',  lo:0,   hi:0.3, cHi:10.0},
  'SpO2':   {unit:'%',      lo:95,  hi:100, cLo:88},
  'HR':     {unit:'bpm',    lo:60,  hi:100, cLo:40,  cHi:150},
  'SBP':    {unit:'mmHg',   lo:90,  hi:140, cLo:70,  cHi:190},
  'DBP':    {unit:'mmHg',   lo:60,  hi:90},
  'BT':     {unit:'°C',     lo:36.0,hi:37.5,cHi:39.0},
  'PT-INR': {unit:'',       lo:0.85,hi:1.15,cHi:3.0},
  'D-Dimer':{unit:'μg/mL', lo:0,   hi:1.0},
};
const LAB_NAMES = Object.keys(LAB_REF);

// ================================================================
// STATE
// ================================================================
let S = {
  patients:[], sel:null, tab:'tasks',
  collapsed:{}, editId:null,
  aiResult:'', aiLoading:false,
  labView:'cards',
  chartItems:[],
  importPreview:null,
  importMode:'json',
  labSelDate:null,
  hospitalFilter:'all',
  cqTagFilter:'',
};

function uid()  { return Date.now().toString(36)+Math.random().toString(36).substr(2,5); }
function nowHM(){ const d=new Date(); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function pad(n) { return String(n).padStart(2,'0'); }
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function esc(s) { return (s==null)?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function selP() { return S.patients.find(p=>p.id===S.sel); }
function calcAge(bd){ if(!bd) return ''; const b=new Date(bd),n=new Date(); let a=n.getFullYear()-b.getFullYear(); const m=n.getMonth()-b.getMonth(); if(m<0||(m===0&&n.getDate()<b.getDate())) a--; return a>=0?`${a}歳`:''; }
function calcBMI(h,w){ const hm=parseFloat(h)/100,wk=parseFloat(w); if(!hm||!wk||isNaN(hm)||isNaN(wk)) return ''; return (wk/(hm*hm)).toFixed(1); }
function updateModalCalc(){
  const bd=document.getElementById('f-birth'); const h=document.getElementById('f-height'); const w=document.getElementById('f-weight');
  const age=document.getElementById('f-age'); const bmi=document.getElementById('f-bmi');
  if(age&&bd) age.value=calcAge(bd.value);
  if(bmi&&h&&w) bmi.value=calcBMI(h.value,w.value);
}

// ================================================================
// PERSISTENCE
// ================================================================
function load() {
  try {
    const d=JSON.parse(localStorage.getItem('clinical_v2')||'{}');
    S.patients=(d.patients||[]).map(migrate);
    S.sel=d.sel||null;
  } catch(e){ console.error(e); }
}

function migrate(p) {
  if(!p.tasks) p.tasks=[];
  if(!p.labs)  p.labs=[];
  if(!p.memo)  p.memo='';
  p.tasks=p.tasks.map(t=>{
    if(t.status===undefined){ t.status=t.done?'done':'pending'; t.doneAt=t.done?(t.doneAt||''):null; delete t.done; }
    if(!t.cat&&t.category){ t.cat=t.category; delete t.category; }
    if(!t.cat) t.cat='その他';
    if(!CAT_NAMES.includes(t.cat)) t.cat=CAT_MIGRATE[t.cat]||'その他';
    return t;
  });
  // Migrate: new patient fields defaults
  if(!p.birthdate) p.birthdate='';
  if(!p.height)    p.height='';
  if(!p.weight)    p.weight='';
  if(!p.adl)       p.adl='';
  if(!p.kpName)    p.kpName='';
  if(!p.kpRel)     p.kpRel='';
  if(!p.pastHistory) p.pastHistory='';
  if(!p.allergies)   p.allergies='';
  if(!p.familyHistory) p.familyHistory='';
  if(!p.ivLines) p.ivLines=[];
  if(!p.medications) p.medications=[];
  if(!p.physicalFindings) p.physicalFindings='';
  if(!p.subjective) p.subjective='';
  if(!p.hospital) p.hospital='';
  if(p.archived===undefined) p.archived=false;
  if(!p.cqs) p.cqs=[];
  if(!p.reports) p.reports=[];
  if(!p.echos) p.echos=[];
  // Migrate lab entries: add date field from ts if missing
  p.labs=p.labs.map(lv=>{
    if(!lv.date){
      const m=lv.ts&&lv.ts.match(/^(\d{1,2})\/(\d{1,2})/);
      if(m){
        const yr=new Date().getFullYear();
        lv.date=`${yr}-${pad(parseInt(m[1]))}-${pad(parseInt(m[2]))}`;
      } else {
        lv.date=todayStr();
      }
    }
    return lv;
  });
  return p;
}

function save() {
  try { localStorage.setItem('clinical_v2',JSON.stringify({patients:S.patients,sel:S.sel})); }
  catch(e){ console.error(e); }
}

// ================================================================
// CLOCK
// ================================================================
function updateClock(){
  const n=new Date(),days=['日','月','火','水','木','金','土'];
  const el=document.getElementById('clock');
  if(el) el.textContent=`${n.getFullYear()}/${n.getMonth()+1}/${n.getDate()}（${days[n.getDay()]}）${nowHM()}`;
}
setInterval(updateClock,1000); updateClock();

// ================================================================
// DAILY RESET
// ================================================================
function resetDay(){
  if(!confirm('全患者のタスクを「未実施」にリセットしますか？\n（実施時刻もクリアされます）')) return;
  S.patients.forEach(p=>p.tasks.forEach(t=>{t.status='pending';t.doneAt=null;}));
  S.aiResult=''; save(); render();
}

// ================================================================
// PATIENT CRUD
// ================================================================
function openAddModal(){
  S.editId=null;
  document.getElementById('modalTitle').textContent='患者登録';
  document.getElementById('modalSaveBtn').textContent='登録';
  ['f-name','f-room','f-diag','f-date','f-hospital'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('patientModal').style.display='flex';
  setTimeout(()=>document.getElementById('f-name').focus(),60);
}
function openEditModal(){
  const p=selP(); if(!p) return;
  S.editId=p.id;
  document.getElementById('modalTitle').textContent='患者情報編集';
  document.getElementById('modalSaveBtn').textContent='更新';
  document.getElementById('f-hospital').value=p.hospital||'';
  document.getElementById('f-name').value=p.name;
  document.getElementById('f-room').value=p.room||'';
  document.getElementById('f-diag').value=p.diag||'';
  document.getElementById('f-date').value=p.date||'';
  document.getElementById('f-birth').value=p.birthdate||'';
  document.getElementById('f-height').value=p.height||'';
  document.getElementById('f-weight').value=p.weight||'';
  document.getElementById('f-adl').value=p.adl||'';
  document.getElementById('f-kp-name').value=p.kpName||'';
  document.getElementById('f-kp-rel').value=p.kpRel||'';
  document.getElementById('f-past').value=p.pastHistory||'';
  document.getElementById('f-allergy').value=p.allergies||'';
  document.getElementById('f-family').value=p.familyHistory||'';
  updateModalCalc();
  document.getElementById('patientModal').style.display='flex';
}
function closeModal(){ document.getElementById('patientModal').style.display='none'; }
function savePatient(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){ document.getElementById('f-name').focus(); return; }
  const room=document.getElementById('f-room').value.trim();
  const diag=document.getElementById('f-diag').value.trim();
  const date=document.getElementById('f-date').value;
  const birthdate=document.getElementById('f-birth').value;
  const height=document.getElementById('f-height').value;
  const weight=document.getElementById('f-weight').value;
  const adl=document.getElementById('f-adl').value;
  const kpName=document.getElementById('f-kp-name').value.trim();
  const kpRel=document.getElementById('f-kp-rel').value.trim();
  const pastHistory=document.getElementById('f-past').value.trim();
  const allergies=document.getElementById('f-allergy').value.trim();
  const familyHistory=document.getElementById('f-family').value.trim();
  const hospital=document.getElementById('f-hospital').value.trim();
  const extra={birthdate,height,weight,adl,kpName,kpRel,pastHistory,allergies,familyHistory,hospital};
  if(!S.editId){
    const p={id:uid(),name,room,diag,date,...extra,tasks:[],labs:[],memo:'',ivLines:[],medications:[],physicalFindings:'',subjective:'',cqs:[],archived:false};
    S.patients.push(p); S.sel=p.id; S.tab='tasks';
  } else {
    const p=S.patients.find(x=>x.id===S.editId);
    if(p) Object.assign(p,{name,room,diag,date,...extra});
  }
  save(); closeModal(); render();
}
function deletePatient(){
  const p=selP(); if(!p) return;
  if(!confirm(`「${p.name}」を削除しますか？元に戻せません。`)) return;
  S.patients=S.patients.filter(x=>x.id!==p.id);
  S.sel=S.patients.length?S.patients[0].id:null;
  save(); render();
}
function archivePatient(){
  const p=selP(); if(!p) return;
  if(!confirm(`「${p.name}」を退院としてアーカイブしますか？`)) return;
  p.archived=true; S.hospitalFilter='__archived__';
  save(); render();
}
function unarchivePatient(){
  const p=selP(); if(!p) return;
  p.archived=false; S.hospitalFilter='all';
  save(); render();
}
function selectPatient(id){ S.sel=id; S.tab='tasks'; S.aiResult=''; save(); render(); }

// ================================================================
// TASKS
// ================================================================
function cycleStatus(id){
  const p=selP(); if(!p) return;
  const t=p.tasks.find(x=>x.id===id); if(!t) return;
  if(t.status==='pending'){ t.status='done'; t.doneAt=nowHM(); }
  else if(t.status==='done'){ t.status='check'; }
  else { t.status='pending'; t.doneAt=null; }
  save(); renderTasks(); renderSidebar();
}
function deleteTask(id){
  const p=selP(); if(!p) return;
  p.tasks=p.tasks.filter(x=>x.id!==id);
  save(); renderTasks(); renderSidebar();
}
function addCustomTask_byId(inputId,catName){
  const p=selP(); if(!p) return;
  const el=document.getElementById(inputId); if(!el) return;
  const text=el.value.trim(); if(!text){ el.focus(); return; }
  p.tasks.push({id:uid(),text,cat:catName,status:'pending',doneAt:null});
  el.value=''; save(); renderTasks(); renderSidebar();
}
function addTemplates(catName){
  const p=selP(); if(!p) return;
  const def=CATEGORIES.find(c=>c.name===catName);
  if(!def||!def.defaults.length) return;
  const existing=p.tasks.filter(t=>t.cat===catName).map(t=>t.text);
  def.defaults.forEach(text=>{ if(!existing.includes(text)) p.tasks.push({id:uid(),text,cat:catName,status:'pending',doneAt:null}); });
  save(); renderTasks(); renderSidebar();
}
function toggleCollapse(name){ S.collapsed[name]=!S.collapsed[name]; renderTasks(); }
function renderIVSection(p){
  const rows=(p.ivLines||[]).map(iv=>`

  const alb=latestLab('Alb'); const egfr=latestLab('eGFR'); const hba1c=latestLab('HbA1c');

function getFlag(name,val){
  const r=LAB_REF[name]; if(!r) return null;
  if(r.cLo!==undefined&&val<r.cLo) return 'LL';
  if(r.cHi!==undefined&&val>r.cHi) return 'HH';
  if(r.lo!==null&&val<r.lo) return 'L';
  if(r.hi!==null&&val>r.hi) return 'H';
  return null;
}

function parseLabJSON(jsonStr){
  const data=JSON.parse(jsonStr);
  const rows=[];
  const extractRows=(obj,defaultDate)=>{
    // Format: { date, results:[{name,value},...] } or { date, labs:[...] }
    if(obj&&typeof obj==='object'&&!Array.isArray(obj)){
      const date=obj.date||obj.採取日||obj.検査日||obj.検体採取日||defaultDate||todayStr();
      const arr=obj.results||obj.labs||obj.data||obj.検査結果;
      if(Array.isArray(arr)){
        arr.forEach(r=>{
          const name=r.name||r.項目||r.検査項目||r.item;
          const val=r.value??r.値??r.val??r.result;
          if(name&&val!==undefined) rows.push({name:String(name).trim(),val:parseFloat(val),date});
        });
        return;
      }
      // Format: { date, WBC:8.5, Hb:12.1, ... }
      Object.entries(obj).forEach(([k,v])=>{
        if(['date','採取日','検査日','results','labs','data','検査結果','患者名','patient'].includes(k)) return;
        if(typeof v==='number'||(typeof v==='string'&&!isNaN(parseFloat(v))))
          rows.push({name:k.trim(),val:parseFloat(v),date});
      });
      return;
    }
    // Format: array of {date,name,value}
    if(Array.isArray(obj)){
      obj.forEach(r=>{
        const name=r.name||r.項目||r.item;
        const val=r.value??r.値??r.val;
        const date=r.date||r.採取日||defaultDate||todayStr();
        if(name&&val!==undefined) rows.push({name:String(name).trim(),val:parseFloat(val),date});
      });
    }
  };
  extractRows(data,null);
  return rows;
}

function previewImport(){
  const ta=document.getElementById('import-json');
  if(!ta) return;
  const raw=ta.value.trim();
  if(!raw){ S.importPreview=null; renderLabImport(); return; }
  try {
    const rows=parseLabJSON(raw);
    S.importPreview={ok:true,rows};
  } catch(e){
    S.importPreview={ok:false,error:e.message};
  }
  renderLabImport();
}

function confirmImport(){
  const p=selP(); if(!p||!S.importPreview||!S.importPreview.ok) return;
  const rows=S.importPreview.rows;
  const n=new Date();
  const ts=`${n.getMonth()+1}/${n.getDate()} ${pad(n.getHours())}:${pad(n.getMinutes())}`;
  rows.forEach(r=>{
    if(!r.name||isNaN(r.val)) return;
    const ref=LAB_REF[r.name];
    const unit=ref?ref.unit:'';
    p.labs.push({id:uid(),name:r.name,val:r.val,unit,date:r.date||todayStr(),ts});
  });
  S.importPreview=null;
  const ta=document.getElementById('import-json');
  if(ta) ta.value='';
  save(); renderLab();
}

function parseTSV(text){
  const rows=[];
  let defaultDate=todayStr();
  const lines=text.split(/\r?\n/);
  for(const raw of lines){
    const line=raw.trim();
    if(!line||line.startsWith('#')) continue;
    // Try tab split first, then comma, then 2+ spaces
    let cols=line.split('\t');
    if(cols.length<2) cols=line.split(',');
    if(cols.length<2) cols=line.split(/\s{2,}/);
    const trimmed=cols.map(c=>c.trim());
    if(trimmed.length>=3){
      // date, name, value
      const [dateCol,nameCol,valCol]=trimmed;
      const parsedDate=normalizeDate(dateCol);
      if(parsedDate){
        const val=parseFloat(valCol.replace(/[^\d.\-]/g,''));
        if(nameCol&&!isNaN(val)) rows.push({date:parsedDate,name:nameCol,val});
      } else {
        // Maybe order is name, value, date OR name, date, value — try name first
        const val=parseFloat(trimmed[1].replace(/[^\d.\-]/g,''));
        const maybeDate=normalizeDate(trimmed[2]);
        if(!isNaN(val)&&trimmed[0]) rows.push({date:maybeDate||defaultDate,name:trimmed[0],val});
      }
    } else if(trimmed.length===2){
      // Could be: name value (use defaultDate) or a date header line
      const maybeDate=normalizeDate(trimmed[0]);
      if(maybeDate&&!trimmed[1]){
        defaultDate=maybeDate; continue;
      }
      const val=parseFloat(trimmed[1].replace(/[^\d.\-]/g,''));
      if(trimmed[0]&&!isNaN(val)) rows.push({date:defaultDate,name:trimmed[0],val});
    } else if(trimmed.length===1){
      // Might be a bare date row acting as header
      const maybeDate=normalizeDate(trimmed[0]);
      if(maybeDate) defaultDate=maybeDate;
    }
  }
  return rows;
}

function normalizeDate(s){
  if(!s) return null;
  // YYYY-MM-DD or YYYY/MM/DD
  let m=s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})$/);
  if(m) return `${m[1]}-${pad(parseInt(m[2]))}-${pad(parseInt(m[3]))}`;
  // MM/DD or M/D (use current year)
  m=s.match(/^(\d{1,2})[-\/](\d{1,2})$/);
  if(m){ const yr=new Date().getFullYear(); return `${yr}-${pad(parseInt(m[1]))}-${pad(parseInt(m[2]))}`; }
  return null;
}

function drawLabCharts(){

  const container=document.getElementById('chart-container');
  if(!container) return;
  if(!S.chartItems.length){
    container.innerHTML='<div style="text-align:center;padding:30px;color:#bbb;font-size:13px">左から表示する項目を選択してください</div>';
    return;
  }
  container.innerHTML='';
  const W=container.offsetWidth||560;

  S.chartItems.forEach(name=>{
    const entries=p.labs.filter(lv=>lv.name===name&&lv.date).sort((a,b)=>a.date<b.date?-1:1);
    if(!entries.length) return;
    // Group by date → latest value
    const byDate={};
    entries.forEach(lv=>{ byDate[lv.date]=lv; });
    const dates=Object.keys(byDate).sort();
    const vals=dates.map(d=>byDate[d].val);
    const ref=LAB_REF[name];

    const wrap=document.createElement('div');
    wrap.className='chart-wrap';
    const titleDiv=document.createElement('div');
    titleDiv.className='chart-item-title';
    titleDiv.innerHTML=`${esc(name)}<span class="ct-unit">${ref?` (${ref.unit})`:''}</span><span class="ct-range">${ref?`基準: ${ref.lo??'?'} ～ ${ref.hi??'?'}`:''}</span>`;
    wrap.appendChild(titleDiv);

    const canvas=document.createElement('canvas');
    canvas.width=W-24; canvas.height=150;
    wrap.appendChild(canvas);
    container.appendChild(wrap);

    drawSingleChart(canvas,name,dates,vals,ref);
  });
}

function drawSingleChart(canvas,name,dates,vals,ref){
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const PAD={t:20,r:16,b:38,l:52};
  const cW=W-PAD.l-PAD.r, cH=H-PAD.t-PAD.b;
  ctx.clearRect(0,0,W,H);

  // Y range
  let yMin=Math.min(...vals), yMax=Math.max(...vals);
  if(ref){ if(ref.lo!=null) yMin=Math.min(yMin,ref.lo); if(ref.hi!=null) yMax=Math.max(yMax,ref.hi); }
  const yPad=(yMax-yMin)*0.15||1;
  yMin-=yPad; yMax+=yPad;
  const toY=v=>PAD.t+cH-((v-yMin)/(yMax-yMin))*cH;
  const toX=i=>PAD.l+(dates.length>1?i/(dates.length-1)*cW:cW/2);

  // Normal range background
  if(ref&&ref.lo!=null&&ref.hi!=null){
    const rT=toY(ref.hi), rB=toY(ref.lo);
    ctx.fillStyle='rgba(22,163,74,0.07)';
    ctx.fillRect(PAD.l,rT,cW,rB-rT);
    ctx.setLineDash([4,3]); ctx.lineWidth=1; ctx.strokeStyle='rgba(22,163,74,0.35)';
    ctx.beginPath(); ctx.moveTo(PAD.l,rT); ctx.lineTo(PAD.l+cW,rT); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(PAD.l,rB); ctx.lineTo(PAD.l+cW,rB); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Grid lines & Y labels
  const steps=4;
  for(let i=0;i<=steps;i++){
    const y=PAD.t+(i/steps)*cH;
    const v=yMax-(i/steps)*(yMax-yMin);
    ctx.strokeStyle='#efefef'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(PAD.l,y); ctx.lineTo(PAD.l+cW,y); ctx.stroke();
    ctx.fillStyle='#aaa'; ctx.font='10px sans-serif'; ctx.textAlign='right';
    ctx.fillText(parseFloat(v.toFixed(2)),PAD.l-4,y+4);
  }

  // Axes
  ctx.strokeStyle='#ccc'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(PAD.l,PAD.t); ctx.lineTo(PAD.l,PAD.t+cH); ctx.lineTo(PAD.l+cW,PAD.t+cH); ctx.stroke();

  // X labels
  const maxLabels=Math.min(dates.length,10);
  const step=Math.ceil(dates.length/maxLabels);
  ctx.fillStyle='#888'; ctx.font='10px sans-serif'; ctx.textAlign='center';
  dates.forEach((d,i)=>{
    if(i%step===0||i===dates.length-1){
      const x=toX(i);
      const label=d.slice(5); // MM-DD
      ctx.fillText(label.replace('-','/'),x,PAD.t+cH+14);
    }
  });

  // Line
  ctx.strokeStyle='#2980b9'; ctx.lineWidth=2; ctx.beginPath();
  vals.forEach((v,i)=>{ const x=toX(i),y=toY(v); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.stroke();

  // Dots + value labels
  vals.forEach((v,i)=>{
    const x=toX(i), y=toY(v);
    const flag=getFlag(name,v);
    const dotColor=flag?(flag==='HH'||flag==='LL'?'#dc2626':flag==='H'?'#ef4444':'#3b82f6'):'#2980b9';
    ctx.beginPath(); ctx.fillStyle=dotColor; ctx.arc(x,y,4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle=dotColor; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
    ctx.fillText(v,x,y-8);
    if(flag){
      ctx.font='bold 9px sans-serif'; ctx.fillStyle=dotColor;
      ctx.fillText(flag,x+10,y-8);
    }
  });
}

function addEcho(){

  const ivs=gv('echo-ivs'),pw=gv('echo-pw'),lavi=gv('echo-lavi');
  const ar=gv('echo-ar'),mr=gv('echo-mr'),tr=gv('echo-tr'),pr=gv('echo-pr');
  if(!ef&&!lvdd&&!ea){document.getElementById('echo-ef').focus();return;}
  const n=new Date(); const ts=`${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())} ${pad(n.getHours())}:${pad(n.getMinutes())}`;
  if(!p.echos) p.echos=[];

function interpretEcho(echo){
  const res=[];
  const ef=parseFloat(echo.ef);
  if(!isNaN(ef)){
    if(ef>=50) res.push({label:'収縮機能',value:`正常 (EF ${ef}%)`,cls:'ok'});
    else if(ef>=40) res.push({label:'収縮機能',value:`軽度低下 (EF ${ef}% — HFmrEF)`,cls:'warn'});
    else res.push({label:'収縮機能',value:`低下 (EF ${ef}% — HFrEF ≥ 中等度心不全)`,cls:'crit'});
  }
  const lvdd=parseFloat(echo.lvdd);
  if(!isNaN(lvdd)&&lvdd>55) res.push({label:'LV拡大',value:`LVDd ${lvdd}mm — 拡大あり (>55mm)`,cls:'warn'});
  const ivs=parseFloat(echo.ivs), pw=parseFloat(echo.pw);
  const wallMax=(!isNaN(ivs)&&!isNaN(pw))?Math.max(ivs,pw):!isNaN(ivs)?ivs:!isNaN(pw)?pw:NaN;
  if(!isNaN(wallMax)){
    if(wallMax>=13) res.push({label:'壁肥厚',value:`最大${wallMax}mm — 高度肥厚 (≥13mm)、HCM・アミロイドーシス等を考慮`,cls:'crit'});
    else if(wallMax>=11) res.push({label:'壁肥厚',value:`最大${wallMax}mm — 軽度肥厚 (11-12mm)`,cls:'warn'});
  }
  const ea=parseFloat(echo.ea), eprime=parseFloat(echo.eprime), ee=parseFloat(echo.ee), lavi=parseFloat(echo.lavi);
  const hasDiast=!isNaN(ea)||!isNaN(eprime)||!isNaN(ee)||!isNaN(lavi);
  if(hasDiast){
    let pos=0, crit=[];
    if(!isNaN(eprime)&&eprime<7){pos++;crit.push(`e'=${eprime}<7`);}
    if(!isNaN(ee)&&ee>14){pos++;crit.push(`E/e'=${ee}>14`);}
    if(!isNaN(lavi)&&lavi>34){pos++;crit.push(`LAVI=${lavi}>34`);}
    let grade,cls;
    if(pos===0){grade='拡張障害なし（正常）';cls='ok';}
    else if(!isNaN(ea)){
      if(ea<=0.8){grade='Grade I（弛緩障害型）';cls='warn';}
      else if(ea>=2){grade='Grade III（拘束型）— 左房圧高度上昇';cls='crit';}
      else if(pos>=2){grade='Grade II（偽正常化型）— 左房圧上昇';cls='warn';}
      else{grade='Indeterminate（判定不能）';cls='neutral';}
    } else {grade=`異常所見あり（${pos}/3 criteria陽性）`;cls='warn';}
    res.push({label:'拡張障害',value:`${grade}${crit.length?' ['+crit.join(', ')+']':''}`,cls});
  }
  const valveDefs=[{k:'ar',l:'AR（大動脈弁逆流）'},{k:'mr',l:'MR（僧帽弁逆流）'},{k:'tr',l:'TR（三尖弁逆流）'},{k:'pr',l:'PR（肺動脈弁逆流）'}];
  valveDefs.forEach(v=>{
    if(echo[v.k]&&echo[v.k]!=='none'){
      const cls=echo[v.k]==='severe'?'crit':echo[v.k]==='moderate'?'warn':'neutral';
      res.push({label:v.l,value:echo[v.k]+({severe:'— 重症：手術適応の評価を',moderate:'— 中等度：経過観察',mild:'— 軽度'}[echo[v.k]]||''),cls});
    }
  });
  if(echo.tr&&echo.tr!=='none'){
    const trMsg=echo.tr==='severe'?'— 右心不全・肺高血圧の積極評価を':echo.tr==='moderate'?'— 肺動脈圧推定を検討':'';
    if(trMsg) res.push({label:'右心系評価',value:`TR ${echo.tr} ${trMsg}`,cls:echo.tr==='severe'?'crit':'warn'});
  }
  return res;
}

function buildCtx(p){
  const lines=[`患者: ${p.name}`];
  if(p.diag) lines.push(`診断: ${p.diag}`);
  if(p.room) lines.push(`病室: ${p.room}`);
  if(p.date) lines.push(`入院日: ${p.date}`);
  if(p.labs&&p.labs.length){
    lines.push('\n【最新検査値】');
    const byName={};
    p.labs.forEach(lv=>{ if(!byName[lv.name]||lv.date>=byName[lv.name].date) byName[lv.name]=lv; });
    Object.entries(byName).forEach(([name,lv])=>{
      const flag=getFlag(name,lv.val);
      const ref=LAB_REF[name];
      const rng=ref?`(基準: ${ref.lo??'?'}-${ref.hi??'?'} ${ref.unit})`:'';
      lines.push(`  ${name}: ${lv.val} ${lv.unit} ${rng}${flag?` ← [${flag}]`:''}`);
    });
  }
  const iv=p.tasks.filter(t=>t.cat==='点滴・輸液');
  if(iv.length){ lines.push('\n【点滴・輸液】'); iv.forEach(t=>lines.push(`  - ${t.text}`)); }
  const med=p.tasks.filter(t=>t.cat==='内服薬');
  if(med.length){ lines.push('\n【内服薬】'); med.forEach(t=>lines.push(`  - ${t.text}`)); }
  if(p.memo&&p.memo.trim()) lines.push(`\n【メモ】\n${p.memo}`);
  return lines.join('\n');
}

function buildClipboardText(p){
  const lines=['以下の患者情報を臨床的に分析して、異常値へのコメント・薬剤の注意点・今日の観察ポイントを教えてください：',''];
  lines.push(`【患者基本情報】`);
  lines.push(`患者名: ${p.name}`);
  if(p.room)  lines.push(`病室: ${p.room}`);
  if(p.diag)  lines.push(`診断名: ${p.diag}`);
  if(p.date)  lines.push(`入院日: ${p.date}`);
  if(p.birthdate) lines.push(`生年月日: ${p.birthdate} ${calcAge(p.birthdate)}`);
  if(p.height||p.weight) lines.push(`身体: 身長${p.height||'?'}cm 体重${p.weight||'?'}kg${(p.height&&p.weight)?` BMI${calcBMI(p.height,p.weight)}`:''}`);
  if(p.adl) lines.push(`ADL: ${p.adl}`);
  if(p.pastHistory) lines.push(`\n【既往歴】\n${p.pastHistory}`);
  if(p.allergies)   lines.push(`\n【アレルギー】\n${p.allergies}`);
  if(p.familyHistory) lines.push(`\n【家族歴】\n${p.familyHistory}`);
  const med=p.tasks.filter(t=>t.cat==='内服薬');
  if(med.length){
    lines.push('');
    lines.push('【内服薬一覧】');
    med.forEach(t=>lines.push(`  - ${t.text}`));
  }
  if(p.labs&&p.labs.length){
    lines.push('');
    lines.push('【最新検査値】');
    const byName={};
    p.labs.forEach(lv=>{ if(!byName[lv.name]||lv.date>=byName[lv.name].date) byName[lv.name]=lv; });
    Object.entries(byName).forEach(([name,lv])=>{
      const flag=getFlag(name,lv.val);
      const ref=LAB_REF[name];
      const rng=ref?` (基準: ${ref.lo??'?'}-${ref.hi??'?'} ${ref.unit})`:'';
      lines.push(`  ${name}: ${lv.val}${lv.unit?` ${lv.unit}`:''}${rng}${flag?` ← [${flag}]`:''}`);
    });
  }
  const unfinished=p.tasks.filter(t=>t.status==='pending'||t.status==='check');
  if(unfinished.length){
    lines.push('');
    lines.push('【今日の未実施・要確認タスク】');
    unfinished.forEach(t=>lines.push(`  [${t.status==='check'?'要確認':'未実施'}] ${t.text}（${t.cat}）`));
  }
  if(p.ivLines&&p.ivLines.length){
    lines.push('');
    lines.push('【点滴・輸液詳細】');
    p.ivLines.forEach(iv=>{
      const parts=[iv.drug];
      if(iv.dose) parts.push(iv.dose);
      if(iv.rate) parts.push(`${iv.rate}mL/h`);
      if(iv.start) parts.push(`開始 ${iv.start}`);
      if(iv.end) parts.push(`終了予定 ${iv.end}`);
      lines.push(`  ・${parts.join('  ')}`);
    });
  }
  if(p.medications&&p.medications.length){
    lines.push('');
    lines.push('【内服薬詳細】');
    p.medications.forEach(med=>{
      const timing=[med.am&&'朝',med.noon&&'昼',med.pm&&'夕',med.bed&&'眠前'].filter(Boolean).join('・');
      lines.push(`  ・${med.drug}${med.dose?` ${med.dose}`:''}${timing?` (${timing})`:''}`);
    });
  }
  if(p.physicalFindings&&p.physicalFindings.trim()){
    lines.push('');
    lines.push('【身体所見】');
    lines.push(p.physicalFindings.trim());
  }
  if(p.subjective&&p.subjective.trim()){
    lines.push('');
    lines.push('【S情報（患者の訴え）】');
    lines.push(p.subjective.trim());
  }
  if(p.memo&&p.memo.trim()){
    lines.push('');
    lines.push('【メモ】');
    lines.push(p.memo.trim());
  }
  if((p.ivLines&&p.ivLines.length)||(p.medications&&p.medications.length)||p.tasks.some(t=>t.cat==='内服薬'||t.cat==='点滴・輸液')){
    lines.push('');
    lines.push('上記の薬剤について、腎機能・既往歴を踏まえた相互作用・用量調整の必要性・中止すべき薬剤を教えてください。');
  }
  return lines.join('\n');
}

async function copyPatientInfo(){
  const p=selP(); if(!p) return;
  const text=buildClipboardText(p);
  try {
    await navigator.clipboard.writeText(text);
    showCopyMsg();
  } catch(e){
    // Fallback for non-HTTPS
    const ta=document.createElement('textarea');
    ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopyMsg();
  }
}

function showCopyMsg(){
  const el=document.getElementById('copy-msg');
  if(!el) return;
  el.style.display='block';
  setTimeout(()=>{ el.style.display='none'; },3500);
}
async function runAI(){
  const key=getApiKey();
  if(!key){ alert('APIキーを入力・保存してください'); return; }
  const p=selP(); if(!p) return;
  S.aiLoading=true; S.aiResult=''; renderAI();
  const prompt=`あなたは経験豊富な内科医のアシスタントです。以下の患者情報を分析し、看護師・医療チーム向けに簡潔かつ実用的な情報を提供してください。\n\n患者情報:\n${buildCtx(p)}\n\n以下の4項目を分析し、各項目は【】で区切って日本語で回答してください:\n【1. 異常検査値へのコメント】異常値の臨床的意義と対処の優先度。正常のみなら「特記なし」。\n【2. 薬剤の注意点】副作用・相互作用リスク。情報不足なら「情報不十分」。\n【3. 病態と治療の整合性】診断名と検査値・治療の整合性。\n【4. 本日の観察ポイント】特に注意すべき事項を3〜5点。\n各項目は3〜5行以内。重大な異常は「要注意」と明記。`;
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1200,messages:[{role:'user',content:prompt}]}),
    });
    if(!res.ok){ const e=await res.json(); throw new Error(e.error?.message||`HTTP ${res.status}`); }
    const data=await res.json();
    S.aiResult=data.content[0].text;
  } catch(e){ S.aiResult=`エラー: ${e.message}`; }
  S.aiLoading=false; renderAI();
}

function renderTasks(){
  const p=selP(); const c=document.getElementById('tabContent'); if(!p||!c) return;
  const done=p.tasks.filter(t=>t.status==='done').length;
  const check=p.tasks.filter(t=>t.status==='check').length;
  const total=p.tasks.length, pend=total-done-check;
  const pct=total?Math.round(done/total*100):0;
  const summary=`<div class="tasks-summary">
    <div class="s-stat"><div class="s-num n-done">${done}</div><div class="s-lbl">実施済み</div></div>
    <div class="s-stat"><div class="s-num n-check">${check}</div><div class="s-lbl">要確認</div></div>
    <div class="s-stat"><div class="s-num n-pend">${pend}</div><div class="s-lbl">未実施</div></div>
    <div class="prog-bar">
      <div class="prog-info"><span>進捗</span><span>${pct}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
  </div>`;
  const groups=CATEGORIES.map(cat=>{
    const tasks=p.tasks.filter(t=>t.cat===cat.name);
    const cd=tasks.filter(t=>t.status==='done').length;
    const cc=tasks.filter(t=>t.status==='check').length;
    const collapsed=!!S.collapsed[cat.name];
    const cntCls=cc>0?'c-check':cd===tasks.length&&tasks.length>0?'c-done':'';
    const safeId='ci-'+btoa(encodeURIComponent(cat.name)).replace(/=/g,'');
    const items=tasks.map(t=>{
      const lbl=t.status==='done'?`&#10003; ${esc(t.doneAt||'')}`:t.status==='check'?'要確認':'未実施';
      return `<div class="task-item s-${t.status}">
        <button class="status-btn" onclick="cycleStatus('${t.id}')">${lbl}</button>
        <span class="task-text">${esc(t.text)}</span>
        <button class="task-del" onclick="deleteTask('${t.id}')">&#215;</button>
      </div>`;
    }).join('');
    return `<div class="cat-group">
      <div class="cat-hdr" onclick="toggleCollapse('${esc(cat.name)}')">
        <div class="cat-icon" style="background:${cat.color}">${cat.abbr}</div>
        <span class="cat-title">${esc(cat.name)}</span>
        <span class="cat-count ${cntCls}">${tasks.length?`${cd}/${tasks.length}`:''}</span>
        <span class="cat-arrow">${collapsed?'&#9654;':'&#9660;'}</span>
      </div>
      ${collapsed?'':` <div class="cat-body">
        ${tasks.length===0?'<div class="cat-empty">タスクがありません</div>':''}
        ${items}
        ${cat.name==='点滴・輸液'?renderIVSection(p):''}
        ${cat.name==='内服薬'?renderMedSection(p):''}
        <div class="add-inline">
          <input type="text" id="${safeId}" placeholder="タスクを追加..."
            onkeydown="if(event.key==='Enter')addCustomTask_byId('${safeId}','${esc(cat.name)}')">
          <button class="btn btn-primary btn-sm" onclick="addCustomTask_byId('${safeId}','${esc(cat.name)}')">追加</button>
          ${cat.defaults.length?`<button class="tmpl-btn" onclick="addTemplates('${esc(cat.name)}')">テンプレ追加</button>`:''}
        </div>
      </div>`}
    </div>`;
  }).join('');
  c.innerHTML=summary+groups;
}

function renderLabCards(){
  const p=selP(); const c=document.getElementById('tabContent'); if(!p||!c) return;
  const byName={};
  p.labs.forEach(lv=>{ if(!byName[lv.name]) byName[lv.name]=[]; byName[lv.name].push(lv); });
  const criticals=[];
  const cards=Object.entries(byName).map(([name,entries])=>{
    const latest=entries.sort((a,b)=>a.date<b.date?1:-1)[0];
    const flag=getFlag(name,latest.val);
    if(flag==='HH'||flag==='LL') criticals.push(name);
    const ref=LAB_REF[name];
    const cls=flag?`f${flag}`:'';
    const range=ref?`基準: ${ref.lo!==null?ref.lo:'?'} ～ ${ref.hi!==null?ref.hi:'?'} ${ref.unit}`:'';
    return `<div class="lab-card ${cls}">
      ${flag?`<span class="lc-flag">${flag}</span>`:''}
      <div class="lc-name">${esc(name)}</div>
      <div><span class="lc-val">${latest.val}</span><span class="lc-unit">${esc(latest.unit)}</span></div>
      ${range?`<div class="lc-range">${range}</div>`:''}
      <div class="lc-ts">${esc(latest.date||'')} ${esc(latest.ts||'')}</div>
      ${entries.length>1?`<div class="lc-ts">計 ${entries.length} 件</div>`:''}
      <button class="lc-del" onclick="deleteLab('${latest.id}')" title="削除">&#215;</button>
    </div>`;
  }).join('');
  const alert=criticals.length?`<div class="critical-alert"><span class="c-lbl">&#9888; 危険値</span><span class="c-body">${esc(criticals.join('、'))} — 至急確認してください</span></div>`:'';
  c.innerHTML=labSubNav()+alert+
    (Object.keys(byName).length?`<div class="lab-grid">${cards}</div>`:'<div style="text-align:center;padding:20px;color:#bbb;font-size:13px;margin-bottom:14px">検査値が登録されていません</div>')+
    labAddForm();
}

function renderLabTable(){
  const p=selP(); const c=document.getElementById('tabContent'); if(!p||!c) return;
  const dateSet=new Set(), nameSet=new Set();
  p.labs.forEach(lv=>{ if(lv.date) dateSet.add(lv.date); nameSet.add(lv.name); });
  const dates=[...dateSet].sort();
  const names=[...nameSet];
  let tableHtml='<div style="text-align:center;padding:20px;color:#bbb;font-size:13px">検査値がありません</div>';
  if(dates.length&&names.length){
    const map={};
    p.labs.forEach(lv=>{ if(!lv.date) return; if(!map[lv.name]) map[lv.name]={}; const ex=map[lv.name][lv.date]; if(!ex||lv.date>=ex.date) map[lv.name][lv.date]=lv; });
    tableHtml=`<div class="lab-matrix-wrap"><table class="lab-matrix">
      <thead><tr><th class="name-th">項目</th>${dates.map(d=>`<th>${esc(d.slice(5).replace('-','/'))}</th>`).join('')}</tr></thead>
      <tbody>${names.map(name=>{
        const ref=LAB_REF[name];
        const unit=ref?ref.unit:'';
        const range=ref?`${ref.lo??'?'}-${ref.hi??'?'}`:'';
        return `<tr>
          <td class="name-td">${esc(name)}<span class="lm-unit">${esc(unit)}</span>${range?`<span class="lm-range">${range}</span>`:''}</td>
          ${dates.map(d=>{
            const lv=map[name]&&map[name][d];
            if(!lv) return '<td class="empty-td">—</td>';
            const flag=getFlag(name,lv.val);
            const cls=flag?`c${flag}`:'';
            const sup=flag?`<span class="flag-sup">${flag}</span>`:'';
            return `<td class="${cls}">${lv.val}${sup}</td>`;
          }).join('')}
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  }
  c.innerHTML=labSubNav()+tableHtml+'<div style="margin-top:14px">'+labAddForm()+'</div>';
}

// ── BY DATE ───────────────────────────────────────────────
function renderLabByDate(){
  const p=selP(); const c=document.getElementById('tabContent'); if(!p||!c) return;
  const dates=[...new Set(p.labs.filter(lv=>lv.date).map(lv=>lv.date))].sort().reverse();
  if(!dates.length){
    c.innerHTML=labSubNav()+'<div style="text-align:center;padding:30px;color:#bbb;font-size:13px">検査値がありません</div>'+'<div style="margin-top:14px">'+labAddForm()+'</div>';
    return;
  }
  if(!S.labSelDate||!dates.includes(S.labSelDate)) S.labSelDate=dates[0];
  const selDate=S.labSelDate;
  const entries=p.labs.filter(lv=>lv.date===selDate);
  const criticals=[];
  const cards=entries.map(lv=>{
    const flag=getFlag(lv.name,lv.val);
    if(flag==='HH'||flag==='LL') criticals.push(lv.name);
    const ref=LAB_REF[lv.name];
    const cls=flag?`f${flag}`:'';
    const range=ref?`基準: ${ref.lo!==null?ref.lo:'?'} ～ ${ref.hi!==null?ref.hi:'?'} ${ref.unit}`:'';
    return `<div class="lab-card ${cls}">
      ${flag?`<span class="lc-flag">${flag}</span>`:''}
      <div class="lc-name">${esc(lv.name)}</div>
      <div><span class="lc-val">${lv.val}</span><span class="lc-unit">${esc(lv.unit)}</span></div>
      ${range?`<div class="lc-range">${range}</div>`:''}
      <div class="lc-ts">${esc(lv.ts||'')}</div>
      <button class="lc-del" onclick="deleteLab('${lv.id}')" title="削除">&#215;</button>
    </div>`;
  }).join('');
  const alert=criticals.length?`<div class="critical-alert"><span class="c-lbl">&#9888; 危険値</span><span class="c-body">${esc(criticals.join('、'))} — 至急確認してください</span></div>`:'';
  const pills=dates.map(d=>{
    const mm=d.slice(5).replace('-','/');
    const cnt=p.labs.filter(lv=>lv.date===d).length;
    return `<button class="date-pill${d===selDate?' active':''}" onclick="S.labSelDate='${d}';renderLabByDate()">${mm} <span style="font-size:10px;opacity:.7">(${cnt}件)</span></button>`;
  }).join('');
  c.innerHTML=labSubNav()+
    `<div class="date-pills">${pills}</div>`+
    alert+
    (entries.length?`<div class="lab-grid">${cards}</div>`:'<div style="padding:16px;color:#bbb;font-size:13px">この日付のデータはありません</div>')+
    '<div style="margin-top:14px">'+labAddForm()+'</div>';
}

function formatAI(text){
  const parts=text.split(/(【[^】]+】)/g);
  let html='';
  for(let i=0;i<parts.length;i++){
    const part=parts[i];
    if(/^【[^】]+】$/.test(part)&&i+1<parts.length){
      html+=`<div class="ai-sec"><div class="ai-sec-title">${esc(part)}</div><div class="ai-sec-body">${esc(parts[i+1].trim()).replace(/\n/g,'<br>')}</div></div>`;
      i++;
    } else if(part.trim()){
      html+=`<div style="margin-bottom:8px">${esc(part.trim()).replace(/\n/g,'<br>')}</div>`;
    }
  }
  return html||esc(text).replace(/\n/g,'<br>');
}

function buildSummaryText(p){
  const lines=[];
  lines.push('━━━ 入院サマリ ━━━');
  lines.push(`患者: ${p.name}　病室: ${p.room||'—'}　入院日: ${p.date||'—'}`);
  const age=p.birthdate?` (${calcAge(p.birthdate)})`:'' ;
  const bmi=p.height&&p.weight?`  BMI: ${calcBMI(p.height,p.weight)}`:'';
  if(p.birthdate||p.height||p.weight)
    lines.push(`生年月日: ${p.birthdate||'—'}${age}  身長: ${p.height?p.height+'cm':'—'}  体重: ${p.weight?p.weight+'kg':'—'}${bmi}`);
  if(p.adl) lines.push(`ADL: ${p.adl}`);
  if(p.kpName||p.kpRel) lines.push(`キーパーソン: ${p.kpName||'—'}（${p.kpRel||'—'}）`);
  lines.push('');
  lines.push(`【診断名】\n${p.diag||'—'}`);
  if(p.pastHistory) lines.push(`\n【既往歴】\n${p.pastHistory}`);
  if(p.allergies)   lines.push(`\n【アレルギー】\n${p.allergies}`);
  if(p.familyHistory) lines.push(`\n【家族歴】\n${p.familyHistory}`);
  const meds=p.tasks.filter(t=>t.cat==='内服薬');
  if(meds.length){ lines.push(`\n【内服薬タスク】`); meds.forEach(t=>lines.push(`  ・${t.text}`)); }
  if(p.labs&&p.labs.length){
    lines.push('\n【最新検査値】');
    const byName={};
    p.labs.forEach(lv=>{ if(!byName[lv.name]||lv.date>=byName[lv.name].date) byName[lv.name]=lv; });
    Object.entries(byName).forEach(([name,lv])=>{
      const flag=getFlag(name,lv.val);
      const ref=LAB_REF[name];
      const rng=ref?` (基準: ${ref.lo??'?'}-${ref.hi??'?'} ${ref.unit})`:'';
      lines.push(`  ${name}: ${lv.val}${lv.unit?' '+lv.unit:''}${rng}${flag?` [${flag}]`:''}`);
    });
  }
  if(p.ivLines&&p.ivLines.length){
    lines.push('\n【点滴・輸液詳細】');
    p.ivLines.forEach(iv=>{
      const parts=[iv.drug];
      if(iv.dose) parts.push(iv.dose);
      if(iv.rate) parts.push(`${iv.rate}mL/h`);
      if(iv.start) parts.push(`開始 ${iv.start}`);
      if(iv.end) parts.push(`終了予定 ${iv.end}`);
      lines.push(`  ・${parts.join('  ')}`);
    });
  }
  if(p.medications&&p.medications.length){
    lines.push('\n【内服薬詳細】');
    p.medications.forEach(med=>{
      const timing=[med.am&&'朝',med.noon&&'昼',med.pm&&'夕',med.bed&&'眠前'].filter(Boolean).join('・');
      lines.push(`  ・${med.drug}${med.dose?` ${med.dose}`:''}${timing?` (${timing})`:''}`);
    });
  }
  if(p.physicalFindings&&p.physicalFindings.trim()) lines.push(`\n【身体所見】\n${p.physicalFindings.trim()}`);
  if(p.subjective&&p.subjective.trim()) lines.push(`\n【S情報（患者の訴え）】\n${p.subjective.trim()}`);
  if(p.memo&&p.memo.trim()) lines.push(`\n【メモ】\n${p.memo.trim()}`);
  return lines.join('\n');
}

async function copySummary(){
  const p=selP(); if(!p) return;
  const text=buildSummaryText(p);
  try { await navigator.clipboard.writeText(text); }
  catch(e){ const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
  const el=document.getElementById('sum-copy-msg');
  if(el){ el.style.display='inline'; setTimeout(()=>{ el.style.display='none'; },2500); }
}

    <div style="background:#fff;border:1px solid var(--g200);border-radius:8px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)">
      <div style="font-size:11px;font-weight:700;color:#2980b9;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">身体所見</div>
      <textarea class="memo-area" id="physFindArea" placeholder="体温・血圧・脈拍・呼吸・SpO2・意識・胸腹部所見など…" oninput="savePhysicalFindings()" style="min-height:120px">${esc(p.physicalFindings||'')}</textarea>
    </div>
    <div style="background:#fff;border:1px solid var(--g200);border-radius:8px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)">
      <div style="font-size:11px;font-weight:700;color:#e67e22;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">S情報（患者の訴え）</div>
      <textarea class="memo-area" id="subjectiveArea" placeholder="患者・家族からの訴え、自覚症状など…" oninput="saveSubjective()" style="min-height:100px">${esc(p.subjective||'')}</textarea>
    </div>
    <div style="background:#fff;border:1px solid var(--g200);border-radius:8px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)">
      <div style="font-size:11px;font-weight:700;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">メモ</div>
      <textarea class="memo-area" id="memoArea" placeholder="自由にメモを入力…" oninput="saveMemo()">${esc(p.memo||'')}</textarea>
      <div style="margin-top:5px;font-size:11px;color:#bbb">入力と同時に自動保存されます</div>
    </div>
  </div>`;
}

load(); render();
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
