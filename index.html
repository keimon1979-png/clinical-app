<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e7490">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="臨床コンパス">
<title>臨床コンパス — タスク・検査・AI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩺</text></svg>">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary:#0e7490; --primary-l:#0891b2; --primary-d:#155e75;
  --accent:#7c3aed;
  --success:#059669; --warning:#d97706; --danger:#dc2626;
  --g50:#f8fafc; --g100:#f1f5f9; --g200:#e2e8f0; --g300:#cbd5e1;
  --g400:#94a3b8; --g500:#64748b; --g600:#475569; --g700:#334155; --g800:#1e293b;
}
body { font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','ヒラギノ角ゴ ProN','Meiryo',sans-serif; font-size:13px; background:var(--g100); color:var(--g800); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
.app-header { height:50px; background:linear-gradient(120deg,#0e7490,#155e75 55%,#164e63); color:#fff; display:flex; align-items:center; padding:0 14px; gap:8px; flex-shrink:0; box-shadow:0 2px 8px rgba(8,51,68,.35); }
.app-header h1 { font-size:15px; font-weight:800; letter-spacing:.02em; margin-right:6px; }
.hdr-clock { margin-left:auto; font-size:12px; opacity:.85; font-variant-numeric:tabular-nums; }
.hdr-reset { background:rgba(255,255,255,.13); border:1px solid rgba(255,255,255,.28); color:#fff; padding:4px 10px; border-radius:7px; cursor:pointer; font-size:11px; font-weight:600; transition:background .12s; }
.hdr-reset:hover { background:rgba(255,255,255,.28); }
.hdr-accent { background:linear-gradient(135deg,#8b5cf6,#7c3aed); border-color:rgba(255,255,255,.35); box-shadow:0 1px 6px rgba(0,0,0,.25); }
.hdr-accent:hover { background:linear-gradient(135deg,#a78bfa,#8b5cf6); }
/* ===== クイックメモFAB / 知識ライブラリ ===== */
#qmFab { position:fixed; right:18px; bottom:20px; width:54px; height:54px; border-radius:50%; border:none; background:linear-gradient(135deg,#f59e0b,#d97706); color:#fff; font-size:23px; cursor:pointer; box-shadow:0 6px 20px rgba(180,83,9,.45); z-index:150; transition:transform .12s; padding-bottom:env(safe-area-inset-bottom,0); }
#qmFab:hover { transform:scale(1.08); }
#qmFab:active { transform:scale(.95); }
.kb-row { display:flex; align-items:flex-start; gap:8px; padding:7px 6px; border-bottom:1px dashed var(--g200); }
.kb-tag { display:inline-block; font-size:9px; color:#5b21b6; background:#f5f3ff; border:1px solid #ddd6fe; border-radius:8px; padding:1px 7px; margin:1px 3px 1px 0; }
.kb-digest { background:var(--g50); border:1px solid var(--g200); border-radius:8px; padding:10px 13px; margin:4px 0 8px; max-height:340px; overflow-y:auto; }
.sync-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-left:5px; background:#94a3b8; vertical-align:middle; }
.sync-dot.ok { background:#34d399; box-shadow:0 0 5px #34d399; }
.sync-dot.pending { background:#fbbf24; }
.sync-dot.syncing { background:#38bdf8; animation:spin-pulse 1s ease infinite; }
.sync-dot.error { background:#f87171; box-shadow:0 0 5px #f87171; }
@keyframes spin-pulse { 50%{ opacity:.35; } }
.app-body { display:flex; flex:1; overflow:hidden; }
.sidebar { width:200px; background:linear-gradient(180deg,#0f172a,#1e293b); color:#fff; display:flex; flex-direction:column; flex-shrink:0; }
.sb-dash { margin:8px 8px 0; padding:9px 10px; background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.18); color:#fff; border-radius:8px; cursor:pointer; font-size:12px; font-weight:700; text-align:left; font-family:inherit; transition:background .12s; }
.sb-dash:hover { background:rgba(255,255,255,.2); }
.sb-head { padding:10px 11px; border-bottom:1px solid rgba(255,255,255,.12); display:flex; align-items:center; justify-content:space-between; }
.sb-head span { font-size:11px; font-weight:700; opacity:.6; letter-spacing:.07em; }
.btn-add-pt { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); color:#fff; padding:3px 9px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:600; }
.btn-add-pt:hover { background:rgba(255,255,255,.28); }
.pt-list { flex:1; overflow-y:auto; padding:6px; }
.pt-card { padding:8px 10px; border-radius:6px; cursor:pointer; margin-bottom:3px; border:1px solid transparent; transition:background .1s; }
.pt-card:hover { background:rgba(255,255,255,.1); }
.pt-card.active { background:rgba(255,255,255,.2); border-color:rgba(255,255,255,.3); }
.pt-name { font-weight:700; font-size:13px; margin-bottom:2px; }
.pt-meta { display:flex; align-items:center; justify-content:space-between; }
.pt-room { font-size:11px; opacity:.6; }
.task-badge { font-size:10px; background:var(--danger); color:#fff; padding:1px 5px; border-radius:10px; font-weight:700; }
.task-badge.all-done { background:var(--success); }
.task-badge.has-check { background:var(--warning); }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.pt-header { background:#fff; padding:9px 16px; border-bottom:1px solid var(--g200); display:flex; align-items:center; gap:8px; flex-shrink:0; min-height:46px; }
.pt-header h2 { font-size:16px; font-weight:700; color:var(--primary); }
.tag { padding:2px 7px; border-radius:3px; font-size:11px; }
.tag-room { background:var(--g100); border:1px solid var(--g300); color:var(--g600); }
.tag-diag { background:#e6f2fb; border:1px solid #b5d4ec; color:var(--primary); }
.header-actions { margin-left:auto; display:flex; gap:5px; }
.btn { padding:5px 11px; border-radius:4px; border:none; cursor:pointer; font-size:12px; font-weight:600; font-family:inherit; transition:all .12s; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-l); }
.btn-ghost { background:transparent; color:var(--g600); border:1px solid var(--g300); }
.btn-ghost:hover { background:var(--g100); }
.btn-sm { padding:3px 8px; font-size:11px; }
.tabs { background:#fff; border-bottom:2px solid var(--g200); display:flex; flex-shrink:0; }
.tab-btn { padding:9px 15px; border:none; background:none; cursor:pointer; font-size:12px; font-weight:600; color:var(--g600); border-bottom:2px solid transparent; margin-bottom:-2px; font-family:inherit; transition:color .1s; }
.tab-btn:hover { color:var(--primary); }
.tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
.tab-content { flex:1; overflow-y:auto; padding:14px 16px; }
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#bbb; gap:10px; font-size:14px; }
/* Tasks */
.tasks-summary { background:#fff; border:1px solid var(--g200); border-radius:6px; padding:10px 14px; margin-bottom:12px; display:flex; align-items:center; gap:14px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
.s-stat { text-align:center; }
.s-num { font-size:22px; font-weight:700; line-height:1; }
.s-lbl { font-size:10px; color:var(--g600); margin-top:2px; }
.n-done { color:var(--success); } .n-check { color:var(--warning); } .n-pend { color:var(--g500); }
.prog-bar { flex:1; }
.prog-info { display:flex; justify-content:space-between; font-size:11px; color:var(--g600); margin-bottom:4px; }
.prog-track { height:6px; background:var(--g200); border-radius:3px; overflow:hidden; }
.prog-fill { height:100%; background:var(--success); border-radius:3px; transition:width .4s; }
.cat-group { background:#fff; border:1px solid var(--g200); border-radius:8px; margin-bottom:9px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.05); }
.cat-hdr { display:flex; align-items:center; gap:9px; padding:9px 12px; cursor:pointer; background:var(--g50); user-select:none; }
.cat-hdr:hover { background:var(--g100); }
.cat-icon { width:24px; height:24px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; flex-shrink:0; }
.cat-title { font-weight:700; font-size:13px; flex:1; }
.cat-count { font-size:11px; color:var(--g600); white-space:nowrap; }
.cat-count.c-done { color:var(--success); font-weight:700; }
.cat-count.c-check { color:var(--warning); font-weight:700; }
.cat-arrow { font-size:9px; color:var(--g500); }
.cat-body { padding:8px 12px 10px; border-top:1px solid var(--g200); }
.task-item { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:5px; margin-bottom:3px; border:1px solid var(--g200); transition:background .1s; }
.task-item:hover { background:var(--g50); }
.task-item.s-done { opacity:.6; }
.task-item.s-check { background:#fffbf0; border-color:#fde68a; }
.status-btn { min-width:90px; padding:3px 7px; border-radius:4px; border:1px solid var(--g300); cursor:pointer; font-size:11px; font-weight:700; font-family:inherit; text-align:center; white-space:nowrap; flex-shrink:0; background:var(--g100); color:var(--g600); transition:all .1s; }
.task-item.s-done .status-btn { background:#dcfce7; color:#15803d; border-color:#86efac; }
.task-item.s-check .status-btn { background:#fef3c7; color:#b45309; border-color:#fcd34d; }
.task-text { flex:1; font-size:12px; }
.s-done .task-text { text-decoration:line-through; color:var(--g500); }
.task-del { background:none; border:none; cursor:pointer; color:var(--g400); font-size:14px; padding:0 2px; flex-shrink:0; }
.task-del:hover { color:var(--danger); }
.add-inline { display:flex; gap:6px; align-items:center; margin-top:8px; padding-top:8px; border-top:1px dashed var(--g300); }
.add-inline input { flex:1; padding:5px 8px; border:1px solid var(--g300); border-radius:4px; font-size:12px; font-family:inherit; }
.add-inline input:focus { outline:none; border-color:var(--primary-l); }
.tmpl-btn { font-size:11px; color:var(--primary); background:none; border:1px dashed var(--primary-l); border-radius:4px; padding:4px 8px; cursor:pointer; font-family:inherit; white-space:nowrap; }
.tmpl-btn:hover { background:#e6f2fb; }
.cat-empty { color:#bbb; font-size:12px; padding:4px 0; }
/* Lab sub-nav */
.lab-subnav { display:flex; gap:3px; margin-bottom:12px; background:#fff; border:1px solid var(--g200); border-radius:6px; padding:4px; }
.lsn-btn { flex:1; padding:5px 6px; border:none; border-radius:4px; background:none; cursor:pointer; font-size:11px; font-weight:600; color:var(--g600); font-family:inherit; text-align:center; white-space:nowrap; transition:all .1s; }
.lsn-btn.active { background:var(--primary); color:#fff; }
.lsn-btn:hover:not(.active) { background:var(--g100); }
/* Lab cards */
.critical-alert { background:#fef2f2; border:2px solid var(--danger); border-radius:6px; padding:8px 13px; margin-bottom:12px; display:flex; align-items:center; gap:8px; animation:cpulse 2s infinite; }
@keyframes cpulse { 0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.3)} 50%{box-shadow:0 0 0 5px rgba(220,38,38,0)} }
.c-lbl { font-weight:700; color:var(--danger); white-space:nowrap; }
.c-body { color:var(--danger); font-size:12px; }
.lab-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:8px; margin-bottom:14px; }
.lab-card { background:var(--g50); border:1px solid var(--g200); border-radius:6px; padding:8px 10px; position:relative; }
.lab-card.fH  { background:#fff5f5; border-color:#fca5a5; }
.lab-card.fL  { background:#eff6ff; border-color:#93c5fd; }
.lab-card.fHH { background:#fef2f2; border-color:var(--danger); box-shadow:0 0 0 2px rgba(220,38,38,.15); }
.lab-card.fLL { background:#eff6ff; border-color:#1d4ed8; box-shadow:0 0 0 2px rgba(29,78,216,.15); }
.lc-name { font-size:11px; font-weight:700; color:var(--g600); margin-bottom:2px; }
.lc-val { font-size:20px; font-weight:700; color:var(--g800); }
.lab-card.fH .lc-val,.lab-card.fHH .lc-val { color:var(--danger); }
.lab-card.fL .lc-val,.lab-card.fLL .lc-val { color:#1d4ed8; }
.lc-unit { font-size:11px; color:var(--g600); margin-left:3px; }
.lc-flag { position:absolute; top:6px; right:6px; font-size:10px; font-weight:800; padding:1px 4px; border-radius:3px; }
.fH  .lc-flag { background:#fca5a5; color:var(--danger); }
.fL  .lc-flag { background:#93c5fd; color:#1d4ed8; }
.fHH .lc-flag { background:var(--danger); color:#fff; }
.fLL .lc-flag { background:#1d4ed8; color:#fff; }
.lc-range { font-size:10px; color:var(--g400); margin-top:2px; }
.lc-ts { font-size:10px; color:var(--g400); margin-top:2px; }
.lc-del { position:absolute; bottom:4px; right:5px; background:none; border:none; cursor:pointer; color:var(--g400); font-size:12px; }
.lc-del:hover { color:var(--danger); }
/* Lab add form */
.lab-add { background:#fff; border:1px solid var(--g200); border-radius:6px; padding:11px 12px; }
.lab-add-title { font-size:11px; font-weight:700; color:#888; margin-bottom:9px; }
.lab-form-row { display:flex; gap:7px; align-items:center; flex-wrap:wrap; }
.lab-form-row select,.lab-form-row input { padding:5px 7px; border:1px solid var(--g300); border-radius:4px; font-size:12px; font-family:inherit; background:#fff; }
.lab-form-row select:focus,.lab-form-row input:focus { outline:none; border-color:var(--primary-l); }
.unit-hint { font-size:11px; color:var(--g600); }
/* Lab table */
.lab-matrix-wrap { overflow-x:auto; }
.lab-matrix { border-collapse:collapse; width:100%; font-size:12px; white-space:nowrap; }
.lab-matrix th { background:var(--g50); border:1px solid var(--g200); padding:6px 10px; font-weight:700; font-size:11px; text-align:center; }
.lab-matrix th.name-th { text-align:left; min-width:120px; }
.lab-matrix td { border:1px solid var(--g200); padding:5px 9px; text-align:center; }
.lab-matrix td.name-td { text-align:left; font-weight:600; }
.lab-matrix td.name-td .lm-unit { font-size:10px; color:var(--g500); font-weight:400; margin-left:3px; }
.lab-matrix td.name-td .lm-range { font-size:10px; color:var(--g400); display:block; font-weight:400; }
.lab-matrix td.empty-td { color:var(--g400); }
.lab-matrix td.cH  { background:#fff5f5; color:var(--danger); font-weight:700; }
.lab-matrix td.cL  { background:#eff6ff; color:#1d4ed8; font-weight:700; }
.lab-matrix td.cHH { background:var(--danger); color:#fff; font-weight:700; }
.lab-matrix td.cLL { background:#1d4ed8; color:#fff; font-weight:700; }
.flag-sup { font-size:9px; font-weight:800; vertical-align:super; margin-left:1px; }
/* Chart */
.chart-panel { display:flex; gap:12px; align-items:flex-start; }
.chart-items-col { width:130px; flex-shrink:0; background:#fff; border:1px solid var(--g200); border-radius:6px; padding:10px; }
.chart-items-col h4 { font-size:11px; font-weight:700; color:var(--g600); margin-bottom:8px; }
.chart-item-label { display:flex; align-items:center; gap:5px; padding:3px 0; cursor:pointer; font-size:12px; }
.chart-item-label input { cursor:pointer; }
.chart-main { flex:1; min-width:0; }
.chart-wrap { background:#fff; border:1px solid var(--g200); border-radius:6px; padding:10px 12px; margin-bottom:10px; }
.chart-item-title { font-size:12px; font-weight:700; color:var(--g700); margin-bottom:6px; }
.chart-item-title .ct-unit { font-weight:400; color:var(--g600); }
.chart-item-title .ct-range { font-size:11px; font-weight:400; color:var(--g500); margin-left:8px; }
/* Import */
.import-panel { max-width:680px; }
.import-mode-toggle { display:flex; gap:0; margin-bottom:14px; border:1px solid var(--g300); border-radius:5px; overflow:hidden; width:fit-content; }
.imt-btn { padding:5px 16px; border:none; background:var(--g50); cursor:pointer; font-size:12px; font-weight:600; color:var(--g600); font-family:inherit; transition:all .1s; }
.imt-btn.active { background:var(--primary); color:#fff; }
.import-prompt-box { background:#f5f3ff; border:1px solid #c4b5fd; border-radius:6px; padding:12px 14px; margin-bottom:14px; }
.import-prompt-title { font-size:12px; font-weight:700; color:#5b21b6; margin-bottom:6px; }
.import-prompt-code { font-size:11px; font-family:monospace; color:#4c1d95; line-height:1.7; white-space:pre-wrap; }
.import-json-area { width:100%; height:160px; border:1px solid var(--g300); border-radius:5px; padding:9px; font-size:12px; font-family:monospace; resize:vertical; }
.import-json-area:focus { outline:none; border-color:var(--primary-l); }
.import-preview { background:var(--g50); border:1px solid var(--g200); border-radius:6px; padding:10px 12px; margin-top:10px; font-size:12px; }
.import-preview-row { display:flex; align-items:center; gap:8px; padding:3px 0; }
.import-ok { color:var(--success); font-weight:700; }
.import-warn { color:var(--warning); font-weight:700; }
.import-err { color:var(--danger); }
/* Date-based view */
.date-pills { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:14px; }
.date-pill { padding:4px 11px; border-radius:14px; border:1px solid var(--g300); background:#fff; cursor:pointer; font-size:12px; font-weight:600; color:var(--g600); transition:all .1s; }
.date-pill:hover { border-color:var(--primary-l); color:var(--primary); }
.date-pill.active { background:var(--primary); border-color:var(--primary); color:#fff; }
/* Memo */
.memo-area { width:100%; min-height:200px; border:1px solid var(--g300); border-radius:5px; padding:9px; font-size:13px; font-family:inherit; resize:vertical; line-height:1.7; }
.memo-area:focus { outline:none; border-color:var(--primary-l); box-shadow:0 0 0 3px rgba(41,128,185,.1); }
/* AI */
.ai-settings-card { background:#fff; border:1px solid var(--g200); border-radius:8px; padding:12px 14px; margin-bottom:12px; }
.ai-s-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.ai-s-title { font-size:12px; font-weight:700; color:var(--g600); }
.ai-key-row { display:flex; gap:7px; }
.ai-key-row input { flex:1; padding:6px 9px; border:1px solid var(--g300); border-radius:4px; font-size:12px; font-family:monospace; }
.ai-key-row input:focus { outline:none; border-color:var(--primary-l); }
.ai-ctx { background:var(--g50); border:1px solid var(--g200); border-radius:6px; padding:10px 12px; margin-bottom:12px; font-size:11px; line-height:1.6; white-space:pre-wrap; max-height:180px; overflow-y:auto; color:var(--g700); font-family:monospace; }
.ai-run-btn { background:#7c3aed; color:#fff; border:none; border-radius:6px; padding:9px 20px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; width:100%; margin-bottom:12px; transition:background .15s; }
.ai-run-btn:hover { background:#6d28d9; }
.ai-run-btn:disabled { background:var(--g400); cursor:not-allowed; }
.ai-loading { text-align:center; padding:20px; color:var(--g600); font-size:13px; }
.ai-result { background:#fff; border:1px solid #c4b5fd; border-radius:8px; padding:14px 16px; line-height:1.8; font-size:13px; }
.ai-sec { margin-bottom:12px; }
.ai-sec-title { font-weight:700; color:#5b21b6; font-size:13px; margin-bottom:4px; border-left:3px solid #7c3aed; padding-left:8px; }
.ai-sec-body { font-size:12px; line-height:1.7; color:var(--g700); padding-left:11px; }
.ai-note { font-size:11px; color:#aaa; margin-top:8px; border-top:1px solid var(--g200); padding-top:6px; }
/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; z-index:200; }
.modal { background:#fff; border-radius:10px; padding:0; width:540px; max-width:96vw; box-shadow:0 20px 60px rgba(0,0,0,.3); display:flex; flex-direction:column; max-height:90vh; }
.modal-head { display:flex; align-items:center; justify-content:space-between; padding:16px 20px 12px; border-bottom:1px solid var(--g200); flex-shrink:0; }
.modal-title { font-size:14px; font-weight:700; }
.modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--g600); }
.modal-body { overflow-y:auto; padding:14px 20px; flex:1; }
.modal-foot { display:flex; gap:7px; justify-content:flex-end; padding:12px 20px; border-top:1px solid var(--g200); flex-shrink:0; }
.form-group { margin-bottom:10px; }
.form-group label { display:block; font-size:11px; font-weight:700; color:var(--g600); margin-bottom:3px; }
.form-group input,.form-group select,.form-group textarea { width:100%; padding:7px 9px; border:1px solid var(--g300); border-radius:4px; font-size:13px; font-family:inherit; background:#fff; }
.form-group input:focus,.form-group select:focus,.form-group textarea:focus { outline:none; border-color:var(--primary-l); }
.form-group textarea { resize:vertical; min-height:56px; line-height:1.6; }
.form-group .calc-hint { font-size:12px; color:var(--primary); font-weight:700; margin-left:6px; }
.form-row { display:flex; gap:8px; }
.form-row .form-group { flex:1; }
.modal-section-divider { height:1px; background:var(--g200); margin:12px 0 14px; }
.modal-section-label { font-size:10px; font-weight:700; color:var(--g500); letter-spacing:.08em; margin-bottom:10px; text-transform:uppercase; }
/* Summary tab */
.summary-copy-bar { display:flex; align-items:center; justify-content:flex-end; gap:8px; margin-bottom:10px; }
.summary-box { background:#fff; border:1px solid var(--g200); border-radius:8px; padding:16px 18px; font-size:12px; line-height:1.9; white-space:pre-wrap; font-family:monospace; color:var(--g800); }
.summary-section { margin-bottom:14px; }
.summary-section-title { font-size:11px; font-weight:700; color:var(--primary); border-bottom:1px solid var(--g200); padding-bottom:4px; margin-bottom:6px; letter-spacing:.05em; }
.summary-row { display:flex; gap:8px; }
.summary-key { color:var(--g500); font-size:11px; min-width:80px; flex-shrink:0; }
.summary-val { font-size:12px; color:var(--g800); }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--g300); border-radius:3px; }
/* IV Lines */
.iv-section { margin:8px 0 4px; border-top:1px dashed var(--g300); padding-top:10px; }
.iv-section-title { font-size:10px; font-weight:700; color:#8e44ad; letter-spacing:.06em; text-transform:uppercase; margin-bottom:7px; }
.iv-table { width:100%; border-collapse:collapse; font-size:11px; margin-bottom:8px; }
.iv-table th { background:var(--g50); border:1px solid var(--g200); padding:4px 7px; font-size:10px; font-weight:700; color:var(--g600); text-align:left; white-space:nowrap; }
.iv-table td { border:1px solid var(--g200); padding:4px 7px; }
.iv-form-row { display:flex; gap:5px; align-items:center; flex-wrap:wrap; margin-top:6px; }
.iv-form-row input { padding:4px 7px; border:1px solid var(--g300); border-radius:4px; font-size:11px; font-family:inherit; }
.iv-form-row input:focus { outline:none; border-color:var(--primary-l); }
/* Sidebar hospital filter */
.sb-filter { padding:4px 6px 3px; }
.sbf-pills { display:flex; flex-wrap:wrap; gap:3px; padding-bottom:4px; }
.sbf-pill { font-size:10px; padding:2px 8px; border:1px solid rgba(255,255,255,.22); background:rgba(255,255,255,.1); color:rgba(255,255,255,.72); border-radius:10px; cursor:pointer; font-family:inherit; white-space:nowrap; max-width:150px; overflow:hidden; text-overflow:ellipsis; transition:background .1s; }
.sbf-pill:hover { background:rgba(255,255,255,.2); color:#fff; }
.sbf-pill.active { background:rgba(255,255,255,.28); color:#fff; font-weight:700; border-color:rgba(255,255,255,.5); }
.sbf-pill.arch { border-color:rgba(255,200,80,.35); color:rgba(255,210,100,.8); }
.sbf-pill.arch.active { background:rgba(255,200,80,.18); color:rgb(255,220,100); }
/* CQ */
.cq-card { background:#fff; border:1px solid var(--g200); border-radius:8px; padding:12px 14px; margin-bottom:9px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
.cq-q { font-size:13px; font-weight:700; color:var(--g800); margin-bottom:8px; line-height:1.5; }
.cq-section { margin-bottom:6px; }
.cq-label { font-size:10px; font-weight:700; color:var(--g500); text-transform:uppercase; letter-spacing:.05em; display:block; margin-bottom:2px; }
.cq-body { font-size:12px; color:var(--g700); line-height:1.6; padding-left:8px; }
.cq-ref { color:var(--primary); font-style:italic; }
.cq-sv { background:#f0fdf4; border-left:3px solid #86efac; padding:4px 8px; border-radius:0 4px 4px 0; color:#15803d; }
.cq-tag { font-size:10px; background:#e6f2fb; border:1px solid #b5d4ec; color:var(--primary); padding:1px 6px; border-radius:10px; font-weight:600; }
/* Reports */
.report-card { background:#fff; border:1px solid var(--g200); border-radius:8px; padding:12px 14px; margin-bottom:9px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
.report-img { max-width:100%; max-height:200px; border-radius:4px; cursor:pointer; border:1px solid var(--g200); display:block; margin:6px 0; transition:max-height .2s; }
.report-cat { font-size:10px; font-weight:700; padding:2px 7px; border-radius:3px; }
.rcat-CT,.rcat-ct { background:#e6f2fb; color:var(--primary); }
.rcat-MRI,.rcat-mri { background:#fff7ed; color:#ea580c; }
.rcat-X線,.rcat-xray { background:#f0fdf4; color:#16a34a; }
.rcat-心エコー,.rcat-超音波,.rcat-echo { background:#f5f3ff; color:#7c3aed; }
.rcat-other { background:var(--g100); color:var(--g600); }
/* Echo */
.echo-card { background:#fff; border:1px solid var(--g200); border-radius:8px; padding:12px 14px; margin-bottom:9px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
.echo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:6px; margin-bottom:8px; }
.echo-val { background:var(--g50); border:1px solid var(--g200); border-radius:5px; padding:5px 8px; }
.echo-val-name { font-size:10px; color:var(--g500); font-weight:700; }
.echo-val-num { font-size:15px; font-weight:700; color:var(--g800); }
.interp-row { display:flex; align-items:flex-start; gap:8px; padding:5px 8px; border-radius:5px; margin-bottom:3px; font-size:12px; }
.interp-ok { background:#f0fdf4; border:1px solid #bbf7d0; }
.interp-warn { background:#fffbeb; border:1px solid #fde68a; }
.interp-crit { background:#fef2f2; border:1px solid #fecaca; }
.interp-neutral { background:var(--g50); border:1px solid var(--g200); }
.interp-lbl { font-weight:700; min-width:90px; flex-shrink:0; }
.interp-ok .interp-lbl { color:#15803d; }
.interp-warn .interp-lbl { color:#b45309; }
.interp-crit .interp-lbl { color:var(--danger); }
.interp-neutral .interp-lbl { color:var(--g600); }
/* ===== 問診・身体所見タブ ===== */
.sx-card { background:#fff; border:1px solid var(--g200); border-radius:8px; padding:14px; margin-bottom:12px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
.sx-card-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; }
.sx-grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; }
.sx-item { display:flex; align-items:center; gap:6px; padding:5px 7px; border-radius:5px; cursor:pointer; border:1px solid transparent; user-select:none; font-size:12px; color:var(--g700); transition:background .1s; }
.sx-item:hover { background:var(--g50); }
.sx-item.sx-checked { background:#fff1f2; border-color:#fca5a5; color:#b91c1c; font-weight:600; }
.sx-cb { width:14px; height:14px; border:2px solid var(--g300); border-radius:3px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:9px; color:#fff; transition:background .1s; }
.sx-item.sx-checked .sx-cb, .sx-check-row.sx-checked .sx-cb { background:#ef4444; border-color:#ef4444; }
.sx-acc { border:1px solid var(--g200); border-radius:6px; margin-bottom:6px; overflow:hidden; }
.sx-acc-hd { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:var(--g50); cursor:pointer; font-size:12px; font-weight:700; color:var(--g700); user-select:none; }
.sx-acc-hd:hover { background:var(--g100); }
.sx-acc-bd { padding:8px 10px; display:none; }
.sx-acc-bd.open { display:block; }
.sx-check-row { display:flex; align-items:center; gap:7px; padding:5px 6px; border-radius:4px; cursor:pointer; border:1px solid transparent; user-select:none; margin-bottom:2px; }
.sx-check-row:hover { background:var(--g50); }
.sx-check-row.sx-checked { background:#fff1f2; border-color:#fca5a5; }
.sx-row-label { font-size:12px; color:var(--g700); flex:1; min-width:0; }
.sx-check-row.sx-checked .sx-row-label { color:#b91c1c; font-weight:600; }
.sx-memo-inp { font-size:11px; padding:2px 7px; border:1px solid var(--g300); border-radius:3px; width:130px; font-family:inherit; background:#fff; flex-shrink:0; }
.sx-paste-area { width:100%; height:90px; padding:7px 9px; border:1px solid var(--g300); border-radius:4px; font-size:12px; font-family:inherit; resize:vertical; margin-bottom:7px; }

/* ===== 全体的なポリッシュ ===== */
.btn { border-radius:7px; }
.tab-btn.active { font-weight:700; background:linear-gradient(180deg,transparent 60%,rgba(14,116,144,.08)); }
.pt-header h2 { color:var(--primary-d); }

/* ===== トースト ===== */
#toast { position:fixed; bottom:24px; left:50%; transform:translate(-50%,16px); background:#1e293b; color:#fff; padding:11px 20px; border-radius:10px; font-size:13px; font-weight:600; box-shadow:0 8px 30px rgba(0,0,0,.35); opacity:0; pointer-events:none; transition:all .25s; z-index:500; max-width:85vw; }
#toast.show { opacity:1; transform:translate(-50%,0); }

/* ===== スマート取込モーダル ===== */
#smartBody { display:flex; flex-direction:column; min-height:0; flex:1; }
.smart-textarea { width:100%; height:150px; padding:10px 12px; border:1.5px solid #c4b5fd; border-radius:9px; font-size:12px; font-family:inherit; resize:vertical; background:#faf5ff; }
.smart-textarea:focus { outline:none; border-color:#8b5cf6; background:#fff; }
.smart-imgzone { position:relative; margin-top:9px; border:1.5px dashed var(--g300); border-radius:9px; padding:14px; text-align:center; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:5px; transition:border-color .15s,background .15s; }
.smart-imgzone:hover { border-color:#8b5cf6; background:#faf5ff; }
.smart-thumbs { display:flex; flex-wrap:wrap; gap:8px; margin-top:9px; }
.smart-thumb { position:relative; width:104px; height:104px; border:1px solid var(--g200); border-radius:8px; overflow:hidden; background:var(--g50); }
.smart-thumb img { width:100%; height:100%; object-fit:cover; }
.smart-thumb-del { position:absolute; top:3px; right:3px; width:20px; height:20px; border-radius:50%; border:none; background:rgba(15,23,42,.65); color:#fff; font-size:12px; font-weight:700; cursor:pointer; line-height:1; display:flex; align-items:center; justify-content:center; }
.smart-thumb-del:hover { background:#dc2626; }
.smart-spinner { width:38px; height:38px; border:4px solid #ede9fe; border-top-color:#7c3aed; border-radius:50%; margin:0 auto; animation:spin 0.9s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.smart-mini { background:var(--g100); border:1px solid var(--g300); color:var(--g600); font-size:10px; padding:3px 8px; border-radius:6px; cursor:pointer; font-family:inherit; font-weight:600; white-space:nowrap; }
.smart-mini:hover { background:var(--g200); }
.smart-mini.rec { background:#dc2626; border-color:#dc2626; color:#fff; animation:spin-pulse 1.2s ease infinite; }
.smart-sec { background:var(--g50); border:1px solid var(--g200); border-radius:9px; padding:9px 11px; margin-bottom:9px; }
.smart-sec-head { display:flex; align-items:center; font-size:12px; font-weight:700; color:var(--g700); margin-bottom:6px; }
.smart-row { display:flex; align-items:center; gap:8px; padding:5px 6px; border-radius:6px; cursor:pointer; font-size:12px; }
.smart-row:hover { background:#fff; }
.smart-lbl { flex-shrink:0; font-size:10px; font-weight:700; color:var(--g500); background:var(--g200); border-radius:4px; padding:2px 6px; }
.smart-val { color:var(--g800); word-break:break-all; }
.smart-note { font-size:9px; color:var(--warning); background:#fffbeb; border:1px solid #fde68a; border-radius:4px; padding:1px 5px; white-space:nowrap; }
.smart-chk { flex-shrink:0; width:17px; height:17px; border:1.5px solid var(--g300); border-radius:5px; background:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:#fff; cursor:pointer; }
.smart-chk.on { background:#7c3aed; border-color:#7c3aed; }
.smart-lab-grid { display:flex; flex-wrap:wrap; gap:5px; }
.smart-labchip { display:inline-flex; align-items:center; gap:5px; font-size:11px; background:#fff; border:1px solid var(--g200); border-radius:7px; padding:4px 8px; cursor:pointer; }
.smart-labchip.abn { border-color:#fcd34d; background:#fffbeb; }
.smart-labchip.crit { border-color:#fca5a5; background:#fef2f2; }
.smart-flag { font-size:9px; font-weight:800; color:#dc2626; }

/* ===== AIタブ ===== */
.ai-mode-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.ai-mode-chip { padding:7px 13px; border-radius:20px; border:1px solid var(--g300); background:#fff; color:var(--g600); font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; transition:all .12s; }
.ai-mode-chip:hover { border-color:var(--primary); color:var(--primary); }
.ai-mode-chip.active { color:#fff; box-shadow:0 2px 8px rgba(0,0,0,.18); }
.ai-mode-desc { display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:#fff; border:1px solid var(--g200); border-radius:8px; padding:9px 12px; margin-bottom:9px; font-size:13px; color:var(--g800); }
.ai-stream { background:#fff; border:1px solid var(--g200); border-radius:9px; padding:13px 15px; margin-top:10px; font-size:12px; line-height:1.85; white-space:pre-wrap; color:var(--g800); max-height:420px; overflow-y:auto; }
.ai-md .md-l { white-space:pre-wrap; line-height:1.8; font-size:12px; }
.ai-md .md-h { font-weight:800; font-size:12.5px; margin:7px 0 3px; color:var(--g800); }
.ai-md .md-sp { height:8px; }
.ai-md code { background:var(--g100); border:1px solid var(--g200); border-radius:4px; padding:0 4px; font-size:11px; }
.ai-md-tbl { border-collapse:collapse; margin:7px 0; font-size:11.5px; background:#fff; width:100%; }
.ai-md-tbl th { background:var(--g100); font-weight:700; text-align:left; }
.ai-md-tbl th,.ai-md-tbl td { border:1px solid var(--g300); padding:4px 8px; }
.ai-chat-card { background:#fff; border:1px solid var(--g200); border-radius:10px; padding:12px 14px; margin-top:12px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
.chat-msgs { max-height:340px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; margin-bottom:9px; padding:4px 2px; }
.chat-bub { max-width:88%; border-radius:11px; padding:8px 12px; font-size:12px; line-height:1.7; }
.chat-bub.user { align-self:flex-end; background:linear-gradient(135deg,#0e7490,#155e75); color:#fff; }
.chat-bub.user .chat-txt { white-space:pre-wrap; }
.chat-bub.asst { align-self:flex-start; background:var(--g50); border:1px solid var(--g200); color:var(--g800); }
.chat-ts { font-size:9px; opacity:.6; margin-top:3px; text-align:right; }
.chat-input-row { display:flex; gap:7px; }
.chat-input-row textarea { flex:1; padding:8px 11px; border:1px solid var(--g300); border-radius:9px; font-size:12px; font-family:inherit; resize:none; line-height:1.5; }
.chat-input-row textarea:focus { outline:none; border-color:var(--primary); }
.ai-hist-card { background:#fff; border:1px solid var(--g200); border-radius:10px; padding:12px 14px; margin-top:12px; }
.ai-hist-item { border:1px solid var(--g200); border-radius:8px; margin-bottom:5px; overflow:hidden; }
.ai-hist-head { display:flex; align-items:center; gap:9px; padding:7px 11px; font-size:11px; cursor:pointer; background:var(--g50); }
.ai-hist-head:hover { background:var(--g100); }
.ai-hist-body { padding:10px 12px; border-top:1px solid var(--g200); }

/* ===== AIタスク提案 ===== */
.tsg-card { background:#f5f3ff; border:1px solid #ddd6fe; border-radius:9px; padding:11px 13px; margin-bottom:12px; }
.tsg-row { display:flex; align-items:flex-start; gap:8px; padding:6px 7px; border-radius:7px; cursor:pointer; background:#fff; border:1px solid #ede9fe; margin-bottom:4px; }
.tsg-row:hover { border-color:#c4b5fd; }
.tsg-prio { flex-shrink:0; font-size:10px; font-weight:800; border-radius:4px; padding:2px 6px; }
.tsg-prio.p-h { background:#fef2f2; color:#dc2626; border:1px solid #fca5a5; }
.tsg-prio.p-m { background:#fffbeb; color:#d97706; border:1px solid #fde68a; }
.tsg-prio.p-l { background:#f0fdf4; color:#059669; border:1px solid #a7f3d0; }
.tsg-cat { flex-shrink:0; font-size:10px; color:var(--g500); background:var(--g100); border-radius:4px; padding:2px 6px; }

/* ===== ダッシュボード ===== */
.dash-wrap { padding:16px 20px; overflow-y:auto; height:100%; }
.dash-welcome { max-width:520px; margin:60px auto; text-align:center; background:#fff; border:1px solid var(--g200); border-radius:14px; padding:36px 30px; box-shadow:0 4px 20px rgba(0,0,0,.05); }
.dash-header { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:13px; }
.dash-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:9px; margin-bottom:15px; }
.dash-stat { background:#fff; border:1px solid var(--g200); border-radius:9px; padding:10px 12px; text-align:center; box-shadow:0 1px 3px rgba(0,0,0,.04); }
.ds-num { font-size:24px; font-weight:800; line-height:1.1; font-variant-numeric:tabular-nums; }
.ds-lbl { font-size:10px; color:var(--g500); font-weight:700; margin-top:3px; }
.dash-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:11px; }
.dash-card { background:#fff; border:1px solid var(--g200); border-radius:11px; padding:12px 14px; cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.05); transition:transform .1s, box-shadow .12s; }
.dash-card:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,.1); border-color:var(--primary-l); }
.dash-card.prio-high { border-left:4px solid #dc2626; }
.dc-head { display:flex; align-items:center; gap:7px; margin-bottom:2px; }
.dc-name { font-size:14px; font-weight:800; color:var(--g800); }
.dc-prio { font-size:9px; font-weight:800; border-radius:4px; padding:1px 6px; }
.dc-prio.p-h { background:#fef2f2; color:#dc2626; border:1px solid #fca5a5; }
.dc-prio.p-m { background:#fffbeb; color:#d97706; border:1px solid #fde68a; }
.dc-prio.p-l { background:#f0fdf4; color:#059669; border:1px solid #a7f3d0; }
.dc-room { margin-left:auto; font-size:10px; color:var(--g400); }
.dc-diag { font-size:11px; color:var(--g500); margin-bottom:7px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.dc-prog { height:5px; background:var(--g100); border-radius:3px; overflow:hidden; margin-bottom:7px; }
.dc-prog-fill { height:100%; background:linear-gradient(90deg,#0891b2,#059669); border-radius:3px; }
.dc-counts { display:flex; gap:5px; margin-bottom:7px; flex-wrap:wrap; }
.dc-cnt { font-size:10px; font-weight:700; border-radius:5px; padding:2px 7px; background:var(--g100); color:var(--g400); }
.dc-cnt.pend { background:#fef2f2; color:#dc2626; }
.dc-cnt.chk { background:#fffbeb; color:#d97706; }
.dc-cnt.done { background:#f0fdf4; color:#059669; }
.dc-alert { font-size:10.5px; border-radius:6px; padding:4px 8px; margin-top:4px; line-height:1.5; }
.dc-alert.crit { background:#fef2f2; color:#b91c1c; border:1px solid #fecaca; font-weight:700; }
.dc-alert.abn { background:#fffbeb; color:#92400e; border:1px solid #fde68a; }
.dc-alert.iv { background:#f5f3ff; color:#6d28d9; border:1px solid #ddd6fe; }
.dc-alert.mustdo { background:#eff6ff; color:#1e40af; border:1px solid #bfdbfe; }
.dc-alert.ho { background:#fff7ed; color:#9a3412; border:1px solid #fed7aa; }
.dash-tip { margin-top:16px; background:#fff; border:1px dashed var(--g300); border-radius:9px; padding:11px 14px; font-size:11.5px; color:var(--g500); line-height:1.8; }

/* ===== v3: タブ ===== */
.tabs { padding:4px 8px 0; gap:2px; }
.tab-btn { display:inline-flex; align-items:center; gap:5px; border-radius:9px 9px 0 0; padding:8px 12px; }
.tab-ic { font-size:13px; }

/* ===== v3: セクションカード ===== */
.sec-card { background:#fff; border:1px solid var(--g200); border-radius:11px; padding:13px 15px; margin-bottom:12px; box-shadow:0 1px 3px rgba(15,23,42,.05); }
.sec-head { display:flex; align-items:center; justify-content:space-between; gap:8px; font-size:13px; font-weight:800; color:var(--g800); margin-bottom:9px; flex-wrap:wrap; }
.sec-cnt { font-size:10px; font-weight:700; color:var(--g500); background:var(--g100); border-radius:9px; padding:2px 8px; margin-left:4px; }

/* ===== v3: 本日の投与チェック ===== */
.tm-row { display:flex; align-items:center; gap:9px; padding:6px 4px; border-bottom:1px dashed var(--g200); flex-wrap:wrap; }
.tm-row:last-child { border-bottom:none; }
.tm-type { flex-shrink:0; font-size:9px; font-weight:800; border-radius:4px; padding:2px 6px; }
.tm-type.po { background:#fff7ed; color:#c2410c; border:1px solid #fed7aa; }
.tm-type.iv { background:#f5f3ff; color:#6d28d9; border:1px solid #ddd6fe; }
.tm-drug { font-size:12.5px; font-weight:700; color:var(--g800); min-width:120px; flex:1; }
.tm-chips { display:flex; gap:5px; flex-wrap:wrap; }
.tm-chip { border:1.5px solid var(--g300); background:#fff; color:var(--g600); font-size:11px; font-weight:700; border-radius:16px; padding:4px 11px; cursor:pointer; font-family:inherit; transition:all .12s; }
.tm-chip:hover { border-color:#059669; color:#059669; }
.tm-chip.on { background:#059669; border-color:#059669; color:#fff; }

/* ===== v3: 週間カレンダー ===== */
.cal-tbl { border-collapse:collapse; width:100%; font-size:11px; background:#fff; }
.cal-tbl th { background:var(--g100); border:1px solid var(--g200); padding:5px 4px; font-size:10px; color:var(--g600); text-align:center; min-width:64px; }
.cal-tbl th.cal-wkend { color:#dc2626; }
.cal-tbl td { border:1px solid var(--g200); padding:4px; text-align:center; vertical-align:middle; }
.cal-drug-th { min-width:170px !important; text-align:left !important; }
.cal-drug { text-align:left !important; font-size:11px; line-height:1.5; min-width:170px; }
.cal-acts { display:flex; gap:4px; margin-top:3px; }
.cal-chip { display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; margin:1px; border-radius:50%; border:1.5px solid var(--g300); background:#fff; color:var(--g500); font-size:10px; font-weight:800; cursor:pointer; user-select:none; transition:all .1s; }
.cal-chip:hover { border-color:#059669; color:#059669; transform:scale(1.12); }
.cal-chip.on { background:#059669; border-color:#059669; color:#fff; }
.cal-chip.fut { opacity:.45; }
.cal-tbl td.cal-today, .cal-tbl th.cal-today { background:#ecfeff; box-shadow:inset 0 0 0 1.5px #06b6d4; }
.cal-tbl td.cal-off { background:repeating-linear-gradient(45deg,var(--g50),var(--g50) 4px,#fff 4px,#fff 8px); }

/* ===== v3: 投与計画フォーム ===== */
.mp-form { background:var(--g50); border:1px solid var(--g200); border-radius:9px; padding:10px 12px; margin-bottom:8px; }
.mp-form-row { display:flex; gap:7px; align-items:center; flex-wrap:wrap; margin-bottom:7px; }
.mp-form-row:last-child { margin-bottom:0; }
.mp-form input[type=text], .mp-form input[type=date], .mp-form select,
.mp-form-row input[type=text], .mp-form-row select { padding:6px 9px; border:1px solid var(--g300); border-radius:7px; font-size:12px; font-family:inherit; }
.mp-tim { display:flex; align-items:center; gap:4px; font-size:12px; font-weight:600; color:var(--g600); cursor:pointer; background:#fff; border:1px solid var(--g300); border-radius:7px; padding:4px 9px; }
.drug-sug-box { position:absolute; top:100%; left:0; right:0; z-index:60; background:#fff; border:1px solid var(--g300); border-radius:9px; box-shadow:0 8px 24px rgba(0,0,0,.15); max-height:280px; overflow-y:auto; margin-top:3px; }
.drug-sug-row { padding:7px 11px; cursor:pointer; border-bottom:1px solid var(--g100); }
.drug-sug-row:last-child { border-bottom:none; }
.drug-sug-row:hover { background:#f0fdfa; }
.drug-sug-main { display:flex; align-items:baseline; gap:8px; font-size:12.5px; }
.drug-sug-brand { color:var(--g500); font-size:11px; font-weight:400; }
.drug-sug-cat { font-size:10px; color:#0e7490; margin-top:1px; }

/* ===== v3: 輸液計算 ===== */
.fluid-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:8px; }
.fluid-cell { background:var(--g50); border:1px solid var(--g200); border-radius:9px; padding:9px 11px; }
.fluid-k { font-size:9.5px; font-weight:700; color:var(--g500); margin-bottom:3px; }
.fluid-v { font-size:17px; font-weight:800; color:#0e7490; }
.fluid-v span { font-size:10px; color:var(--g500); font-weight:600; }
.fluid-row { display:flex; justify-content:space-between; font-size:11.5px; padding:4px 2px; border-bottom:1px dashed var(--g200); }

/* ===== v3: 病歴・プロファイル ===== */
.profile-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:7px; }
.profile-cell { background:var(--g50); border:1px solid var(--g200); border-radius:8px; padding:7px 10px; }
.profile-k { font-size:9px; font-weight:700; color:var(--g500); }
.profile-v { font-size:13px; font-weight:800; color:var(--g800); margin-top:1px; }
.hist-field { margin-bottom:10px; }
.hist-label { font-size:11.5px; font-weight:800; color:var(--g700); margin-bottom:4px; }
.hist-hint { font-size:9.5px; font-weight:400; color:var(--g400); margin-left:7px; }
.hist-ta { width:100%; padding:8px 11px; border:1px solid var(--g300); border-radius:8px; font-size:12.5px; font-family:inherit; resize:vertical; line-height:1.7; background:#fff; }
.hist-ta:focus { outline:none; border-color:var(--primary-l); box-shadow:0 0 0 3px rgba(8,145,178,.1); }
.opqrst-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:8px; }
.opqrst-cell { background:var(--g50); border:1px solid var(--g200); border-radius:8px; padding:8px 10px; }
.opqrst-k { font-size:10.5px; font-weight:800; color:#0e7490; margin-bottom:4px; }
/* v3.8: かきくけこ・さしすせそ */
.hx-group { margin-bottom:10px; }
.hx-group-title { font-size:12.5px; font-weight:800; margin-bottom:5px; }
.hx-letter-block { display:flex; gap:9px; align-items:flex-start; margin-bottom:5px; }
.hx-letter { flex-shrink:0; width:26px; height:26px; border-radius:8px; color:#fff; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center; margin-top:2px; }
.hx-letter-items { flex:1; min-width:0; }
.hx-row { display:flex; align-items:center; gap:8px; padding:5px 7px; border-radius:7px; cursor:pointer; }
.hx-row:hover { background:var(--g50); }
.hx-tx { font-size:12px; color:var(--g800); line-height:1.5; }
.hx-row.on .hx-tx { color:var(--g500); }

/* ===== v3: 鑑別・プロブレム ===== */
.ddx-tier { margin-bottom:10px; }
.ddx-tier-head { font-size:12px; font-weight:800; margin-bottom:5px; }
.ddx-item { background:var(--g50); border:1px solid var(--g200); border-radius:8px; padding:7px 11px; margin-bottom:5px; font-size:12px; }
.ddx-item.st-ruled { opacity:.5; }
.ddx-item.st-ruled .ddx-name { text-decoration:line-through; }
.ddx-item.st-confirmed { background:#f0fdf4; border-color:#a7f3d0; }
.ddx-badge { font-size:9px; font-weight:800; border-radius:4px; padding:1px 6px; }
.ddx-badge.conf { background:#059669; color:#fff; }
.ddx-badge.ruled { background:var(--g300); color:var(--g600); }
.ddx-sub { font-size:10.5px; color:var(--g500); margin-top:3px; line-height:1.5; }
.ddx-acts { margin-left:auto; display:flex; gap:4px; }
.prob-row { display:flex; align-items:center; gap:8px; background:var(--g50); border:1px solid var(--g200); border-radius:8px; padding:7px 11px; margin-bottom:5px; font-size:12.5px; font-weight:600; }
.prob-num { font-size:10px; font-weight:800; color:#0e7490; background:#ecfeff; border:1px solid #a5f3fc; border-radius:5px; padding:1px 6px; }
.sug-done { opacity:.75; }

/* ===== v3.6: 今日のTODO・治療の検討 ===== */
.todo-row { display:flex; align-items:center; gap:9px; padding:7px 10px; border-radius:8px; background:var(--g50); border:1px solid var(--g200); margin-bottom:5px; }
.todo-text { flex:1; font-size:13px; font-weight:600; color:var(--g800); cursor:pointer; min-width:0; word-break:break-word; }
.todo-row.todo-done { opacity:.55; }
.todo-row.todo-done .todo-text { text-decoration:line-through; font-weight:400; }
.todo-ts { font-size:9px; color:var(--g400); white-space:nowrap; }
.rev-row { border:1px solid var(--g200); background:var(--g50); border-radius:9px; padding:8px 11px; margin-bottom:7px; }
.rev-row.rev-done { border-color:#a7f3d0; background:#f0fdf4; }
.rev-head { display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-bottom:4px; }
.rev-day { font-size:9.5px; font-weight:800; color:#6366f1; background:#eef2ff; border:1px solid #c7d2fe; border-radius:8px; padding:1px 7px; white-space:nowrap; }
.rev-chk { margin-left:auto; border:1.5px solid var(--g300); background:#fff; color:var(--g500); font-size:10.5px; font-weight:700; border-radius:14px; padding:3px 11px; cursor:pointer; font-family:inherit; white-space:nowrap; }
.rev-chk:hover { border-color:#059669; color:#059669; }
.rev-chk.on { background:#059669; border-color:#059669; color:#fff; }
.rev-line { font-size:11px; color:var(--g600); line-height:1.65; margin:2px 0; }
.rev-think { color:#6d28d9; }
.rev-memo { width:100%; margin-top:5px; padding:5px 9px; border:1px dashed var(--g300); border-radius:7px; font-size:11.5px; font-family:inherit; background:#fff; }
.rev-memo:focus { outline:none; border-style:solid; border-color:#6366f1; }

/* ===== v3.7: ERモード ===== */
.sb-er { background:rgba(220,38,38,.22); border-color:rgba(252,165,165,.4); }
.sb-er:hover { background:rgba(220,38,38,.38); }
.er-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:10px; }
.er-tile { background:#fff; border:1px solid var(--g200); border-radius:11px; padding:13px 14px; cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.05); transition:transform .1s, box-shadow .12s, border-color .12s; }
.er-tile:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(220,38,38,.15); border-color:#fca5a5; }
.er-tile-ic { font-size:24px; margin-bottom:5px; }
.er-tile-lb { font-size:12.5px; font-weight:800; color:var(--g800); line-height:1.4; }
.er-tile-sub { font-size:9.5px; color:var(--g500); margin-top:3px; line-height:1.45; }
.er-case-row { display:flex; align-items:center; gap:9px; padding:7px 6px; border-bottom:1px dashed var(--g200); }
.er-case-row:last-child { border-bottom:none; }
.er-item { display:flex; align-items:flex-start; gap:9px; padding:7px 9px; border-radius:8px; cursor:pointer; border:1px solid transparent; }
.er-item:hover { background:var(--g50); border-color:var(--g200); }
.er-item.er-done { opacity:.62; }
.er-item.er-done .er-item-tx { text-decoration:line-through; }
.er-item-tx { flex:1; font-size:12.5px; color:var(--g800); line-height:1.55; min-width:0; }
.er-item-ts { font-size:9px; color:#059669; font-weight:700; white-space:nowrap; margin-top:2px; }
.er-window { display:flex; align-items:center; gap:8px; font-size:12px; background:var(--g50); border:1px solid var(--g200); border-radius:8px; padding:6px 11px; margin-bottom:4px; }
.er-window b { font-size:11px; color:var(--g700); }
.er-window span { font-weight:800; font-variant-numeric:tabular-nums; }
@media (max-width:700px){ .er-grid { grid-template-columns:repeat(2,1fr); } }

/* ===== 狭い画面への対応 ===== */
.hamburger { display:none; }
#sbBackdrop { display:none; }

}

<body>
<header class="app-header">
  <button class="hamburger" onclick="toggleSidebar()" title="患者リスト">☰</button>
  <h1>🩺 臨床コンパス <span style="font-size:9px;font-weight:400;opacity:.65;vertical-align:middle">v3.9</span></h1>

  </div>
</div>
<div id="patientModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">

      </div>

        <div class="form-group"><label>体重 (kg)</label><input type="number" id="f-weight" placeholder="例: 60" step="0.1" oninput="updateModalCalc()"></div>
        <div class="form-group"><label>BMI</label><input type="text" id="f-bmi" placeholder="自動計算" readonly style="background:var(--g50);color:var(--primary);font-weight:700"></div>
      </div>
      <div class="form-row">

// ── 大文字小文字非依存のエイリアス検索テーブル ──
// (起動時に1回だけ構築)
const _LAB_ALIAS_LC = {};
Object.entries(LAB_ALIAS).forEach(([k,v])=>{
  // 正規化キー: 小文字・スペース除去・括弧内除去
  const norm=k.toLowerCase().replace(/\s+/g,'').replace(/[（(][^)）]*[)）]/g,'');
  _LAB_ALIAS_LC[norm]=v;
});
// LAB_REF自身のキーもLCマップに登録（エイリアスなしで直接マッチ）
Object.keys(LAB_REF).forEach(k=>{
  const norm=k.toLowerCase().replace(/\s+/g,'').replace(/[（(][^)）]*[)）]/g,'');
  if(!_LAB_ALIAS_LC[norm]) _LAB_ALIAS_LC[norm]=k;
});

// 正規化関数（エイリアス解決・大文字小文字非依存）
function normLabName(raw){
  const trimmed=(raw||'').trim();
  // 1. 完全一致（LAB_ALIAS）
  if(LAB_ALIAS[trimmed]) return LAB_ALIAS[trimmed];
  // 2. LAB_REF直接一致
  if(LAB_REF[trimmed]) return trimmed;
  // 3. 正規化キーで検索（大文字小文字・スペース・括弧を無視）
  const normKey=trimmed.toLowerCase().replace(/\s+/g,'').replace(/[（(][^)）]*[)）]/g,'');
  if(_LAB_ALIAS_LC[normKey]) return _LAB_ALIAS_LC[normKey];
  // 4. そのまま返す
  return trimmed;
}

// 定性検査の表示ラベル取得
function qualLabel(ref, val){
  if(!ref||!ref.qual) return null;
  const labels=ref.qLabel||['陰性','陽性'];
  return labels[Math.round(val)]||String(val);
}

function uid()  { return Date.now().toString(36)+Math.random().toString(36).substr(2,5); }
function nowHM(){ const d=new Date(); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function pad(n) { return String(n).padStart(2,'0'); }
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function esc(s) { return (s==null)?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function selP() { return S.patients.find(p=>p.id===S.sel); }
function calcAge(bd){ if(!bd) return ''; const b=new Date(bd),n=new Date(); let a=n.getFullYear()-b.getFullYear(); const m=n.getMonth()-b.getMonth(); if(m<0||(m===0&&n.getDate()<b.getDate())) a--; return a>=0?`${a}歳`:''; }
function calcBMI(h,w){ const hm=parseFloat(h)/100,wk=parseFloat(w); if(!hm||!wk||isNaN(hm)||isNaN(wk)) return ''; return (wk/(hm*hm)).toFixed(1); }
function updateModalCalc(){

function load() {

    S.sel=d.sel||null;

function migrate(p) {
  if(!p.tasks) p.tasks=[];
  if(!p.labs)  p.labs=[];
  if(!p.memo)  p.memo='';
  if(!p.aiHistory) p.aiHistory=[];
  if(!p.aiChat) p.aiChat=[];
  // ---- v3: 臨床推論フロー用フィールド ----
  if(!p.opqrst) p.opqrst={o:'',p:'',q:'',r:'',s:'',t:''};
  if(!p.hxAsk) p.hxAsk={};
  if(p.hxMemo===undefined) p.hxMemo='';
  ['infectionHistory','medHistory','lifestyle','socialHistory','nursingOrders','referralLetter','referralTo'].forEach(k=>{ if(p[k]===undefined) p[k]=''; });
  if(!p.ddx) p.ddx=[];
  if(!p.confirmedDx) p.confirmedDx=[];
  if(!p.problems) p.problems=[];
  if(!p.consults) p.consults=[];
  if(!p.medChecks) p.medChecks={};
  if(!p.physSuggest) p.physSuggest=[];
  if(!p.testSuggest) p.testSuggest=[];
  if(!p.medPlan){
    p.medPlan=[];
    (p.medications||[]).forEach(m=>{ p.medPlan.push({id:uid(),type:'po',drug:m.drug,dose:m.dose||'',timings:{am:!!m.am,noon:!!m.noon,pm:!!m.pm,bed:!!m.bed},rate:'',startDate:p.date||todayStr(),endDate:'',memo:''}); });
    (p.ivLines||[]).forEach(iv=>{ p.medPlan.push({id:uid(),type:'iv',drug:iv.drug,dose:iv.dose||'',timings:{},rate:iv.rate||'',startDate:p.date||todayStr(),endDate:'',memo:''}); });
  }
  // v3.6: TODOリスト（旧「今日必ずやること」テキストから移行）
  if(!p.todos){
    p.todos=[];
    const md=p.priority&&p.priority.mustdo;
    if(md&&md.trim()) md.split('\n').map(t=>t.trim()).filter(Boolean).forEach(t=>p.todos.push({id:uid(),text:t,done:false,doneAt:null}));
  }
  if(!p.planReviews) p.planReviews={};
  p.tasks=p.tasks.map(t=>{
    if(t.status===undefined){ t.status=t.done?'done':'pending'; t.doneAt=t.done?(t.doneAt||''):null; delete t.done; }
    if(!t.cat&&t.category){ t.cat=t.category; delete t.category; }
    if(!t.cat) t.cat='その他';
    if(!CAT_NAMES.includes(t.cat)) t.cat=CAT_MIGRATE[t.cat]||'その他';
    return t;
  });
  // Migrate: new patient fields defaults
  if(!p.birthdate) p.birthdate='';
  if(!p.height)    p.height='';
  if(!p.weight)    p.weight='';
  if(!p.adl)       p.adl='';
  if(!p.kpName)    p.kpName='';
  if(!p.kpRel)     p.kpRel='';
  if(!p.pastHistory) p.pastHistory='';
  if(!p.allergies)   p.allergies='';
  if(!p.familyHistory) p.familyHistory='';
  if(!p.ivLines) p.ivLines=[];
  if(!p.medications) p.medications=[];
  if(!p.physicalFindings) p.physicalFindings='';
  if(!p.subjective) p.subjective='';
  if(!p.hospital) p.hospital='';
  if(p.archived===undefined) p.archived=false;
  if(!p.cqs) p.cqs=[];
  if(!p.reports) p.reports=[];
  if(!p.echos) p.echos=[];
  if(!p.symptoms) p.symptoms={};
  if(!p.physChecks) p.physChecks={};
  if(!p.cnChecks) p.cnChecks={};
  if(!p.priority) p.priority={problems:{},level:'',mustdo:''};
  if(!p.nightWatch) p.nightWatch={items:{},handover:''};
  if(!p.deviceChecks) p.deviceChecks={};
  // Summary fields
  if(!p.chiefComplaint)       p.chiefComplaint='';
  if(!p.presentIllness)       p.presentIllness='';
  if(!p.admissionFindings)    p.admissionFindings='';
  if(!p.labFindings)          p.labFindings='';
  if(!p.clinicalCourse)       p.clinicalCourse='';
  if(!p.treatment)            p.treatment='';
  if(!p.dischargeStatus)      p.dischargeStatus='';
  if(!p.dischargePrescription) p.dischargePrescription='';
  if(!p.dischargePolicy)      p.dischargePolicy='';
  if(!p.handoverNotes)        p.handoverNotes='';
  // Migrate lab entries: add date field from ts if missing
  p.labs=p.labs.map(lv=>{
    if(!lv.date){
      const m=lv.ts&&lv.ts.match(/^(\d{1,2})\/(\d{1,2})/);
      if(m){
        const yr=new Date().getFullYear();
        lv.date=`${yr}-${pad(parseInt(m[1]))}-${pad(parseInt(m[2]))}`;
      } else {
        lv.date=todayStr();
      }
    }
    return lv;
  });
  return p;
}

function getFlag(name,val){
  const r=LAB_REF[name]; if(!r) return null;
  if(r.qual) return val>0?'陽性':'陰性';
  if(r.cLo!==undefined&&val<r.cLo) return 'LL';
  if(r.cHi!==undefined&&val>r.cHi) return 'HH';
  if(r.lo!==null&&val<r.lo) return 'L';
  if(r.hi!==null&&val>r.hi) return 'H';
  return null;
}

function parseLabJSON(jsonStr){
  const data=JSON.parse(jsonStr);
  const rows=[];
  const extractRows=(obj,defaultDate)=>{
    // Format: { date, results:[{name,value},...] } or { date, labs:[...] }
    if(obj&&typeof obj==='object'&&!Array.isArray(obj)){
      const date=obj.date||obj.採取日||obj.検査日||obj.検体採取日||defaultDate||todayStr();
      const arr=obj.results||obj.labs||obj.data||obj.検査結果;
      if(Array.isArray(arr)){
        arr.forEach(r=>{
          const name=r.name||r.項目||r.検査項目||r.item;
          const val=r.value??r.値??r.val??r.result;
          if(name&&val!==undefined) rows.push({name:String(name).trim(),val:parseFloat(val),date});
        });
        return;
      }
      // Format: { date, WBC:8.5, Hb:12.1, ... }
      Object.entries(obj).forEach(([k,v])=>{
        if(['date','採取日','検査日','results','labs','data','検査結果','患者名','patient'].includes(k)) return;
        if(typeof v==='number'||(typeof v==='string'&&!isNaN(parseFloat(v))))
          rows.push({name:k.trim(),val:parseFloat(v),date});
      });
      return;
    }
    // Format: array of {date,name,value}
    if(Array.isArray(obj)){
      obj.forEach(r=>{
        const name=r.name||r.項目||r.item;
        const val=r.value??r.値??r.val;
        const date=r.date||r.採取日||defaultDate||todayStr();
        if(name&&val!==undefined) rows.push({name:String(name).trim(),val:parseFloat(val),date});
      });
    }
  };
  extractRows(data,null);
  return rows;
}

function parseTSV(text){
  const rows=[];
  let defaultDate=todayStr();
  const lines=text.split(/\r?\n/);
  for(const raw of lines){
    const line=raw.trim();
    if(!line||line.startsWith('#')) continue;
    // Try tab split first, then comma, then 2+ spaces
    let cols=line.split('\t');
    if(cols.length<2) cols=line.split(',');
    if(cols.length<2) cols=line.split(/\s{2,}/);
    const trimmed=cols.map(c=>c.trim());
    if(trimmed.length>=3){
      // date, name, value
      const [dateCol,nameCol,valCol]=trimmed;
      const parsedDate=normalizeDate(dateCol);
      if(parsedDate){
        const val=parseFloat(valCol.replace(/[^\d.\-]/g,''));
        if(nameCol&&!isNaN(val)) rows.push({date:parsedDate,name:nameCol,val});
      } else {
        // Maybe order is name, value, date OR name, date, value — try name first
        const val=parseFloat(trimmed[1].replace(/[^\d.\-]/g,''));
        const maybeDate=normalizeDate(trimmed[2]);
        if(!isNaN(val)&&trimmed[0]) rows.push({date:maybeDate||defaultDate,name:normLabName(trimmed[0]),val});
      }
    } else if(trimmed.length===2){
      // Could be: name value (use defaultDate) or a date header line
      const maybeDate=normalizeDate(trimmed[0]);
      if(maybeDate&&!trimmed[1]){
        defaultDate=maybeDate; continue;
      }
      const val=parseFloat(trimmed[1].replace(/[^\d.\-]/g,''));
      if(trimmed[0]&&!isNaN(val)) rows.push({date:defaultDate,name:normLabName(trimmed[0]),val});
    } else if(trimmed.length===1){
      // Might be a bare date row acting as header
      const maybeDate=normalizeDate(trimmed[0]);
      if(maybeDate) defaultDate=maybeDate;
    }
  }
  return rows;
}

function normalizeDate(s){
  if(!s) return null;
  // YYYY-MM-DD or YYYY/MM/DD
  let m=s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})$/);
  if(m) return `${m[1]}-${pad(parseInt(m[2]))}-${pad(parseInt(m[3]))}`;
  // MM/DD or M/D (use current year)
  m=s.match(/^(\d{1,2})[-\/](\d{1,2})$/);
  if(m){ const yr=new Date().getFullYear(); return `${yr}-${pad(parseInt(m[1]))}-${pad(parseInt(m[2]))}`; }
  return null;
}

function previewTSV(){
  const ta=document.getElementById('import-tsv');
  if(!ta) return;
  const raw=ta.value.trim();
  if(!raw){ S.importPreview=null; renderLabImport(); return; }
  try {
    const rows=parseTSV(raw);
    if(!rows.length) throw new Error('有効なデータが見つかりませんでした');
    S.importPreview={ok:true,rows};
  } catch(e){
    S.importPreview={ok:false,error:e.message};
  }
  renderLabImport();
}

function drawSingleChart(canvas,name,dates,vals,ref){
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const PAD={t:20,r:16,b:38,l:52};
  const cW=W-PAD.l-PAD.r, cH=H-PAD.t-PAD.b;
  ctx.clearRect(0,0,W,H);

  // Y range
  let yMin=Math.min(...vals), yMax=Math.max(...vals);
  if(ref){ if(ref.lo!=null) yMin=Math.min(yMin,ref.lo); if(ref.hi!=null) yMax=Math.max(yMax,ref.hi); }
  const yPad=(yMax-yMin)*0.15||1;
  yMin-=yPad; yMax+=yPad;
  const toY=v=>PAD.t+cH-((v-yMin)/(yMax-yMin))*cH;
  const toX=i=>PAD.l+(dates.length>1?i/(dates.length-1)*cW:cW/2);

  // Normal range background
  if(ref&&ref.lo!=null&&ref.hi!=null){
    const rT=toY(ref.hi), rB=toY(ref.lo);
    ctx.fillStyle='rgba(22,163,74,0.07)';
    ctx.fillRect(PAD.l,rT,cW,rB-rT);
    ctx.setLineDash([4,3]); ctx.lineWidth=1; ctx.strokeStyle='rgba(22,163,74,0.35)';
    ctx.beginPath(); ctx.moveTo(PAD.l,rT); ctx.lineTo(PAD.l+cW,rT); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(PAD.l,rB); ctx.lineTo(PAD.l+cW,rB); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Grid lines & Y labels
  const steps=4;
  for(let i=0;i<=steps;i++){
    const y=PAD.t+(i/steps)*cH;
    const v=yMax-(i/steps)*(yMax-yMin);
    ctx.strokeStyle='#efefef'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(PAD.l,y); ctx.lineTo(PAD.l+cW,y); ctx.stroke();
    ctx.fillStyle='#aaa'; ctx.font='10px sans-serif'; ctx.textAlign='right';
    ctx.fillText(parseFloat(v.toFixed(2)),PAD.l-4,y+4);
  }

  // Axes
  ctx.strokeStyle='#ccc'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(PAD.l,PAD.t); ctx.lineTo(PAD.l,PAD.t+cH); ctx.lineTo(PAD.l+cW,PAD.t+cH); ctx.stroke();

  // X labels
  const maxLabels=Math.min(dates.length,10);
  const step=Math.ceil(dates.length/maxLabels);
  ctx.fillStyle='#888'; ctx.font='10px sans-serif'; ctx.textAlign='center';
  dates.forEach((d,i)=>{
    if(i%step===0||i===dates.length-1){
      const x=toX(i);
      const label=d.slice(5); // MM-DD
      ctx.fillText(label.replace('-','/'),x,PAD.t+cH+14);
    }
  });

  // Line
  ctx.strokeStyle='#2980b9'; ctx.lineWidth=2; ctx.beginPath();
  vals.forEach((v,i)=>{ const x=toX(i),y=toY(v); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.stroke();

  // Dots + value labels
  vals.forEach((v,i)=>{
    const x=toX(i), y=toY(v);
    const flag=getFlag(name,v);
    const dotColor=flag?(flag==='HH'||flag==='LL'?'#dc2626':flag==='H'?'#ef4444':'#3b82f6'):'#2980b9';
    ctx.beginPath(); ctx.fillStyle=dotColor; ctx.arc(x,y,4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle=dotColor; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
    ctx.fillText(v,x,y-8);
    if(flag){
      ctx.font='bold 9px sans-serif'; ctx.fillStyle=dotColor;
      ctx.fillText(flag,x+10,y-8);
    }
  });
}

function previewReportImg(input){
  const nameEl=document.getElementById('rep-img-name');
  const prevEl=document.getElementById('rep-img-preview');
  if(!input.files||!input.files[0]){if(nameEl)nameEl.textContent='';return;}
  const file=input.files[0];
  if(nameEl) nameEl.textContent=`${file.name} (${(file.size/1024).toFixed(0)}KB)`;
  if(prevEl&&file.size>3*1024*1024) prevEl.innerHTML='<div style="color:var(--warning);font-size:11px">&#9888; 3MB超の画像はlocalStorageの容量を超える場合があります</div>';
  const reader=new FileReader();
  reader.onload=e=>{ if(prevEl) prevEl.innerHTML=`<img src="${e.target.result}" style="max-height:120px;border-radius:4px;border:1px solid var(--g200);">`; };
  reader.readAsDataURL(file);
}
function addReport(){
  const p=selP(); if(!p) return;
  const category=document.getElementById('rep-cat').value;
  const title=document.getElementById('rep-title').value.trim();
  const reportText=document.getElementById('rep-text').value.trim();
  const imgInput=document.getElementById('rep-img');
  const file=imgInput&&imgInput.files&&imgInput.files[0];
  if(!title&&!reportText&&!file){document.getElementById('rep-title').focus();return;}
  const n=new Date(); const ts=`${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())} ${pad(n.getHours())}:${pad(n.getMinutes())}`;
  const saveEntry=imgData=>{
    if(!p.reports) p.reports=[];
    p.reports.unshift({id:uid(),category,title,reportText,imageData:imgData,imageName:file?file.name:'',createdAt:ts});
    try{save();}catch(ex){alert('画像サイズが大きすぎます。画像なしで保存します。');p.reports[0].imageData='';save();}
    renderLabReports();
  };
  if(file){const reader=new FileReader();reader.onload=e=>saveEntry(e.target.result);reader.readAsDataURL(file);}
  else saveEntry('');
}
function deleteReport(id){
  const p=selP(); if(!p) return;
  p.reports=(p.reports||[]).filter(x=>x.id!==id);
  save(); renderLabReports();
}

function parseEchoText(){
  const raw=(document.getElementById('echo-paste')||{}).value||'';
  if(!raw.trim()) return;
  const parseFluid=txt=>{ if(/大量|large/.test(txt)) return 'large'; if(/中等量|moderate/.test(txt)) return 'moderate'; if(/少量|mild|trace/.test(txt)) return 'mild'; if(/なし|none|陰性|\(-\)|（-）/.test(txt)) return 'none'; return null; };
  const parsePresent=txt=>{ if(/あり|present|\(\+\)|（\+）/.test(txt)) return 'present'; if(/なし|none|\(-\)|（-）/.test(txt)) return 'none'; return null; };
  const parseSeverityOrPresent=txt=>{
    const t=txt;
    if(/高度|severely|severe/.test(t)) return 'severe';
    if(/中等度|moderately|moderate/.test(t)) return 'moderate';
    if(/軽度|mildly|mild/.test(t)) return 'mild';
    if(/なし|none|陰性|\(-\)|（-）/.test(t)) return 'none';
    if(/あり|present|\(\+\)|（\+）/.test(t)) return 'mild'; // "あり" → mild として扱う
    return null;
  };
  const FIELD_MAP=[
    {id:'echo-ef',      keys:['lvef','ef（teichholz）','ef(teichholz)','ef（teichholz法）','ef（%）','ef(%)','左室駆出率','駆出率','ef']},
    {id:'echo-fs',      keys:['fs','fractional shortening','左室内径短縮率']},
    {id:'echo-lvdd',    keys:['lvdd','左室拡張末期径']},
    {id:'echo-lvds',    keys:['lvds','左室収縮末期径']},
    {id:'echo-ivs',     keys:['ivstd','ivsd','ivs','心室中隔壁厚','心室中隔','中隔壁厚']},
    {id:'echo-pw',      keys:['pwtd','pwd','pw','後壁厚','左室後壁']},
    {id:'echo-lad',     keys:['lad','lads','左房径','左房内径']},
    {id:'echo-lavi',    keys:['lavi','左房容積係数']},
    {id:'echo-lvmi',    keys:['lvmi','左室心筋重量係数']},
    {id:'echo-rvdd',    keys:['rvdd','rvd','右室拡張末期径','右室径','右室内径']},
    {id:'echo-tapse',   keys:['tapse','三尖弁輪収縮期移動距離']},
    {id:'echo-ewave',   keys:['e波','e velocity','僧帽弁e波','e（cm/s）','e wave','e vel']},
    {id:'echo-awave',   keys:['a波','a velocity','僧帽弁a波','a（cm/s）','a wave','a vel']},
    {id:'echo-ea',      keys:['e/a比','e/a']},
    {id:'echo-eprime',  keys:["中隔側e'","中隔e'","e'sep","e'（sep）","e'(sep)","e'（中隔）","septal e'","sep e'","組織e'（中隔）","e'（cm/s）","e'中隔"]},
    {id:'echo-eprimelat',keys:["側壁側e'","側壁e'","lateral e'","lat e'","e'（lat）","e'（lateral）","e'（側壁）","組織e'（側壁）","e'lat","e'lateral","e'側壁"]},
    {id:'echo-ee',      keys:["中隔側e/e'","中隔e/e'","e/e'（sep）","e/e'(sep)","e/e'（中隔）","e/e'sep","sep e/e'","e/e'中隔"]},
    {id:'echo-meanee',  keys:["平均e/e'","mean e/e'","e/e'（平均）","e/e'平均","平均e/e'比","e/e'ave","ave e/e'"]},
    {id:'echo-dct',     keys:['dct（ms）','dct(ms)','減速時間','dct']},
    {id:'echo-ivcmax',  keys:['ivc max','ivcmax','ivc（呼気）','ivc呼気','ivc（最大）','下大静脈最大径']},
    {id:'echo-ivcmin',  keys:['ivc min','ivcmin','ivc（吸気）','ivc吸気','ivc（最小）','下大静脈最小径']},
    {id:'echo-ivcvar',  keys:['ivc呼吸性変動','呼吸性変動','ivc変動率','ivc collapsibility','ivc ci','ci']},
    {id:'echo-rap',     keys:['推定右房圧','right atrial pressure','rap','右房圧']},
    {id:'echo-avvmax',  keys:['av vmax','avvmax','大動脈弁最大血流速度','vmax（av）','av max velocity','aortic vmax','aov vmax']},
    {id:'echo-meanpg',  keys:['mean pg','meanpg','平均圧較差','大動脈弁平均圧較差','mean pressure gradient','mpg']},
    {id:'echo-ava',     keys:['ava','弁口面積','大動脈弁口面積','aortic valve area']},
    {id:'echo-trpg',    keys:['trpg','三尖弁圧較差','tr圧較差','tr pg','tr pressure gradient']},
    {id:'echo-pasp',    keys:['推定pasp','推定肺動脈収縮期圧','pasp','肺動脈収縮期圧','estimated pasp']},
    {id:'echo-hr',      keys:['hr','心拍数']},
  ];
  const VALVE_MAP=[
    {id:'echo-ar', keys:['ar','大動脈弁逆流','大動脈弁閉鎖不全']},
    {id:'echo-mr', keys:['mr','僧帽弁逆流','僧帽弁閉鎖不全']},
    {id:'echo-tr', keys:['tr','三尖弁逆流','三尖弁閉鎖不全']},
    {id:'echo-pr', keys:['pr','肺動脈弁逆流','肺動脈弁閉鎖不全']},
    {id:'echo-as', keys:['as','大動脈弁狭窄','大動脈弁狭窄症']},
    {id:'echo-ms', keys:['ms','僧帽弁狭窄','僧帽弁狭窄症']},
  ];
  const SPECIAL_MAP=[
    {id:'echo-asynergy', keys:['壁運動異常','asynergy','wall motion abnormality','wma','局所壁運動異常','rwma'],
      parse:parsePresent},
    {id:'echo-ra',       keys:['右房','右房拡大','right atrium'],
      parse:txt=>{ if(/拡大|enlarged|拡張/.test(txt)) return 'enlarged'; if(/正常|normal/.test(txt)) return 'normal'; return null; }},
    {id:'echo-rvsys',    keys:['右室収縮能','右室機能','rv function','right ventricular function','rv systolic function'],
      parse:txt=>{ if(/高度|severely|severe/.test(txt)) return 'severely_reduced'; if(/中等度|moderately|moderate/.test(txt)) return 'moderately_reduced'; if(/軽度|mildly|mild/.test(txt)) return 'mildly_reduced'; if(/正常|normal/.test(txt)) return ''; return null; }},
    {id:'echo-mvc',      keys:['僧帽弁輪石灰化','僧帽弁石灰化','mac','mitral annular calcification','mitral valve calcification','mvc'],
      parse:parseSeverityOrPresent},
    {id:'echo-avca',     keys:['大動脈弁石灰化','aortic valve calcification','avca','大動脈弁カルシウム'],
      parse:parseSeverityOrPresent},
    {id:'echo-peff',     keys:['心嚢液','心嚢水','pericardial effusion'],
      parse:parseFluid},
    {id:'echo-rpe',      keys:['右胸水','右側胸水','right pleural effusion'],
      parse:parseFluid},
    {id:'echo-lpe',      keys:['左胸水','左側胸水','left pleural effusion'],
      parse:parseFluid},
    {id:'echo-thrombus', keys:['心内血栓','血栓','thrombus'],
      parse:parsePresent},
  ];
  const parseValve=txt=>{
    const t=txt.toLowerCase();
    if(/severe|高度|重度|\(\+\+\)/.test(t)) return 'severe';
    if(/moderate|中等度|\(\+\)(?!\+)/.test(t)) return 'moderate';
    if(/mild|軽度|微量|\(±\)|trace/.test(t)) return 'mild';
    if(/なし|陰性|\(-\)|\(−\)|none|trivial/.test(t)||/^0$/.test(t.trim())) return 'none';
    return null;
  };
  // アポストロフィ・プライム記号を統一（e'の異字体対応）
  const normApos=s=>s.replace(/['’′ʼ´＇]/g,"'");
  const norm=s=>normApos(s).toLowerCase().replace(/\s+/g,'').replace(/[（(][^)）]*[)）]/g,'');
  const allIds=[...FIELD_MAP,...VALVE_MAP,...SPECIAL_MAP].map(f=>f.id);
  const fe=document.getElementById('echo-findings');
  const hasExisting=allIds.some(id=>{const el=document.getElementById(id);return el&&(el.tagName==='SELECT'?el.value!=='none':el.value.trim());})
    ||(fe&&fe.value.trim());
  if(hasExisting&&!confirm('既存の入力データを上書きします。よろしいですか？')) return;

  lines.forEach(line=>{
    const t=line.trim(); if(!t) return;
    const secM=t.match(/^【(.+)】\s*$/);
    if(secM){inFindings=/所見|findings/i.test(secM[1]);return;}
    if(inFindings){findingsLines.push(line);return;}
    const kvM=t.match(/^(.+?)[：:]\s*(.*)$/); if(!kvM||!kvM[2].trim()) return;
    const keyRaw=kvM[1].trim(), valRaw=kvM[2].trim();
    const keyFull=normApos(keyRaw).toLowerCase().replace(/\s+/g,'');
    // "胸水" 単独 → 右胸水・左胸水に振り分け
    if(keyFull==='胸水'){
      const fl=parseFluid(valRaw);
      if(fl!==null){ parsed['echo-rpe']=fl; parsed['echo-lpe']=fl; }
      return;
    }
    // "右胸水・左胸水" 同時表記
    if(keyFull==='右胸水・左胸水'||keyFull==='左右胸水'){
      const fl=parseFluid(valRaw);
      if(fl!==null){ parsed['echo-rpe']=fl; parsed['echo-lpe']=fl; }
      return;
    }
    let matched=false;
    for(const f of FIELD_MAP){
      if(f.keys.some(k=>keyFull===norm(k)||norm(keyRaw)===norm(k))){
        const nm=valRaw.match(/[\d.]+/);
        if(nm){parsed[f.id]=nm[0];matched=true;break;}
      }
    }
    if(!matched) for(const v of VALVE_MAP){
      if(v.keys.some(k=>keyFull===norm(k)||norm(keyRaw)===norm(k))){
        const sev=parseValve(valRaw);
        if(sev!==null){parsed[v.id]=sev;matched=true;break;}
      }
    }
    if(!matched) for(const s of SPECIAL_MAP){
      if(s.keys.some(k=>keyFull===norm(k)||norm(keyRaw)===norm(k))){
        const val=s.parse(valRaw);
        if(val!==null){parsed[s.id]=val;matched=true;break;}
      }
    }
    if(!matched) unrecognized.push(keyRaw);
  });

  // ── セカンダリスキャン ──
  // 行全体から "呼吸性変動" を探す（入れ子・スラッシュ区切り・記述型に対応）
  if(!parsed['echo-ivcvar']){
    for(const line of lines){
      // 数値あり: "呼吸性変動：50%" / "CI：50%" / "呼吸性変動 50%"
      const numM=line.match(/呼吸性変動\s*[：:\s]\s*([\d.]+)\s*%?/);
      if(numM){ parsed['echo-ivcvar']=numM[1]; break; }
      // 記述型: "良好(>50%)" / "あり" / "不良(<50%)"
      if(/呼吸性変動/.test(line)){
        if(/良好|>50|≥50|保たれ|あり/.test(line)){ parsed['echo-ivcvar']='50'; break; }
        if(/不良|低下|<50|減少|消失/.test(line)){ parsed['echo-ivcvar']='20'; break; }
      }
    }
  }

  let count=0;
  Object.entries(parsed).forEach(([id,val])=>{const el=document.getElementById(id);if(!el)return;el.value=val;count++;});
  if(findingsLines.length&&fe){fe.value=findingsLines.join('\n').trim();count++;}
  const rEl=document.getElementById('echo-parse-result');
  if(rEl){
    let html=`<div style="margin-top:6px;font-size:12px;color:var(--success);font-weight:600">&#10003; ${count}項目を入力しました</div>`;
    if(unrecognized.length) html+=`<div style="margin-top:3px;font-size:11px;color:var(--g500)">認識できなかった項目: ${unrecognized.map(s=>`<b>${esc(s)}</b>`).join('、')}</div>`;
    rEl.innerHTML=html;
  }
}
function addEcho(){

  const gv=id=>{ const el=document.getElementById(id); return el?el.value.trim():''; };

  const ivs=gv('echo-ivs'),pw=gv('echo-pw'),lad=gv('echo-lad'),lvmi=gv('echo-lvmi');
  const asynergy=gv('echo-asynergy');
  const rvdd=gv('echo-rvdd'),tapse=gv('echo-tapse'),rvsys=gv('echo-rvsys'),ra=gv('echo-ra');
  const lavi=gv('echo-lavi'),ewave=gv('echo-ewave'),awave=gv('echo-awave'),ea=gv('echo-ea');
  const eprime=gv('echo-eprime'),eprimelat=gv('echo-eprimelat'),ee=gv('echo-ee'),meanee=gv('echo-meanee');
  const dct=gv('echo-dct'),ivcMax=gv('echo-ivcmax'),ivcMin=gv('echo-ivcmin');
  const ivcvar=gv('echo-ivcvar'),rap=gv('echo-rap'),hr=gv('echo-hr');
  const ar=gv('echo-ar'),mr=gv('echo-mr'),tr=gv('echo-tr'),pr=gv('echo-pr');
  const as=gv('echo-as'),ms=gv('echo-ms'),mvc=gv('echo-mvc'),avca=gv('echo-avca');
  const avvmax=gv('echo-avvmax'),meanpg=gv('echo-meanpg'),ava=gv('echo-ava');
  const trpg=gv('echo-trpg'),pasp=gv('echo-pasp');
  const peff=gv('echo-peff'),rpe=gv('echo-rpe'),lpe=gv('echo-lpe'),thrombus=gv('echo-thrombus');
  const findings=gv('echo-findings');
  if(!ef&&!lvdd&&!ea&&!ewave&&!rvdd){document.getElementById('echo-ef').focus();return;}
  const n=new Date(); const ts=`${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())} ${pad(n.getHours())}:${pad(n.getMinutes())}`;

  save(); renderLabEcho();
}
function deleteEcho(id){

function interpretEcho(echo){
  const res=[];
  const ef=parseFloat(echo.ef);
  if(!isNaN(ef)){
    if(ef>=50) res.push({label:'LV収縮機能',value:`正常 (EF ${ef}%)`,cls:'ok'});
    else if(ef>=40) res.push({label:'LV収縮機能',value:`軽度低下 (EF ${ef}% — HFmrEF)`,cls:'warn'});
    else res.push({label:'LV収縮機能',value:`低下 (EF ${ef}% — HFrEF)`,cls:'crit'});
  }
  const fs=parseFloat(echo.fs);
  if(!isNaN(fs)){
    if(fs>=25) res.push({label:'FS',value:`${fs}% — 正常 (≥25%)`,cls:'ok'});
    else if(fs>=20) res.push({label:'FS',value:`${fs}% — 軽度低下 (20-24%)`,cls:'warn'});
    else res.push({label:'FS',value:`${fs}% — 低下 (<20%)`,cls:'crit'});
  }
  const lvdd=parseFloat(echo.lvdd);
  if(!isNaN(lvdd)&&lvdd>55) res.push({label:'LV拡大',value:`LVDd ${lvdd}mm — 拡大あり (>55mm)`,cls:'warn'});
  const ivs=parseFloat(echo.ivs), pw=parseFloat(echo.pw);
  const wallMax=(!isNaN(ivs)&&!isNaN(pw))?Math.max(ivs,pw):!isNaN(ivs)?ivs:!isNaN(pw)?pw:NaN;
  if(!isNaN(wallMax)){
    if(wallMax>=13) res.push({label:'壁肥厚',value:`最大${wallMax}mm — 高度肥厚 (≥13mm)、HCM・アミロイドーシス等を考慮`,cls:'crit'});
    else if(wallMax>=11) res.push({label:'壁肥厚',value:`最大${wallMax}mm — 軽度肥厚 (11-12mm)`,cls:'warn'});
  }
  if(echo.asynergy==='present') res.push({label:'壁運動異常',value:'あり — 虚血性心疾患・心筋症の評価を',cls:'crit'});
  // 右心系
  const rvdd=parseFloat(echo.rvdd);
  if(!isNaN(rvdd)){
    if(rvdd>42) res.push({label:'RV拡大',value:`RVDd ${rvdd}mm — 拡大あり (>42mm)、肺高血圧・右心不全を考慮`,cls:'warn'});
    else res.push({label:'RVDd',value:`${rvdd}mm — 正常範囲`,cls:'ok'});
  }
  const tapse=parseFloat(echo.tapse);
  if(!isNaN(tapse)){
    if(tapse<17) res.push({label:'TAPSE',value:`${tapse}mm — 低下 (<17mm)、RV収縮機能低下`,cls:'crit'});

  if(echo.rvsys){
    const rvsysMap={'mildly_reduced':{v:'軽度低下',cls:'warn'},'moderately_reduced':{v:'中等度低下',cls:'crit'},'severely_reduced':{v:'高度低下 — 右心不全の積極的治療を',cls:'crit'}};

  const ea=parseFloat(echo.ea), eprime=parseFloat(echo.eprime);
  const ee=parseFloat(echo.ee), meanee=parseFloat(echo.meanee), lavi=parseFloat(echo.lavi);

  if(hasDiast){
    let pos=0, crit=[];

    if(!isNaN(lavi)&&lavi>34){pos++;crit.push(`LAVI=${lavi}>34`);}
    let grade,cls;

    else if(!isNaN(ea)){
      if(ea<=0.8){grade='Grade I（弛緩障害型）';cls='warn';}
      else if(ea>=2){grade='Grade III（拘束型）— 左房圧高度上昇';cls='crit';}
      else if(pos>=2){grade='Grade II（偽正常化型）— 左房圧上昇';cls='warn';}
      else{grade='Indeterminate（判定不能）';cls='neutral';}
    } else {grade=`異常所見あり（${pos}/3 criteria陽性）`;cls='warn';}
    res.push({label:'拡張障害',value:`${grade}${crit.length?' ['+crit.join(', ')+']':''}`,cls});
  }
  // 弁膜症（逆流）
  const valveDefs=[
    {k:'ar',l:'AR（大動脈弁逆流）'},
    {k:'mr',l:'MR（僧帽弁逆流）'},
    {k:'tr',l:'TR（三尖弁逆流）'},
    {k:'pr',l:'PR（肺動脈弁逆流）'},
  ];
  valveDefs.forEach(v=>{
    if(echo[v.k]&&echo[v.k]!=='none'){
      const cls=echo[v.k]==='severe'?'crit':echo[v.k]==='moderate'?'warn':'neutral';
      const note={severe:'— 重症：手術/カテーテル適応の評価を',moderate:'— 中等度：経過観察・定期エコー',mild:'— 軽度'}[echo[v.k]]||'';

    res.push({label:'大動脈弁石灰化',value:`${echo.avca}${echo.avca==='severe'?' — 重度AV石灰化、AS進行リスク':''}`,cls});
  }

    if(trpg>=64)      res.push({label:'TRPG',value:`${trpg} mmHg — 高度肺高血圧を示唆`,cls:'crit'});
    else if(trpg>=36) res.push({label:'TRPG',value:`${trpg} mmHg — 中等度肺高血圧を示唆`,cls:'warn'});
    else              res.push({label:'TRPG',value:`${trpg} mmHg — 正常範囲`,cls:'ok'});

  if(!isNaN(pasp)){
    if(pasp>=55)      res.push({label:'推定PASP',value:`${pasp} mmHg — 重症肺高血圧（ESC Grade severe）`,cls:'crit'});
