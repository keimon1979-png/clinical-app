    } else if(collapse!==null){
      if(collapse>=50) res.push({label:'IVC / 右房圧',value:`max ${ivcMax}mm、虚脱率${collapse}% — 正常（RA圧 ≤5mmHg）`,cls:'ok'});
      else             res.push({label:'IVC / 右房圧',value:`max ${ivcMax}mm、虚脱率${collapse}% — 虚脱不良、RA圧上昇を考慮`,cls:'warn'});
    }
  } else if(collapse!==null){
    if(collapse>=50) res.push({label:'IVC呼吸性変動',value:`${collapse}% — 正常（脱水・低右房圧）`,cls:'ok'});
    else             res.push({label:'IVC呼吸性変動',value:`${collapse}% — 低下、右房圧上昇を考慮`,cls:'warn'});
  }
  // 心嚢液・胸水
  if(echo.peff&&echo.peff!=='none'){
    const m={mild:{v:'少量',cls:'neutral'},moderate:{v:'中等量 — 経過観察、心タンポナーデに注意',cls:'warn'},large:{v:'大量 — 心タンポナーデリスク、緊急評価',cls:'crit'}};
    const pm=m[echo.peff]; if(pm) res.push({label:'心嚢液',value:pm.v,cls:pm.cls});
  }
  const pleuralMap={mild:{v:'少量',cls:'neutral'},moderate:{v:'中等量 — 心不全・胸膜炎等を考慮',cls:'warn'},large:{v:'大量 — ドレナージ適応の評価を',cls:'crit'}};
  if(echo.rpe&&echo.rpe!=='none'){const m=pleuralMap[echo.rpe];if(m) res.push({label:'右胸水',value:m.v,cls:m.cls});}
  if(echo.lpe&&echo.lpe!=='none'){const m=pleuralMap[echo.lpe];if(m) res.push({label:'左胸水',value:m.v,cls:m.cls});}
  // 心内血栓
  if(echo.thrombus==='present') res.push({label:'心内血栓',value:'あり ⚠ — 抗凝固療法・塞栓症リスク評価を至急',cls:'crit'});
  return res;
}

const _NEG=/陰性|（[-−ー]）|\([-−]\)|なし|否定|（−）/;
function _getLine(txt,idx){ const s=Math.max(0,txt.lastIndexOf('\n',idx)+1); const e=txt.indexOf('\n',idx); return txt.substring(s,e<0?txt.length:e); }
function _extractVal(line,label){ const re=new RegExp(label.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'[：:＝=\\s]*([\\d][\\d./a-zA-Zμ%℃]*(?:/[\\d.]+[a-zA-Z]*)?)'); const m=line.match(re); return m?m[1]:''; }

// Claude API 共通呼び出し。onDelta を渡すとストリーミング、tools を渡すと構造化抽出。
async function callClaude(opts){
  const key=getApiKey();
  if(!key) throw new Error('APIキーが未設定です（AIアシスタントタブで設定してください）');
  const st=getAISettings();
  const body={ model:opts.model||st.model, max_tokens:opts.maxTokens||4096, messages:opts.messages };
  if(opts.system) body.system=opts.system;
  if(opts.tools){ body.tools=opts.tools; if(opts.toolChoice) body.tool_choice=opts.toolChoice; }
  const useStream=!!opts.onDelta&&!opts.tools;
  if(useStream) body.stream=true;
  let res;
  try{
    res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify(body),
    });
  }catch(e){ throw new Error('通信エラー: ネット接続を確認してください'); }
  if(!res.ok){
    let msg=`HTTP ${res.status}`;
    try{ const e=await res.json(); msg=(e.error&&e.error.message)||msg; }catch(_){}
    if(res.status===401) msg='APIキーが無効です。AIアシスタントタブで確認してください';
    else if(res.status===429) msg='利用制限（レート制限）に達しました。1〜2分待って再実行してください';
    else if(res.status===529||res.status===503) msg='AIサーバーが混雑しています。少し待って再実行してください';
    throw new Error(msg);
  }
  if(useStream){
    const reader=res.body.getReader(); const dec=new TextDecoder();
    let buf='', full='';
    while(true){
      const {done,value}=await reader.read();
      if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop();
      for(const line of lines){
        const t=line.trim();
        if(!t.startsWith('data:')) continue;
        const js=t.slice(5).trim();
        if(!js||js==='[DONE]') continue;
        let ev; try{ ev=JSON.parse(js); }catch(_){ continue; }
        if(ev.type==='content_block_delta'&&ev.delta&&ev.delta.type==='text_delta'){ full+=ev.delta.text; try{opts.onDelta(ev.delta.text,full);}catch(_){} }
        if(ev.type==='error') throw new Error((ev.error&&ev.error.message)||'ストリーミングエラー');
      }
    }
    return {text:full,toolInput:null};
  }
  const data=await res.json();
  const out={text:'',toolInput:null};
  (data.content||[]).forEach(b=>{
    if(b.type==='text') out.text+=b.text;
    if(b.type==='tool_use') out.toolInput=b.input;
  });
  return out;
}
function buildCtx(p){
  const lines=[`患者: ${p.name}`];
  if(p.diag) lines.push(`診断: ${p.diag}`);
  if(p.room) lines.push(`病室: ${p.room}`);
  if(p.date) lines.push(`入院日: ${p.date}`);
  if(p.birthdate) lines.push(`生年月日: ${p.birthdate} ${calcAge(p.birthdate)}`);
  if(p.height||p.weight) lines.push(`身体: 身長${p.height||'?'}cm 体重${p.weight||'?'}kg`);
  // バイタル（タスクタブ）
  const vitalTasks=p.tasks.filter(t=>t.cat==='バイタル'||t.cat==='バイタル確認');
  if(vitalTasks.length){ lines.push('\n【バイタル】'); vitalTasks.forEach(t=>lines.push(`  ${t.text}`)); }
  // 内服薬
  if(p.medications&&p.medications.length){
    lines.push('\n【内服薬】');
    p.medications.forEach(m=>{ const t=[m.am&&'朝',m.noon&&'昼',m.pm&&'夕',m.bed&&'眠前'].filter(Boolean).join('・'); lines.push(`  - ${m.drug}${m.dose?' '+m.dose:''}${t?' ('+t+')':''}`); });
  } else {
    const med=p.tasks.filter(t=>t.cat==='内服薬');
    if(med.length){ lines.push('\n【内服薬】'); med.forEach(t=>lines.push(`  - ${t.text}`)); }
  }
  // 点滴
  if(p.ivLines&&p.ivLines.length){
    lines.push('\n【点滴・輸液】');
    p.ivLines.forEach(iv=>{ const pts=[iv.drug];if(iv.dose)pts.push(iv.dose);if(iv.rate)pts.push(iv.rate+'mL/h');lines.push(`  - ${pts.join(' ')}`); });
  } else {
    const iv=p.tasks.filter(t=>t.cat==='点滴・輸液');
    if(iv.length){ lines.push('\n【点滴・輸液】'); iv.forEach(t=>lines.push(`  - ${t.text}`)); }
  }
  // 検査値
  if(p.labs&&p.labs.length){
    lines.push('\n【最新検査値】');
    const byName={};
    p.labs.forEach(lv=>{ if(!byName[lv.name]||lv.date>=byName[lv.name].date) byName[lv.name]=lv; });
    Object.entries(byName).forEach(([name,lv])=>{ const flag=getFlag(name,lv.val); lines.push(`  ${name}: ${lv.val}${lv.unit?' '+lv.unit:''}${flag?' ['+flag+']':''}`); });
  }
  // 心エコー（最新）
  if(p.echos&&p.echos.length){
    const e=p.echos[0]; const pts=[];
    if(e.ef)pts.push(`EF ${e.ef}%`);if(e.lvdd)pts.push(`LVDd ${e.lvdd}mm`);if(e.lvds)pts.push(`LVDs ${e.lvds}mm`);
    if(e.ea)pts.push(`E/A ${e.ea}`);if(e.ee)pts.push(`E/e' ${e.ee}`);if(e.lavi)pts.push(`LAVI ${e.lavi}`);
    ['ar','mr','tr','pr'].forEach(k=>{ if(e[k]&&e[k]!=='none')pts.push(`${k.toUpperCase()} ${e[k]}`); });
    if(pts.length) lines.push(`\n【心エコー（${e.createdAt||'最新'}）】${pts.join('  ')}`);
  }
  // 症候チェック
  const checkedSx=(SYMPTOMS||[]).filter(s=>p.symptoms&&p.symptoms[s.id]).map(s=>s.label);
  if(checkedSx.length) lines.push(`\n【症候チェック】${checkedSx.join('、')}`);
  // 身体所見（異常チェック項目）
  const physItems=[];
  (PHYS_CATS||[]).forEach(cat=>cat.items.forEach((item,i)=>{ const d=p.physChecks&&p.physChecks[`${cat.id}_${i}`];if(d&&d.checked)physItems.push(d.memo?`${item}(${d.memo})`:item); }));
  if(physItems.length) lines.push(`\n【身体所見（異常）】${physItems.join('、')}`);
  if(p.chiefComplaint&&p.chiefComplaint.trim())    lines.push(`\n【主訴】\n${p.chiefComplaint.trim()}`);
  if(p.presentIllness&&p.presentIllness.trim())    lines.push(`\n【現病歴】\n${p.presentIllness.trim()}`);
  if(p.pastHistory&&p.pastHistory.trim())          lines.push(`\n【既往歴】\n${p.pastHistory.trim()}`);
  if(p.allergies&&p.allergies.trim())              lines.push(`\n【アレルギー】\n${p.allergies.trim()}`);
  if(p.familyHistory&&p.familyHistory.trim())      lines.push(`\n【家族歴】\n${p.familyHistory.trim()}`);
  if(p.admissionFindings&&p.admissionFindings.trim()) lines.push(`\n【入院時所見】\n${p.admissionFindings.trim()}`);
  if(p.labFindings&&p.labFindings.trim())          lines.push(`\n【検査所見】\n${p.labFindings.trim()}`);
  if(p.clinicalCourse&&p.clinicalCourse.trim())    lines.push(`\n【入院後経過】\n${p.clinicalCourse.trim()}`);
  if(p.treatment&&p.treatment.trim())              lines.push(`\n【治療内容】\n${p.treatment.trim()}`);
  if(p.dischargeStatus&&p.dischargeStatus.trim())  lines.push(`\n【退院時状態】\n${p.dischargeStatus.trim()}`);
  if(p.dischargePrescription&&p.dischargePrescription.trim()) lines.push(`\n【退院時処方】\n${p.dischargePrescription.trim()}`);
  if(p.dischargePolicy&&p.dischargePolicy.trim())  lines.push(`\n【退院後方針】\n${p.dischargePolicy.trim()}`);
  if(p.handoverNotes&&p.handoverNotes.trim())      lines.push(`\n【申し送り事項】\n${p.handoverNotes.trim()}`);
  if(p.subjective&&p.subjective.trim())            lines.push(`\n【S情報】\n${p.subjective.trim()}`);
  return lines.join('\n');
}

function buildClipboardText(p){
  const lines=['以下の患者情報を臨床的に分析して、異常値へのコメント・薬剤の注意点・今日の観察ポイントを教えてください：',''];

  if(p.height||p.weight) lines.push(`身体: 身長${p.height||'?'}cm 体重${p.weight||'?'}kg${(p.height&&p.weight)?` BMI${calcBMI(p.height,p.weight)}`:''}`);
  if(p.adl) lines.push(`ADL: ${p.adl}`);
  if(p.pastHistory) lines.push(`\n【既往歴】\n${p.pastHistory}`);

  if(p.infectionHistory) lines.push(`\n【感染症・曝露歴】\n${p.infectionHistory}`);

  if(p.socialHistory) lines.push(`\n【社会歴】\n${p.socialHistory}`);
  const opq=p.opqrst||{};
  const opqLines=[['O(発症)',opq.o],['P(増悪寛解)',opq.p],['Q(性状)',opq.q],['R(部位放散)',opq.r],['S(強さ)',opq.s],['T(経過)',opq.t]].filter(([,v])=>v&&v.trim());
  if(opqLines.length){ lines.push('\n【OPQRST】'); opqLines.forEach(([k,v])=>lines.push(`  ${k}: ${v.trim()}`)); }
  // 追加問診（かきくけこ・さしすせそ）
  if(p.hxAsk&&Object.keys(p.hxAsk).length){

    HX_MNEMONIC.forEach(g=>g.letters.forEach(L=>L.items.forEach((it,i)=>{ if(p.hxAsk[L.k+'_'+i]) asked.push(it); })));

  // 投与計画（現在有効なもの）
  const activePlans=(p.medPlan||[]).filter(pl=>planActiveOn(pl,todayStr()));
  if(activePlans.length){
    lines.push('\n【現在の投与計画】');
    activePlans.forEach(pl=>{
      const t=SLOT_DEFS.filter(([k])=>pl.timings&&pl.timings[k]).map(([,l])=>l).join('・');
      lines.push(`  - [${pl.type==='iv'?'点滴':'内服'}] ${pl.drug}${pl.dose?' '+pl.dose:''}${pl.rate?' '+pl.rate+'mL/h':''}${t?' ('+t+')':''} ${pl.startDate||''}〜${pl.endDate||'継続'}${pl.reviewMemo?'｜検討メモ: '+pl.reviewMemo:''}`);
    });
  }
  // 今日のTODO（未完了）
  const todosOpen=(p.todos||[]).filter(t=>!t.done);
  if(todosOpen.length){
    lines.push('\n【今日のTODO（未完了）】');
    todosOpen.forEach(t=>lines.push(`  - ${t.text}`));
  }
  // 鑑別・診断・プロブレム
  const ddxAct=(p.ddx||[]).filter(d=>d.status!=='ruled');
  if(ddxAct.length){
    const tierL={red:'赤旗',common:'コモン',rare:'まれ'};
    lines.push('\n【鑑別診断（検討中）】');
    ddxAct.forEach(d=>lines.push(`  - [${tierL[d.tier]||''}${d.status==='confirmed'?'/確定':''}] ${d.name}`));
  }
  if((p.confirmedDx||[]).length){ lines.push('\n【確定診断】'); p.confirmedDx.forEach(d=>lines.push(`  - ${d.name}（${d.date||''}）`)); }
  const probsAct=(p.problems||[]).filter(x=>x.active);
  if(probsAct.length){ lines.push('\n【プロブレムリスト】'); probsAct.forEach((x,i)=>lines.push(`  #${i+1} ${x.text}`)); }
  const med=p.tasks.filter(t=>t.cat==='内服薬');
  if(med.length){
    lines.push('');
    lines.push('【内服薬一覧】');
    med.forEach(t=>lines.push(`  - ${t.text}`));
  }
  if(p.labs&&p.labs.length){
    lines.push('');
    lines.push('【最新検査値】');
    const byName={};
    p.labs.forEach(lv=>{ if(!byName[lv.name]||lv.date>=byName[lv.name].date) byName[lv.name]=lv; });
    Object.entries(byName).forEach(([name,lv])=>{
      const flag=getFlag(name,lv.val);
      const ref=LAB_REF[name];
      const rng=ref?` (基準: ${ref.lo??'?'}-${ref.hi??'?'} ${ref.unit})`:'';
      lines.push(`  ${name}: ${lv.val}${lv.unit?` ${lv.unit}`:''}${rng}${flag?` ← [${flag}]`:''}`);
    });
  }
  const unfinished=p.tasks.filter(t=>t.status==='pending'||t.status==='check');
  if(unfinished.length){
    lines.push('');
    lines.push('【今日の未実施・要確認タスク】');
    unfinished.forEach(t=>lines.push(`  [${t.status==='check'?'要確認':'未実施'}] ${t.text}（${t.cat}）`));
  }
  if(p.ivLines&&p.ivLines.length){
    lines.push('');
    lines.push('【点滴・輸液詳細】');
    p.ivLines.forEach(iv=>{
      const parts=[iv.drug];
      if(iv.dose) parts.push(iv.dose);
      if(iv.rate) parts.push(`${iv.rate}mL/h`);
      if(iv.start) parts.push(`開始 ${iv.start}`);
      if(iv.end) parts.push(`終了予定 ${iv.end}`);
      lines.push(`  ・${parts.join('  ')}`);
    });
  }
  if(p.medications&&p.medications.length){
    lines.push('');
    lines.push('【内服薬詳細】');
    p.medications.forEach(med=>{
      const timing=[med.am&&'朝',med.noon&&'昼',med.pm&&'夕',med.bed&&'眠前'].filter(Boolean).join('・');
      lines.push(`  ・${med.drug}${med.dose?` ${med.dose}`:''}${timing?` (${timing})`:''}`);
    });
  }
  // 心エコー（最新）
  if(p.echos&&p.echos.length){
    const e=p.echos[0];
    lines.push(''); lines.push(`【心エコーデータ（${e.createdAt||'最新'}）】`);
    const ef=[['EF',e.ef,'%'],['LVDd',e.lvdd,'mm'],['LVDs',e.lvds,'mm'],['IVSd',e.ivs,'mm'],['PWd',e.pw,'mm'],['LAD',e.lad,'mm'],['LVMI',e.lvmi,'g/m²'],['LAVI',e.lavi,'mL/m²'],["E/A",e.ea,''],["e'",e.eprime,'cm/s'],["E/e'",e.ee,''],['Dct',e.dct,'ms'],['IVC max',e.ivcMax,'mm'],['IVC min',e.ivcMin,'mm']];
    ef.filter(([,v])=>v).forEach(([n,v,u])=>lines.push(`  ${n}: ${v}${u}`));
    ['ar','mr','tr','pr'].forEach(k=>{ if(e[k]&&e[k]!=='none')lines.push(`  ${k.toUpperCase()}: ${e[k]}`); });
    if(e.findings) lines.push(`  所見: ${e.findings}`);
  }
  // 症候チェック（問診・身体所見タブ）
  const checkedSx=(SYMPTOMS||[]).filter(s=>p.symptoms&&p.symptoms[s.id]).map(s=>s.label);
  if(checkedSx.length){ lines.push(''); lines.push('【症候チェック（陽性項目）】'); lines.push('  '+checkedSx.join('、')); }
  // 身体所見チェック（異常項目）
  const physItems=[];
  (PHYS_CATS||[]).forEach(cat=>cat.items.forEach((item,i)=>{ const d=p.physChecks&&p.physChecks[`${cat.id}_${i}`];if(d&&d.checked)physItems.push(d.memo?`${item}(${d.memo})`:item); }));
  if(physItems.length){ lines.push(''); lines.push('【身体所見（異常チェック項目）】'); lines.push('  '+physItems.join('、')); }
  if(p.chiefComplaint&&p.chiefComplaint.trim()){ lines.push(''); lines.push('【主訴】'); lines.push(p.chiefComplaint.trim()); }
  if(p.presentIllness&&p.presentIllness.trim()){ lines.push(''); lines.push('【現病歴】'); lines.push(p.presentIllness.trim()); }
  if(p.admissionFindings&&p.admissionFindings.trim()){ lines.push(''); lines.push('【入院時所見】'); lines.push(p.admissionFindings.trim()); }
  if(p.labFindings&&p.labFindings.trim()){ lines.push(''); lines.push('【検査所見（サマリ記載）】'); lines.push(p.labFindings.trim()); }
  if(p.clinicalCourse&&p.clinicalCourse.trim()){ lines.push(''); lines.push('【入院後経過】'); lines.push(p.clinicalCourse.trim()); }
  if(p.treatment&&p.treatment.trim()){ lines.push(''); lines.push('【治療内容】'); lines.push(p.treatment.trim()); }
  if(p.dischargeStatus&&p.dischargeStatus.trim()){ lines.push(''); lines.push('【退院時状態】'); lines.push(p.dischargeStatus.trim()); }
  if(p.dischargePrescription&&p.dischargePrescription.trim()){ lines.push(''); lines.push('【退院時処方】'); lines.push(p.dischargePrescription.trim()); }
  if(p.dischargePolicy&&p.dischargePolicy.trim()){ lines.push(''); lines.push('【退院後方針】'); lines.push(p.dischargePolicy.trim()); }
  if(p.handoverNotes&&p.handoverNotes.trim()){ lines.push(''); lines.push('【申し送り事項】'); lines.push(p.handoverNotes.trim()); }
  if(p.subjective&&p.subjective.trim()){ lines.push(''); lines.push('【S情報（患者の訴え）】'); lines.push(p.subjective.trim()); }
  if(p.memo&&p.memo.trim()){ lines.push(''); lines.push('【メモ】'); lines.push(p.memo.trim()); }
  if((p.ivLines&&p.ivLines.length)||(p.medications&&p.medications.length)||p.tasks.some(t=>t.cat==='内服薬'||t.cat==='点滴・輸液')){
    lines.push(''); lines.push('上記の薬剤について、腎機能・既往歴を踏まえた相互作用・用量調整の必要性・中止すべき薬剤を教えてください。');
  }
  return lines.join('\n');
}

async function copyPatientInfo(){
  const p=selP(); if(!p) return;
  const text=buildClipboardText(p);
  try {
    await navigator.clipboard.writeText(text);
    showCopyMsg();
  } catch(e){
    // Fallback for non-HTTPS
    const ta=document.createElement('textarea');
    ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopyMsg();
  }
}

}

function buildInfectionData(p){
  const age=p.birthdate?calcAge(p.birthdate):'';
  const basic=[p.name&&`氏名: ${p.name}`,age&&`年齢: ${age}`,p.diag&&`診断名: ${p.diag}`,p.date&&`入院日: ${p.date}`,p.height&&`身長: ${p.height}cm`,p.weight&&`体重: ${p.weight}kg`,p.pastHistory&&`既往歴: ${p.pastHistory}`,p.allergies&&`アレルギー: ${p.allergies}`].filter(Boolean).join('\n');
  const vitals=p.tasks.filter(t=>t.cat==='バイタル'||t.cat==='バイタル確認').map(t=>t.text).join('\n');
  const INF_LABS=['WBC','CRP','PCT','Cre','eGFR','Lac','BUN','PLT','Hb','Na','K','ALT','AST','T-Bil','ALB','HbA1c','D-D'];
  const byName={};
  (p.labs||[]).forEach(lv=>{ if(!byName[lv.name]||lv.date>=byName[lv.name].date) byName[lv.name]=lv; });
  const labLines=[...INF_LABS.filter(k=>byName[k]).map(k=>{ const lv=byName[k];const f=getFlag(k,lv.val);return `${k}: ${lv.val}${lv.unit?' '+lv.unit:''}${f?' ['+f+']':''}`; }),
    ...Object.entries(byName).filter(([n])=>!INF_LABS.includes(n)).map(([n,lv])=>`${n}: ${lv.val}${lv.unit?' '+lv.unit:''}`)];
  const medLines=[];
  (p.medications||[]).forEach(m=>{ const t=[m.am&&'朝',m.noon&&'昼',m.pm&&'夕',m.bed&&'眠前'].filter(Boolean).join('・');medLines.push(`内服: ${m.drug}${m.dose?' '+m.dose:''}${t?' ('+t+')':''}`); });
  (p.ivLines||[]).forEach(iv=>{ const pts=[iv.drug];if(iv.dose)pts.push(iv.dose);if(iv.rate)pts.push(iv.rate+'mL/h');medLines.push(`点滴: ${pts.join(' ')}`); });
  p.tasks.filter(t=>t.cat==='内服薬'||t.cat==='点滴・輸液').forEach(t=>medLines.push(`- ${t.text}`));
  const physLines=[];
  const sx=(SYMPTOMS||[]).filter(s=>p.symptoms&&p.symptoms[s.id]).map(s=>s.label);
  if(sx.length) physLines.push(`【症候】${sx.join('、')}`);
  (PHYS_CATS||[]).forEach(cat=>{ const items=[];cat.items.forEach((item,i)=>{ const d=p.physChecks&&p.physChecks[`${cat.id}_${i}`];if(d&&d.checked)items.push(d.memo?`${item}(${d.memo})`:item); });if(items.length)physLines.push(`【${cat.label}】${items.join('、')}`); });
  return {basic,vitals,labs:labLines.join('\n'),meds:medLines.join('\n'),phys:physLines.join('\n'),sinfo:p.subjective||''};
}

    S.aiResult=r.text||'（応答が空でした）';
    pushAIHistory(p,'infection',r.text);
  } catch(e){ S.aiResult=`エラー: ${e.message}`; }
  S.aiLoading=false; renderAI();
}

async function sendAIChat(){
  const p=selP(); if(!p||S.chatBusy) return;
  const inp=document.getElementById('ai-chat-input'); if(!inp) return;
  const q=inp.value.trim(); if(!q) return;
  if(!getApiKey()){ S.aiSettingsOpen=true; renderAI(); alert('先にAPIキーを設定してください'); return; }
  if(!p.aiChat) p.aiChat=[];
  p.aiChat.push({role:'user',content:q,ts:nowHM()});
  save();
  S.chatBusy=true; renderAI();
  const scrollChat=()=>{ const sc=document.getElementById('chatMsgs'); if(sc) sc.scrollTop=sc.scrollHeight; };
  scrollChat();
  try{
    const ctx=anonymizeForAI(buildClipboardText(p),p);
    const lastAnalysis=(S.aiResult&&!S.aiResult.startsWith('エラー'))?S.aiResult:(p.aiHistory&&p.aiHistory[0]?p.aiHistory[0].text:'');
    const msgs=[
      {role:'user',content:`【患者情報】\n${ctx}${kbContext()}\n\n上記の担当患者について相談させてください。`},
      {role:'assistant',content:lastAnalysis?`承知しました。患者情報を確認しました。参考までに直近のAI分析結果は以下です:\n\n${anonymizeForAI(lastAnalysis,p)}\n\nご質問をどうぞ。`:'承知しました。患者情報を確認しました。ご質問をどうぞ。'},
    ];
    let hist=p.aiChat.slice(-9);
    while(hist.length&&hist[0].role!=='user') hist.shift();
    hist.forEach(m=>msgs.push({role:m.role,content:m.content}));
    const r=await callClaude({
      system:`あなたは経験豊富な内科指導医です。診療看護師（NP）実習生からの担当患者に関する質問に、根拠を示しつつ簡潔・具体的に日本語で答えてください。次に取るべきアクションが明確になる、教育的な回答を心がけてください。`,
      messages:msgs,
      maxTokens:2048,
      onDelta:(d,full)=>{ const b=document.getElementById('chatStream'); if(b){ b.textContent=full; } scrollChat(); },
    });
    p.aiChat.push({role:'assistant',content:r.text||'（応答が空でした）',ts:nowHM()});
  }catch(e){
    p.aiChat.push({role:'assistant',content:`エラー: ${e.message}`,ts:nowHM()});
  }
  p.aiChat=p.aiChat.slice(-30);
  save(); S.chatBusy=false; renderAI();
  setTimeout(()=>{ const sc=document.getElementById('chatMsgs'); if(sc) sc.scrollTop=sc.scrollHeight; const i=document.getElementById('ai-chat-input'); if(i) i.focus(); },60);
}
function clearAIChat(){
  const p=selP(); if(!p) return;
  if(p.aiChat&&p.aiChat.length&&!confirm('この患者とのチャット履歴を消去しますか？')) return;
  p.aiChat=[]; save(); renderAI();
}

const SUGGEST_TASKS_TOOL={
  name:'suggest_tasks',
  description:'患者の病態に基づき、本日実施すべき具体的なタスクを提案する',
  input_schema:{
    type:'object',
    properties:{
      tasks:{
        type:'array',
        description:'提案タスク（5〜10個）。既存タスクと重複しないこと。',
        items:{
          type:'object',
          properties:{
            text:{type:'string',description:'タスク内容（簡潔・具体的に。例「K再検（前回5.2、内服変更後）」）'},
            cat:{type:'string',enum:CAT_NAMES,description:'カテゴリ'},
            priority:{type:'string',enum:['高','中','低']},
            reason:{type:'string',description:'なぜ今日必要か（1文）'},
          },
          required:['text','cat','priority'],
        },
      },
    },
    required:['tasks'],
  },
};
async function suggestTasksAI(){
  const p=selP(); if(!p||S.taskSuggestBusy) return;
  if(!getApiKey()){ alert('APIキーが未設定です。AIアシスタントタブで設定してください'); return; }
  S.taskSuggestBusy=true; renderTasks();
  try{
    const cur=p.tasks.filter(t=>t.status!=='done').map(t=>`[${t.cat}] ${t.text}`).join('\n')||'（なし）';
    const done=p.tasks.filter(t=>t.status==='done').map(t=>`[${t.cat}] ${t.text}`).join('\n')||'（なし）';
    const r=await callClaude({
      system:`あなたは病棟管理に長けた内科指導医です。診療看護師（NP）実習生の1日のタスク計画を支援します。この患者の病態・検査値・薬剤に特異的で、見逃すと危険なものを優先して提案してください。`,
      messages:[{role:'user',content:anonymizeForAI(`${buildClipboardText(p)}

【現在の未完了タスク】
${cur}

【本日実施済みタスク】
${done}

上記の患者に対して、本日実施・確認すべきタスクを提案してください。一般論より、この患者のデータ（異常値・薬剤・デバイス・経過）に紐づく具体的なタスクを優先してください。`,p)}],
      maxTokens:2048,
      tools:[SUGGEST_TASKS_TOOL],
      toolChoice:{type:'tool',name:'suggest_tasks'},
    });
    const items=((r.toolInput&&r.toolInput.tasks)||[]).filter(t=>t&&t.text);
    if(!items.length){ alert('提案できるタスクがありませんでした'); }
    else S.taskSuggest={items,sel:items.map(()=>true)};
  }catch(e){ alert('タスク提案エラー: '+e.message); }
  S.taskSuggestBusy=false; renderTasks();
}
function toggleTaskSuggest(i){
  if(!S.taskSuggest) return;
  S.taskSuggest.sel[i]=!S.taskSuggest.sel[i];
  renderTasks();
}
function applyTaskSuggest(){
  const p=selP(); if(!p||!S.taskSuggest) return;
  let n=0;
  S.taskSuggest.items.forEach((t,i)=>{
    if(!S.taskSuggest.sel[i]) return;
    const cat=CAT_NAMES.includes(t.cat)?t.cat:'その他';
    if(p.tasks.some(x=>x.text===t.text)) return;
    p.tasks.push({id:uid(),text:t.text,cat,status:'pending',doneAt:null});
    n++;
  });
  S.taskSuggest=null;
  save(); renderTasks();
  showToast(`✅ ${n}件のタスクを追加しました`);
}
function dismissTaskSuggest(){ S.taskSuggest=null; renderTasks(); }

// ================================================================
// v3: 投与計画（内服・点滴）— 登録・週間カレンダー・毎日チェック
// ================================================================
const SLOT_DEFS=[['am','朝'],['noon','昼'],['pm','夕'],['bed','眠前']];
function planActiveOn(pl,dateStr){
  if(pl.startDate&&dateStr<pl.startDate) return false;
  if(pl.endDate&&dateStr>pl.endDate) return false;
  return true;
}
function planSlots(pl){
  if(pl.type==='iv') return [['iv',pl.rate?`点滴(${pl.rate}mL/h)`:'点滴']];
  const s=SLOT_DEFS.filter(([k])=>pl.timings&&pl.timings[k]);
  return s.length?s:[['once','1日1回']];
}
function isMedChecked(p,date,planId,slot){ return !!(p.medChecks&&p.medChecks[date]&&p.medChecks[date][planId+'_'+slot]); }
function toggleMedCheck(date,planId,slot){
  const p=selP(); if(!p) return;
  if(!p.medChecks) p.medChecks={};
  if(!p.medChecks[date]) p.medChecks[date]={};
  const k=planId+'_'+slot;
  p.medChecks[date][k]=!p.medChecks[date][k];
  save(); renderTab();
}
function addMedPlan(){
  const p=selP(); if(!p) return;
  const gv=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  const gc=id=>{const el=document.getElementById(id);return el?el.checked:false;};
  const drug=gv('mp-drug'); if(!drug){ const el=document.getElementById('mp-drug'); el&&el.focus(); return; }
  const type=gv('mp-type')||'po';
  const pl={id:uid(),type,drug,dose:gv('mp-dose'),rate:gv('mp-rate'),
    timings:{am:gc('mp-am'),noon:gc('mp-noon'),pm:gc('mp-pm'),bed:gc('mp-bed')},
    startDate:gv('mp-start')||todayStr(),endDate:gv('mp-end'),memo:''};
  if(!p.medPlan) p.medPlan=[];
  p.medPlan.push(pl);
  save(); renderTx();
  showToast(`💊 ${drug} を投与計画に追加しました`);
}
function stopMedPlan(id){
  const p=selP(); if(!p) return;
  const pl=(p.medPlan||[]).find(x=>x.id===id); if(!pl) return;
  pl.endDate=todayStr(); save(); renderTx();
  showToast(`⏹ ${pl.drug} を本日で終了にしました`);
}
function resumeMedPlan(id){
  const p=selP(); if(!p) return;
  const pl=(p.medPlan||[]).find(x=>x.id===id); if(!pl) return;
  pl.endDate=''; save(); renderTx();
}
function deleteMedPlan(id){
  const p=selP(); if(!p) return;
  const pl=(p.medPlan||[]).find(x=>x.id===id);
  if(pl&&!confirm(`「${pl.drug}」を投与計画から削除しますか？\n（終了しただけなら「終了」を推奨。削除は誤登録時のみ）`)) return;
  p.medPlan=(p.medPlan||[]).filter(x=>x.id!==id);
  save(); renderTx();
}
function renderTodayMeds(p){
  const date=todayStr();
  const plans=(p.medPlan||[]).filter(pl=>planActiveOn(pl,date));
  if(!plans.length){
    return `<div class="sec-card" style="border-left:4px solid #14b8a6"><div class="sec-head"><span>💉 本日の投与チェック</span><button class="smart-mini" onclick="switchTab('tx')">💊 治療タブで登録</button></div>
      <div style="font-size:11px;color:var(--g500)">治療タブで内服・点滴を登録すると、毎日ここに自動でチェックリストが出ます。</div></div>`;
  }
  let total=0,done=0;
  const row=pl=>{
    const chips=planSlots(pl).map(([k,lbl])=>{
      const ck=isMedChecked(p,date,pl.id,k); total++; if(ck)done++;
      return `<button class="tm-chip${ck?' on':''}" onclick="toggleMedCheck('${date}','${pl.id}','${k}')">${ck?'✓ ':''}${lbl}</button>`;
    }).join('');
    return `<div class="tm-row"><span class="tm-type ${pl.type}">${pl.type==='iv'?'点滴':'内服'}</span>
      <span class="tm-drug">${esc(pl.drug)}${pl.dose?` <span style="color:var(--g500);font-weight:400">${esc(pl.dose)}</span>`:''}</span>
      <span class="tm-chips">${chips}</span></div>`;
  };
  const poRows=plans.filter(pl=>pl.type!=='iv').map(row).join('');
  const ivRows=plans.filter(pl=>pl.type==='iv').map(row).join('');
  return `<div class="sec-card" style="border-left:4px solid #14b8a6">
    <div class="sec-head"><span>💉 本日の投与チェック <span class="sec-cnt">${done}/${total}</span></span><button class="smart-mini" onclick="switchTab('tx')">週間カレンダー →</button></div>
    ${ivRows}${poRows}
  </div>`;
}

function getTxAlerts(p){
  const alerts=[];
  const today=todayStr();
  const drugs=(p.medPlan||[]).filter(pl=>planActiveOn(pl,today)).map(pl=>pl.drug).join('\n');
  if(!drugs&&!(p.labs||[]).length) return alerts;
  const has=re=>re.test(drugs);
  const latest=name=>{ const m={}; (p.labs||[]).forEach(lv=>{ if(!m[lv.name]||lv.date>=m[lv.name].date) m[lv.name]=lv; }); return m[name]?parseFloat(m[name].val):null; };
  const hx=(p.pastHistory||'')+' '+(p.diag||'');
  const alg=p.allergies||'';
  const add=(level,msg)=>alerts.push({level,msg});
  // --- 薬×薬 ---
  const RX=[
    [/ワル?ファリン|ワーファリン/,/ミコナゾール|フロリード/,'禁忌','ワルファリン×ミコナゾール: 併用禁忌（INR著増・重篤な出血）'],
    [/ワル?ファリン|ワーファリン/,/ロキソプロフェン|ジクロフェナク|イブプロフェン|セレコキシブ|NSAIDs|アスピリン|バイアスピリン/,'注意','ワルファリン×NSAIDs/アスピリン: 出血リスク増大。INR頻回確認・消化管保護を検討'],
    [/ワル?ファリン|ワーファリン/,/クラリスロマイシン|レボフロキサシン|シプロフロキサシン|ST合剤|バクタ(?!ム)/,'注意','ワルファリン×抗菌薬: INR上昇しやすい。3〜5日後にINR確認'],
    [/アピキサバン|エリキュース|リバーロキサバン|イグザレルト|エドキサバン|リクシアナ|ダビガトラン|プラザキサ/,/イトラコナゾール|リトナビル/,'禁忌','DOAC×強力なCYP3A4/P-gp阻害薬: 血中濃度上昇。併用回避'],
    [/スピロノラクトン|アルダクトン|エプレレノン|セララ/,/エナラプリル|リシノプリル|ペリンドプリル|イミダプリル|カンデサルタン|ロサルタン|バルサルタン|テルミサルタン|オルメサルタン|アジルサルタン/,'注意','MRA×ACE阻害薬/ARB: 高K血症リスク。K・腎機能を定期確認'],
    [/ジゴキシン|ジゴシン/,/フロセミド|ラシックス|トラセミド|ルプラック/,'注意','ジゴキシン×ループ利尿薬: 低K血症でジギタリス中毒リスク。K補正を確認'],
    [/ジゴキシン|ジゴシン/,/クラリスロマイシン|ベラパミル|ワソラン|アミオダロン|アンカロン/,'注意','ジゴキシン濃度上昇の併用。血中濃度・徐脈に注意'],
    [/アトルバスタチン|リピトール|シンバスタチン/,/クラリスロマイシン|イトラコナゾール/,'注意','スタチン×CYP3A4阻害薬: 横紋筋融解症リスク。CK・筋症状を確認'],
    [/レボフロキサシン|クラビット|シプロフロキサシン|ガレノキサシン|モキシフロキサシン/,/酸化マグネシウム|マグミット|アルミ|スクラルファート|鉄剤|フェロミア|カルシウム/,'注意','キノロン×金属カチオン: キレート形成で吸収低下。2時間以上あけて服用'],
    [/レボフロキサシン|シプロフロキサシン/,/テオフィリン|テオドール/,'注意','キノロン×テオフィリン: けいれんリスク・テオフィリン濃度上昇'],
    [/シルデナフィル|バイアグラ|タダラフィル|シアリス|ザルティア|バルデナフィル/,/ニトログリセリン|硝酸イソソルビド|ニトロール|フランドル|ニコランジル|シグマート/,'禁忌','PDE5阻害薬×硝酸薬: 併用禁忌（重篤な血圧低下）'],
    [/トラマドール|トラムセット/,/セルトラリン|ジェイゾロフト|エスシタロプラム|レクサプロ|パロキセチン|パキシル|フルボキサミン|デュロキセチン|サインバルタ/,'注意','トラマドール×SSRI/SNRI: セロトニン症候群・けいれんリスク'],
    [/オメプラゾール|オメプラール/,/クロピドグレル|プラビックス/,'注意','オメプラゾール×クロピドグレル: 抗血小板効果減弱。ランソプラゾール等へ変更検討'],
    [/メトトレキサート|リウマトレックス/,/NSAIDs|ロキソプロフェン|ジクロフェナク|ST合剤|バクタ(?!ム)/,'重要','MTX×NSAIDs/ST合剤: MTX排泄低下→骨髄抑制リスク'],
    [/アスパラ.*カリウム|グルコン酸カリウム|塩化カリウム|ケーサプライ|スローケー/,/スピロノラクトン|エプレレノン/,'注意','K製剤×MRA: 高K血症リスク。K値を頻回確認'],

  const egfr=latest('eGFR'), k=latest('K');
  if(egfr!==null){
    if(egfr<30&&has(/メトホルミン|メトグルコ|グリコラン/)) add('禁忌',`メトホルミン: eGFR ${egfr} (<30) → 禁忌。乳酸アシドーシスリスク、中止を`);
    else if(egfr<45&&has(/メトホルミン|メトグルコ/)) add('注意',`メトホルミン: eGFR ${egfr} (<45) → 減量・慎重投与`);
    if(egfr<45&&has(/ロキソプロフェン|ジクロフェナク|イブプロフェン|セレコキシブ|NSAIDs/)) add('重要',`NSAIDs: eGFR ${egfr} → 腎機能悪化リスク。アセトアミノフェンへの変更を検討`);

  }
  if(k!==null&&k>=5.0&&has(/スピロノラクトン|エプレレノン|エナラプリル|リシノプリル|カンデサルタン|ロサルタン|バルサルタン|テルミサルタン|オルメサルタン|アジルサルタン|カリウム/)) add('重要',`K ${k} mEq/L: RAS阻害薬/MRA/K製剤継続の可否を確認（高K血症進行リスク）`);
  if(/喘息|気管支喘息/.test(hx)&&has(/ビソプロロール|メインテート|カルベジロール|アーチスト|プロプラノロール|アテノロール|メトプロロール/)) add('注意','喘息既往+β遮断薬: 気管支攣縮リスク。β1選択性でも注意');
  if(/喘息/.test(hx)&&has(/ロキソプロフェン|ジクロフェナク|イブプロフェン|アスピリン|NSAIDs/)) add('注意','喘息既往+NSAIDs: アスピリン喘息（NSAIDs過敏）の可能性を確認');
  if(/パーキンソン/.test(hx)&&has(/メトクロプラミド|プリンペラン|ハロペリドール|セレネース|プロクロルペラジン|ノバミン/)) add('禁忌','パーキンソン病+ドパミン遮断薬（プリンペラン/セレネース等）: 症状悪化。ドンペリドン等を検討');
  // --- アレルギー交差 ---
  if(/ペニシリン/.test(alg)&&has(/ペニシリン|アモキシシリン|サワシリン|アンピシリン|ピペラシリン|ゾシン|タゾピペ|オーグメンチン/)) add('禁忌','ペニシリンアレルギー歴あり: ペニシリン系が処方されています！');

  if(/キノロン/.test(alg)&&has(/レボフロキサシン|シプロフロキサシン|クラビット/)) add('禁忌','キノロンアレルギー歴あり: キノロン系が処方されています！');
  if(/造影剤/.test(alg)) add('注意','造影剤アレルギー歴あり: 造影検査オーダー時は前投薬プロトコルを確認');
  // --- 食事 ---
  if(has(/ワル?ファリン|ワーファリン/)) add('食事','ワルファリン服用中: 納豆・クロレラ・青汁は禁止（ビタミンKで効果減弱）。栄養科への指示も確認');
  if(has(/アムロジピン|アダラート|ニフェジピン|フェロジピン|ニソルジピン/)) add('食事','Ca拮抗薬: グレープフルーツ(ジュース)で血中濃度上昇→血圧低下に注意');
  if(has(/セフト リアキソン|セフトリアキソン|ロセフィン/)&&has(/カルシウム|リンゲル|ラクテック/)) add('注意','セフトリアキソン×Ca含有輸液: 同一ルート同時投与で沈殿。ルート・時間を分ける');
  return alerts;
}
function renderTxAlerts(p){
  const alerts=getTxAlerts(p);
  const LV={'禁忌':['#fef2f2','#fca5a5','#b91c1c','⛔'],'重要':['#fef2f2','#fecaca','#dc2626','🔴'],'注意':['#fffbeb','#fde68a','#92400e','⚠️'],'食事':['#eff6ff','#bfdbfe','#1e40af','🍽']};
  const items=alerts.map(a=>{ const s=LV[a.level]||LV['注意'];
    return `<div style="background:${s[0]};border:1px solid ${s[1]};border-radius:7px;padding:8px 11px;margin-bottom:5px;font-size:12px;color:${s[2]};line-height:1.6"><b>${s[3]} ${a.level}</b>　${esc(a.msg)}</div>`; }).join('');
  return `<div class="sec-card" style="border-left:4px solid ${alerts.some(a=>a.level==='禁忌'||a.level==='重要')?'#dc2626':alerts.length?'#d97706':'#059669'}">
    <div class="sec-head"><span>🚨 自動アラート（禁忌・相互作用・食事）<span class="sec-cnt">${alerts.length}</span></span>
      <span style="display:flex;gap:6px"><button class="smart-mini" onclick="goAIMode('meds')" title="AIで処方全体を監査（相互作用・用量・中止候補）">🤖 AI処方監査</button></span></div>
    ${items||'<div style="font-size:11px;color:var(--g500)">現在の投与計画・検査値・既往歴から自動チェック — 問題は検出されていません（AI処方監査での確認も推奨）</div>'}

  </div>`;
}

function renderFluidCalc(p){
  const w=parseFloat(p.weight);
  const today=todayStr();
  const ivs=(p.medPlan||[]).filter(pl=>pl.type==='iv'&&planActiveOn(pl,today));
  const vols=ivs.map(pl=>{
    let v=null,how='';
    const rate=parseFloat(pl.rate);
    const doseMl=(String(pl.dose||'').match(/([\d.]+)\s*m[lL]/)||[])[1];
    if(rate){ v=Math.round(rate*24); how=`${rate}mL/h×24h`; }
    else if(doseMl){ v=parseFloat(doseMl); how='1日1回として'; }
    return {name:pl.drug,v,how};
  });
  const total=vols.reduce((s,x)=>s+(x.v||0),0);
  const rows=vols.map(x=>`<div class="fluid-row"><span>${esc(x.name)}</span><span>${x.v!==null?`${x.v} mL/日 <span style="color:var(--g400);font-size:10px">(${x.how})</span>`:'<span style="color:var(--g400)">量不明</span>'}</span></div>`).join('');
  const body=w?`
    <div class="fluid-grid">
      <div class="fluid-cell"><div class="fluid-k">維持水分量 (25–30mL/kg/日)</div><div class="fluid-v">${Math.round(w*25)}–${Math.round(w*30)} <span>mL/日</span></div></div>
      <div class="fluid-cell"><div class="fluid-k">4-2-1ルール</div><div class="fluid-v">${Math.round(w<=10?w*4:w<=20?40+(w-10)*2:60+(w-20))} <span>mL/h</span></div></div>
      <div class="fluid-cell"><div class="fluid-k">Na必要量 (1–2mEq/kg/日)</div><div class="fluid-v">${Math.round(w)}–${Math.round(w*2)} <span>mEq/日</span></div></div>
      <div class="fluid-cell"><div class="fluid-k">K必要量 (0.5–1mEq/kg/日)</div><div class="fluid-v">${Math.round(w*0.5)}–${Math.round(w)} <span>mEq/日</span></div></div>
    </div>
    ${rows?`<div style="margin-top:8px;font-size:11px;font-weight:700;color:var(--g600)">現在の点滴（推定合計 <span style="color:${w&&total>w*35?'#dc2626':total<w*20&&total>0?'#d97706':'#059669'}">${total} mL/日</span>）</div>${rows}`:'<div style="font-size:11px;color:var(--g500);margin-top:6px">点滴の登録はありません</div>'}
    <div style="font-size:10px;color:var(--g400);margin-top:6px">※ 目安値。心不全・腎不全・脱水・発熱・ドレーン排液などで必ず調整。食事摂取分も考慮。</div>`
    :`<div style="font-size:12px;color:var(--warning)">体重が未登録です。患者「編集」から体重を入力すると自動計算されます。</div>`;
  return secCard('💧','維持輸液 必要量計算',body,'#0891b2');
}

// ひらがな→カタカナ・全角英数半角化・小文字化で表記ゆれを吸収
function kanaFold(s){
  return String(s||'').replace(/[ぁ-ゖ]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60))
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
    .replace(/[ー－・／]/g,'').toLowerCase();
}
function drugMatch(q,d){
  const query=kanaFold(q);
  if(!query) return false;
  // 一般名・商品名・分類のいずれかに部分一致（ひらがな/カタカナ/英字どれでも）
  return kanaFold(d[0]).includes(query)||kanaFold(d[1]).includes(query)||kanaFold(d[2]).includes(query);
}
function searchDrugs(q){
  if(!q||!q.trim()) return [];
  const query=q.trim();
  const hits=DRUG_DB.filter(d=>drugMatch(query,d));
  // 先頭一致を上位に（より「入力に近い」候補が上に来るように）
  const fq=kanaFold(query);
  hits.sort((a,b)=>{
    const ap=kanaFold(a[0]).startsWith(fq)||kanaFold(a[1]).startsWith(fq)?0:1;
    const bp=kanaFold(b[0]).startsWith(fq)||kanaFold(b[1]).startsWith(fq)?0:1;
    return ap-bp;
  });
  return hits.slice(0,40);
}
function mpDrugInput(input){
  const q=input.value;
  const box=document.getElementById('mp-drug-sug');
  if(!box) return;
  const results=searchDrugs(q);
  if(!results.length){ box.style.display='none'; box.innerHTML=''; return; }
  box.innerHTML=results.map((d,i)=>{
    const [name,brand,cat,def,timing,form]=d;
    return `<div class="drug-sug-row" onmousedown="event.preventDefault();mpDrugPick(${JSON.stringify(i).replace(/"/g,'&quot;')})" data-idx="${i}">
      <div class="drug-sug-main"><b>${esc(name)}</b><span class="drug-sug-brand">${esc(brand)}</span></div>
      <div class="drug-sug-cat">${esc(cat)}${def.dose?' ・ '+esc(def.dose):''}</div>
    </div>`;
  }).join('');
  box._results=results;
  box.style.display='block';
}
function mpDrugPick(idx){
  const box=document.getElementById('mp-drug-sug');
  const d=box&&box._results&&box._results[idx];
  if(!d) return;
  const [name,,,def,timing,form]=d;
  const drugEl=document.getElementById('mp-drug'); if(drugEl) drugEl.value=name;
  const doseEl=document.getElementById('mp-dose'); if(doseEl&&def.dose) doseEl.value=def.dose;
  const rateEl=document.getElementById('mp-rate'); if(rateEl) rateEl.value=def.rate||'';
  const typeEl=document.getElementById('mp-type'); if(typeEl) typeEl.value=form;
  ['am','noon','pm','bed'].forEach(k=>{ const el=document.getElementById('mp-'+k); if(el) el.checked=!!def[k]; });
  box.style.display='none';
  if(doseEl) doseEl.focus();
}
function mpDrugBlurHide(){ setTimeout(()=>{ const box=document.getElementById('mp-drug-sug'); if(box) box.style.display='none'; },150); }

const DDX_TOOL={
  name:'generate_ddx',
  description:'鑑別診断リストを3層（レッドフラッグ/コモン/まれ）で生成する',
  input_schema:{type:'object',properties:{
    red:{type:'array',description:'見逃すと致死的・重篤なレッドフラッグ疾患（2〜5個）',items:{type:'object',properties:{name:{type:'string'},basis:{type:'string',description:'支持・非支持所見の要約1文'},ruleOut:{type:'string',description:'除外・確認に必要な検査/所見'}},required:['name']}},
    common:{type:'array',description:'頻度の高いコモン疾患（3〜6個）',items:{type:'object',properties:{name:{type:'string'},basis:{type:'string'},ruleOut:{type:'string'}},required:['name']}},
    rare:{type:'array',description:'まれだが本症例で一考すべき疾患（2〜4個）',items:{type:'object',properties:{name:{type:'string'},basis:{type:'string'},ruleOut:{type:'string'}},required:['name']}},
  },required:['red','common','rare']},
};
async function generateDdxAI(){
  const p=selP(); if(!p||S.ddxBusy) return;
  if(!getApiKey()){ alert('APIキーが未設定です（AIタブで設定）'); return; }
  S.ddxBusy=true; renderDx();
  try{
    const r=await callClaude({
      system:'あなたは臨床推論の名手である総合内科指導医です。病歴・身体所見・検査から鑑別診断を、レッドフラッグ（見逃し厳禁）→コモン→まれ、の3層で挙げてください。各疾患に支持所見と除外方法を付けてください。',
      messages:[{role:'user',content:anonymizeForAI(buildClipboardText(p),p)+kbContext()+'\n\n上記から鑑別診断リストを生成してください（参照資料に該当疾患の基準があれば鑑別の根拠・除外方法に活用）。'}],
      maxTokens:3000, tools:[DDX_TOOL], toolChoice:{type:'tool',name:'generate_ddx'},
    });
    if(r.toolInput){
      const names=new Set((p.ddx||[]).map(d=>d.name));
      let added=0;
      [['red',r.toolInput.red],['common',r.toolInput.common],['rare',r.toolInput.rare]].forEach(([tier,arr])=>{
        (arr||[]).forEach(d=>{ if(d&&d.name&&!names.has(d.name)){ p.ddx.push({id:uid(),name:d.name,tier,basis:d.basis||'',ruleOut:d.ruleOut||'',status:'active'}); names.add(d.name); added++; } });
      });
      save(); showToast(`🎯 鑑別を${added}件追加しました`);
    }
  }catch(e){ alert('鑑別生成エラー: '+e.message); }
  S.ddxBusy=false; renderDx();
}
function addDdxManual(){
  const p=selP(); if(!p) return;

  const name=nameEl?nameEl.value.trim():''; if(!name){ nameEl&&nameEl.focus(); return; }
  p.ddx.push({id:uid(),name,tier:(tierEl&&tierEl.value)||'common',basis:'',ruleOut:'',status:'active'});
  save(); renderDx();
}
function setDdxStatus(id,st){
  const p=selP(); if(!p) return;

  }
  save(); renderDx();
}
function deleteDdx(id){ const p=selP(); if(!p)return; p.ddx=(p.ddx||[]).filter(x=>x.id!==id); save(); renderDx(); }

function deleteConfirmed(id){ const p=selP(); if(!p)return; p.confirmedDx=(p.confirmedDx||[]).filter(x=>x.id!==id); save(); renderDx(); }
function dxToProblem(name){

function deleteProblem(id){ const p=selP(); if(!p)return; p.problems=(p.problems||[]).filter(x=>x.id!==id); save(); renderDx(); }
function renderDx(){
  const p=selP(); const c=document.getElementById('tabContent'); if(!p||!c) return;
  const TIERS=[['red','🔴 レッドフラッグ（見逃し厳禁）','#dc2626'],['common','🟠 コモン（頻度が高い）','#d97706'],['rare','🟣 まれ・一考すべき','#7c3aed']];
  const ddxItem=d=>`
    <div class="ddx-item st-${d.status}">
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
        <b class="ddx-name">${esc(d.name)}</b>
        ${d.status==='confirmed'?'<span class="ddx-badge conf">確定</span>':''}
        ${d.status==='ruled'?'<span class="ddx-badge ruled">除外</span>':''}
        <span class="ddx-acts">
          <button class="smart-mini" onclick="setDdxStatus('${d.id}','ruled')">${d.status==='ruled'?'↩ 戻す':'除外'}</button>

function exportBackup(){
  const data={app:'clinical_v2',version:2,exportedAt:new Date().toISOString(),patients:S.patients};
  const blob=new Blob([JSON.stringify(data,null,1)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`臨床データ_バックアップ_${todayStr()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),3000);
  showToast('💾 バックアップを保存しました（ダウンロードフォルダ）');
}
function importBackupFile(input){
  const f=input.files&&input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      const pts=Array.isArray(d)?d:(d.patients||null);
      if(!pts||!Array.isArray(pts)) throw new Error('バックアップ形式ではありません');
      const add=confirm(`${pts.length}名の患者データが見つかりました。\n\n［OK］既存データに追加する（同名患者はスキップ）\n［キャンセル］現在のデータを全て置き換える`);
      if(add){
        const names=new Set(S.patients.map(p=>p.name));
        let added=0;
        pts.forEach(p=>{ if(!names.has(p.name)){ S.patients.push(migrate(p)); added++; } });
        showToast(`📂 ${added}名を追加しました`);
      }else{
        if(!confirm('⚠ 現在の全データを置き換えます。本当によろしいですか？')){ input.value=''; return; }
        S.patients=pts.map(migrate); S.sel=null;
        showToast(`📂 ${pts.length}名のデータで置き換えました`);
      }
      save(); render();
    }catch(err){ alert('読み込みエラー: '+err.message); }
    input.value='';
  };
  r.readAsText(f);
}

const SMART_SYSTEM=`あなたは医療データ入力の専門家です。電子カルテの画面コピー、検査報告書、処方箋、手書きメモ、写真などから、記載されている臨床情報だけを正確に抽出します。
ルール:
- 記載されていない値を推測で作らない。読み取れない項目は省略する。
- 検査項目名は日本の標準略称に正規化する（WBC, RBC, Hb, Ht, Plt, AST, ALT, γ-GTP, ALP, T-Bil, ALB, TP, BUN, Cre, eGFR, UA, Na, K, Cl, Ca, P, Glu, HbA1c, CRP, PCT, BNP, NT-proBNP, D-D, PT-INR, APTT, TSH, FT4, Lac, NH3 等）。
- 数値は数値として抽出（単位や不等号は含めない）。定性結果（陰性/陽性）は val を 0/1 とする。
- 日付は YYYY-MM-DD 形式。年が不明なら今年と仮定する。
- 内服薬は用法（朝・昼・夕・眠前）を読み取れたら反映する。
- 心エコーの計測値（LVEF/EF, FS, LVDd, LVDs, IVSTd, PWTd, LAD, LVMI, LAVI, E波, A波, E/A, e', E/e', Dct, TRPG, 推定PASP, IVC径, TAPSE, RVDd, 弁逆流, 心嚢液など）は labs に入れず、必ず echo オブジェクトに入れる。
- 問診・病歴の記載からは OPQRST（発症様式・増悪寛解因子・性状・部位/放散・強さ・時間経過）と、陽性の症状（symptoms、指定リストの表現に正規化。「なし」「否定」されたものは含めない）も抽出する。
- 身体診察の記載は histories.physicalFindings に入れる。
- 文章情報（現病歴・経過など）は原文のニュアンスを保って抽出する。`;
function smartToolDef(){
  return {
    name:'import_clinical_data',
    description:'臨床データから構造化情報を抽出する',
    input_schema:{
      type:'object',

// 音声入力（Web Speech API対応ブラウザのみボタン表示。iPhoneはキーボードの🎤推奨）
let _dictRec=null;
function dictationSupported(){ return !!(window.SpeechRecognition||window.webkitSpeechRecognition); }
function toggleDictation(taId,btnId,onText){
  taId=taId||'smart-text'; btnId=btnId||'smart-mic';
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert('このブラウザは音声認識に非対応です。キーボードのマイク（音声入力）をご利用ください'); return; }
  const btn=document.getElementById(btnId);
  if(_dictRec){ try{_dictRec.stop();}catch(_){} return; }
  const rec=new SR();
  rec.lang='ja-JP'; rec.continuous=true; rec.interimResults=true;
  const ta=document.getElementById(taId);
  const base=ta?ta.value:'';
  rec.onresult=e=>{
    let fin='',inter='';
    for(let i=0;i<e.results.length;i++){ const r=e.results[i]; if(r.isFinal) fin+=r[0].transcript; else inter+=r[0].transcript; }
    if(ta){ ta.value=base+((base&&(fin||inter))?'\n':'')+fin+inter; ta.scrollTop=ta.scrollHeight; if(onText) onText(ta.value); }
  };
  const done=()=>{ _dictRec=null; const b=document.getElementById(btnId); if(b){ b.classList.remove('rec'); b.textContent='🎤 音声入力'; } };
  rec.onend=done;
  rec.onerror=ev=>{ if(ev.error==='not-allowed') alert('マイクの使用が許可されていません。ブラウザの設定でマイクを許可してください'); done(); };
  try{ rec.start(); _dictRec=rec; if(btn){ btn.classList.add('rec'); btn.textContent='⏺ 停止（話し終えたら押す）'; } }
  catch(e){ done(); }
}

function compressImage(fileOrUrl){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      try{
        const MAX=1568;
        let w=img.width,h=img.height;
        if(Math.max(w,h)>MAX){ const r=MAX/Math.max(w,h); w=Math.round(w*r); h=Math.round(h*r); }
        const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        resolve(cv.toDataURL('image/jpeg',0.85));
      }catch(e){ reject(new Error('画像の変換に失敗しました')); }
    };
    img.onerror=()=>reject(new Error('画像を読み込めませんでした'));
    if(typeof fileOrUrl==='string'){ img.src=fileOrUrl; }
    else{
      const r=new FileReader();
      r.onload=e=>{ img.src=e.target.result; };
      r.onerror=()=>reject(new Error('ファイルを読み込めませんでした'));
      r.readAsDataURL(fileOrUrl);
    }
  });
}
const SMART_MAX_IMGS=30;

function normalizeSmartResult(raw){
  const r={patient:raw.patient||{},labs:[],vitals:[],medications:[],ivLines:[],echo:raw.echo||null,histories:raw.histories||{},tasks:[],summary:raw.summary||''};
  // OPQRST
  r.opqrst=null;
  if(raw.opqrst&&typeof raw.opqrst==='object'){
    const op={};
    ['o','p','q','r','s','t'].forEach(k=>{ if(raw.opqrst[k]&&String(raw.opqrst[k]).trim()) op[k]=String(raw.opqrst[k]).trim(); });
    if(Object.keys(op).length) r.opqrst=op;
  }
  // ROS陽性症状（正規リストと照合）
  r.symptoms=[];
  (Array.isArray(raw.symptoms)?raw.symptoms:[]).forEach(lb=>{
    const hit=SYMPTOMS.find(s=>s.label===String(lb).trim());
    if(hit&&!r.symptoms.some(x=>x.id===hit.id)) r.symptoms.push({id:hit.id,label:hit.label});
  });
  (Array.isArray(raw.labs)?raw.labs:[]).forEach(lv=>{
    if(!lv||!lv.name) return;
    const val=typeof lv.val==='number'?lv.val:parseFloat(lv.val);
    if(isNaN(val)) return;
    const name=normLabName(String(lv.name).trim());
    const ref=LAB_REF[name];
    r.labs.push({name,val,unit:ref?ref.unit:(lv.unit||''),date:normalizeDate(lv.date||'')||todayStr()});
  });
  (Array.isArray(raw.vitals)?raw.vitals:[]).forEach(v=>{ if(v&&String(v).trim()) r.vitals.push(String(v).trim()); });
  (Array.isArray(raw.medications)?raw.medications:[]).forEach(m=>{ if(m&&m.drug) r.medications.push({drug:String(m.drug).trim(),dose:m.dose?String(m.dose).trim():'',am:!!m.am,noon:!!m.noon,pm:!!m.pm,bed:!!m.bed}); });
  (Array.isArray(raw.ivLines)?raw.ivLines:[]).forEach(iv=>{ if(iv&&iv.drug) r.ivLines.push({drug:String(iv.drug).trim(),dose:iv.dose?String(iv.dose).trim():'',rate:iv.rate?String(iv.rate).replace(/[^\d.]/g,''):'',start:iv.start||'',end:iv.end||''}); });
  (Array.isArray(raw.tasks)?raw.tasks:[]).forEach(t=>{ if(t&&t.text) r.tasks.push({text:String(t.text).trim(),cat:CAT_NAMES.includes(t.cat)?t.cat:'その他'}); });
  // 救済: AIが心エコー項目を labs に振り分けてしまった場合、echo へ移動する
  const ECHO_FIELD_MAP={'EF':'ef','LVEF':'ef','FS':'fs','LVDD':'lvdd','LVDS':'lvds','IVS':'ivs','IVST':'ivs','IVSTD':'ivs','PW':'pw','PWT':'pw','PWTD':'pw','LAD':'lad','LVMI':'lvmi','LAVI':'lavi','E/A':'ea','E波':'ewave','A波':'awave',"E'":'eprime',"E/E'":'ee',"平均E/E'":'meanee','DCT':'dct','TRPG':'trpg','PASP':'pasp','推定PASP':'pasp','TAPSE':'tapse','RVDD':'rvdd','IVCMAX':'ivcMax','IVCMIN':'ivcMin','IVC':'ivcMax'};
  const nonEchoLabs=[];
  r.labs.forEach(lv=>{
    const key=ECHO_FIELD_MAP[String(lv.name).toUpperCase().replace(/[ 　]/g,'')];
    if(key){
      if(!r.echo) r.echo={};
      if(r.echo[key]===undefined||r.echo[key]===null||r.echo[key]==='') r.echo[key]=lv.val;
    } else nonEchoLabs.push(lv);
  });
  r.labs=nonEchoLabs;
  if(r.echo&&!Object.keys(r.echo).some(k=>r.echo[k]!==undefined&&r.echo[k]!==null&&r.echo[k]!=='')) r.echo=null;
  return r;
}
function buildSmartSel(r,p){
  const sel={patient:{},histories:{},labs:r.labs.map(()=>true),vitals:r.vitals.map(()=>true),
    medications:r.medications.map(m=>!(p.medications||[]).some(x=>x.drug===m.drug&&x.dose===m.dose)),
    ivLines:r.ivLines.map(iv=>!(p.ivLines||[]).some(x=>x.drug===iv.drug&&x.dose===iv.dose)),
    tasks:r.tasks.map(t=>!p.tasks.some(x=>x.text===t.text)),
    echo:!!r.echo};
  Object.entries(r.patient||{}).forEach(([k,v])=>{
    if(v===undefined||v===null||v==='') return;
    sel.patient[k]=!p[k]; // 既存値があればデフォルトOFF
  });
  Object.entries(r.histories||{}).forEach(([k,v])=>{
    if(!v||!String(v).trim()) return;
    const existing=(p[k]||'');
    sel.histories[k]=!existing.includes(String(v).trim().slice(0,40)); // 取込済みらしければOFF
  });
  // 検査値: 完全に同じ name+date+val が既にあればOFF
  sel.labs=r.labs.map(lv=>!(p.labs||[]).some(x=>x.name===lv.name&&x.date===lv.date&&String(x.val)===String(lv.val)));
  // バイタル: 同一テキストのタスクがあればOFF
  sel.vitals=r.vitals.map(v=>!p.tasks.some(x=>x.text===v));
  // OPQRST: 既存値があればOFF
  sel.opqrst={};
  if(r.opqrst){ Object.keys(r.opqrst).forEach(k=>{ sel.opqrst[k]=!((p.opqrst||{})[k]||'').trim(); }); }
  // ROS症状: 既にチェック済みならOFF
  sel.symptoms=(r.symptoms||[]).map(sx=>!(p.symptoms&&p.symptoms[sx.id]));
  return sel;
}

  const p=selP(); const r=S.smart.result; const sel=S.smart.sel;
  if(!p||!r||!sel) return;
  const counts={};
  const bump=(k,n)=>{ counts[k]=(counts[k]||0)+(n===undefined?1:n); };
  // 患者基本情報
  Object.entries(r.patient||{}).forEach(([k,v])=>{
    if(!sel.patient[k]||v===undefined||v===null||v==='') return;
    p[k]=(k==='height'||k==='weight')?String(v):String(v).trim();
    bump('基本情報');
  });
  // 検査値
  const n=new Date();
  const ts=`${n.getMonth()+1}/${n.getDate()} ${pad(n.getHours())}:${pad(n.getMinutes())}`;
  r.labs.forEach((lv,i)=>{
    if(!sel.labs[i]) return;
    if((p.labs||[]).some(x=>x.name===lv.name&&x.date===lv.date&&String(x.val)===String(lv.val))) return;
    p.labs.push({id:uid(),name:lv.name,val:lv.val,unit:lv.unit,date:lv.date,ts});
    bump('検査値');
  });
  // バイタル → バイタル確認カテゴリに実施済みタスクとして記録
  r.vitals.forEach((v,i)=>{
    if(!sel.vitals[i]) return;
    if(p.tasks.some(x=>x.text===v)) return;
    p.tasks.push({id:uid(),text:v,cat:'バイタル確認',status:'done',doneAt:nowHM()});
    bump('バイタル');
  });
  // 内服薬（投与計画にも登録）
  if(!p.medications) p.medications=[];
  if(!p.medPlan) p.medPlan=[];
  r.medications.forEach((m,i)=>{
    if(!sel.medications[i]) return;
    if(p.medications.some(x=>x.drug===m.drug&&x.dose===m.dose)) return;
    p.medications.push({id:uid(),...m});
    if(!p.medPlan.some(pl=>pl.type==='po'&&pl.drug===m.drug&&pl.dose===(m.dose||'')&&(!pl.endDate||pl.endDate>=todayStr())))
      p.medPlan.push({id:uid(),type:'po',drug:m.drug,dose:m.dose||'',timings:{am:!!m.am,noon:!!m.noon,pm:!!m.pm,bed:!!m.bed},rate:'',startDate:todayStr(),endDate:'',memo:''});
    bump('内服薬');
  });
  // 点滴（投与計画にも登録）
  if(!p.ivLines) p.ivLines=[];
  r.ivLines.forEach((iv,i)=>{
    if(!sel.ivLines[i]) return;
    if(p.ivLines.some(x=>x.drug===iv.drug&&x.dose===iv.dose&&x.rate===iv.rate)) return;
    p.ivLines.push({id:uid(),...iv});
    if(!p.medPlan.some(pl=>pl.type==='iv'&&pl.drug===iv.drug&&pl.dose===(iv.dose||'')&&(!pl.endDate||pl.endDate>=todayStr())))
      p.medPlan.push({id:uid(),type:'iv',drug:iv.drug,dose:iv.dose||'',timings:{},rate:iv.rate||'',startDate:todayStr(),endDate:'',memo:''});
    bump('点滴');
  });
  // 心エコー
  if(r.echo&&sel.echo){
    if(!p.echos) p.echos=[];
    p.echos.unshift({id:uid(),createdAt:`${todayStr()} ${nowHM()}`,...r.echo});
    bump('心エコー');
  }
  // 文章情報
  Object.entries(r.histories||{}).forEach(([k,v])=>{
    if(!sel.histories[k]||!v||!String(v).trim()) return;
    const txt=String(v).trim();
    if(!p[k]||!String(p[k]).trim()) p[k]=txt;
    else if(!String(p[k]).includes(txt.slice(0,40))) p[k]=String(p[k]).trim()+'\n'+txt;
    else return;
    bump('文章情報');
  });
  // OPQRST
  if(r.opqrst){
    if(!p.opqrst) p.opqrst={};
    Object.entries(r.opqrst).forEach(([k,v])=>{
      if(!sel.opqrst[k]) return;
      const cur=(p.opqrst[k]||'').trim();
      if(!cur) p.opqrst[k]=v;
      else if(!cur.includes(v.slice(0,20))) p.opqrst[k]=cur+' / '+v;
      else return;
      bump('OPQRST');
    });
  }
  // ROS症状チェック
  if(!p.symptoms) p.symptoms={};
  (r.symptoms||[]).forEach((sx,i)=>{
    if(!sel.symptoms[i]) return;
    if(p.symptoms[sx.id]) return;
    p.symptoms[sx.id]=true;
    bump('症状チェック');
  });
  // タスク
  r.tasks.forEach((t,i)=>{
    if(!sel.tasks[i]) return;
    if(p.tasks.some(x=>x.text===t.text)) return;
    p.tasks.push({id:uid(),text:t.text,cat:t.cat,status:'pending',doneAt:null});
    bump('タスク');
  });
  save();
  closeSmartImport();
  render();
  const msg=Object.entries(counts).map(([k,v])=>`${k}${v}件`).join('・');
  showToast(msg?`📥 取込完了: ${msg}`:'取り込む項目が選択されていませんでした');
}

function renderSmartPreview(r,sel,p){
  const chk=(on,handler)=>`<span class="smart-chk${on?' on':''}" onclick="${handler}">${on?'✓':''}</span>`;
  const secHead=(title,group,count)=>`
    <div class="smart-sec-head">
      <span>${title} <span style="color:var(--g400);font-weight:400">${count}件</span></span>
      <span style="margin-left:auto;display:flex;gap:6px">
        <button class="smart-mini" onclick="smartToggleAll('${group}',true)">全選択</button>
        <button class="smart-mini" onclick="smartToggleAll('${group}',false)">全解除</button>
      </span>
    </div>`;
  const secs=[];
  // 患者情報
  const ptKeys=Object.keys(sel.patient);
  if(ptKeys.length){
    secs.push(`<div class="smart-sec">${secHead('👤 患者基本情報','patient',ptKeys.length)}
      ${ptKeys.map(k=>{
        const v=r.patient[k]; const has=p[k];
        return `<div class="smart-row">${chk(sel.patient[k],`smartToggle('patient','${k}')`)}
          <span class="smart-lbl">${SMART_PT_LABELS[k]||k}</span>
          <span class="smart-val">${esc(String(v))}</span>
          ${has?`<span class="smart-note">既存: ${esc(String(has).slice(0,20))} → 上書き注意</span>`:''}</div>`;
      }).join('')}</div>`);
  }
  // 検査値
  if(r.labs.length){
    secs.push(`<div class="smart-sec">${secHead('🧪 検査値','labs',r.labs.length)}
      <div class="smart-lab-grid">
      ${r.labs.map((lv,i)=>{
        const flag=getFlag(lv.name,lv.val);
        const fCls=flag==='HH'||flag==='LL'?'crit':flag?'abn':'';
        return `<div class="smart-labchip ${fCls}" onclick="smartToggle('labs',${i})">
          <span class="smart-chk${sel.labs[i]?' on':''}">${sel.labs[i]?'✓':''}</span>
          <b>${esc(lv.name)}</b> ${lv.val}${esc(lv.unit?' '+lv.unit:'')}${flag?`<span class="smart-flag">${flag}</span>`:''}
          <span style="color:var(--g400);font-size:9px">${esc(lv.date.slice(5))}</span></div>`;
      }).join('')}</div></div>`);
  }
  // バイタル
  if(r.vitals.length){
    secs.push(`<div class="smart-sec">${secHead('❤️ バイタル','vitals',r.vitals.length)}
      ${r.vitals.map((v,i)=>`<div class="smart-row" onclick="smartToggle('vitals',${i})">${chk(sel.vitals[i],'')}<span class="smart-val">${esc(v)}</span></div>`).join('')}</div>`);
  }
  // 内服薬
  if(r.medications.length){
    secs.push(`<div class="smart-sec">${secHead('💊 内服薬','medications',r.medications.length)}
      ${r.medications.map((m,i)=>{
        const t=[m.am&&'朝',m.noon&&'昼',m.pm&&'夕',m.bed&&'眠前'].filter(Boolean).join('・');
        return `<div class="smart-row" onclick="smartToggle('medications',${i})">${chk(sel.medications[i],'')}
          <span class="smart-val"><b>${esc(m.drug)}</b>${m.dose?' '+esc(m.dose):''}${t?` <span style="color:var(--g500)">(${t})</span>`:''}</span></div>`;
      }).join('')}</div>`);
  }
  // 点滴
  if(r.ivLines.length){
    secs.push(`<div class="smart-sec">${secHead('💧 点滴・注射','ivLines',r.ivLines.length)}
      ${r.ivLines.map((iv,i)=>`<div class="smart-row" onclick="smartToggle('ivLines',${i})">${chk(sel.ivLines[i],'')}
        <span class="smart-val"><b>${esc(iv.drug)}</b>${iv.dose?' '+esc(iv.dose):''}${iv.rate?' '+esc(iv.rate)+'mL/h':''}${iv.start?' '+esc(iv.start)+'〜':''}${iv.end?esc(iv.end):''}</span></div>`).join('')}</div>`);
  }
  // 心エコー
  if(r.echo){
    const pts=Object.entries(r.echo).filter(([k,v])=>k!=='findings'&&v!==undefined&&v!==null&&v!=='').map(([k,v])=>`${k.toUpperCase()} ${v}`).join(' / ');
    secs.push(`<div class="smart-sec"><div class="smart-sec-head"><span>🫀 心エコー</span></div>
      <div class="smart-row" onclick="smartToggle('echo')">${chk(sel.echo,'')}
        <span class="smart-val">${esc(pts)}${r.echo.findings?`<div style="color:var(--g500);font-size:11px;margin-top:2px">${esc(r.echo.findings)}</div>`:''}</span></div></div>`);
  }
  // 文章情報
  const histKeys=Object.keys(sel.histories);
  if(histKeys.length){
    secs.push(`<div class="smart-sec">${secHead('📄 文章情報','histories',histKeys.length)}
      ${histKeys.map(k=>`<div class="smart-row" onclick="smartToggle('histories','${k}')" style="align-items:flex-start">${chk(sel.histories[k],'')}
        <span class="smart-lbl">${SMART_HIST_LABELS[k]||k}</span>
        <span class="smart-val" style="white-space:pre-wrap">${esc(String(r.histories[k]).slice(0,300))}${String(r.histories[k]).length>300?'…':''}</span>
        ${p[k]&&String(p[k]).trim()?'<span class="smart-note">既存に追記</span>':''}</div>`).join('')}</div>`);
  }
  // OPQRST
  if(r.opqrst){
    const okeys=Object.keys(sel.opqrst);
    secs.push(`<div class="smart-sec">${secHead('🔎 OPQRST','opqrst',okeys.length)}
      ${okeys.map(k=>`<div class="smart-row" onclick="smartToggle('opqrst','${k}')">${chk(sel.opqrst[k],'')}
        <span class="smart-lbl">${OPQRST_SHORT[k]||k}</span>
        <span class="smart-val">${esc(r.opqrst[k])}</span>
        ${((p.opqrst||{})[k]||'').trim()?'<span class="smart-note">既存に追記</span>':''}</div>`).join('')}</div>`);
  }
  // ROS症状チェック
  if((r.symptoms||[]).length){
    secs.push(`<div class="smart-sec">${secHead('🩹 症状チェック（ROS陽性）','symptoms',r.symptoms.length)}
      <div class="smart-lab-grid">
      ${r.symptoms.map((sx,i)=>`<div class="smart-labchip" onclick="smartToggle('symptoms',${i})">
        <span class="smart-chk${sel.symptoms[i]?' on':''}">${sel.symptoms[i]?'✓':''}</span>${esc(sx.label)}</div>`).join('')}</div></div>`);
  }
  // タスク
  if(r.tasks.length){
    secs.push(`<div class="smart-sec">${secHead('✅ タスク','tasks',r.tasks.length)}
      ${r.tasks.map((t,i)=>`<div class="smart-row" onclick="smartToggle('tasks',${i})">${chk(sel.tasks[i],'')}
        <span class="smart-lbl">${esc(t.cat)}</span><span class="smart-val">${esc(t.text)}</span></div>`).join('')}</div>`);
  }
  const empty=!secs.length;
  return `
    <div class="modal-head">
      <div class="modal-title">🪄 取込プレビュー</div>
      <button class="modal-close" onclick="closeSmartImport()">&#215;</button>
    </div>
    <div class="modal-body">
      ${r.summary?`<div style="background:#f5f3ff;border:1px solid #ddd6fe;border-radius:7px;padding:9px 12px;font-size:12px;color:#5b21b6;margin-bottom:10px">💡 ${esc(r.summary)}</div>`:''}
      ${empty?'<div style="text-align:center;color:var(--g400);padding:30px 0">抽出できる項目が見つかりませんでした</div>':secs.join('')}
      <div style="font-size:11px;color:var(--g500);margin-top:8px">チェックした項目だけが取り込まれます。既存と重複しそうな項目は自動でチェックを外しています。</div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="smartBack()">← 戻る</button>
      <button class="btn btn-ghost" onclick="closeSmartImport()">キャンセル</button>
      ${empty?'':`<button class="btn btn-primary" style="background:linear-gradient(135deg,#059669,#047857);min-width:140px" onclick="applySmartImport()">✓ 選択項目を取り込む</button>`}
    </div>`;
}

function renderSidebar(){
  const list=document.getElementById('patientList'); if(!list) return;
  const filterEl=document.getElementById('sidebarFilter');
  const hospitals=[...new Set(S.patients.filter(p=>p.hospital&&!p.archived).map(p=>p.hospital))];
  const archCount=S.patients.filter(p=>p.archived).length;
  if(filterEl){
    filterEl.innerHTML=(hospitals.length||archCount)?`<div class="sb-filter"><div class="sbf-pills">
      <button class="sbf-pill${S.hospitalFilter==='all'?' active':''}" onclick="S.hospitalFilter='all';renderSidebar()">全て</button>
      ${hospitals.map(h=>`<button class="sbf-pill${S.hospitalFilter===h?' active':''}" onclick="S.hospitalFilter=decodeURIComponent('${encodeURIComponent(h)}');renderSidebar()">${esc(h)}</button>`).join('')}
      ${archCount?`<button class="sbf-pill arch${S.hospitalFilter==='__archived__'?' active':''}" onclick="S.hospitalFilter='__archived__';renderSidebar()">退院(${archCount})</button>`:''}
    </div></div>`:'';
  }
  let visible;
  if(S.hospitalFilter==='__archived__') visible=S.patients.filter(p=>p.archived);
  else if(S.hospitalFilter==='all') visible=S.patients.filter(p=>!p.archived);
  else visible=S.patients.filter(p=>!p.archived&&p.hospital===S.hospitalFilter);
  if(!visible.length){
    list.innerHTML=`<div style="padding:14px;text-align:center;opacity:.45;font-size:11px">${S.hospitalFilter==='__archived__'?'退院患者はいません':'患者がいません'}</div>`;
    return;
  }
  list.innerHTML=visible.map(p=>{
    const done=p.tasks.filter(t=>t.status==='done').length;
    const check=p.tasks.filter(t=>t.status==='check').length;
    const total=p.tasks.length, rem=total-done-check;
    let badge='';
    if(check>0) badge=`<span class="task-badge has-check">${check}要確認</span>`;
    else if(rem>0) badge=`<span class="task-badge">${rem}件残</span>`;
    else if(total>0) badge=`<span class="task-badge all-done">完了</span>`;
    return `<div class="pt-card${p.id===S.sel?' active':''}" onclick="selectPatient('${p.id}')">
      <div class="pt-name">${esc(p.name)}</div>
      <div class="pt-meta"><span class="pt-room">${esc(p.room||'病室未設定')}</span>${badge}</div>
    </div>`;
  }).join('');
}

function ivEndingSoon(p){
  const out=[]; const n=new Date(); const cur=n.getHours()*60+n.getMinutes();
  (p.ivLines||[]).forEach(iv=>{
    if(!iv.end) return;
    const m=String(iv.end).match(/^(\d{1,2}):(\d{2})$/); if(!m) return;
    const t=(+m[1])*60+(+m[2]); const diff=t-cur;
    if(diff>=-30&&diff<=120) out.push(`${iv.drug} ${iv.end}終了${diff<0?'⚠超過':diff<=30?'まもなく':''}`);
  });
  return out;
}
function getPatientAlerts(p){
  const byName={};
  (p.labs||[]).forEach(lv=>{ if(!byName[lv.name]||lv.date>=byName[lv.name].date) byName[lv.name]=lv; });
  const crit=[],abn=[];
  Object.entries(byName).forEach(([name,lv])=>{
    const f=getFlag(name,lv.val);
    if(f==='HH'||f==='LL') crit.push(`${name} ${lv.val}`);
    else if(f==='H') abn.push(`${name} ${lv.val}↑`);
    else if(f==='L') abn.push(`${name} ${lv.val}↓`);
  });
  let medsDue=0;
  const _today=todayStr();
  (p.medPlan||[]).filter(pl=>planActiveOn(pl,_today)).forEach(pl=>{
    planSlots(pl).forEach(([k])=>{ if(!isMedChecked(p,_today,pl.id,k)) medsDue++; });
  });
  return {
    crit, abn, medsDue,
    pend:p.tasks.filter(t=>t.status==='pending').length,
    chk:p.tasks.filter(t=>t.status==='check').length,
    done:p.tasks.filter(t=>t.status==='done').length,
    total:p.tasks.length,
    iv:ivEndingSoon(p),
    todosLeft:(p.todos||[]).filter(t=>!t.done).length,
    firstTodo:(((p.todos||[]).find(t=>!t.done))||{}).text||'',

const TABS=[
  ['today','📋','今日'],['history','📖','病歴'],['exam','🩺','診察'],['tests','🧪','検査'],
  ['dx','🎯','診断'],['tx','💊','治療'],['nutrition','🍱','栄養'],['docs','📄','書類'],
  ['ai','🤖','AI'],['records','📝','記録'],
];
const TAB_MAP={tasks:'today',lab:'tests',summary:'docs',memo:'history',cq:'records'};
function normTab(t){ return TAB_MAP[t]||t; }
function switchTab(tab){
  S.tab=normTab(tab);
  document.querySelectorAll('#tabBar .tab-btn').forEach(b=>{ b.classList.toggle('active',b.dataset.tab===S.tab); });
  renderTab();
}
function renderTab(){
  S.tab=normTab(S.tab);
  try {
    switch(S.tab){
      case 'today':     renderTasks(); break;
      case 'history':   renderHistory(); break;
      case 'exam':      renderExam(); break;
      case 'tests':     renderLab(); break;
      case 'dx':        renderDx(); break;
      case 'tx':        renderTx(); break;
      case 'nutrition': renderNutrition(); break;
      case 'docs':      renderDocs(); break;
      case 'ai':        renderAI(); break;
      case 'records':   renderRecords(); break;
      default: S.tab='today'; renderTasks();
    }
  } catch(e){
    console.error('renderTab error (tab='+S.tab+'):',e);
    const c=document.getElementById('tabContent');
    if(c) c.innerHTML=`<div style="padding:20px;color:var(--danger);font-size:13px">&#9888; 表示エラー: ${esc(e.message)}<br><button class="btn btn-sm" style="margin-top:8px" onclick="switchTab('today')">今日タブに戻る</button></div>`;
  }
}

function addTodo(){
  const p=selP(); if(!p) return;
  const el=document.getElementById('todo-new'); if(!el) return;
  const t=el.value.trim(); if(!t) return;
  if(!p.todos) p.todos=[];
  p.todos.push({id:uid(),text:t,done:false,doneAt:null});
  el.value='';
  save(); renderTasks();
  setTimeout(()=>{ const e=document.getElementById('todo-new'); if(e) e.focus(); },40);
}
function toggleTodo(id){
  const p=selP(); if(!p) return;
  const t=(p.todos||[]).find(x=>x.id===id); if(!t) return;
  t.done=!t.done; t.doneAt=t.done?nowHM():null;
  save(); renderTasks();
}
function deleteTodo(id){
  const p=selP(); if(!p) return;
  p.todos=(p.todos||[]).filter(x=>x.id!==id);
  save(); renderTasks();
}
function clearDoneTodos(){
  const p=selP(); if(!p) return;
  p.todos=(p.todos||[]).filter(x=>!x.done);
  save(); renderTasks();
}

function togglePlanReview(planId){
  const p=selP(); if(!p) return;
  const d=todayStr();
  if(!p.planReviews) p.planReviews={};
  if(!p.planReviews[d]) p.planReviews[d]={};
  p.planReviews[d][planId]=!p.planReviews[d][planId];
  save(); renderTasks();
}
function savePlanReviewMemo(planId,val){
  const p=selP(); if(!p) return;
  const pl=(p.medPlan||[]).find(x=>x.id===planId);
  if(pl){ pl.reviewMemo=val; save(); }
}
function toggleNightItem(name){
  const p=selP(); if(!p) return;
  if(!p.nightWatch) p.nightWatch={items:{},handover:''};
  p.nightWatch.items[name]=!p.nightWatch.items[name]; save();
  const i=NIGHT_WATCH_ITEMS.indexOf(name);
  const el=document.getElementById(`nw-item-${i}`);
  if(el) el.classList.toggle('active',!!p.nightWatch.items[name]);
}
function saveNightHandover(){
  const p=selP(); if(!p) return;
  if(!p.nightWatch) p.nightWatch={items:{},handover:''};
  const el=document.getElementById('nw-handover'); if(el){p.nightWatch.handover=el.value;save();}
}
function toggleDeviceCheck(name,field){
  const p=selP(); if(!p) return;
  if(!p.deviceChecks) p.deviceChecks={};
  if(!p.deviceChecks[name]) p.deviceChecks[name]={needed:false,removable:false};
  p.deviceChecks[name][field]=!p.deviceChecks[name][field]; save();
  const i=DEVICE_NAMES.indexOf(name);
  if(i<0) return;
  const el=document.getElementById(`dev-${field}-${i}`);
  if(!el) return;
  const chk=p.deviceChecks[name][field];
  el.className=`dev-chk-box ${chk?(field==='needed'?'chk-y':'chk-r'):''}`;
  el.textContent=chk?'✓':'';
  const sp=el.nextElementSibling;
  if(sp) sp.style.color=chk?(field==='needed'?'#16a34a':'#dc2626'):'var(--g500)';
}
function renderTodoSection(p){
  const todos=p.todos||[];
  const open=todos.filter(t=>!t.done), done=todos.filter(t=>t.done);
  const row=t=>`
    <div class="todo-row${t.done?' todo-done':''}">
      <span class="smart-chk${t.done?' on':''}" onclick="toggleTodo('${t.id}')">${t.done?'✓':''}</span>
      <span class="todo-text" onclick="toggleTodo('${t.id}')">${esc(t.text)}</span>
      ${t.done&&t.doneAt?`<span class="todo-ts">${esc(t.doneAt)}</span>`:''}
      <button class="task-del" onclick="deleteTodo('${t.id}')" title="削除">&#215;</button>

  return `<div class="sec-card" style="border-left:4px solid #2563eb">
    <div class="sec-head">

      <input type="text" id="todo-new" placeholder="やること・考えることを追加（Enterで登録）例: K再検の結果を確認して指導医に報告" style="flex:1;padding:7px 11px;border:1px solid var(--g300);border-radius:8px;font-size:12.5px;font-family:inherit" onkeydown="if(event.key==='Enter')addTodo()">
      <button class="btn btn-primary btn-sm" onclick="addTodo()">＋ 追加</button>
    </div>
    ${open.map(row).join('')}${done.map(row).join('')}
    ${todos.length?'':'<div style="font-size:10.5px;color:var(--g400);margin-top:6px">未完了のTODOは翌日に持ち越され、完了分は「🌅本日リセット」で消えます</div>'}
  </div>`;
}

  [/降圧|Ca拮抗|ARB|ACE|β遮断/, '血圧・脈拍（目標値を確認）'],
  [/抗菌|抗真菌/, '解熱・症状改善、WBC/CRP、投与日数（3日目で効果判定）、培養結果'],
  [/糖尿病|インスリン/, '血糖の推移、低血糖症状'],
  [/抗凝固/, '出血兆候、腎機能'],
  [/抗血小板/, '出血兆候'],
  [/睡眠|抗不安/, 'ふらつき・転倒・せん妄、漫然投与の見直し'],
  [/オピオイド|鎮痛/, '疼痛スケール、副作用（便秘・嘔気・眠気）'],
  [/ステロイド/, '血糖・感染兆候・不眠'],
  [/輸液|栄養/, 'in-out・体重・電解質、経口への移行検討'],
  [/緩下|下剤/, '排便状況'],
];
function medMonitorHint(pl){
  for(const [re,h] of MED_MONITOR){ if(re.test(pl.drug)) return h; }
  const dbHit=DRUG_DB.find(d=>d[0]===pl.drug);
  const cat=dbHit?dbHit[2]:'';
  for(const [re,h] of CAT_MONITOR){ if(re.test(cat)) return h; }
  return '効果の指標（何が改善したら有効と判断するか）と代表的な副作用・採血フォローを確認';
}
function renderTxReview(p){
  const today=todayStr();
  const plans=(p.medPlan||[]).filter(pl=>planActiveOn(pl,today));
  if(!plans.length){
    return `<div class="sec-card" style="border-left:4px solid #6366f1">
      <div class="sec-head"><span>🧠 治療の検討（点滴・内服の見直し）</span><button class="smart-mini" onclick="switchTab('tx')">💊 治療タブで登録</button></div>
      <div style="font-size:11px;color:var(--g500)">治療タブで点滴・内服を登録すると、薬ごとに「効果は何でみるか・いつまで続けるか」の検討ポイントがここに毎日表示されます。</div>
    </div>`;
  }
  const reviewed=(p.planReviews&&p.planReviews[today])||{};
  let done=0;
  const row=pl=>{
    const ck=!!reviewed[pl.id]; if(ck) done++;
    const ds=pl.startDate?Math.floor((new Date(today+'T00:00:00')-new Date(pl.startDate+'T00:00:00'))/86400000)+1:null;
    const think=pl.type==='iv'
      ?`💭 経口摂取できるなら内服・経口補水への切替を検討 ／ この量・組成で適切か（<a href="javascript:switchTab('tx')" style="color:#0e7490;font-weight:700">💧輸液計算</a>）${pl.endDate?` ／ ${esc(pl.endDate)}まで`:' ／ 終了日未設定 — いつまで点滴でいくか'}`
      :`⏳ ${pl.endDate?`${esc(pl.endDate)}まで — 継続/中止の判断は`:'終了日未設定（継続処方）— いつまで続けるか・処方切れに注意、'}中止・減量できないかも検討`;
    return `<div class="rev-row${ck?' rev-done':''}">
      <div class="rev-head">
        <span class="tm-type ${pl.type}">${pl.type==='iv'?'点滴':'内服'}</span>
        <b style="font-size:12.5px">${esc(pl.drug)}</b>
        ${pl.dose?`<span style="color:var(--g500);font-size:11px">${esc(pl.dose)}</span>`:''}
        ${ds?`<span class="rev-day">${ds}日目</span>`:''}
        <button class="rev-chk${ck?' on':''}" onclick="togglePlanReview('${pl.id}')">${ck?'✓ 検討済':'検討する'}</button>
      </div>
      <div class="rev-line">📈 みるもの: ${medMonitorHint(pl)}</div>
      <div class="rev-line rev-think">${think}</div>
      <input type="text" class="rev-memo" placeholder="検討メモ（例: 7/6に経口切替予定・BP目標130未満）" value="${esc(pl.reviewMemo||'')}" oninput="savePlanReviewMemo('${pl.id}',this.value)">
    </div>`;
  };
  const ivRows=plans.filter(pl=>pl.type==='iv').map(row).join('');
  const poRows=plans.filter(pl=>pl.type!=='iv').map(row).join('');
  return `<div class="sec-card" style="border-left:4px solid #6366f1">
    <div class="sec-head">
      <span>🧠 治療の検討 <span class="sec-cnt">${done}/${plans.length}</span></span>
      <span style="font-size:10px;color:var(--g400)">朝・帰りに1剤ずつ「この治療のままでいいか」を考えてチェック</span>
    </div>
    ${ivRows}${poRows}
  </div>`;
}

function renderTasks(){
  const p=selP(); const c=document.getElementById('tabContent'); if(!p||!c) return;
  const done=p.tasks.filter(t=>t.status==='done').length;
  const check=p.tasks.filter(t=>t.status==='check').length;
  const total=p.tasks.length, pend=total-done-check;
  const pct=total?Math.round(done/total*100):0;
  const summary=`<div class="tasks-summary">
    <div class="s-stat"><div class="s-num n-done">${done}</div><div class="s-lbl">実施済み</div></div>
    <div class="s-stat"><div class="s-num n-check">${check}</div><div class="s-lbl">要確認</div></div>
    <div class="s-stat"><div class="s-num n-pend">${pend}</div><div class="s-lbl">未実施</div></div>
    <div class="prog-bar">
      <div class="prog-info"><span>進捗</span><span>${pct}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
  </div>`;
  const groups=CATEGORIES.map(cat=>{
    const tasks=p.tasks.filter(t=>t.cat===cat.name);
    const cd=tasks.filter(t=>t.status==='done').length;
    const cc=tasks.filter(t=>t.status==='check').length;
    const collapsed=catCollapsed(cat.name);
    const cntCls=cc>0?'c-check':cd===tasks.length&&tasks.length>0?'c-done':'';
    const safeId='ci-'+btoa(encodeURIComponent(cat.name)).replace(/=/g,'');
    const items=tasks.map(t=>{
      const lbl=t.status==='done'?`&#10003; ${esc(t.doneAt||'')}`:t.status==='check'?'要確認':'未実施';
      return `<div class="task-item s-${t.status}">
        <button class="status-btn" onclick="cycleStatus('${t.id}')">${lbl}</button>
        <span class="task-text">${esc(t.text)}</span>
        <button class="task-del" onclick="deleteTask('${t.id}')">&#215;</button>
      </div>`;
    }).join('');
    return `<div class="cat-group">
      <div class="cat-hdr" onclick="toggleCollapse('${esc(cat.name)}')">
        <div class="cat-icon" style="background:${cat.color}">${cat.abbr}</div>
        <span class="cat-title">${esc(cat.name)}</span>
        <span class="cat-count ${cntCls}">${tasks.length?`${cd}/${tasks.length}`:''}</span>
        <span class="cat-arrow">${collapsed?'&#9654;':'&#9660;'}</span>
      </div>
      ${collapsed?'':` <div class="cat-body">
        ${tasks.length===0?'<div class="cat-empty">タスクがありません</div>':''}
        ${items}
        ${(cat.name==='点滴・輸液'||cat.name==='内服薬')?`<div style="font-size:10px;color:var(--g400);padding:4px 2px">薬剤の登録・投与スケジュールは <a href="javascript:switchTab('tx')" style="color:var(--primary);font-weight:700">💊 治療タブ</a> で管理（毎日の実施チェックは上の「本日の投与」に自動表示）</div>`:''}
        ${cat.name==='デバイス・ライン'?renderDeviceCheckSection(p):''}
        <div class="add-inline">
          <input type="text" id="${safeId}" placeholder="タスクを追加..."
            onkeydown="if(event.key==='Enter')addCustomTask_byId('${safeId}','${esc(cat.name)}')">
          <button class="btn btn-primary btn-sm" onclick="addCustomTask_byId('${safeId}','${esc(cat.name)}')">追加</button>
          ${cat.defaults.length?`<button class="tmpl-btn" onclick="addTemplates('${esc(cat.name)}')">テンプレ追加</button>`:''}
        </div>
      </div>`}
    </div>`;
  }).join('');
  c.innerHTML=renderTodoSection(p)+renderTodayMeds(p)+renderTxReview(p)+summary+renderTaskSuggestSection(p)+renderTaskPasteArea()+groups+renderNightWatchSection(p);
}

function guessTaskCat(text){
  const t=text;
  const rules=[
    {cat:'バイタル確認',    keys:['体温','血圧','脈拍','SpO','呼吸数','バイタル','HR','BT','SBP','DBP','体重測定']},
    {cat:'点滴・輸液',      keys:['点滴','輸液','生食','生理食塩水','ルート確認','滴下','ヘパリン','フラッシュ','DIV','側管']},
    {cat:'内服薬',          keys:['内服','服薬','投薬','与薬','薬','錠','カプセル','朝薬','昼薬','夕薬','眠前']},
    {cat:'処置',            keys:['処置','創傷','創部','包帯','ガーゼ','ドレーン','カテーテル交換','抜糸','抜釘','洗浄']},
    {cat:'観察項目',        keys:['観察','意識','JCS','GCS','疼痛','NRS','浮腫','皮膚','チアノーゼ','呼吸状態','腸蠕動','腹部']},
    {cat:'検査',            keys:['採血','検査','培養','X線','CT','MRI','エコー','心電図','培養結果','検尿','スワブ','レントゲン']},
    {cat:'食事・栄養・排泄',keys:['食事','摂取量','水分','飲水','尿量','排便','排尿','血糖','下痢','嘔吐','経管','経口','PEG','NST']},
    {cat:'デバイス・ライン',keys:['ルート管理','CV','PICC','中心静脈','尿道','酸素','NPPV','人工呼吸','胃管','留置','抑制','ミトン']},
    {cat:'退院・調整',      keys:['退院','調整','MSW','ソーシャル','リハビリ','PT','OT','ST','施設','転院','サマリ','紹介状','家族説明','退院指導','外来']},
    {cat:'記録・報告',      keys:['記録','報告','看護記録','申し送り','ドクターコール','カルテ','SOAP']},
  ];
  for(const r of rules){
    if(r.keys.some(k=>t.includes(k))) return r.cat;
  }
  return 'その他';
}

function autoAddTasks(){
  const p=selP(); if(!p) return;
  const raw=(document.getElementById('taskPasteArea')||{}).value||'';
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  if(!lines.length){ alert('テキストを入力してください'); return; }

  let added=0;
  lines.forEach(text=>{
    const cat=guessTaskCat(text);
    // 重複チェック
    if(p.tasks.some(t=>t.text===text)) return;
    p.tasks.push({id:uid(), text, cat, status:'pending', doneAt:null});
    added++;
  });

  if(!added){ alert('追加できるタスクがありませんでした（すべて重複）'); return; }
  save();
  S.taskPasteOpen=false;
  renderTasks(); renderSidebar();
}

function renderLabCards(){
  const p=selP(); const c=document.getElementById('tabContent'); if(!p||!c) return;
  const byName={};
  p.labs.forEach(lv=>{ if(!byName[lv.name]) byName[lv.name]=[]; byName[lv.name].push(lv); });
  const criticals=[];
  const cards=Object.entries(byName).map(([name,entries])=>{
    const latest=entries.sort((a,b)=>a.date<b.date?1:-1)[0];
    const flag=getFlag(name,latest.val);
    if(flag==='HH'||flag==='LL') criticals.push(name);
    const ref=LAB_REF[name];
    const isQual=ref&&ref.qual;
    const dispVal=isQual?(latest.val>0?'陽性':'陰性'):latest.val;
    const cls=isQual?(latest.val>0?'fHH':''):flag?`f${flag}`:'';
    const flagDisp=isQual?(latest.val>0?'陽性':''):flag;
    const range=(!isQual&&ref)?`基準: ${ref.lo!==null?ref.lo:'?'} ～ ${ref.hi!==null?ref.hi:'?'} ${ref.unit}`:'';
    return `<div class="lab-card ${cls}">
      ${flagDisp?`<span class="lc-flag">${flagDisp}</span>`:''}
      <div class="lc-name">${esc(name)}</div>
      <div><span class="lc-val" style="${isQual&&latest.val>0?'font-size:14px;':''}">
        ${isQual?`<span style="color:${latest.val>0?'var(--danger)':'var(--success)'};font-weight:800">${dispVal}</span>`:dispVal}
      </span>${!isQual?`<span class="lc-unit">${esc(latest.unit)}</span>`:''}</div>
      ${range?`<div class="lc-range">${range}</div>`:''}
      <div class="lc-ts">${esc(latest.date||'')} ${esc(latest.ts||'')}</div>
      ${entries.length>1?`<div class="lc-ts">計 ${entries.length} 件</div>`:''}
      <button class="lc-del" onclick="deleteLab('${latest.id}')" title="削除">&#215;</button>
    </div>`;
  }).join('');

// ── TABLE ─────────────────────────────────────────────────
function renderLabTable(){
  const p=selP(); const c=document.getElementById('tabContent'); if(!p||!c) return;
  const dateSet=new Set(), nameSet=new Set();
  p.labs.forEach(lv=>{ if(lv.date) dateSet.add(lv.date); nameSet.add(lv.name); });
  const dates=[...dateSet].sort();
  const names=[...nameSet];
  let tableHtml='<div style="text-align:center;padding:20px;color:#bbb;font-size:13px">検査値がありません</div>';
  if(dates.length&&names.length){
    const map={};
    p.labs.forEach(lv=>{ if(!lv.date) return; if(!map[lv.name]) map[lv.name]={}; const ex=map[lv.name][lv.date]; if(!ex||lv.date>=ex.date) map[lv.name][lv.date]=lv; });
    tableHtml=`<div class="lab-matrix-wrap"><table class="lab-matrix">
      <thead><tr><th class="name-th">項目</th>${dates.map(d=>`<th>${esc(d.slice(5).replace('-','/'))}</th>`).join('')}</tr></thead>
      <tbody>${names.map(name=>{
        const ref=LAB_REF[name];
        const unit=ref?ref.unit:'';
        const range=ref?`${ref.lo??'?'}-${ref.hi??'?'}`:'';
        return `<tr>
          <td class="name-td">${esc(name)}<span class="lm-unit">${esc(unit)}</span>${range?`<span class="lm-range">${range}</span>`:''}</td>
          ${dates.map(d=>{
            const lv=map[name]&&map[name][d];
            if(!lv) return '<td class="empty-td">—</td>';
            const flag=getFlag(name,lv.val);
            const cls=flag?`c${flag}`:'';
            const sup=flag?`<span class="flag-sup">${flag}</span>`:'';
            return `<td class="${cls}">${lv.val}${sup}</td>`;
          }).join('')}
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  }
  c.innerHTML=labSubNav()+tableHtml+'<div style="margin-top:14px">'+labAddForm()+'</div>';
}
